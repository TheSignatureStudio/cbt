<script>
(function(){

const SUPABASE_URL = "https://xiaoorbmjvjqkicbzvgi.supabase.co";        // 예: https://xxxx.supabase.co
const SUPABASE_ANON_KEY = "sb_publishable_OydsKiGivvM11lz3-_CwwA_HICVdeqC"; // Supabase anon(public) 키

const ls={ get(k){try{return localStorage.getItem(k);}catch(e){return mem[k]??null;}},
           set(k,v){try{localStorage.setItem(k,v);}catch(e){mem[k]=v;}} };
const LKEY='cbt_all';

function snapshot(){ return { wrong:[...ST.wrong], stats:ST.stats, bySec:ST.bySec }; }
let saveTimer=null;
function persist(){ ls.set(LKEY, JSON.stringify(snapshot())); if(sb&&ST.user){ clearTimeout(saveTimer); saveTimer=setTimeout(cloudSave,700); } }
async function cloudSave(){ try{ await sb.from('cbt_progress').upsert({ user_id:ST.user.id, data:snapshot(), updated_at:new Date().toISOString() }); }catch(e){} }
async function cloudLoad(){ try{

  if(error) return;
  const r=(data&&data.data)||{}; (r.wrong||[]).forEach(x=>ST.wrong.add(x));

  const rb=r.bySec||{}; Object.keys(rb).forEach(k=>{ if(!ST.bySec[k] || (rb[k].seen||0)>(ST.bySec[k].seen||0)) ST.bySec[k]=rb[k]; });
  persist();
}catch(e){} }
// 접근자
function getWrong(){ return [...ST.wrong]; }
function addWrong(id){ if(!ST.wrong.has(id)){ ST.wrong.add(id); persist(); } }
function delWrong(id){ if(ST.wrong.delete(id)){ persist(); } }
function setWrong(a){ ST.wrong=new Set(a); persist(); }
function bumpStat(q,ok){ ST.stats.solved++; if(ok)ST.stats.correct++; if(q&&q.section){ const k=q.subject+' · '+q.section; const e=ST.bySec[k]||(ST.bySec[k]={seen:0,correct:0}); e.seen++; if(ok)e.correct++; } persist(); }

// ---------- 인증(이메일/비밀번호) ----------
function userName(u){ const m=(u&&u.user_metadata)||{}; return m.name||m.full_name||m.nickname||m.preferred_username||(u&&u.email)||'내 계정'; }

  } else {
    const b=el(`<button class="btn sm">로그인</button>`); b.onclick=openAuth; a.appendChild(b);
  }
}

  if(m.includes('password')&&m.includes('6')) return '비밀번호는 6자 이상이어야 합니다';
  if(m.includes('not confirmed')||m.includes('confirm')) return '이메일 인증이 필요합니다. 메일함을 확인하세요';
  if(m.includes('rate')) return '잠시 후 다시 시도하세요';
  return m||'오류가 발생했습니다'; }
function closeAuth(){ if(openAuth._ov){ openAuth._ov.remove(); openAuth._ov=null; } }
function openAuth(){

  const card=el(`<div class="modal-card"></div>`);
  function render(){
    card.innerHTML='';
    card.appendChild(el(`<div class="h1" style="margin:0 0 2px">${mode==='login'?'로그인':'회원가입'}</div>`));
    card.appendChild(el(`<div class="small muted" style="margin-bottom:14px">이메일과 비밀번호로 ${mode==='login'?'로그인합니다':'가입합니다'}</div>`));
    const email=el(`<input class="inp" type="email" placeholder="이메일" autocomplete="username">`);
    const pw=el(`<input class="inp" type="password" placeholder="비밀번호 (6자 이상)" autocomplete="${mode==='login'?'current-password':'new-password'}">`);

    async function go(){
      const e=email.value.trim(), p=pw.value;
      if(!e||!p){ msg.style.color='var(--bad)'; msg.textContent='이메일과 비밀번호를 입력하세요'; return; }
      submit.disabled=true; const label=submit.textContent; submit.textContent='처리 중…';
      try{
        if(mode==='login'){
          const { error }=await sb.auth.signInWithPassword({ email:e, password:p });
          if(error){ msg.style.color='var(--bad)'; msg.textContent=loginErr(error.message); }
          else { closeAuth(); toast('로그인되었습니다'); }
        } else {
          const { data, error }=await sb.auth.signUp({ email:e, password:p });
          if(error){ msg.style.color='var(--bad)'; msg.textContent=loginErr(error.message); }
          else if(data && data.session){ closeAuth(); toast('가입되어 로그인되었습니다'); }
          else { msg.style.color='var(--ok)'; msg.textContent='가입 완료! 이메일 인증 메일을 확인한 뒤 로그인하세요.'; }
        }
      }catch(ex){ msg.style.color='var(--bad)'; msg.textContent='네트워크 오류'; }
      submit.disabled=false; submit.textContent=label;
    }
    submit.onclick=go; pw.onkeydown=(e)=>{ if(e.key==='Enter') go(); };
    const toggle=el(`<button class="btn ghost sm" style="width:100%;margin-top:8px">${mode==='login'?'계정이 없으신가요? 회원가입':'이미 계정이 있으신가요? 로그인'}</button>`);
    toggle.onclick=()=>{ mode=(mode==='login'?'signup':'login'); render(); };
    const close=el(`<button class="btn ghost sm" style="width:100%;margin-top:4px">닫기</button>`); close.onclick=closeAuth;
    card.appendChild(email); card.appendChild(pw); card.appendChild(msg); card.appendChild(submit); card.appendChild(toggle); card.appendChild(close);
    setTimeout(()=>{ try{ email.focus(); }catch(e){} },30);
  }
  ov.appendChild(card); ov.onclick=(e)=>{ if(e.target===ov) closeAuth(); };
  document.body.appendChild(ov); openAuth._ov=ov; render();
}
async function signOut(){ try{ await sb.auth.signOut(); }catch(e){} ST.user=null; ST.loaded=false; loadLocal(); renderAuth(); home(); }
async function onSignedIn(u){ ST.user=u; renderAuth(); if(!ST.loaded){ ST.loaded=true; await cloudLoad(); home(); } }
async function initAuth(){
  if(!CLOUD){ renderAuth(); return; }
  sb.auth.onAuthStateChange((ev,session)=>{ if(session&&session.user) onSignedIn(session.user); else { ST.user=null; renderAuth(); } });
  try{ const { data } = await sb.auth.getSession(); if(data&&data.session&&data.session.user){ onSignedIn(data.session.user); return; } }catch(e){}

}

function byId(id){ return DATA.find(q=>q.id===id); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function esc(s){ return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

function startPractice(list,label){ pstate={list,idx:0,picks:{},navOpen:false,label}; renderPractice(); }
function pStats(){ const s=pstate; let correct=0,done=0; s.list.forEach((q,i)=>{ const p=s.picks[i]; if(p!==undefined){ done++; if(p===q.answer)correct++; } }); return {correct,done,wrong:done-correct,unsolved:s.list.length-done}; }
function renderPractice(){
  clear();
  const s=pstate, i=s.idx, q=s.list[i], pick=s.picks[i], answered=pick!==undefined, st=pStats();
  const card=el(`<div class="card"></div>`);
  card.appendChild(el(`<div class="qmeta"><span>${esc(s.label)} · <b>${i+1}</b> / ${s.list.length}번째</span><span>맞힘 ${st.correct} · 오답 ${st.wrong} · 안풂 ${st.unsolved}</span></div>`));

    s.list.forEach((qq,j)=>{ const p=s.picks[j]; let cls=''; if(p!==undefined) cls=(p===qq.answer?' right':' wrongj'); if(j===i) cls+=' cur';
      const b=el(`<button class="qj${cls}">${j+1}</button>`); b.onclick=()=>{ s.idx=j; renderPractice(); }; grid.appendChild(b); });
    card.appendChild(grid);
    card.appendChild(el(`<div class="small muted" style="margin:-4px 0 10px">초록=정답 · 빨강=오답 · 회색=안 푼 문제 · 번호를 눌러 이동</div>`));
  }
  card.appendChild(el(`<div class="stem">${esc(q.stem)}</div>`));
  const ch=el(`<div class="choices"></div>`);
  q.choices.forEach((c,k)=>{
    const b=el(`<button class="choice"><span class="num">${NUM[k+1]}</span><span>${esc(c)}</span></button>`);
    if(answered){ b.setAttribute('disabled',''); if(k+1===q.answer)b.classList.add('correct'); else if(k+1===pick)b.classList.add('wrong'); else b.classList.add('dim'); }
    else b.onclick=()=>{ s.picks[i]=k+1; if(k+1!==q.answer) addWrong(q.id); bumpStat(q, k+1===q.answer); renderPractice(); };
    ch.appendChild(b);
  });
  card.appendChild(ch);
  if(answered){
    const ok=pick===q.answer;
    card.appendChild(el(`<div class="verdict ${ok?'ok':'bad'}">${ok?'정답입니다 ✓':'오답입니다 ✗  (정답 '+NUM[q.answer]+')'}</div>`));
    if(q.explanation) card.appendChild(el(`<div class="explain"><span class="tag">해설</span>${esc(q.explanation)}</div>`));
  }
  card.appendChild(reportBox(q.id));
  const nav=el(`<div class="navwrap"></div>`);

  const prev=el(`<button class="btn sm" ${i===0?'disabled':''}>← 이전</button>`); prev.onclick=()=>{ if(i>0){s.idx--;renderPractice();} };
  const last=i>=s.list.length-1;

  nav.appendChild(hb); nav.appendChild(el(`<span class="spacer"></span>`)); nav.appendChild(prev); nav.appendChild(next);

function startExam(list,label){
  estate={list,label,idx:0,answers:{},end:Date.now()+list.length*60000,timer:null};
  estate.timer=setInterval(tickExam,1000); renderExam();
}
function tickExam(){
  const t=document.getElementById('exam-timer'); if(!t){clearInterval(estate.timer);return;}
  const left=Math.max(0,Math.floor((estate.end-Date.now())/1000));
  const m=String(Math.floor(left/60)).padStart(2,'0'), s=String(left%60).padStart(2,'0');
  t.textContent=`${m}:${s}`; t.classList.toggle('danger',left<=60);
  if(left<=0){ clearInterval(estate.timer); submitExam(true); }
}
function renderExam(){
  clear(); const s=estate, q=s.list[s.idx];
  const card=el(`<div class="card"></div>`);
  card.appendChild(el(`<div class="qmeta"><span>${esc(s.label)} · ${s.idx+1} / ${s.list.length}</span><span class="timer" id="exam-timer">--:--</span></div>`));
  card.appendChild(el(`<div class="progress"><i style="width:${(s.idx+1)/s.list.length*100}%"></i></div>`));
  card.appendChild(el(`<div class="stem">${esc(q.stem)}</div>`));

  q.choices.forEach((c,i)=>{
    const on=s.answers[s.idx]===i+1;
    const b=el(`<button class="choice${on?' correct':''}"><span class="num">${NUM[i+1]}</span><span>${esc(c)}</span></button>`);
    b.onclick=()=>{ s.answers[s.idx]=i+1; renderExam(); }; ch.appendChild(b);
  });
  card.appendChild(ch);
  const nav=el(`<div class="navwrap"></div>`);
  const prev=el(`<button class="btn sm" ${s.idx===0?'disabled':''}>← 이전</button>`); prev.onclick=()=>{if(s.idx>0){s.idx--;renderExam();}};
  const next=el(`<button class="btn sm">다음 →</button>`); next.onclick=()=>{if(s.idx<s.list.length-1){s.idx++;renderExam();}};
  nav.appendChild(prev); nav.appendChild(el(`<span class="spacer"></span>`)); nav.appendChild(next);
  card.appendChild(nav);
  const jump=el(`<div class="qjump"></div>`);
  s.list.forEach((_,i)=>{ const j=el(`<button class="qj${s.answers[i]?' ans':''}${i===s.idx?' cur':''}">${i+1}</button>`); j.onclick=()=>{s.idx=i;renderExam();}; jump.appendChild(j); });
  card.appendChild(jump);
  const sub=el(`<div class="navwrap"><button class="btn primary" style="width:100%">제출하고 채점</button></div>`);
  sub.firstElementChild.onclick=()=>{ const un=s.list.length-Object.keys(s.answers).length;
    if(un>0 && !confirm(`미응답 ${un}문항이 있습니다. 제출할까요?`)) return; clearInterval(s.timer); submitExam(false); };
  card.appendChild(sub);
  app.appendChild(card); tickExam();
}
function submitExam(timeUp){
  clear(); const s=estate; let correct=0;
  s.list.forEach((q,i)=>{ const a=s.answers[i]; if(a===q.answer) correct++; else addWrong(q.id); if(a) bumpStat(q, a===q.answer); });
  const pct=Math.round(correct/s.list.length*100);
  app.appendChild(el(`<div class="card" style="text-align:center">
    <div class="h2">${timeUp?'시간 종료 · ':''}모의고사 결과 · ${esc(s.label)}</div>
    <div class="score">${pct}<span style="font-size:20px">%</span></div>
    <div class="muted">${s.list.length}문항 중 ${correct}문항 정답 · 오답 ${s.list.length-correct}개는 오답노트에 저장됨</div>
  </div>`));
  const row=el(`<div class="row" style="margin:14px 0"></div>`);
  const again=el(`<button class="btn">다시</button>`); again.onclick=examSetup;
  const wr=el(`<button class="btn">오답노트 (${getWrong().length})</button>`); wr.onclick=review;
  const h=el(`<button class="btn primary">홈</button>`); h.onclick=home;
  row.appendChild(again); row.appendChild(wr); row.appendChild(el(`<span class="spacer"></span>`)); row.appendChild(h);
  app.appendChild(row);
  app.appendChild(el(`<div class="h2">문항별 리뷰</div>`));
  s.list.forEach((q,i)=>{
    const a=s.answers[i], ok=a===q.answer;
    const c=el(`<div class="card" style="margin-bottom:10px"></div>`);
    c.appendChild(el(`<div class="qmeta"><span>${i+1}. ${esc(q.section)}</span><span class="${ok?'verdict ok':'verdict bad'}" style="margin:0">${ok?'정답':'오답'}</span></div>`));
    c.appendChild(el(`<div class="stem" style="font-size:15.5px">${esc(q.stem)}</div>`));
    const cl=el(`<div class="choices"></div>`);
    q.choices.forEach((t,j)=>{ let k=''; if(j+1===q.answer)k=' correct'; else if(j+1===a)k=' wrong'; else k=' dim';
      cl.appendChild(el(`<div class="choice${k}" disabled><span class="num">${NUM[j+1]}</span><span>${esc(t)}</span></div>`)); });
    c.appendChild(cl);
    if(!a) c.appendChild(el(`<div class="small muted" style="margin-top:8px">미응답</div>`));
    if(q.explanation) c.appendChild(el(`<div class="explain"><span class="tag">해설</span>${esc(q.explanation)}</div>`));
    c.appendChild(reportBox(q.id));
    app.appendChild(c);
  });
}

// ====================================================== REVIEW (오답노트)
function review(){
  clear();
  const ids=getWrong(); const list=ids.map(byId).filter(Boolean);
  const card=el(`<div class="card"><div class="h1">오답노트 <span class="muted">${list.length}</span></div></div>`);
  if(!list.length){
    card.appendChild(el(`<div class="empty">아직 오답이 없습니다.<br>연습이나 모의고사에서 틀린 문제가 모입니다.</div>`));
    const h=el(`<button class="btn primary">홈으로</button>`); h.onclick=home; card.appendChild(h); app.appendChild(card); return;
  }
  const row=el(`<div class="row"></div>`);
  const start=el(`<button class="btn primary">오답 다시 풀기</button>`); start.onclick=()=>startReviewQuiz(shuffle(list));
  const clr=el(`<button class="btn ghost sm">전체 비우기</button>`); clr.onclick=()=>{ if(confirm('오답노트를 비울까요?')){ setWrong([]); review(); } };
  const h=el(`<button class="btn ghost sm">← 홈</button>`); h.onclick=home;
  row.appendChild(h); row.appendChild(el(`<span class="spacer"></span>`)); row.appendChild(clr); row.appendChild(start);
  card.appendChild(row); app.appendChild(card);
  list.forEach(q=>{
    const c=el(`<div class="card" style="margin-top:10px"></div>`);
    c.appendChild(el(`<div class="qmeta"><span>${esc(q.section)}</span><span>정답 ${NUM[q.answer]}</span></div>`));
    c.appendChild(el(`<div class="stem" style="font-size:15px">${esc(q.stem)}</div>`));
    const cl=el(`<div class="choices"></div>`);
    q.choices.forEach((t,j)=>cl.appendChild(el(`<div class="choice${j+1===q.answer?' correct':' dim'}" disabled><span class="num">${NUM[j+1]}</span><span>${esc(t)}</span></div>`)));
    c.appendChild(cl);
    if(q.explanation) c.appendChild(el(`<div class="explain"><span class="tag">해설</span>${esc(q.explanation)}</div>`));
    const rm=el(`<button class="btn ghost sm" style="margin-top:10px">노트에서 제거</button>`); rm.onclick=()=>{ delWrong(q.id); review(); };
    c.appendChild(reportBox(q.id)); c.appendChild(rm); app.appendChild(c);
  });
}
function startReviewQuiz(list){ pstate={list,idx:0,correct:0,done:0,answered:false,label:'오답 복습'}; renderReviewQuiz(); }
function renderReviewQuiz(){
  // 연습과 동일하되 맞히면 오답노트에서 제거
  clear(); const s=pstate, q=s.list[s.idx];
  const card=el(`<div class="card"></div>`);
  card.appendChild(el(`<div class="qmeta"><span>오답 복습 · ${s.idx+1} / ${s.list.length}</span><span>맞힘 ${s.correct}</span></div>`));
  card.appendChild(el(`<div class="progress"><i style="width:${s.idx/s.list.length*100}%"></i></div>`));
  card.appendChild(el(`<div class="stem">${esc(q.stem)}</div>`));
  const ch=el(`<div class="choices"></div>`);
  q.choices.forEach((c,i)=>{ const b=el(`<button class="choice"><span class="num">${NUM[i+1]}</span><span>${esc(c)}</span></button>`);
    b.onclick=()=>{ if(s.answered)return; s.answered=true; s.done++; const ok=(i+1===q.answer);
      if(ok){ s.correct++; delWrong(q.id); }
      bumpStat(q, ok);
      [...ch.children].forEach((bb,k)=>{ bb.setAttribute('disabled',''); if(k+1===q.answer)bb.classList.add('correct'); else if(k===i)bb.classList.add('wrong'); else bb.classList.add('dim'); });
      card.appendChild(el(`<div class="verdict ${ok?'ok':'bad'}">${ok?'정답 ✓ (오답노트에서 제거)':'오답 ✗ (정답 '+NUM[q.answer]+')'}</div>`));
      if(q.explanation) card.appendChild(el(`<div class="explain"><span class="tag">해설</span>${esc(q.explanation)}</div>`));
      const nav=card.querySelector('.navwrap'); nav.innerHTML='';
      const back=el(`<button class="btn ghost sm">← 오답노트</button>`); back.onclick=review; nav.appendChild(back); nav.appendChild(el(`<span class="spacer"></span>`));
      const last=s.idx>=s.list.length-1;
      const next=el(`<button class="btn primary">${last?'완료':'다음 →'}</button>`);
      next.onclick=()=>{ if(last) review(); else { s.idx++; s.answered=false; renderReviewQuiz(); } };
      nav.appendChild(next);
    }; ch.appendChild(b); });
  card.appendChild(ch);
  const nav=el(`<div class="navwrap"><button class="btn ghost sm">← 오답노트</button></div>`); nav.firstElementChild.onclick=review;
  card.appendChild(nav); app.appendChild(card);
}

// ---------- boot ----------
loadLocal();
{ const lg=document.getElementById('logo'); if(lg) lg.onclick=()=>home(); }
if(!DATA.length){ app.innerHTML='<div class="card empty">문제 데이터를 불러오지 못했습니다.</div>'; }
else { home(); initAuth(); }
})();
</script>
