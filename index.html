<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>강도사 고시 CBT</title>
<style>
:root{
  --bg:#f4f6f9; --card:#ffffff; --ink:#1c2530; --muted:#697586;
  --line:#e3e8ef; --brand:#1f4e79; --brand2:#2e6db4; --brand-soft:#e8f0fa;
  --ok:#1c7c54; --ok-soft:#e3f4ec; --bad:#c0392b; --bad-soft:#fbeae8;
  --warn:#9a6700; --radius:14px; --shadow:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","맑은 고딕",Segoe UI,Roboto,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.6;-webkit-text-size-adjust:100%}
.wrap{max-width:780px;margin:0 auto;padding:16px 16px 64px}
.appbar{display:flex;align-items:center;gap:10px;padding:14px 16px;position:sticky;top:0;z-index:10;
  background:rgba(244,246,249,.92);backdrop-filter:saturate(180%) blur(8px);border-bottom:1px solid var(--line)}
.appbar .logo{font-weight:800;color:var(--brand);letter-spacing:-.3px;cursor:pointer}
.appbar .sub{color:var(--muted);font-size:13px;margin-left:auto}
button{font-family:inherit;font-size:16px;cursor:pointer}
.btn{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--ink);
  border-radius:12px;padding:12px 16px;font-weight:600;transition:.12s;box-shadow:var(--shadow)}
.btn:hover{border-color:var(--brand2)}
.btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn.primary:hover{background:#193f63}
.btn.ghost{background:transparent;box-shadow:none}
.btn.sm{padding:8px 12px;font-size:14px;border-radius:10px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
.grid{display:grid;gap:12px}
.modes{grid-template-columns:1fr}
@media(min-width:560px){.modes{grid-template-columns:1fr 1fr 1fr}}
.mode{display:flex;flex-direction:column;gap:6px;text-align:left;align-items:flex-start;padding:18px}
.mode .ic{font-size:24px}
.mode .t{font-weight:700;font-size:17px}
.mode .d{color:var(--muted);font-size:13px;line-height:1.45}
.stat{display:flex;gap:18px;flex-wrap:wrap;color:var(--muted);font-size:13px;margin-top:10px}
.stat b{color:var(--ink);font-size:18px;display:block}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:8px 14px;font-size:14px;font-weight:600}
.chip.on{background:var(--brand-soft);border-color:var(--brand2);color:var(--brand)}
.h1{font-size:20px;font-weight:800;margin:2px 0 2px}
.h2{font-size:15px;font-weight:700;color:var(--muted);margin:0 0 10px}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.spacer{flex:1}
.qmeta{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:13px;margin-bottom:8px}
.progress{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin:4px 0 14px}
.progress > i{display:block;height:100%;background:var(--brand2);width:0;transition:width .2s}
.sbar{height:8px;background:var(--line);border-radius:999px;overflow:hidden;margin-top:3px}
.sbar > i{display:block;height:100%;border-radius:999px}
.stem{font-size:17px;font-weight:600;margin:6px 0 14px;white-space:pre-wrap;word-break:break-word}
.choices{display:grid;gap:10px}
.choice{display:flex;gap:10px;align-items:flex-start;text-align:left;width:100%;
  border:1.5px solid var(--line);background:var(--card);border-radius:12px;padding:13px 14px;font-size:15.5px;line-height:1.5}
.choice:hover{border-color:var(--brand2)}
.choice .num{flex:0 0 auto;font-weight:800;color:var(--brand2)}
.choice.correct{background:var(--ok-soft);border-color:var(--ok)}
.choice.correct .num{color:var(--ok)}
.choice.wrong{background:var(--bad-soft);border-color:var(--bad)}
.choice.wrong .num{color:var(--bad)}
.choice.dim{opacity:.6}
.choice[disabled]{cursor:default}
.explain{margin-top:14px;border-left:3px solid var(--brand2);background:#f7f9fc;border-radius:0 10px 10px 0;padding:12px 14px;font-size:14.5px;color:#2c3a4b}
.explain .tag{font-weight:700;color:var(--brand);margin-right:6px}
.verdict{font-weight:800;margin:14px 0 2px}
.verdict.ok{color:var(--ok)} .verdict.bad{color:var(--bad)}
.timer{font-variant-numeric:tabular-nums;font-weight:800;color:var(--brand)}
.timer.danger{color:var(--bad)}
.navwrap{display:flex;gap:8px;margin-top:16px}
.qjump{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.qj{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:var(--card);font-size:13px;font-weight:700}
.qj.ans{background:var(--brand-soft);border-color:var(--brand2);color:var(--brand)}
.qj.cur{outline:2px solid var(--brand)}
.qj.right{background:var(--ok-soft);border-color:var(--ok);color:var(--ok)}
.qj.wrongj{background:var(--bad-soft);border-color:var(--bad);color:var(--bad)}
.pjump{max-height:172px;overflow-y:auto;padding:8px;border:1px solid var(--line);border-radius:10px;background:#fbfcff;margin:0 0 12px}
.score{font-size:40px;font-weight:800;color:var(--brand)}
.muted{color:var(--muted)} .small{font-size:13px}
.empty{text-align:center;color:var(--muted);padding:32px 10px}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#1c2530;color:#fff;
  padding:10px 16px;border-radius:999px;font-size:14px;box-shadow:var(--shadow);opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1}
select{font-family:inherit;font-size:15px;padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:var(--card)}
.foot{color:var(--muted);font-size:12px;text-align:center;margin-top:26px;line-height:1.5}
#auth-area{display:flex;align-items:center;gap:8px;margin-left:10px}
.modal-ov{position:fixed;inset:0;background:rgba(16,24,40,.45);display:flex;align-items:center;justify-content:center;padding:18px;z-index:50}
.modal-card{background:var(--card);border-radius:16px;box-shadow:0 10px 40px rgba(16,24,40,.25);padding:22px;width:100%;max-width:360px}
.inp{width:100%;font-size:15px;padding:12px 13px;border:1px solid var(--line);border-radius:10px;margin-bottom:10px;font-family:inherit}
.inp:focus{outline:none;border-color:var(--brand2)}
textarea.inp{resize:vertical;min-height:42px}
.reportwrap{margin-top:12px;border-top:1px dashed var(--line);padding-top:10px}
.reportbtn{color:var(--muted)}
.reportbox{margin-top:8px;padding:10px;border:1px solid var(--line);border-radius:10px;background:#fafbfd}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <span class="logo" id="logo" role="button" title="홈으로">강도사 고시 CBT</span>
  <span class="sub" id="bar-sub">교회사</span>
  <span id="auth-area"></span>
</div>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

"qnum": 495, "stem": "요한계시록에서 새 하늘과 새 땅의 새 창조를 말하는 장은?", "choices": ["계 18장", "계 19장", "계 20장", "계 21장"], "answer": 4, "explanation": "교리 173. 최후의 상태"}, {"id": "교회사-0001", "subject": "교회사", "section": "초대교회사", "qnum": 1, "stem": "다음 중 3세기까지 초대교회의 교리 발전의 동기로 보기 가장 어려운 것은?", "choices": ["교회 고위 성직자들의 부패가 확산했다.", "헬레니즘의 사상적 도전에 직면했다.", "교회가 급속도로 성장했다.", "로마 제국 정부의 박해가 발생했다."], "answer": 1, "explanation": "313년 공인 이전 기독교는 끊임없는 박해 속에서도 급속한 교회의 성장을 이루어냈다. 이 과정에서 직면한 헬레니즘 사상의 도 전에 맞서 진리를 변호하고 더 잘 설명하기 위한 교리적 발전이 이루어졌다. 초기 기독교회에는 아직 성직 위계체제가 완전히 성립되지 않았으므로 타락할 수 있는 고위 성직자 계층은 성립되지 못했다."}, {"id": "교회사-0002", "subject": "교회사", "section": "초대교회사", "qnum": 2, "stem": "다음 중 초대교회 시대 로마 제국의 특징과 가장 거리가 먼 것은?", "choices": ["계층적인 신분사회였다.", "잘 정돈된 도로망과 더불어 일관된 법률 체계를 추구했다.", "사상적으로 헬레니즘을 수용했다.", "로마의 종교와 문화를 일방적으로 강요했다."], "answer": 4, "explanation": "로마 제국은 제국의 효율적인 운영을 위해 각 지역의 문화와 종교를 존중하는 포용정책을 사용했다. 기독교인들이 박해를 받은 이유는 이런 포용정책에도 불구하고 로마 황제에 대한 종교적 숭앙을 거부했기 때문이다."}, {"id": "교회사-0003", "subject": "교회사", "section": "초대교회사", "qnum": 3, "stem": "기원 후 70년 티투스가 예루살렘을 정복해 성전을 파괴하고 유대 종교를 억압한 직후인 81년에 황제로 즉위해 기독교를 계속 박해했던 로마 황제는?", "choices": ["네로", "도미티아누스", "데시우스", "디오클레티아누스"], "answer": 2, "explanation": "티투스가 팔레스타인 원정을 마치고 돌아온 후 사망하자 동생 도미티아누스가 81년 황제에 즉위했다. 도미티아누스는 기독교인 들에 대한 박해를 계속했다."}, {"id": "교회사-0004", "subject": "교회사", "section": "초대교회사", "qnum": 4, "stem": "초대교회가 로마 제국으로부터 박해를 받았던 이유와 가장 거리가 먼 것은?", "choices": ["기독교 예배 의식에 대한 로마인들의 오해", "기독교인들의 도덕적 타락에 대한 우려", "육체의 부활 등 교리에 대한 멸시", "황제권의 확립을 위한 정치적 동기"], "answer": 2, "explanation": "기독교의 성육신과 육체 부활 교리는 영육이원론에 입각한 헬레니즘의 관점에서 볼 때 인정할 수 없는 저급한 교리였다. 더불어 남녀노소의 구별 없이 성찬을 시행하는 기독교 예배 의식에 대한 오해와 새로 즉위한 황제의 정치적 입지를 강화하려는 정치적 동기가 초대교회 기독교 박해의 중요한 원인이었다. 그럼에도 불구하고 기독교인들의 도덕적 높은 수준은 로마인들에게 일반적 으로 인정을 받았다."}, {"id": "교회사-0005", "subject": "교회사", "section": "초대교회사", "qnum": 5, "stem": "교회에 대한 로마 정부의 박해와 지식인들의 비판에 맞서 기독교 교리와 사상적 우월성을 변호하 려 했던 변증가에 속하지 않는 인물은?", "choices": ["타티안", "타키투스", "터툴리안", "테오필루스"], "answer": 2, "explanation": "3세기 이전 기독교 신학자들은 모두 박해의 위협과 사상적 도전에 맞서 기독교 신앙을 변증했다. 타키투스는 기독교를 비우호적 으로 평가한 로마의 대표적 역사가이다."}, {"id": "교회사-0006", "subject": "교회사", "section": "초대교회사", "qnum": 6, "stem": "다음 중 초대교회가 교리 발전 과정에서 상대해야 했던 헬레니즘 사상 체계에 속한다고 볼 수 없 는 사상은?", "choices": ["스토아주의", "스콜라주의", "에피쿠로스주의", "신플라톤주의"], "answer": 2, "explanation": "스토아주의와 에피쿠로스주의 및 신플라톤주의는 모두 초대 기독교가 상대해야 했던 헬레니즘 사상의 조류들이다. 스콜라주의는 중세신학 작업 방법론이다."}, {"id": "교회사-0007", "subject": "교회사", "section": "초대교회사", "qnum": 7, "stem": "다음 중 헬레니즘 사상에 대한 설명으로 올바르지 않은 것은?", "choices": ["기본적으로 정신 세계와 물질 세계를 구분하는 이원론을 취했다.", "종교적 주제에 대한 관심을 기울였다.", "스토아주의와 달리 에피쿠로스주의는 육체적 쾌락을 적극 추구했다.", "정치 철학으로서 면모를 지니고 있었다."], "answer": 3, "explanation": "헬레니즘 사상은 일반적으로 정신세계와 물질세계, 영과 육, 이데아계와 현상계를 구별하는 이원론을 취했다. 대부분의 헬레니즘 사상들은 종교적 주제에 대한 깊은 관심을 가지고 있었으며 인간의 덕성을 함양하여 바람직한 공동체를 세우려는 정치적 목적을 지향했다. 에피쿠로스학파가 추구한 쾌락은 육체적인 것이 아니라 도리어 육체를 제어함으로 얻을 수 있는 정신적 쾌락이었다."}, {"id": "교회사-0008", "subject": "교회사", "section": "초대교회사", "qnum": 8, "stem": "일반적인 헬레니즘 사상과 구별되는 기독교 교리의 특징이라고 보기 가장 어려운 것은?", "choices": ["영혼과 육체의 구별", "최후의 심판과 육체의 부활", "구원을 위한 은혜의 절대성", "로고스의 성육신"], "answer": 1, "explanation": "신약성경과 초대 기독교 교리 중에는 헬레니즘의 용어와 사고 체계가 많이 활용된다. 대표적으로 영혼과 육체의 구별에 대해서 는 기독교와 헬레니즘 사이에 큰 차이가 나타나지 않는다. 그러나 성경적 진리 체계와 헬레니즘 사상의 체계 사이에는 분명한 차이가 나타난다. 헬레니즘이 육체를 죄와 죽음의 원인으로 보고, 인간의 깨달음을 통한 정신적 향상을 주장하는 데 비해 기독 교 사상은 로고스의 성육신과 구원을 위한 은혜의 절대성, 그리고 육체의 부활을 가르쳤다."}, {"id": "교회사-0009", "subject": "교회사", "section": "초대교회사", "qnum": 9, "stem": "다음은 신플라톤주의에 대한 설명이다. 올바르지 않은 것은?", "choices": ["플라톤주의의 이원론을 따랐다.", "모든 개별적이며 물질적 존재가 절대적 존재로부터 유출된다고 주장했다.", "3세기에 플로티누스와 포르피리우스 등의 사상가들이 활동했다.", "영지주의의 종교적 성격과 대립하여 사변적 논증을 강조했다."], "answer": 4, "explanation": "신플라톤주의는 이원론에 입각해 만물이 절대적 일자로부터 유출된 것이라고 생각했다. 초대 기독교를 위협했던 영지주의의 사 상 체계는 신플라톤주의로부터 많은 영향을 받았다."}, {"id": "교회사-0010", "subject": "교회사", "section": "초대교회사", "qnum": 10, "stem": "다음 중 신약성경이 기록될 당시 존재했던 유대교 분파가 아닌 것은?", "choices": ["사두개파", "에세네파", "바리새파", "알비파"], "answer": 4, "explanation": "신약성경이 기록될 당시 팔레스타인 지역을 중심으로 여러 유대인 분파가 활동했다. 이중 바리새파나 사두개파와 같은 몇 분파 들은 신약성경에 기록되어 나타난다. 알비파는 중세시대 남부 프랑스를 중심으로 활동한 심각한 마니교적 이단이다."}, {"id": "교회사-0011", "subject": "교회사", "section": "초대교회사", "qnum": 11, "stem": "다음 중 영지주의의 일반적인 특징으로 보기 가장 어려운 것은?", "choices": ["혼합주의", "회의주의", "신비주의", "엘리트주의"], "answer": 2, "explanation": "영지주의는 초대 기독교 시대에 헬레니즘 사상 체계를 바탕으로 삼아 나타난 신비주의적 종교운동이다. 영지주의는 다양한 사상 들을 혼합해 여러 가지 형태로 전개되었으나 일반적으로 그노시스, 즉 영적인 지식을 소유함으로써 구원에 이르게 된다는 주장 을 펼쳤다. 따라서 이 지식을 깨달은 소수 계층 사람들의 특별함을 강조했다."}, {"id": "교회사-0012", "subject": "교회사", "section": "초대교회사", "qnum": 12, "stem": "초대교회 시대 기독교에 대한 박해를 주도했던 황제로 볼 수 없는 인물은?", "choices": ["네로", "도미티아누스", "마르쿠스 아우렐리우스", "갈리에누스"], "answer": 4, "explanation": "초대교회 시대 많은 황제들이 특히 정치적 목적으로 기독교를 박해했다. 그러나 253년 즉위해 268년까지 통치했던 갈리에누스 황제는 259년 관용령을 발표해 일시적으로나마 기독교인들에 대한 박해를 중단하고 기독교인들의 예배 처소와 무덤을 되돌려 주었다."}, {"id": "교회사-0013", "subject": "교회사", "section": "초대교회사", "qnum": 13, "stem": "다음 중 기독교를 박해한 로마의 황제와 그 당시 순교한 인물들을 바르게 연결한 것은?", "choices": ["네로 - 이그나티우스", "도미티아누스 - 사도 바울", "데시우스 - 폴리갑", "마르쿠스 아우렐리우스 - 순교자 유스티누스"], "answer": 4, "explanation": "이그나티우스는 110년 트라야누스 황제 통치 하에서 순교했다. 사도 바울은 네로 황제 통치 시대인 67년경 순교한 것으로 알려 져 있다. 서머나의 감독 폴리갑은 마르쿠스 아우렐리우스 황제가 통치하던 시기인 168년 순교했다. 순교자 유스티니아누스 (저 스틴 마터) 역시 165년 아우렐리우스 황제 통치기에 순교했다."}, {"id": "교회사-0014", "subject": "교회사", "section": "초대교회사", "qnum": 14, "stem": "콘스탄티누스의 황제가 기독교를 공인하기 전까지 기독교를 박해했던 황제들을 재위 순서대로 바 르게 연결한 것은? 네로- 도미티아누스- 디오클레티아누스 - 마르쿠스 아우렐리우스", "choices": ["네로- 도미티아누스- 디오클레티아누스 - 마르쿠스 아우렐리우스", "네로 - 도미티아누스 - 마르쿠스 아우렐리우스 - 디오클레티아누스", "네로- 마르쿠스 아우렐리우스 - 디오클레티아누스 - 도미티아누스", "네로- 마르쿠스 아우렐리우스 - 도미티아누스 - 디오클레티아누스"], "answer": 2, "explanation": "네 황제 모두 기독교를 박해했다. 각 황제의 재위 순서는 다음과 같다. 네로(54-68), 도미티아누스(81-96), 마르쿠스 아우렐리 우스(161-180), 디오클레티아누스(284-305)"}, {"id": "교회사-0015", "subject": "교회사", "section": "초대교회사", "qnum": 15, "stem": "사도들의 제자로 알려진 속사도교부에 속하는 인물로서 \"마그네시아와 에베소에 보내는 편지\"를 비롯한 7편의 서신을 저술하여 그리스도의 신성을 설명했던 교부는?", "choices": ["이그나티우스", "폴리캅", "유스티누스", "테오필루스"], "answer": 1, "explanation": "안디옥의 감독이었던 이그나티우스는 사도 요한의 제자로 알려진 대표적인 속사도교부이다. 그는 신약성경이 기록되던 시기 직 후에 여러 교회에 보낸 7편의 편지를 썼으며, 이 편지들 안에 초대교회의 신앙과 예배 및 삶에 대해 기록했다."}, {"id": "교회사-0016", "subject": "교회사", "section": "초대교회사", "qnum": 16, "stem": "다음 중 속사도교부 시대에 나타난 저술에 해당하지 않는 것은?", "choices": ["헤르마스의 목자", "디다케", "바나바의 서신", "유대인 트리포와의 대화"], "answer": 4, "explanation": "헤르마스의 목자와 디다케, 바나바의 서신은 저자를 정확하게 알기 어려운 속사도교부 시대의 저술들이다. 유대인 트리포의 대화 는 변증가에 속하는 순교자 유스티누스(100-165)의 작품으로서 속사도교부 시대의 문헌으로 보기는 어렵다."}, {"id": "교회사-0017", "subject": "교회사", "section": "초대교회사", "qnum": 17, "stem": "다음은 속사도교부들과 그 시기에 등장한 문헌들에 대한 설명이다. 옳은 것만을 묶은 것은? 가. 로마의 클레멘트는 고린도교회에 보내는 편지를 저술했다. 나. 이그나티우스는 서머나의 감독이었다. 다. \"디다케\"의 또 다른 제목은 열두 사도들의 가르침\"이다. 라. \"디오그네투스에게 보낸 편지\"는 기독교 예배와 생활을 변호했다. 마. \"헤르마스의 목자\"는 행위공로를 부정하고 이신칭의를 강조했다.", "choices": ["가, 나, 마", "가, 다, 라", "나, 다, 라", "나, 라, 마"], "answer": 2, "explanation": "로마의 클레멘트는 고린도를 비롯한 여러 교회에 보내는 편지를 저술했다. \"열두 사도들의 가르침\"은 \"디다케\"의 또 다른 이름 이다. \"디오그네투스에게 보내는 편지\"는 저자를 알 수 없는 서신 형식의 문서로서 기독교에 대한 오해를 불식시키기 위한 변증 서였다. \"헤르마스의 목자\"는 이신칭의를 가르치기보다는 율법준수를 통한 선행과 삶의 실천을 강조했다. 속사도교부인 이그나티 우스는 안디옥의 감독이었다."}, {"id": "교회사-0018", "subject": "교회사", "section": "초대교회사", "qnum": 18, "stem": "다음 중 2세기부터 3세기까지 활동했던 헬라 교부들에 대한 올바른 설명만 묶은 것은? 가. 이레네우스는 헬라 교부들과 라틴 교부들 사이의 가교역할을 했다. 나. 히폴리투스는 알레고리적 해석방법을 배격하고 문자적 성경 해석을 추구했다. 다. 키프리아누스는 교리의 일치성에서 보편교회의 근거를 찾았다. 라. 알렉산드리아와 안디옥이 헬라신학의 중심지였다. 마. 알렉산드리아의 클레멘트는 기독교 신앙과 플라톤 철학의 조화를 추구했다.", "choices": ["가, 다, 마", "가, 라, 마", "나, 다, 라", "나, 라, 마"], "answer": 2, "explanation": "잘못된 보기들의 이유를 설명하면 나. 히폴리투스는 문자적 해석이 아니라 알레고리적 해석을 높이 평가했다. 다. 키프리아누스 는 교리의 일치성이 아닌 감독의 일치성에 보편교회의 기초가 있다고 주장했다."}, {"id": "교회사-0019", "subject": "교회사", "section": "초대교회사", "qnum": 19, "stem": "다음 중 2세기부터 3세기까지 활동했던 라틴 교부들에 대한 설명으로 옳은 설명만을 묶은 것은? 가. 타티안은 \"켈수스 반박\"을 저술하여 기독교 신앙을 변증했다. 나. 터툴리안은 프락세아스 반박\"에서 삼위일체 교리의 중요 개념들을 제시했다. 다. 헬라 교부들보다 형이상학적 논의를 더 적극 활용해 헬레니즘과의 조화를 추구했다. 라. 키프리아누스는 분파주의에 맞서 \"교회 밖에는 구원이 없다\"라고 주장했다. 마. 카르타고와 로마 등이 라틴신학의 중심지였다.", "choices": ["가, 나, 라", "@ 가, 다, 라", "나, 라, 마", "나, 다, 마"], "answer": 4, "explanation": "잘못된 보기의 이유를 설명하면 가. \"켈수스 반박'은 오리겐의 대표적인 변증 저술이다. 다. 형이상학적 논의를 더 적극적으로 사용한 것은 라틴 교부들보다는 헬라 교부들이었다."}, {"id": "교회사-0021", "subject": "교회사", "section": "초대교회사", "qnum": 21, "stem": "다음 중 오리겐에 대한 설명으로 올바른 것은? 주후 185년경 시리아 안디옥에서 출생했다.", "choices": ["주후 185년경 시리아 안디옥에서 출생했다.", "영적 우의적 해석보다는 문자적 역사적 성경해석을 추구했다.", "여러 이단사상에 맞서 기독교 신학을 체계적으로 설명한 \"헥사플라\"를 저술했다.", "로고스의 \"영원 전 출생\"을 주장하여 삼위일체 교리 확립에 기여했다."], "answer": 4, "explanation": "오리겐은 이집트 알렉산드리아 출신으로서 성경의 우의적 해석을 높이 평가했다. 그는 이단 사상에 맞서 변증적 저술을 남겼을 뿐 아니라 \"헥사플라'를 통해 당시 성경 사본들을 비교하는 사본연구의 업적도 남겼다. 삼위일체 교리에 있어서도 로고스의 \"영 원 전 출생\" 개념을 논의함으로써 신학적인 측면에서 기여했다."}, {"id": "교회사-0022", "subject": "교회사", "section": "초대교회사", "qnum": 22, "stem": "다음 중 초대교회 시대의 교부인 이레네우스에 대한 설명으로 올바르지 않은 것은? 소아시아 출신으로 추정되며 갈리아 지방 리용의 감독이었다.", "choices": ["소아시아 출신으로 추정되며 갈리아 지방 리용의 감독이었다.", "마르키온과 영지주의에 맞서 기독교 신학을 확증하려 했다.", "구원을 단회적이며 법정적인 칭의로 설명했다.", "\"총괄갱신\"을 주장하여 아담과 그리스도를 병행시키는 구원론을 제시했다."], "answer": 3, "explanation": "이레네우스는 그의 구원론에서 아담과 그리스도 사이의 병행적 해석에 따른 \"총괄갱신\"을 주장했으나 단회적이며 법정적 의미의 칭의를 명시하지는 않았다."}, {"id": "교회사-0023", "subject": "교회사", "section": "초대교회사", "qnum": 23, "stem": "다음 중 초대교회 변증가들의 이름과 작품이 올바르게 연결된 것은?", "choices": ["유스티누스 - 제1변증서", "타티안 - 트리포와의 대화", "아테나고라스 - 사도적 가르침의 증명", "이레네우스 - 기독교인들을 위한 청원"], "answer": 1, "explanation": "\"제1변증서와 \"트리포와의 대화'는 순교자 유스티누스의 대표적인 저술이다. 사도적 가르침의 증명'은 이레네우스의 작품이며, \"기독교인들을 위한 청원\"은 아테나고라스의 글이다."}, {"id": "교회사-0025", "subject": "교회사", "section": "초대교회사", "qnum": 25, "stem": "다음 중 2세기에 등장했던 몬타누스파 이단에 대한 설명으로 올바르지 않은 것은?", "choices": ["소아시아 프리기아 출신의 몬타누스가 시작했다.", "자칭 여성 예언자인 프리스실라와 막시밀라가 동참했다.", "임박한 종말을 주장하며 엄격한 금욕주의를 내세웠다.", "헬레니즘 사상을 적극적으로 수용했다."], "answer": 4, "explanation": "몬타누스주의는 영지주의와 달리 헬레니즘 사상에 대해 경계하는 입쟝을 취했다."}, {"id": "교회사-0026", "subject": "교회사", "section": "초대교회사", "qnum": 26, "stem": "다음은 초대교회가 상대해야 했던 여러 이단적 사상들이다. 이들 중 헬레니즘의 영향을 받은 이 단에 속하는 것만을 묶은 것은? 가. 에비온파 나. 몬타누스주의 다. 마르키온주의 라. 엘크사이트파 마. 마니교 사. 도케티즘", "choices": ["나, 마, 바", "가, 다, 라", "@ 다, 마, 사", "가, 나, 사"], "answer": 2, "explanation": "몬타누스주의, 마르키온주의, 마니교, 도케티즘은 헬라주의적 이단에 속한다. 에비온파, 엘크사이트파, 나사렛파는 유대주의적 조 류에 속한다."}, {"id": "교회사-0027", "subject": "교회사", "section": "초대교회사", "qnum": 27, "stem": "3세기 이전 이단 사상에 맞서 교회의 정통성을 옹호하려 했던 대응 방법으로 보기 가장 어려운 것은?", "choices": ["정경의 확립", "헬레니즘 사상 배격", "신앙의 기준 사용", "사도적 계승 주장"], "answer": 2, "explanation": "3세기 이전 초대교회는 다양한 이단들의 도전에 맞서 다양한 대응을 보여주었다. 먼저 마르키온주의에 맞서서는 정경을 확정했 으며 초신자와 어린이들을 위한 교육, 예배 시 공적 고백을 위한 신앙의 기준(regula fidel)를 사용했다. 교리의 연속성과 관련 해 사도적 계승의 정당성을 강하게 주장하기도 했다. 헬레니즘 사상을 배격하는 변증의 방식도 있었으나 많은 변증가들은 힐레 니즘 사상의 용어와 개념, 그리고 체계를 기독교 신앙의 변증을 위해 많이 활용했다."}, {"id": "교회사-0028", "subject": "교회사", "section": "초대교회사", "qnum": 28, "stem": "다음은 콘스탄티누스 황제에 대한 설명이다. 옳은 내용만 묶은 것은? 가. 콘스탄티우스 클로루스와 헬레나 사이에서 태어났다. 나. 306년 아버지 콘스탄티우스의 뒤를 이어 부하들에 의해 황제로 추대되었다. 다. 313년 밀라노 칙령을 발표해 기독교 이외의 모든 종교를 금지했다. 라. 제국을 통일한 후 330년 새로 건설한 콘스탄티노플을 수도로 정했다. 마. 자신의 네 아들에게 제국을 분할해 주었다.", "choices": ["가, 나, 라", "가, 다, 마", "나, 다, 라", "나, 라, 마"], "answer": 1, "explanation": "보기 가운데 콘스탄티누스 황제에 대한 잘못된 내용을 설명하면, 다, 313년 밀라노 칙령은 기독교 예배를 인정했지만 기독교 이외의 다른 모든 종교를 금지한 것은 아니었다. 마. 콘스탄티누스 황제는 세 명의 아들에게 제국을 분할해 주었다."}, {"id": "교회사-0029", "subject": "교회사", "section": "초대교회사", "qnum": 29, "stem": "다음 중 콘스탄티누스 황제에 의한 기독교 공인 이후 기독교 안에서 발생한 변화에 해당하지 않는 것은?", "choices": ["교리 논쟁이 본격적으로 전개되었다.", "교회가 조직화되고 교권이 증대되었다.", "서방교회에서는 동방교회와 달리 각 지역 감독들을 중심으로 교회가 정비되었다.", "수도원 운동이 발전했다."], "answer": 3, "explanation": "313년 밀라노 칙령에 의한 기독교 공인 이후 교회는 좀 더 공개적으로 신학적 논쟁을 전개할 수 있었으며 그 이유 중 하나가 교회의 조직화와 체계화의 빠른 진행이었다. 동방교회에서는 주요 도시들의 감독들을 중심으로 교회 제도가 정비된 반면, 서방 교회는 수도인 로마 감독을 중심으로 교회 제도가 조직화되었다. 교회의 제도화에 대한 반발로서 수도원 운동이 전개되기도 했다."}, {"id": "교회사-0030", "subject": "교회사", "section": "초대교회사", "qnum": 30, "stem": "313년 명령된 밀라노 칙령 직전에 콘스탄티누스와 서방의 황제 자리를 놓고 경쟁하다가 312년 밀비안 다리 전투에서 패배한 인물은 누구인가?", "choices": ["갈레리우스", "막시미누스 다이어", "리키니우스", "막센티우스"], "answer": 4, "explanation": "디오클레티아누스가 황제직에서 퇴임한 이후 서로마와 동로마 황제 자리를 놓고 벌어진 군사적 갈등 속에서 콘스탄티누스는 경 쟁자 막센티우스를 312년 밀비안 다리 전투에서 격퇴하고 서방 제국의 승자가 되었다."}, {"id": "교회사-0031", "subject": "교회사", "section": "초대교회사", "qnum": 31, "stem": "초대교회 동방 신학은 크게 이집트의 알렉산드리아 학파와 시리아의 안디옥 학파가 대표했다. 이 두 학파를 비교할 때 안디옥 학파의 특징이라고 말하기 가장 어려운 것은? ® 헬레니즘적 사상체계와 적극적으로 대화했다.", "choices": ["헬레니즘적 사상체계와 적극적으로 대화했다.", "그리스도의 인성보다 신성을 부각시키는 신학을 전개했다.", "문자적, 역사적 성경해석을 선호했다.", "도덕적이며 실천적 측면에 대해 큰 관심을 가졌다."], "answer": 2, "explanation": "안디옥 출신의 신학자들은 알렉산드리아 출신의 신학자들과 비교할 때 그리스도의 신성과 구별되는 인성의 의의와 역할을 강조했다."}, {"id": "교회사-0032", "subject": "교회사", "section": "초대교회사", "qnum": 32, "stem": "다음 중 초대교회의 교부들과 그들의 대표적인 신학적 입장이 올바르게 연결되지 않은 것은?", "choices": ["알렉산드리아의 클레멘트 - 헬라 철학은 이방인들에게 복음을 위한 준비로 주어졌다.", "터툴리안 - 나는 모순되기 때문에 믿는다.", "키프리아누스 - 도덕적으로 불완전한 감독이 베푼 세례는 효력이 없다.", "어거스틴 - 하나님을 아버지로 모신 사람은 교회를 어머니로 모셔야 한다."], "answer": 3, "explanation": "키프리아누스는 도덕적으로 불완전한 감독이 베푼 세례에 효력이 없다고 주장한 노바티아누스의 입장을 거절하고 감독의 일치에 의한 보편교회의 일치와 보편교회가 시행하는 성례의 정당성을 강조했다."}, {"id": "교회사-0033", "subject": "교회사", "section": "초대교회사", "qnum": 33, "stem": "260년 태어난 4세기의 대표적인 교회역사가로서 \"팔레스타인의 순교자\"들을 저술해 디오클레티아 누스 황제 시기의 박해의 역사를 기록했으며 기독교 공인 이후에는 \"교회사\"를 저술하여 324년까 지 교회 역사의 발전 과정을 기록한 인물은?", "choices": ["가이사랴의 유세비우스", "안디옥의 데오토레투스", "니코메디아의 유세비우스", "알렉산드리아의 디오스코루스"], "answer": 1, "explanation": "가이사랴의 유세비우스는 기독교 공인 이후 이전 박해의 시대로부터 공인까지 과정을 기록한 초대교회의 대표적인 교회사가이다."}, {"id": "교회사-0034", "subject": "교회사", "section": "초대교회사", "qnum": 34, "stem": "다음 중 크리소스톰에 대한 설명으로 올바르지 않은 것은? N 374년경 로마 장교의 아들로서 안디옥에서 출생했다.", "choices": ["374년경 로마 장교의 아들로서 안디옥에서 출생했다.", "안디옥 학파의 경향을 따라 알레고리적 성경해석을 적극 추구했다.", "398년 콘스탄티노플의 감독이 되었다.", "정치적 이유로 인해 감독직에서 추방되어 유배 중 소천했다."], "answer": 2, "explanation": "안디옥 출신이며 콘스탄티노플 감독이었던 크리소스톤은 알레고리적 성경해석을 추구한 알렉산드리아 학파의 입장과 달리 역사 적이며 문자적 해석을 따라 성경을 이해하고 설교했다."}, {"id": "교회사-0035", "subject": "교회사", "section": "초대교회사", "qnum": 35, "stem": "다음 중 4세기 후반부터 5세기 초까지 활동한 교부 제롬에 대한 설명으로 올바르지 않은 것은?", "choices": ["교황 다마수스 1세의 지시를 받아 성경 번역에 착수했다.", "구약 히브리어를 배우기 위해 유대교 랍비들과 교제했다.", "팔레스타인 베들레헴에서 성경을 라틴어로 번역했다.", "금욕주의적 입장에 서서 동시대의 어거스턴과 달리 펠라기우스를 지지했다."], "answer": 4, "explanation": "어거스틴과 동시대에 활동했던 제롬(히에로니무스)은 펠라기우스의 주장을 둘러싼 신학적 논쟁이 발생했을 때 어거스틴을 적극 지지했다."}, {"id": "교회사-0036", "subject": "교회사", "section": "초대교회사", "qnum": 36, "stem": "다음 중 암브로시우스에 대한 설명으로 올바르지 않은 것은? 주후 339년 트리어에서 총독의 아들로 태어났다. 밀라노의 행정관이었으나 군중들에 의해 감독에 추대되었다.", "choices": ["주후 339년 트리어에서 총독의 아들로 태어났다.", "밀라노의 행정관이었으나 군중들에 의해 감독에 추대되었다.", "황제 발렌티니아누스 2세와 함께 이교도들에게 관용 정책을 시행했다.", "데살로니카에서 시민들을 학살한 황제 테오도시우스에게 성찬을 베풀지 않았다."], "answer": 3, "explanation": "어거스틴의 회심에 중요한 역할을 했던 밀라노의 감독 암브로시우스는 귀족 가문 출신의 관료였으나 시민들의 추대로 감독이 되 었다. 그는 정치적 수완도 뛰어나 황제를 설득하여 이교도들을 강하게 억압했으며 황제가 부당한 정책을 시행할 경우 성찬을 베 풀지 않고 강하게 질책하기도 했다."}, {"id": "교회사-0037", "subject": "교회사", "section": "초대교회사", "qnum": 37, "stem": "다음 중 양태론적 단일신론의 주장에 해당하는 것은? 그리스도는 온전한 의미의 하나님이 아니다.", "choices": ["그리스도는 온전한 의미의 하나님이 아니다.", "성부께서 십자가에서 죽으셨다고 말할 수 없다.", "예수님께서 세례를 받으실 때 로고스가 그에게 임했다.", "성부, 성자, 성령은 하나님이 나타나는 세 가지 방식의 이름이다."], "answer": 4, "explanation": "사벨리우스 등이 주장한 양태론은 그리스도가 곧 하나님이시며 성부, 성자, 성령은 한 하나님의 서로 다른 이름 혹은 현현의 양 식이라고 주장했다. 따라서 성부께서 십자가에서 죽으셨다고 주장하는 성부수난설을 취하기도 했다."}, {"id": "교회사-0038", "subject": "교회사", "section": "초대교회사", "qnum": 38, "stem": "다음 중 성부, 성자, 성령의 삼위일체를 태양과 빛과 열의 유비를 통해 설명했던 양태론자는 누구 인가?", "choices": ["사벨리우스", "@ 아리우스", "아타나시우스", "사모사타의 바울"], "answer": 1, "explanation": "사벨리우스는 양태론적 이해에 따라 성부, 성자, 성령의 관계를 태양과 빛과 열의 유비를 통해 설명했다."}, {"id": "교회사-0039", "subject": "교회사", "section": "초대교회사", "qnum": 39, "stem": "다음 중 카르타고의 감독 키프리아누스가 보편교회의 하나 됨을 주장하기 위해 쓴 \"교회의 일치 에 관하여\"의 배경이 된 3세기의 대표적인 분파주의로서 박해 시 신앙을 지키지 못한 이들에 대 한 엄격한 권징을 주장했던 분파는 무엇인가?", "choices": ["펠라기우스파", "도나투스파", "노바티아누스파", "몬타누스파"], "answer": 3, "explanation": "3세기 카르타고의 감독 키프리아누스는 데시우스 황제 박해 시 황제 숭배에 동의한 사람들을 수용했던 보편교회를 부정했던 노 바티아누스 분파주의에 맞서 보편교회 일치의 근거에 대해 저술했다."}, {"id": "교회사-0040", "subject": "교회사", "section": "초대교회사", "qnum": 40, "stem": "다음 중 역동적 단일신론과 관련이 없는 것은? 사모사타의 바울이 대표적인 인물이었다. 신성과 구별되는 예수 그리스도의 인성을 강조했다.", "choices": ["사모사타의 바울이 대표적인 인물이었다.", "신성과 구별되는 예수 그리스도의 인성을 강조했다.", "성자는 성육신하신 로고스의 또 다른 이름일 뿐이라고 주장했다.", "나사렛의 예수 안에 로고스가 임해서 그 안에서 성장했다고 주장했다."], "answer": 3, "explanation": "성자는 성육신하신 로고스의 또 다른 이름일 뿐이라는 주장은 역동적 단일신론과 상반되는 양태론의 주장이다."}, {"id": "교회사-0041", "subject": "교회사", "section": "초대교회사", "qnum": 41, "stem": "다음 중 단일신론자들과 그들의 주장을 바르게 연결한 것은?", "choices": ["데오도투스 - 양태론", "사벨리우스 - 양자설", "프락세아스 - 성부수난설", "사모사타의 바울 - 동일본질"], "answer": 3, "explanation": "데오토투스는 양자설를 주장하여 사벨리우스의 양태론과 완전히 반대되는 입장을 취했다. 역동적 단일신론을 취한 사모사타의 바울은 성자의 신성이 성부와 동일함을 인정하지 않았다."}, {"id": "교회사-0042", "subject": "교회사", "section": "초대교회사", "qnum": 42, "stem": "알렉산드리아의 신학자로서 감독 알렉산더와 논쟁에서 성자의 \"영원 전 나심\"이라는 개념은 성자 께서 피조물 이전의 피조물이었음을 뜻한다고 주장함으로써 4세기 벌어진 삼위일체 교리를 둘러 싼 논쟁을 불러일으킨 인물은?", "choices": ["아타나시우스", "아리우스", "사벨리우스", "오리겐"], "answer": 2, "explanation": "4세기 기독교 공인 이후 알렉산더와 논쟁을 벌임으로써 삼위일체 논쟁을 촉발한 인물은 아리우스이다."}, {"id": "교회사-0043", "subject": "교회사", "section": "초대교회사", "qnum": 43, "stem": "삼위일체 교리에서 아리우스주의자들의 주장에 맞서 니케아 신조가 강조했던 개념은?", "choices": ["동일본질", "상이본질", "유사본질", "파생본질"], "answer": 1, "explanation": "니케아 신조는 성자의 신적 본질이 성부의 신적 본질과 동질이라는 \"동일본질'(homoousios) 교리를 명시했다."}, {"id": "교회사-0044", "subject": "교회사", "section": "초대교회사", "qnum": 44, "stem": "삼위일체 교리 논쟁으로 인한 동방교회의 분열 문제를 해결하기 위해 325년 콘스틴티누스 황제에 의해 소집된 최초의 보편교회 회의는 무엇인가?", "choices": ["에베소 회의", "니케아 회의", "칼케돈 회의", "콘스탄티노플 회의"], "answer": 2, "explanation": "325년 콘스탄티누스 황제에 의해 역사상 최초로 소집된 공의회는 케아 회의이다."}, {"id": "교회사-0045", "subject": "교회사", "section": "초대교회사", "qnum": 45, "stem": "다음 중 니케아 신조에서 오류라고 지적된 내용에 해당하지 않는 것은?", "choices": ["성자가 존재하지 않은 때가 있었다.", "성자는 성부와 다른 본질로부터 나셨다.", "성자는 참 하나님의 하나님이시다.", "아들은 창조된 분이시므로 변할 수 있다."], "answer": 3, "explanation": "니케아 신조는 정통교리를 진술한 이후 이에 덧붙여 잘못된 오류를 지적하는 파문장을 포함했다. 파문장에는 성부와 성자의 신 적 본질이 동일하지 않다고 주장한 아리우스의 여러 견해들을 정죄했다."}, {"id": "교회사-0046", "subject": "교회사", "section": "초대교회사", "qnum": 46, "stem": "다음 중 니케아 회의에 대한 설명으로 바른 것은?", "choices": ["아리우스와 아타나시우스 사이에 발생한 논쟁으로 인해 개최되었다.", "서방에서는 코르도바의 호시우스와 로마 감독 실베스터가 참석했다.", "참석한 감독들 모두 채택된 신조에 서명했다.", "교리문제뿐 아니라 교회법을 제정하여 감독들의 임명과 권징에 대한 결정을 내렸다."], "answer": 4, "explanation": "니케아 회의가 다룬 삼위일체 논쟁은 알렉산드리아 감독 알렉산더와 아리우스 사이에서 발생했다. 아타나시우스는 회의에 참석 하기는 했으나 그의 신학적 활동은 주로 니케아 회의 이후에 이루어졌다. 로마 감독 실베스터는 참석하지 않았고, 니코메디아의 유세비우스와 같은 인물은 신조에 서명하지 않았다. 니케아 회의는 신학적 문제뿐 아니라 교회법을 제정하여 교회 제도 정비와 관련된 안건들도 다루었다."}, {"id": "교회사-0047", "subject": "교회사", "section": "초대교회사", "qnum": 47, "stem": "다음은 니케아 신조의 일부분이다. 빈 칸에 들어갈 말로 적당한 것은? 그리고 한 분 주 예수 그리스도를 믿으니, 그는 하나님의 외아들로 나시고, 즉 아버지의 ( )로부터 나셨고, 하나님으로부터의 하나님이시요 빛으로부터의 빛이시요. 참 하나님으로부터의 참 하나님으로서 출생하셨으나 만들어지지는 아니하셨고, 아버지와 ( )이시며, 하늘에 있는 것이나 땅에 있는 것이나 만물이 다 그를 말미암아 만들어졌고, 우리 인간들을 위하여, 그리고 우리의 ( )을(를) 위하여 내려오시고, 성육신하시어 사람이 되었으며, 고난을 받으시고, 사흘 만에 다시 살아나셔서 하늘에 오르셨고, 산 자와 죽은 자를 심판하시기 위하여 오실 것이다.", "choices": ["형상 - 유사본질 - 영생", "본질- 유사본질 - 성화", "형상 - 동일본질 - 대속", "본질 - 동일본질 - 구원"], "answer": 4, "explanation": "니케아 신조는 당시 논란이 되고 있던 성자와 성부의 신적 본질에 대한 이해 문제를 확정했다. 니케아 신조는 성자께서는 아버 지의 본질에서 나셨고 따라서 그분의 본질은 아버지와 동일본질이며, 그분이 인간이 되어 오신 이유는 다만 우리의 구원을 위함 이라고 고백했다."}, {"id": "교회사-0048", "subject": "교회사", "section": "초대교회사", "qnum": 48, "stem": "다음 중 니케아 회의 이후의 삼위일체 교리의 확립 과정에 대한 설명으로 바른 것은? 황제가 교회의 교리를 확정했다는 사실이 모든 교회의 환영을 받았다.", "choices": ["황제가 교회의 교리를 확정했다는 사실이 모든 교회의 환영을 받았다.", "양태론적 입장은 완전히 사라졌다.", "삼위일체 교리에 대한 더 체계적인 설명이 필요해졌다.", "콘스탄티누스 황제와 그의 계승자들은 니케아 신조를 철저히 보호했다."], "answer": 3, "explanation": "니케아 회의는 삼위일체 교리와 관련한 정통교리를 확정했으나 그 결과 그간의 모든 논쟁이 마무리된 것은 아니었다. 박해가 막 끝난 상황에서 황제가 교회의 교리 확정을 주도해도 되겠느냐는 의구심과, 간략한 신앙고백이 다 다루지 못한 정교한 신학적 설 명의 필요성이 남아 있었다. 또 콘스탄티누스 황제 이후 즉위한 아들 황제들은 아리우스파에게 우호적 입장을 취함으로써 삼위 일체 교리를 둘러싼 논쟁을 다시 촉발했다."}, {"id": "교회사-0049", "subject": "교회사", "section": "초대교회사", "qnum": 49, "stem": "니케아 회의 이후 발생한 삼위일체 교리의 확립 과정에서 성령의 신성에 대한 논란을 불러일으켜 \"성령훼방론자\"라고 불린 콘스탄티노플의 감독은?", "choices": ["마케도니우스", "• 네스토리우스", "멜리티우스", "유스타케"], "answer": 1, "explanation": "성부와 동일한 성령의 신성을 부정하고 독자적인 인격성을 부인하는 입장을 취함으로써 논란을 불러일으킨 4세기 콘스탄티노플 의 감독은 마케도니우스이다."}, {"id": "교회사-0050", "subject": "교회사", "section": "초대교회사", "qnum": 50, "stem": "다음 중 양태론을 경계하면서 니케아 신조의 \"동일본질\"을 반대했던 사람이 아닌 인물은?", "choices": ["안디옥의 유독시우스", "앙키라의 마르켈루스", "알렉산드리아의 게오르기우스", "무르사의 발렌스"], "answer": 2, "explanation": "니케아 신조에 대한 반발이 계속된 이유 가운데 하나는 \"동일본질\"이라는 개념이 결국 성부와 성자의 구별을 불가능하게 만드는 양태론을 조장할 것이라는 우려였다. 많은 반대자들 속에서도 앙키라의 마르켈루스는 니케아 신조의 \"동일본질'을 변호했다."}, {"id": "교회사-0051", "subject": "교회사", "section": "초대교회사", "qnum": 51, "stem": "4세기 삼위일체 교리의 확립 과정에서 갑바도기아 출신 신학자들의 역할이 지대했다. 다음 중 갑 바도기아 신학자에 속하지 않는 인물은? 0 가이사랴의 바질리우스", "choices": ["가이사랴의 바질리우스", "나지안주스의 그레고리우스", "푸아티에의 힐라리우스", "닛사의 그레고리우스"], "answer": 3, "explanation": "4세기 삼위일체 교리 확립에 중요한 역할을 담당했던 갑바도기아 출신 신학자에는 가이사랴의 바질리우스, 나지안주스의 그레고 리우스, 그리고 닛사의 그레고리우스가 있다."}, {"id": "교회사-0052", "subject": "교회사", "section": "초대교회사", "qnum": 52, "stem": "381년 콘스탄티노플에서 공의회를 소집하여 니케아 신조를 확정함으로써 오랫동안 계속된 삼위일 체 논쟁을 공식적으로 마무리했던 황제는 누구인가?", "choices": ["콘스탄티우스", "테오도시우스", "데시우스", "율리우스"], "answer": 2, "explanation": "381년 콘스탄티노플에 공의회를 소집한 황제는 테오도시우스이다."}, {"id": "교회사-0053", "subject": "교회사", "section": "초대교회사", "qnum": 53, "stem": "381년 콘스탄티노플 회의에 대한 설명으로 올바른 것은?", "choices": ["코르도바의 감독 호시우스가 의장직을 수행했다.", "아폴리나리우스의 기독론을 정죄했다.", "아리우스의 주장을 반대하여 그리스도의 완전한 인성을 주장했다.", "마케도니우스의 주장을 정통교리로 승인했다."], "answer": 2, "explanation": "381년 소집된 콘스탄티노플 회의는 니케아 회의 이후에도 계속된 삼위일체 교리의 혼란을 종식시키고 마케도니우스의 잘못된 성령론을 정죄했으며, 성령에 대해 명확하게 고백했다. 더불어 아폴리나리스의 주장으로 인해 새롭게 등장한 기독론 관련 논쟁 도 다루었다."}, {"id": "교회사-0054", "subject": "교회사", "section": "초대교회사", "qnum": 54, "stem": "다음은 381년 콘스탄티노플 회의에서 확정한 성령에 대한 고백이다. 빈칸에 들어갈 알맞은 단어 는 무엇인가? 또한 성령을 믿사오니, 이는 주이시며 생명을 주시는 자이시니, 아버지로부터 ( ), 곧 아버지와 아들과 더불어 함께 경배 받으시며, 함께 영광을 받으실 분이시니, 선지자들을 통하여 말씀하여 오신 분이시니라.", "choices": ["창조되셨으며", "태어나셨으며", "나오셨으며", "유출되셨으며"], "answer": 3, "explanation": "콘스탄티노플 신조는 성령에 대한 고백도 더 구체적으로 진술했다. 성자께서 성부로부터 \"출생\", 즉 \"태어나셨다\"면, 성령은 이 버지로터 \"발출\", 혹은 나오셨다\"로 진술함으로써 성자와 성령을 구별했다."}, {"id": "교회사-0055", "subject": "교회사", "section": "초대교회사", "qnum": 55, "stem": "삼위일체 논쟁의 과정에서 서방교회가 자신들이 사용하는 신조 가운데 성령께서 성부와 성자 모 두에게서 나오신다는 말을 삽입함으로써 성령은 성부에게서만 나오신다고 주장한 동방교회와 갈 등을 일으키게 한 용어는?", "choices": ["필리오케", "호모우시오스", "테오토코스", "휘포스타시스"], "answer": 1, "explanation": "필리오케(filioque)는 \"아들로부터도\"라는 뜻으로 본래 니케아 콘스탄티노플 신조에 포함되지 않았던 단어였지만, 이후 서방교회 에서 라틴어로 번역된 신조에 포함되어 사용되었다. 공의회를 거치지 않은 서방교회의 임의적 변경은 동방교회와의 갈등을 불러 일으켰다."}, {"id": "교회사-0057", "subject": "교회사", "section": "초대교회사", "qnum": 57, "stem": "네스토리우스의 분리적 양성분 아니라 단성론까지 모두 정죄하고 정통 기독론을 확정했던 451 년 개최된 회의는?", "choices": ["칼케돈 회의", "니케아 회의", "에베소 회의", "트렌트 회의"], "answer": 1, "explanation": "네스토리우스의 주장뿐 아니라 단성론도 정죄하고 정통 기독론을 확립한 칼케돈 회의는 451년 개최되었다."}, {"id": "교회사-0058", "subject": "교회사", "section": "초대교회사", "qnum": 58, "stem": "다음은 칼케돈 회의에게 확정된 정통 기독론의 진술이다. 보기 가운데 빈칸에 들어가기에 부적합 한 말은? 한 분이시고 같은 분께서 그리스도, 외아들, 주님이시며, 두 본성 안에서 ( )이(가) 없으시며 ( )이(가) 없으시며 ( )이(가) 없으시고 나뉘지 않으시는 분으로 인식되며, 이 외에는 결합으로 인해 본성들의 구별이 없어지지 않으시고, 오히려 두 본성의 각 속성이 보존되며, 하나의 위격과 하나의 휘포스타시스로 결합 되신다. \" 혼합 ② 분리 ③ 동질 ④ 변함", "choices": ["혼합", "분리", "동질", "변함"], "answer": 3, "explanation": "칼케돈 신조는 예수 그리스도 안의 신성과 인성, 이 두 본성이 혼합, 분리, 변함, 나눔 없이 구별되어 결합되었다고 고백했다. \"동질\"은 성부와 성자의 신적 본질의 성격에 대한 설명이라고 볼 수 있다."}, {"id": "교회사-0059", "subject": "교회사", "section": "초대교회사", "qnum": 59, "stem": "다음 중 네스토리우스의 주장을 반박하기 위해 알렉산드리아의 키릴루스가 제시한 기독론과 가장 거리가 먼 것은?", "choices": ["속성교류", "성부의 신성과 유사한 그리스도의 신성의 본질", "그리스도의 인성과 신성의 불가분적 결합", "테오토코스로서의 마리아"], "answer": 2, "explanation": "알렉산드리아의 키릴루스는 네스토리우의 양성 분리 주장을 반대했다. 키릴루스는 삼위일체 교리에 있어서 유사본질파는 아니었다."}, {"id": "교회사-0060", "subject": "교회사", "section": "초대교회사", "qnum": 60, "stem": "인간 삼분설에 입각하여 그리스도께서 성육신하실 때 인간의 영은 취하지 않으시고 다만 인간의 혼과 육만을 취했다고 주장하다가 381년 콘스탄티노플 회의에서 정죄된 라오디게아의 감독은?", "choices": ["마르켈뉴스", "플라비아누스", "네스토리우스", "아폴리나리스"], "answer": 4, "explanation": "라오디게아의 감독 아폴리나리스는 그리스도의 신적 본질이 성부와 동일함을 강조하는 과정에서 기독론과 관련해 인간 3분설에 입각해 성육신하신 그리스도의 인성은 인간의 혼은 취했지만 인간의 영은 취하지 않았다고 주장했다."}, {"id": "교회사-0061", "subject": "교회사", "section": "초대교회사", "qnum": 61, "stem": "다음 중 381년 콘스탄티노플 회의에서 기독론과 관련한 오류를 비판하고 이 오류를 극복하기 위 해 구원에 있어 그리스도의 신성과 인성의 중요성을 모두 강조했던 신학자는?", "choices": ["터툴리안", "크리소스톰", "나지안주스의 그레고리우스", "어거스턴"], "answer": 3, "explanation": "381년 콘스탄티노플 회의에서 중요한 역할을 담당했던 나지안주스의 그레고리우스는 아폴리나리우스의 기독론적 오류도 강하게 비판했다. 그는 아폴리나리스를 반박하면서, 만일 그리스도께서 인간의 영을 취하지 않으셨다면 인간의 영은 구원의 범위에서 제외될 수밖에 없을 것이라고 지적했다."}, {"id": "교회사-0062", "subject": "교회사", "section": "초대교회사", "qnum": 62, "stem": "안디옥 출신의 콘스탄티노플 감독으로서 그리스도의 인성과 신성의 상호 교류 불가능이라는 잘못 된 기독론을 주장함으로써 431년 공의회에서 정죄된 인물은?", "choices": ["네스토리우스", "아폴리나리스", "크리사피우스", "플라비아누스"], "answer": 1, "explanation": "431년 에베소 공의회는 네스토리우스의 기독론적 오류를 정죄했다."}, {"id": "교회사-0063", "subject": "교회사", "section": "초대교회사", "qnum": 63, "stem": "다음 중 로마 감독 레오 1세에 대한 설명으로 올바르지 않은 것은?", "choices": ["440년부터 461년까지 로마 감독으로 재위했다.", "동방에서 벌어진 기독론 논쟁에서 알렉산드리아의 입장을 지지했다.", "로마 감독의 권위가 천국의 열쇠를 수여받은 베드로에게서 왔다고 주장했다.", "재위 기간 중 외교적 수완을 발휘해 훈족과 반달족으로부터 로마의 약탈을 막아냈다."], "answer": 2, "explanation": "431년 에베소 회의의 결정 이후 단성론이 대두되어 논쟁이 벌어지자 당시 로마의 감독이었던 레오 1세는 알렉산드리아의 감독 디오스코루스와 달리 단성론의 문제를 비판했다. 그는 기독론 논쟁뿐 아니라 이민족의 침입 가운데 로마를 지켜내는 등 정치적 2 역량도 발휘해 서방교회에서 교황의 지위를 크게 높여 놓았다."}, {"id": "교회사-0064", "subject": "교회사", "section": "초대교회사", "qnum": 64, "stem": "5세기 중엽 예수 그리스도의 인성과 신성 사이의 결합을 강조하다가 결국 그리스도 안에서 두 본 성이 하나가 되었다는 주장으로 인해 정죄당한 콘스탄티노플의 대수도원장은?", "choices": ["네스토리우스", "유티케스", "플라비아누스", "크리사피우스"], "answer": 2, "explanation": "콘스탄티노플의 대수도원장 유티케스는 네스토리우스의 주장을 비판하는 데에서 더 나아가 예수 그리스도의 한 인격 안에 신성 과 인성이 구별되어 있다는 생각까지 거부했다. 그 결과 그는 예수 그리스도 안에는 하나의 본성만 있을 뿐이라는 단성론을 주 장했다."}, {"id": "교회사-0065", "subject": "교회사", "section": "초대교회사", "qnum": 65, "stem": "단성론자들의 공격에 맞서기 위해 평화안을 제출한 안디옥 출신의 키루스의 감독 테오도레투스의 주장과 가장 거리가 먼 것은?", "choices": ["그리스도께서는 완전한 인간이다.", "그리스도의 한 인격 안에 신성과 인성이 연합하여 있다.", "예수 그리스도는 그의 신성에서 하나님 아버지와 동질이시다.", "어떤 의미에서도 하나님께서 십자가에서 죽으셨다고 말할 수 없다."], "answer": 4, "explanation": "기독론을 둘러싼 동방교회의 논쟁이 격렬해지자 키루스의 감독 테오도레투스는 합의안을 제시했다. 그의 합의안은 그리스도의 한 인격 안에 완전한 인성과 완전한 신성이 연합하여 있다고 말함으로써 하나님께서 십자가에 죽으셨다고는 절대 말할 수 없다 는 네스토리우스의 주장을 거부했다."}, {"id": "교회사-0067", "subject": "교회사", "section": "초대교회사", "qnum": 67, "stem": "다음 중 초대교회 각 시기에 발생한 사건을 바르게 연결한 것은 무엇인가?", "choices": ["2세기 - 공의회를 통해 삼위일체 논쟁이 종결되었다.", "3세기 - 분파주의에 맞서 보편교회에 대한 신학적 논의가 전개되었다.", "4세기 - 마르키온주의와 몬타누스주의의 도전이 나타났다.", "5세기 - 기독교가 로마 제국의 공인을 받아 예배와 신앙의 자유를 얻었다"], "answer": 2, "explanation": "삼위일체 교리 논쟁은 대략 4세기 말에 정리되었고 보편교회에 대한 키프리안의 논쟁은 3세기에 나타났다. 마르키온주의와 몬타 누스주의의 도전은 2세기에는 나타났고 기독교의 공인은 4세기에 이루어졌다."}, {"id": "교회사-0068", "subject": "교회사", "section": "초대교회사", "qnum": 68, "stem": "다음 중 초대교회에서 발전한 주요 교리의 주제와 그 주제의 정통교리 확정에 크게 기여한 인물 들을 잘못 연결한 것은?", "choices": ["삼위일체론- 니코메디아의 유세비우스", "기독론 - 레오 1세", "인간론 - 어거스틴", "교회론 - 키프리아누스"], "answer": 1, "explanation": "니코메디아의 유세비우스는 니케아 신조에 동의하지 않았다."}, {"id": "교회사-0069", "subject": "교회사", "section": "초대교회사", "qnum": 69, "stem": "다음 중 어거스틴의 생애에 대한 설명으로 올바른 것은?", "choices": ["354년 북아프리카 히포에서 출생했다.", "젊은 시절 마니교의 일원론을 신봉했다.", "387년 밀라노에서 암브로시우스의 설교를 듣고 감화를 받아 회개했다.", "395년 회중들에 의해 카르타고의 감독이 되었다."], "answer": 3, "explanation": "어거스틴은 354년 북아프리카 타가스테에서 출생했으며 그가 젊은 시절 신봉한 마니교는 선과 악의 이원론을 특징으로 했다. 그는 387년 밀라노에 머무는 동안 감독 암브로시우스의 설교에 큰 감화를 받았다. 어거스틴이 395년 감독으로 취임한 곳은 히 포이다."}, {"id": "교회사-0070", "subject": "교회사", "section": "초대교회사", "qnum": 70, "stem": "어거스틴은 \"삼위일체론\"에서 삼위일체 하나님의 흔적이 인간의 영혼 안에 남아 있다고 말했다. 이때 그가 말한 인간 영혼을 구성하는 세 가지 요소에 포함되지 않는 것은 다음 중 무엇인가?", "choices": ["기억", "이해", "의지", "감정"], "answer": 4, "explanation": "어거스틴은 인간 영혼의 3요소를 이해, 의지, 그리고 기억이라고 보고, 이 세 요소에서 삼위일체의 흔적을 발견할 수 있다고 말 했다."}, {"id": "교회사-0071", "subject": "교회사", "section": "초대교회사", "qnum": 71, "stem": "4세기 기독교 공인 이후 북아프리카에서 활동한 인물로 박해 시에 신앙의 절개를 지키지 못한 이 들에 대한 철저한 권징을 주장한 도나투스의 분열에 맞서 선택받은 사람들의 공동체로 무형교회 의 일치를 주장했던 교부는?", "choices": ["키프리아누스", "터툴리안", "힐라리우스", "® 어거스틴"], "answer": 4, "explanation": "어거스틴은 북아프리카에 확산된 도나투스주의 분파에 맞서 무형교회의 중요성과 보편교회의 일치를 강조하는 교회론을 전개했다."}, {"id": "교회사-0072", "subject": "교회사", "section": "초대교회사", "qnum": 72, "stem": "아담의 죄가 후손들에게 예외 없이 유전된다는 생각을 거부하고 인간의 전적인 타락을 부정하며 은혜의 조력을 받아 인간이 스스로 의지적 변화를 통해 구원을 받을 수 있다고 주장한 5세기 브 리타니아 출신의 신학자는?", "choices": ["펠라기우스", "콜룸바", "패트릭", "그레고리우스"], "answer": 1, "explanation": "어거스틴과 인간론 및 원죄론, 그리고 은총론에서 치열한 논쟁을 벌인 브리타니아 출신 수도사는 펠라기우스이다."}, {"id": "교회사-0073", "subject": "교회사", "section": "초대교회사", "qnum": 73, "stem": "다음 중 펠라기우스의 주장에 맞선 어거스틴의 주장과 가장 거리가 먼 것은?", "choices": ["아담의 범죄는 그의 후손인 온 인류에게 유전된다.", "유아들 역시 원죄로 인해 타락했기 때문에 유아세례를 받을 필요가 있다.", "구원의 은혜는 인간의 적극적인 수용에 의해서 의롭게 하는 효과를 나타낸다.", "하나님의 은혜는 예정된 자들에게만 주어진다."], "answer": 3, "explanation": "펠라기우스의 주장에 맞서 어거스틴은 아담의 원죄의 보편적 유전과 그로 인한 유아세례의 필요성을 주장했으며, 구원의 은총은 2 전적으로 하나님의 독력적 사역으로서 완전히 타락한 인간이 이를 스스로 깨닫고 수용할 수 없으며 이 은총은 예정된 자들에게 만 주어진다고 주장했다."}, {"id": "교회사-0074", "subject": "교회사", "section": "초대교회사", "qnum": 74, "stem": "다음 중 펠라기우스의 사상을 정죄한 교회 회의는 무엇인가?", "choices": ["325년 니케아 회의", "381년 콘스탄티노플 회의", "횐", "431년 에베소 회의", "553년 콘스탄티노플 회의"], "answer": 3, "explanation": "431년 에베소 회의는 네스토리우스의 기독론을 정죄했을 뿐 아니라 펠라기우스의 잘못된 교리들도 정죄했다."}, {"id": "교회사-0075", "subject": "교회사", "section": "초대교회사", "qnum": 75, "stem": "다음 중 어거스턴이 평생에 걸쳐 상대했던 잘못된 사상 및 사상가들과 그들에 맞서 다루었던 주 제들이 올바르게 연결된 것은?", "choices": ["마니교- 국가론", "도나투스 - 교회론", "펠라기우스 - 삼위일체론", "아리우스 - 은종론"], "answer": 2, "explanation": null}, {"id": "교회사-0076", "subject": "교회사", "section": "초대교회사", "qnum": 76, "stem": "다음 중 어거스틴이 저술한 \"하나님의 도성\"에 대한 설명으로 올바르지 않은 것은?", "choices": ["410년 고트족에 의한 로마 함락과 그에 따른 이교도들의 비난에 대응하기 위해 저술했다.", "413년부터 426년까지 저술되었으며 총 22권으로 구성되었다.", "지상의 도성과 하나님의 도성을 대조하면서 두 도성의 역사적 관련성에 대해 설명했다.", "로마가 기독교를 국교로 삼고 굴복함으로써 하나님의 도성이 성취되었다고 주장했다."], "answer": 4, "explanation": "하나님의 도성은 이민족에 의한 로마 함락의 상황에서 확산한 기독교 신앙에 대한 비난에 대응하여 성경적 역사관을 제시하기 위한 목적으로 저술되었다. 어거스틴은 종말론적 역사 이해에 기초하여 기독교를 공인한 로마 제국이 곧 하나님의 나라라는 주 잠을 받아들이지 않았다."}, {"id": "교회사-0077", "subject": "교회사", "section": "초대교회사", "qnum": 77, "stem": "다음 중 어거스틴이 저술한 대표적인 작품이 아닌 것은?", "choices": ["참회록", "하나님의 도성", "삼위일체론", "제1원리에 관하여"], "answer": 4, "explanation": "제1원리에 관하여는 3세기 알렉산드리아의 신학자 오리겐의 대표적인 작품이다."}, {"id": "교회사-0078", "subject": "교회사", "section": "초대교회사", "qnum": 78, "stem": "마니교의 이원론에 맞서 어거스턴은 악을 무엇이라고 주장했는가?", "choices": ["무지의 귀결", "선의 결핍", "선의 원리와 대립되는 원리", "피조물의 필연적 한계"], "answer": 1, "explanation": "마니교는 선과 약을 대립된 두 가지 실체라고 생각했다. 이에 맞서 어거스틴은 존재하는 실체는 모두 선하다고 주장했다. 따라 서 악은 어떤 실체가 아니며 창조된 모든 실체가 지니고 있던 선의 결핍이라고 이해했다."}, {"id": "교회사-0079", "subject": "교회사", "section": "초대교회사", "qnum": 79, "stem": "다음은 어거스틴이 저술한 \"하나님의 도성\"의 일부이다. 빈칸에 들어가기에 가장 합당한 단어는? 두 도성은 두 가지 ( >(으)로 건설되었습니다. 지상의 도성은 하나님을 경멸하도록 이끄는 자기 ( )에 의해 건설되었고, 하나님의 도성은 자아를 경멸하도록 이끄는 하나님 ()에 의해 건설되었습니 다. 전자는 자신을 영화롭게 하고 후자는 주님을 영화롭게 합니다. 한 도성에서는 지배욕이 통치자들과 피지배 자들을 지배합니다. 그러나 다른 도성에서는 통치자들과 종들이 사랑하며 서로를 섬깁니다.", "choices": ["공의", "사랑", "공로", "말씀"], "answer": 2, "explanation": "어거스틴은 하나님의 도성과 지상의 도성을 \"사랑\"의 궁극적 대상을 무엇으로 삼고 있는가에 따라 구별할 수 있다고 말했다. 두 도성 모두 사랑을 가지고 있고 심지어 하나님을 사랑할 수도 있지만 하나님을 궁극적이며 최종적인 유일한 사랑의 대상으로 삼 는 도성만이 하나님의 도성이다."}, {"id": "교회사-0080", "subject": "교회사", "section": "초대교회사", "qnum": 80, "stem": "다음 중 어거스틴의 신학적 주장과 가장 거리가 먼 것은? • 인간의 전적인 타락 ② 불가항력적 은혜", "choices": ["인간의 전적인 타락", "불가항력적 은혜", "원죄의 유전", "하나님의 조건적 선택"], "answer": 4, "explanation": "펠라기우스와의 논쟁을 통해 어거스틴은 원죄의 보편적 유전에 의한 인간의 전적인 타락을 강조했고 이와 같이 타락한 인간을 구원하시는 하나님의 절대적 선택과 불가항력적 은총을 주장했다."}, {"id": "교회사-0081", "subject": "교회사", "section": "초대교회사", "qnum": 81, "stem": "다음 중 반펠라기우스(Semi-Pelagianism)에 대한 설명으로 옳지 않은 것은? 5세기 후반 카시아누스와 파우스투스 등이 주장했다.", "choices": ["5세기 후반 카시아누스와 파우스투스 등이 주장했다.", "아담으로부터의 원죄 유전을 인정하지 않았다.", "하나님의 구원의 은혜를 인간이 거부할 수 있다고 주장했다.", "529년 오렌지 회의에서 정죄되었다."], "answer": 2, "explanation": "펠라기우스주의가 교회에서 정죄된 이후에도 타락한 인간의 가능성을 일부 인정하는 키시아누스와 파우스투스와 같은 반필라기 우스, 혹은 준펠라기우스주의자들이 등장했다. 이들은 원죄의 보편적 유전은 인정했으나 원죄가 유전됨으로써 인간의 모든 능력 이 사라진 것은 아니라고 생각했다."}, {"id": "교회사-0082", "subject": "교회사", "section": "초대교회사", "qnum": 82, "stem": "다음 중 반펠라기우스주의(Semi-Pelagianism)의 주장과 가장 거리가 먼 개념은?", "choices": ["성례 시행 강조", "원죄 모방설", "타락의 보편성", "부분적 타락"], "answer": 2, "explanation": "펠라기우스는 원죄의 모방설을 주장한 반면 반펠라기우스주의자들은 원죄의 유전설을 주장했다는 점에서 차이가 있다"}, {"id": "교회사-0083", "subject": "교회사", "section": "초대교회사", "qnum": 83, "stem": "다음 중 초대교회 시대에 전개된 수도원 운동을 주도했다고 보기 가장 어려운 인물은?", "choices": ["파코미우스", "제롬", "바실리우스", "디오스코루스"], "answer": 4, "explanation": "디오스코루스는 5세기 알렉산드리아의 감독으로서 스스로 전체 교회의 지도자임을 자처했고 신학적 문제뿐 아니라 정치적 사인 에 대해서 영향력을 행사한 제도권 교회의 지도자였다."}, {"id": "교회사-0084", "subject": "교회사", "section": "초대교회사", "qnum": 84, "stem": "다음 중 기독교 공인 이후 수도원 운동이 활발하게 전개된 이유와 가장 거리가 먼 것은? 성직자들의 세속화에 대한 반감 동방의 신비주의적 세계관에 대한 저항 2", "choices": ["성직자들의 세속화에 대한 반감", "동방의 신비주의적 세계관에 대한 저항", "은둔생활에 대한 높은 평가", "순교를 사모하던 열정의 영향"], "answer": 2, "explanation": "초대교회에서 시작된 수도원 운동은 기독교 공인 이후의 이전까지의 순교 신앙을 유지하려는 동기가 크게 작동했다. 동방 신비 주의에 대한 관심과 은둔생활에 대한 높은 평가도 중요한 요인들 가운데 하나였다."}, {"id": "교회사-0085", "subject": "교회사", "section": "초대교회사", "qnum": 85, "stem": "주후 250년경 이집트에서 태어나 활동한 은둔주의 수도원 운동의 창설자로서 아타나시우스가 그 에 대한 전기를 저술했던 인물은?", "choices": ["안토니우스", "파코미우스", "제롬", "베네딕트"], "answer": 1, "explanation": "아타나시우스가 기록한 전기를 통해 동방교회의 은둔 수사 안토니우스의 이름이 후대에게 널리 알려졌다."}, {"id": "교회사-0086", "subject": "교회사", "section": "초대교회사", "qnum": 86, "stem": "다음 중 6세기 초 수도원 운동을 전개했던 베네딕트에 대한 설명으로 올바르지 않은 것은? 480년경 팔레스타인에서 출생했다.", "choices": ["480년경 팔레스타인에서 출생했다.", "개인적 수양보다는 공동체적 훈련을 중시했다.", "몬테카지노에 수도원을 설립하여 규칙적인 수도원 생활을 실시했다.", "그가 실시한 규칙은 이후 서유럽 수도원 운동의 기준이 되었다."], "answer": 1, "explanation": "베네딕트는 480년경 이탈리아 누르시아 출신으로서 몬테카시노에 수도 공동체를 수립하고 공동생활에 적용할 규칙을 만들어 이 후 서방 수도원 운동에 크게 기여했다."}, {"id": "교회사-0088", "subject": "교회사", "section": "초대교회사", "qnum": 88, "stem": "다음 중 연설을 발전시켜 체계적으로 제시한 6세기의 교황은 누구인가?", "choices": ["레오 1세", "그레고리우스 1세", "베네틱투스 1세", "요한 3세"], "answer": 2, "explanation": "연옥설은 교황 그레고리우스 1세를 통해 신학적 체계를 갖추고 수용될 수 있었다."}, {"id": "교회사-0089", "subject": "교회사", "section": "초대교회사", "qnum": 89, "stem": "다음 중 313년 기독교 공인 이후 서방교회에서 교황의 권위가 증대된 배경과 가장 거리가 먼 것은?", "choices": ["정통 교회와 이단 사이의 신학적 투쟁", "칼케돈 공의회에서 확인된 교황의 역할", "게르만족의 침입에 대한 대응", "유스티니아누스 황제의 재정복"], "answer": 2, "explanation": "기독교 공인 이후 교회에 대한 황제의 권위가 컸던 동방교회에 비해 서방교회에서는 로마 감독, 즉 교황의 권위가 크게 증대했 다. 서로마 황제의 위상이 흔들리던 5세기 초부터 교황은 이단에 대한 신학적 대처 아니라 이민족들의 침입을 대처하는 외교 적 수완에 이르기까지 주도적 영향을 담당했다. 유스티니아누스 황제는 동방 황제로서 이탈리아 지역을 비롯한 서로마의 많은 지역을 수복했다. 그는 교회 문제도 깊이 개입하여 제국 전체에 걸쳐 황제의 권한을 위를 높였다."}, {"id": "교회사-0090", "subject": "교회사", "section": "초대교회사", "qnum": 90, "stem": "다음 중 기독교가 로마 제국의 공인을 받은 후 나타난 신앙적 변화로 볼 수 없는 것은?", "choices": ["교회 건축과 기독교 예술의 발전", "성자 및 성물 숭배 사상", "부활절 등 절기 준수 날짜의 다변화", "마리아 숭배 및 천사 숭배"], "answer": 3, "explanation": "313년 기독교가 공인된 이후 기독교 내에서는 건축을 비롯한 예술이 발달했고 마리아와 천사까지 포함하는 성자 및 성물 숭배 가 계속 이루어졌다. 부활절이나 성탄절은 특정한 일자로 확정되었다."}, {"id": "교회사-0091", "subject": "교회사", "section": "초대교회사", "qnum": 91, "stem": "서로마의 마지막 황제인 로물루스 아우구스투스를 축출하고 최초의 게르만 왕이 되었으나 동로마 황제 제논의 사주를 받은 동고트족 테오도릭에 의해 살해당한 인물은?", "choices": ["오도아케르", "아틸라", "알라리쿠스", "알보인"], "answer": 1, "explanation": "서로마 제국은 476년 마지막 황제인 로물루스 아우구스투스가 오도아케르에 의해 폐위됨으로써 막을 내렸다."}, {"id": "교회사-0092", "subject": "교회사", "section": "초대교회사", "qnum": 92, "stem": "다음 중 초대교회에서 발생한 여러 신학적 논쟁들과 이 문제에 대한 정통교리를 확정한 회의를 바르게 연결한 것은?", "choices": ["성부와 성자의 신성의 본질 - 431년 콘스탄티노플 회의", "예수 그리스도의 두 본성 - 451년 칼케돈 회의", "원죄의 유전과 전적 타락 - 449년 에베소 회의", "예수 그리스도의 두 의지 - 325년 니케아 회의"], "answer": 2, "explanation": "성부와 성자의 신성의 본질은 325년 니케아 회의에서, 예수 그리스도의 두 본성의 관계에 대해서는 431년 에베소 공의회를 거 쳐 451년 칼케돈 공의회에서, 원죄의 유전과 전적 타락은 펠라기우스를 정죄했던 431년 에베소 공의회에서, 예수 그리스도의 두 의지에 대한 교리적 확정은 680년 콘스탄티노플 공의회에서 이루어졌다."}, {"id": "교회사-0093", "subject": "교회사", "section": "초대교회사", "qnum": 93, "stem": "다음 중 초대교회에 등장했던 여러 이단적 사상들과 그들이 처음 출현했던 시기가 바르게 연결된 것은?", "choices": ["몬타누스주의 - 2세기", "펠라기우스주의 - 3세기", "네스토리우스주의 - 4세기", "아리우스주의 - 6세기"], "answer": 1, "explanation": "마르키온주의와 몬타누스주의는 2세기 등장했다. 펠라기우스주의는 360년경 출생한 펠라기우스의 사상이다. 네스토리우스의 주 장으로 시작된 기독론 논쟁은 5세기에 일어났다. 아리우스로 인해 비롯된 삼위일체 교리 논쟁은 4세기에 발생했다."}, {"id": "교회사-0094", "subject": "교회사", "section": "초대교회사", "qnum": 94, "stem": "다음 중 서방교회에서 로마 교황의 권위를 증대시켰던 주요 교황들을 재위 순서대로 바르게 나열 된 것은?", "choices": ["레오 1세 - 다마수스 1세 - 젤라리우스 1세 - 그레고리우스 1세", "다마수스 1세 - 레오 1세 - 그레고리우스 1세 - 겔라리우스 1세", "다마수스 1세 - 레오 1세 - 겔라리우스 1세 - 그레고리우스 1세", "레오 1세 - 다마수스 1세 - 그레고리우스 1세 - 겔라리우스 1세"], "answer": 3, "explanation": "다마수스 1세는 366년부터 384년 로마 감독으로 재위하면서 다른 감독들 위에 로마 감독의 우월성을 주장했다. 이후 레오 1세 는 440부터 461년까지 재워하면서 로마 감독이 베드로의 계승자임을 주장했다. 겔라리우스 1세는 492년부터 496년까지 재위 하며 \"두 권력 이론\"을 주장하며 교황의 권위가 황제의 권위 위에 있다고 주장했다. 그레고리우스 1세는 590년부터 604년까지 재위했고 이후 교황이 세속 권세까지 관리하는 기독교 왕국(Christendom)이 세워지는 기초를 놓았다."}, {"id 96", "subject": "교회사", "section": "중세교회사", "qnum": 7, "stem": "다음 중 베네딕트 수도규칙의 내용에 해당하지 않는 내용은?", "choices": ["육체노동을 강조했다.", "수도원 소속의 영속성과 순종의 의무를 강조했다.", "성무 일과에 따른 반복적 예배와 기도 생활을 규정했다.", "금식과 고행을 통한 영성의 이상적 성취를 추구했다."], "answer": 4, "explanation": "6세기 이탈리아 누르시아 출신의 베네딕트에 의해 시작되어 확대된 수도원운동은 금식과 고행, 은둔을 강조하기보다는 규율을 갖춘 공동체 안에서 육체노동과 성무 일과에 따른 실천 가능한 경건을 강조했다."}, {"id": "교회사-0197", "subject": "교회사", "section": "중세교회사", "qnum": 8, "stem": "주후 800년 성탄절에 로마에서 교황 레오 3세로부터 로마 제국 황제의 관을 받음으로써 \"신성로마 제국\"을 시작한 프랑크 왕국의 군주는 누구인가?", "choices": ["피핀", "샤를마뉴", "오토", "루이"], "answer": 2, "explanation": "교황 레오 3세는 프랑크 왕국의 카알 마르텔의 조카인 샤를마뉴를 800년 12월 25일 로마로 불러 신성로마제국의 새로운 황제 로 삼았다."}, {"id": "교회사-0198", "subject": "교회사", "section": "중세교회사", "qnum": 9, "stem": "다음 중 프랑크 왕국의 샤를마뉴 대제에 대한 설명으로 올바른 것은? 비잔턴 제국 황제의 지배를 받는 위치였다.", "choices": ["비잔턴 제국 황제의 지배를 받는 위치였다.", "각 지역 주교의 임명권은 전적으로 로마 교황에게 있었다.", "수도원을 억압하고 라틴어로 드리는 예배를 강제했다.", "알을 궁정학사로 임명하여 학문 발달을 촉진시켰다."], "answer": 4, "explanation": "신성로마제국의 황제로 임명된 샤를마뉴 대제는 기독교 문화를 지원하고 유능한 학자 알권을 궁정학사로 임명하여 카롤링거 르 네상스라고 불리는 문예 부흥을 이루어냈다. 그는 프랑크 왕국 내에서 주교 임명에 영향력을 가지고 있었지만 특정한 예배 의식 을 강제하지는 않았다."}, {"id": "교회사-0199", "subject": "교회사", "section": "중세교회사", "qnum": 10, "stem": "다음 중 프랑크의 왕 샤를마뉴에 의해서 시도된 9세기 교회와 예배 개혁 방향에 속하지 않는 것 은?", "choices": ["성직자 복장 개선", "예배당에 성수반 사용", "저", "수도원 규율의 체계화", "개인의 사적 미사 억압"], "answer": 4, "explanation": "샤를마뉴 대제 통치 기간 서방교회의 여러 제도와 의식들이 체계적으로 정비되었다. 성직자 복장이 개선되었으며 예배당에 성수 를 담아놓는 성수반이 설치되었고 수도원의 규율이 체계화되었다. 그러나 개인들의 사적 미사는 여전히 성행했다."}, {"id": "교회사-0200", "subject": "교회사", "section": "중세교회사", "qnum": 11, "stem": "카롤링거 왕조 시대에 왕실의 지원을 받아 오늘날 독일 지역 선교에 현신하여 큰 업적을 남겨 홋 날 \"독일의 사도\"라는 이름을 얻은 잉글랜드 출신의 선교사는?", "choices": ["보니파키우스", "콜롬바누스", "모혼나", "윌리브로드"], "answer": 1, "explanation": "보니파키우스는 카롤링거 왕실의 후원 속에서 오늘날 독일 지역을 선교하여 성과를 거둠으로써 이후 \"독일의 사도\"라는 이름을 얻었다."}, {"id": "교회사-0201", "subject": "교회사", "section": "중세교회사", "qnum": 12, "stem": "프랑크 왕국을 셋으로 나누어 이후 각각 프랑스, 독일, 이탈리아로 발전하게 했던 843년의 조약 은 무엇인가?", "choices": ["베르됭 조약", "메르센 조약", "보름스 조약", "밀라노 조약"], "answer": 1, "explanation": "830년 사를마뉴 대제의 아들인 루트비히 경건왕이 죽자 그의 세 아들 사이에 황권을 둘러싼 경쟁이 발생했다. 세 아들은 843 년 베르됭에서 만나 프랑크 왕국을 셋으로 나누는 조약을 체결했다. 로타르 1세가 통치한 중프랑크 지역은 이후 이탈리아와 스 위스 및 벨기에 등으로 발전했고, 대머리왕 샤를 2세가 통치한 서프랑크 지역은 이후 프랑스로, 루트비히 2세가 통치한 동프랑 크 지역은 독일로 발전했다."}, {"id": "교회사-0202", "subject": "교회사", "section": "중세교회사", "qnum": 13, "stem": "810년경 아일랜드에서 출생한 수도사로서 카롤링거 왕조 시대 파리 왕립학교의 교수가 되었으며 위-디오니시우스의 헬라어 저술들을 라틴어로 번역하고 실재론에 입각한 신학적 사변을 전개함으 로써 중세 스콜라신학의 초석을 놓은 인물은?", "choices": ["알퀸", "아인하르트", "에리우게나", "보에티우스"], "answer": 3, "explanation": "810년경 아일랜드에서 출생한 에리우게나는 프랑크 왕국의 대머리왕 샤를 2세 시대에 활동한 유능한 신학자였다. 그는 코트살 트의 이중예정론을 반박했으며 위-디오니시우스의 저술을 라틴어로 번역하여 플라톤주의를 서방 신학에 도입하는 데 기여했다."}, {"id": "교회사-0203", "subject": "교회사", "section": "중세교회사", "qnum": 14, "stem": "기독교 신앙을 왕국의 기초로 더 확고하게 확립하고 여러 지역의 귀족들을 군사력으로 진입하여 강력한 왕권을 확립한 후 이탈리아에서 교황의 권위를 보존함으로써 962년 교황 요한 12세에 의 해 신성로마제국의 황제라는 칭호를 얻은 동프랑크 왕국의 군주는?", "choices": ["콘라트 1세", "프리드리히 1세", "오토 1세", "하인리히 1세"], "answer": 3, "explanation": "931년 독일의 군주로 즉위한 오토 1세는 기독교 세계에 끼친 지도력을 인정받아 962년 교황 요한 12세에 의해 신성로마제국 의 황제라는 명칭을 얻었다."}, {"id": "교회사-0204", "subject": "교회사", "section": "중세교회사", "qnum": 15, "stem": "다음 중 비잔틴 제국의 유스티니아누스 황제의 종교정책에 대한 설명으로 올바른 것만을 묶은 것 은? 가. 로마법을 통일하여 제국의 통치를 체계화했다. 나. 벨리사리우스 장군을 통해 로마를 포함한 종전 로마 제국의 영토를 대부분 회복했다. 다. 프랑크 왕국을 멸망시키고 정통 교회를 재건했다. 라. 칼케돈 신조를 철저하게 신봉하여 단성론자들을 억압했다. 마. 수도인 콘스탄티노플에 하기아 소피아 성당을 건축했다.", "choices": ["가, 다, 마", "가, 나, 마", "나, 다, 라", "나, 라, 마"], "answer": 2, "explanation": "보기 중 잘못된 것을 설명하면 다. 유스티니아누스 황제가 서로마 제국 지역을 수복하면서 프랑크 왕국을 멸망시킨 것은 아니 다. 라. 유스티니아누스는 황제는 재위 초기에 칼케돈 신조보다 단성론을 지지하는 입장을 취했다."}, {"id": "교회사-0205", "subject": "교회사", "section": "중세교회사", "qnum": 16, "stem": "다음 중 중세 초기 서방교회와 비교할 때 나타나는 동방 비잔틴 교회의 특징을 바르게 설명한 것 만을 묶은 것은? 가. 황제들은 되도록 교회 문제에 관여하지 않으려 했다. 나. 성령은 성부에게서만 나오신다고 고백했다. 다. 기독론과 관련한 신학적 논쟁이 계속되었다. 라. 성상숭배를 적극적으로 옹호했다.", "choices": ["가, 나", "나, 라", "다, 라", "나, 다"], "answer": 4, "explanation": "서방교회와 비교할 때 동방 비잔틴 교회는 교회 문제의 해결에 있어 주교들보다 황제가 중요한 권위를 갖는 경향이 있었다. 성 령의 발출과 관련해서는 서방과 달리 아버지로부터만 나오신다는 입장을 고수했다. 기독론 논쟁은 주로 동방교회에서 계속 치열 하게 전개되었다. 성상숭배의 가능성에 대해서는 서방교회가 더 적극적인 입장을 보여주었다."}, {"id": "교회사-0206", "subject": "교회사", "section": "중세교회사", "qnum": 17, "stem": "다음 중 중세시대 동방 비잔틴 교회와 서방 라틴 교회의 공통점과 가장 거리가 먼 것은?", "choices": ["성령의 발출", "® 성유물 숭배", "성례전 중심의 예배", "이전 시대 공의회 결정에 대한 존중"], "answer": 1, "explanation": "동방 비잔틴 교회와 서방 라틴 교회는 모두 성유물 숭배를 인정했으며 성례전 중심의 예배를 드렸고 초대교회의 공의회가 결정 한 내용들을 존중했다. 그러나 성령의 발출에 대해서는 서방교회가 \"아들로부터 (filioque)를 고백한 반면 동방교회는 이를 거절 하고 강하게 비판했다."}, {"id": "교회사-0207", "subject": "교회사", "section": "중세교회사", "qnum": 18, "stem": "787년 열린 제2차 니케아 공의회가 성상숭배에 대해 내린 결정 사항과 가장 어울리지 않는 것 은? 성상과 성화숭배는 우상숭배가 아니다.", "choices": ["성상과 성화숭배는 우상숭배가 아니다.", "예수 그리스도와 마리아와 성인들의 형상은 가능하나 천사는 형상화할 수 없다.", "성상을 통해 원형을 상기할 수 있으므로 공경의 예배를 드릴 수 있다.", "성상은 그릇과 옷과 벽과 집 내부와 길에 대해서도 사용할 수 있다."], "answer": 2, "explanation": "787년 열린 제2차 니케아 공의회는 성상숭배와 관련해 예수 그리스도와 마리아뿐 아니라 성인들과 천사는 형상화도 가능하다고 결정했다."}, {"id": "교회사-0208", "subject": "교회사", "section": "중세교회사", "qnum": 19, "stem": "다음 중 5세기부터 6세기까지 활동한 위-디오니시우스의 부정신학에 어울리지 않는 설명은?", "choices": ["하나님에 대한 지식은 초월적이다.", "하나님에 대한 지식은 보편적인 언어로 진술되어야 한다.", "하나님에 대한 지식은 침묵과 예배로 나아갈 때만 얻을 수 있다.", "하나님에 대한 지식은 긍정보다는 부정적 서술이 적합하다."], "answer": 2, "explanation": "플라톤주의적 성향을 가진 위-디오니시우스의 부정신학은 하나님에 대한 지식은 초월적이어서 사람들이 일반적으로 이해할 수 있는 보편적인 언어로 진술될 수 없다고 주장했다."}, {"id": "교회사-0209", "subject": "교회사", "section": "중세교회사", "qnum": 20, "stem": "675년경 출생한 인물로서 한때 이슬람 칼리프의 관원으로 일했으나 이후 수도사가 되었으며 교회 음악과 예술에 조예가 깊어 성상숭배를 둘러싼 논쟁에서 중요한 이론적 근거를 제시했던 신학자는?", "choices": ["다마스쿠스의 요한", "막시무스 플라누데스", "미카엘 코니아테스", "그레고리우스 팔라마스"], "answer": 1, "explanation": "다마스쿠스의 요한은 교회 음악과 예술에 대한 깊은 이해를 바탕으로 성상숭배와 관련한 중요한 이론적 근거들을 제시했다."}, {"id": "교회사-0210", "subject": "교회사", "section": "중세교회사", "qnum": 21, "stem": "다음 중 중세 초기 동방의 발전한 여러 지역의 교회들과 그 교회들의 신학적 입장을 바르게 연결 한 것은?", "choices": ["아르메니아 교회 - 의식이나 축일에 대한 거부", "콥턱 교회 - 단성론을 지속적으로 주장함", "시리아 교회- 삼위일체론에서 아리우스주의적 경향이 강함", "메소포타미아 교회 - 사도 야고보로부터 유래했다고 주장"], "answer": 2, "explanation": "동방교회의 여러 지역에서 발전한 다양한 교파들 가운데 아르메니아 교회와 콥틱 교회는 모두 단성론을 따랐으며 의식이나 축일 들을 적극 활용했다. 시리아 교회는 삼위일체론에서 니케아 신앙을 견지하며 사도 야고보로부터 유래했다고 주장했다."}, {"id": "교회사-0211", "subject": "교회사", "section": "중세교회사", "qnum": 22, "stem": "다음 중 교황권 강화와 관련한 그레고리우스 1세의 정책에 해당하지 않는 것은? • 수도사 출신으로 교황이 된 첫 인물로서 중요 직위에 수도사들을 등용했다. 고트족의 로마 침입을 막아내고 협상을 통해 이들을 개종시켰다.", "choices": ["수도사 출신으로 교황이 된 첫 인물로서 중요 직위에 수도사들을 등용했다.", "고트족의 로마 침입을 막아내고 협상을 통해 이들을 개종시켰다.", "잉글랜드에 선교사 어거스틴을 파송하는 등 이교도 전도에 힘썼다.", "사제의 결혼과 성직 매매를 금지했다."], "answer": 2, "explanation": "마지막 교부이라고 불린 그레고리우스 1세는 중세 초기 교황의 권위를 한층 높여 놓음으로써 대교황이라는 명칭을 얻었다. 그는 사제들의 결혼과 성직매매를 금지하는 등 내부 개혁에도 힘썼으며 롬바르드족의 침입으로부터 로마를 지켜내기도 했으며 선교사 어거스틴을 잉글랜드에 파송하기도 했다."}, {"id": "교회사-0212", "subject": "교회사", "section": "중세교회사", "qnum": 23, "stem": "9세기 출현한 \"위 이시도르 교령집\"의 주장과 가장 거리가 먼 것은?", "choices": ["성직자는 하나님께서 구별하신 사람들이다.", "성직자는 세속법정의 판단 대상이 아니다.", "황제는 주교들을 임명하고 폐위시킬 수 있다.", "교황의 판결은 최종적이므로 이에 불복한 항소는 불가하다."], "answer": 3, "explanation": "9세기 나타난 \"위 이시도르 교령집\"은 콘스탄티누스 황제가 기독교로 개종하면서 당시 로마 감독 실베스터 1세에게 서방 지역 의 통치권을 양보했다는 기증문서를 포함해 니케아 공의회 이전의 교황 서한들과 공의회의 회의록, 그리고 실베스터 1세로부터 그레고리우스 2세까지의 교황 등의 서한집을 교묘하게 배열해놓은 문집이다. 그중에 많은 문서는 실제로는 850년경에 만들어진 위작들이다. 9세기 이후 교황청은 이 문서를 근거로 삼아 세속 권세에 대한 교황의 특권을 강조했다. 특히 교황의 최종적 판결 권한을 주장했다."}, {"id": "교회사-0213", "subject": "교회사", "section": "중세교회사", "qnum": 24, "stem": "다음 중 교황의 사절로 콘스탄티노플을 방문했다가 동방교회의 예배의 문제를 지적함으로써 1054년 교황이 동방교회를 파문하게 만들었던 인물은?", "choices": ["힐데브란트", "홈베르투스 데 실바칸디다", "페트루스 다미아니", "위고 칸디두스"], "answer": 2, "explanation": "콘스탄티누스의 기증문서가 사실이라고 믿었던 교황 레오 9세는 자신이 보편교회의 수장임을 확인하기 위한 목적으로 홈베르투 스 데 실바칸디다를 콘스탄티노플에 사절로 파견했다. 홈베르트스는 총대주교 미카엘 켈롤라리우스를 파문한다는 고서를 성소피 아 성단의 제단 위에 올려놓았다. 이 파문장에 대해 총대주교는 홈베르투스와 사절단을 파문하여 대답했고 이로써 동서교회 분 열이 일어나고 말았다."}, {"id": "교회사-0215", "subject": "교회사", "section": "중세교회사", "qnum": 26, "stem": "1074년 로마에서 개최된 공의회에서 성직자의 결혼을 우상숭배나 이교도 숭배의 죄와 동등한 것 으로 정죄하며 금지한 교황은?", "choices": ["알렉산더 2세", "니콜라우스 2세", "그레고리우스 7세", "우르바노스 3세"], "answer": 3, "explanation": "중세시대 교황권과 황제권의 충돌 속에서 1073년 즉위한 그레고리우스 7세는 공의회를 개최하여 성직자 결혼을 금지하고 우상 숭배를 정죄하는 등 로마 가톨릭 내의 강력한 개혁정책을 실행했다."}, {"id": "교회사-0216", "subject": "교회사", "section": "중세교회사", "qnum": 27, "stem": "중세시대 교황이 대표하는 교회의 권세와 황제가 대표하는 세속의 권세가 대립하던 중 결국 황제 가 교황의 파문 위협 앞에 회개함으로써 교회의 권세의 우위를 드러냈던 상징적인 사건이 일어난 곳은?", "choices": ["로마", "라테란", "아비뇽", "카노사"], "answer": 4, "explanation": "카노사의 굴욕이라고 불리는 사건은 1077년 교황 그레고리우스 7세를 폐위시키려 했던 황제 하인리히 4세가 교황의 파문 앞에 서 자신의 잘못을 인정하고 굴복한 역사적 사건이다. 이 사건은 서방교회에서 교황의 영적 권세가 황제의 세속 권력을 억누른 상징적인 사건이었다."}, {"id": "교회사-0219", "subject": "교회사", "section": "중세교회사", "qnum": 30, "stem": "11세기 후반 쾰른 출신 브루노에 의해 시작된 수도회로서 절대적 고독과 침묵 가운데 하나님을 관상하는 데 주력했던 수도회는?", "choices": ["시토 수도회", "카르투지오 수도회", "클루니 수도회", "갈멜 수도회"], "answer": 2, "explanation": "카르투지오 수도회는 부르노에 의해 11세기에 시작되었으며 고독과 침묵을 강조하고 하나님에 대한 관상을 훈련했다."}, {"id": "교회사-0220", "subject": "교회사", "section": "중세교회사", "qnum": 31, "stem": "다음 중 클루니 수도원에 대한 설명으로 올바른 것만을 묶은 것은? 가. 910년 아키텐 공작 기욤 1세에 의해 창설되었다. 나. 수도원장 베르노의 정책을 통해 개혁의 중심지로 부상했다. 다. 성직 매매와 수도사를 비롯한 모든 성직자들의 결혼을 금지했다. 라. 베네딕트 수도규칙과 구별되는 새로운 규칙을 채택해 사용했다. 마. 교황의 실정과 부패를 강하게 비판하는 개혁을 추진하여 많은 호응을 얻었다. 바. 다른 수도원의 동참을 이끌어내어 수도회로의 조직망을 구축했다.", "choices": ["가, 다, 마", "나, 라, 바", "가, 다, 바", "나, 다, 마"], "answer": 3, "explanation": "보기 중 잘못된 것만 설명하면, 라. 클루니 수도원은 베네딕트 수도규칙을 철저하게 지켰다. 마. 클루니 수도원은 교황에 대한"}, {"id": "교회사-0222", "subject": "교회사", "section": "중세교회사", "qnum": 33, "stem": "다음 중 중세 초기부터 기독교 세계를 위협했던 이슬람에 대한 설명으로 올바른 것만을 묶은 것 은? 가. 무함마드가 메카에서 추방된 해인 622년을 원년으로 삼는다. 나. 아라비아의 토속 종교와 기독교 및 유대교 등의 근동 종교의 교리를 기반으로 삼았다. 다. 아브라함과 모세의 권위는 부인하고 오직 무함마드의 권위만을 인정한다. 라. 쿠란은 가장 권위 있는 경전으로서 계시된 진리라고 생각한다. 마. 시아파와 달리 수니파는 무함마드의 유일한 계승자인 알리만을 인정한다.", "choices": ["가, 다, 라", "@ 나, 다, 마", "나, 라, 마", "가, 나, 라"], "answer": 4, "explanation": "보기 중 잘못된 내용만 설명하면, 다. 이슬람은 아브라함과 모세의 권위도 인정한다. 마. 무함마드의 유일한 계승자로 알리만을 인정하는 것은 시아파이다."}, {"id": "교회사-0223", "subject": "교회사", "section": "중세교회사", "qnum": 34, "stem": "다음 중 이슬람교의 창시자 무함마드에 대한 설명으로 올바르지 않은 것은?", "choices": ["570년 아라비아 메카에서 출생했다.", "610년 신의 계시를 받았다고 주장하며 메디나에서 강력한 일신교를 창설했다.", "630년 메카를 무력으로 장악하고 모든 우상을 제거했다.", "점차 아라비아를 넘어서 세계 종교를 세우기 위한 포교를 추진했다."], "answer": 2, "explanation": "무함마드는 610년 메카에서 일신교를 창설했다. 그러나 현지 상인들과 기득권 세력에 저항을 받아 622년 메디나로 도주했고 그곳에서 세력을 키워 630년 메카를 탈환했다."}, {"id": "교회사-0224", "subject": "교회사", "section": "중세교회사", "qnum": 35, "stem": "1095년 11월 27일 교황 우르바누스 2세가 클레르몽 공의회에서 십자군 운동을 촉구하면서 재창 한 문구는?", "choices": ["Te Deum", "In Nomine Domini", "Deus Vult", "Exsurge Domine"], "answer": 3, "explanation": "우르바누스 2세는 1095년 클레르몽 공의회에서 십자군 출병을 촉구하면서 이것이 하나님의 뜻이라는 의미로 \"Deus vult\", 즉 하나님께서 원하신다는 구호를 내세웠다."}, {"id": "교회사-0225", "subject": "교회사", "section": "중세교회사", "qnum": 36, "stem": "다음 중 십자군 운동이 일어나게 된 동기에 해당하지 않는 것은?", "choices": ["셀주크 투르크의 세력 확장에 대한 기독교 세계의 위기감", "서방 기독교 국가들의 군사적 지원에 대한 동방 황제 알레시우스 1세의 요청", "성지 수복을 위한 전쟁에 동참함으로써 구원의 공로를 얻을 수 있다는 기대", "이슬람 국가들이 보존하고 있던 고대 그리스 문화와 사상에 대한 호기심"], "answer": 4, "explanation": "동방 황제 알렉시우스 1세의 군사 지원 요청이 십자가 운동의 직접적 원인이었다. 이 원조 요청에 응함으로써 영적이 유익을 누 릴 수 있을 것이라는 신앙적 동기도 크게 작용했다. 이슬람 국가들이 보존하고 있던 고대 문화는 십자군 운동 이후 서구 기독교 의 새로운 전환에 많은 영향을 주었지만 고전 문화에 대한 기대와 호기심을 십자군 운동이 시작된 동기라고 말하기는 어렵다."}, {"id": "교회사-0226", "subject": "교회사", "section": "중세교회사", "qnum": 37, "stem": "11세기 말부터 13세에 이르기까지 여러 차례 계속된 십자군 운동과 그 성과들을 바르게 연결한 것은?", "choices": ["제1차 십자군 운동 - 안디옥과 에데사를 비롯해 예루살렘을 탈환해 기독교 왕국을 세웠다.", "제2차 십자군 운동 - 에데사와 다메섹에서 이슬람 군대를 격파하고 영토를 크게 확장했다.", "제4차 십자군 운동 - 콘스탄티노플에 라틴 제국을 세움으로써 동서방 교회가 화해했다.", "제5차 십자군 운동 - 소년 십자군의 눈부신 활약으로 술탄 살라딘의 항복을 받아냈다."], "answer": 1, "explanation": "제1차 십자군 운동은 거의 유일하게 동방 지역에 기독교 국가들을 설립하는 성과를 거두었다. 이후의 모든 운동들은 제대로 된 성과를 내지 못했다. 특히 4차 십자군 운동은 비잔틴 제국을 멸망시키고 라틴 제국을 세움으로써 동방 제국과 교회에 큰 적대 감을 불러일으켰다. 5차 십자군 운동에 참전한 소년 십자군들은 동방에 도착조차 하지 못하고 노예로 팔려갔다."}, {"id": "교회사-0227", "subject": "교회사", "section": "중세교회사", "qnum": 38, "stem": "십자군 전쟁 중에는 중세시대 기사도의 이상과 수도원의 이상을 결합하여 군사적 성격을 함께 보 여준 여러 기사 수도회들이 나타났다. 다음 중 이와 같은 성격의 수도회에 속하지 않는 것은?", "choices": ["장미 기사단", "성전 기사단", "성 요한 기사단", "튜튼 기사단"], "answer": 1, "explanation": "십자군 운동 기간 유럽의 여러 기사들은 신앙적 동기를 더한 수도회를 창설했다. 대표적으로 성전 기사단, 성요한 기사단으로 불린 몰타 기사단, 튜튼 기사단이 있었다."}, {"id": "교회사-0228", "subject": "교회사", "section": "중세교회사", "qnum": 39, "stem": "다음 중 십자군 운동이 결국 실패하게 된 원인이라고 말할 수 없는 것은? n 참전한 각국 군주들과 기사들 사이의 세속적 이해가 충돌했다. 이슬람 교리와 신앙에 동화된 십자군들이 증가했다.", "choices": ["참전한 각국 군주들과 기사들 사이의 세속적 이해가 충돌했다.", "이슬람 교리와 신앙에 동화된 십자군들이 증가했다.", "본국으로부터 멀리 떨어진 지역에 대한 원정 및 정복 유지에 한계가 있었다.", "최초의 종교적 열정이 사라지고 세속적 욕망이 커졌다."], "answer": 2, "explanation": "십자군 운동가 실패한 데에는 원정의 어려움과 같은 실제적 한계와 더불어 초기의 신앙적 동기가 약화된 결과 커져간 여러 내부 적 갈등이 크게 작용했다. 그러나 십자군들의 기독교 신앙이 약화되어 현지 이슬람 신앙으로 개종하는 일은 많이 발생하지 않았다."}, {"id": "교회사-0229", "subject": "교회사", "section": "중세교회사", "qnum": 40, "stem": "다음 중 중세 신학자 안셀름의 저술이 아닌 것은?", "choices": ["왜 하나님이 사람이 되셨는가?", "e 프로슬로기온", "자연구분론", "모놀로기온"], "answer": 3, "explanation": "\"자연구분론\"은 에리우게나의 작품이다."}, {"id": "교회사-0230", "subject": "교회사", "section": "중세교회사", "qnum": 41, "stem": "다음 중 중세 신학자 안셀름의 신존재 증명을 위해 제기한 논증 내용과 가장 거리가 먼 것은 무 엇인가?", "choices": ["하나님은 그분보다 더 완벽한 존재를 생각할 수 없는 존재이다.", "그 존재보다 더 완벽한 존재를 생각할 수 없는 존재는 오직 사유 속에만 존재한다.", "하나님은 그분이 완전한 존재임으로 인해 필연적으로 실제로 존재하신다.", "실제로 존재하는 것이 사유 속에서만 존재하는 것보다 더 완전하다."], "answer": 2, "explanation": "안셀름은 \"프로슬로기온\"에서 제시한 그의 신 존재 증명에서 하나님은 그분보다 더 완벽한 존재를 생각할 수 없는 완벽한 존재 이므로 사유뿐 아니라 실제로도 존재하시는 분이라고 주장했다."}, {"id": "교회사-0231", "subject": "교회사", "section": "중세교회사", "qnum": 42, "stem": "중세 신학자 피터 롬바르두스의 저술로서 중세 신학교육에 있어 가장 일반적인 교과서로 사용된 작품은?", "choices": ["프로슬로기온", "명제집", "신학대전", "디다스칼리온"], "answer": 2, "explanation": "주로 교부들의 언급들을 주제별로 모아 정리한 롬바르두스의 \"명제집\"은 중세 대학교에서 신학교육의 교재로 널리 활용되었다."}, {"id": "교회사-0233", "subject": "교회사", "section": "중세교회사", "qnum": 44, "stem": "다음 중 토마스 아퀴나스의 생애와 신학적 입장에 대한 설명으로 올바른 것은?", "choices": ["프랑스 리용의 귀족 가문 출신이었다.", "프란시스코 수도회에 가입했다.", "하나님의 존재를 이성적으로 증명하려는 시도를 모두 거부했다.", "새로운 교리를 제시하기보다는 교회가 인정한 교리를 논증하려 했다."], "answer": 4, "explanation": "이탈리아 출신의 토마스 아퀴나스는 도미니크 수도사로서 프랑스와 독일에서 공부한 후 신앙과 이성의 합당한 조화를 통한 지식 체계 구축을 시도했다. 그가 시도한 신학적 작업은 새로운 신학적 주장을 제시하는 것이었다기보다는 교회에서 승인한 기존 교 리들을 효과적으로 논증하는 것이었다."}, {"id": "교회사-0234", "subject": "교회사", "section": "중세교회사", "qnum": 45, "stem": "다음 중 아퀴나스가 저술한 신학대전에 대한 올바른 설명만을 묶은 것은? 가. 아리스토텔레스의 철학 체계보다 플라톤의 체계를 더 많이 사용했다. 나. 아퀴나스 생전에 총 3부로 완성되었다. 다. 진리에 대한 단편적 분석을 넘어서 이를 유기적으로 체계화하려 했다. 라. 난해한 사변의 전개보다 효과적인 신학 교육을 목적으로 삼았다.", "choices": ["가, 나", "가, 다", "나, 다", "다, 라"], "answer": 4, "explanation": "아퀴나스의 \"신학대전\"은 주로 아리스토텔레스의 철학 체계를 사용했다. 아퀴나스는 완성을 보지 못하고 사망했다."}, {"id": "교회사-0235", "subject": "교회사", "section": "중세교회사", "qnum": 46, "stem": "다음 중 12세기 후반 이후 전성기를 맞이한 스콜라신학에 대한 설명으로 가장 부적합한 것은? 중세 시대 성당 부속학교들에서 신학을 가르치는 방법론으로서 발전했다.", "choices": ["중세 시대 성당 부속학교들에서 신학을 가르치는 방법론으로서 발전했다.", "신학적 명제들에 대한 전거들을 제시하고 여러 반박에 응답하는 전개 방식을 취했다.", "기존에 사용하던 아리스토텔레스의 체계를 극복하고 플라톤의 철학으로 회귀했다.", "이성과 신앙, 철학과 신학의 조화를 추구했다."], "answer": 3, "explanation": "중세 스콜라신학은 13세기에 들어서며 대학을 중심으로 전성기를 맞이했다. 이슬람 문화권으로부터 새롭게 유입된 아리스토텔레 스의 저작들과 철학 체계가 이 시기 스콜라신학의 발전에 기여했다."}, {"id": "교회사-0236", "subject": "교회사", "section": "중세교회사", "qnum": 47, "stem": "다음 중 중세 스콜라신학을 대표하는 신학자와 그들의 대표적인 작품을 바르게 연결한 것은?", "choices": ["알베르투스 마그누스 - 성육신론(Cur Deus Homo)", "토마스 아퀴나스 - 신학대전(Summa Theologiae)", "둔스 스코투스 - 논리대전(Summa Logicae)", "윌리엄 오컴 - 철학대전(Summa Philosopiae)"], "answer": 2, "explanation": "토마스 아퀴나스의 대표적인 작품은 \"신학대전\"이다. \"성육신론'은 안셀름의 저술이며, \"논리대전'은 오컴의 대표적인 저술이다."}, {"id": "교회사-0237", "subject": "교회사", "section": "중세교회사", "qnum": 48, "stem": "다음 중 1079년 프랑스 남부에서 출생한 신학자로서 여러 신학적 문제들에 대한 성경과 고대 저 술들의 불일치를 다루면서 기존 교리들에 대한 강한 의문을 제기했으나 클레르보의 베르나르두스 와 충돌했고 교회로부터 이단으로 정죄당하기까지 했던 인물은?", "choices": ["아벨라르두스", "알베르투스 마그누스", "란플랑크", "마스트리히트"], "answer": 1, "explanation": "12세기의 프랑스 출신 신학자 아벨라르두스는 교회가 공인한 기존 교리들에 대한 의문을 제기하고 새로운 관점의 이론들을 제 시했다. 동시대 활동했던 베르나르두스는 아벨라르두스의 여러 신학적 주장을 강하게 비판했다."}, {"id": "교회사-0238", "subject": "교회사", "section": "중세교회사", "qnum": 49, "stem": "다음 중 윌리엄 오에 대한 설명으로 올바르지 않은 것은?", "choices": ["유명론을 취했다.", "프란시스코 수도사로서 교황을 강력하게 지지했다.", "\"당해낼 수 없는 교사\"(Doctor invincibilis)라는 별명을 얻었다.", "알 수 있는 지식은 개별적인 지식들뿐이라고 주장했다."], "answer": 2, "explanation": "14세기 초 활동했던 스콜라신학자인 윌리엄 오컴은 유명론의 입장을 가졌으며 가지적 지식은 개별적 지식일 뿐이라고 주장했다. 그는 프란시스코 수도사였지만 교황을 일방적으로 지지하지는 않았다. 특히 교회의 영적인 권세와 세속적 권세의 엄격한 분리를 주장했다."}, {"id": "교회사-0239", "subject": "교회사", "section": "중세교회사", "qnum": 50, "stem": "스페인 카스티야 귀족 출신으로서 1203년 남부 프랑스의 알비파를 목격하고 이들을 능가하는 영 성과 뛰어난 학문성을 가진 수도회를 세우는 운동을 시작하여 \"설교자들의 수도회\"라는 별명을 얻게 했던 인물은?", "choices": ["프란시스코", "왈도", "도미니크", "베르노"], "answer": 3, "explanation": "스페인 출신인 도미니크는 탁발수도회로서 소속 수도사들의 설교 사역을 강조했다. 도미니크 수도회는 설교 훈련을 위해 학문 연구를 강조했다."}, {"id": "교회사-0240", "subject": "교회사", "section": "중세교회사", "qnum": 51, "stem": "이탈리아 상인 가문 출신으로서 신비 체험 이후 수도생활을 시작하여 그를 따르는 무리들과 함께 청빈과 구제를 강조하는 탁발수도회를 시작하여 후에 \"작은 형제들의 수도회\"라는 별명을 얻게 했던 13세기의 기독교 영성가는?", "choices": ["베네딕트", "도미니크", "프란시스코", "보나벤투라"], "answer": 3, "explanation": "13세기 초 이탈리아 아시시 출신의 프란시스의 가르침과 체험적 교훈을 바탕으로 청빈과 구제를 강조하는 탁발수도회가 설립되 었다."}, {"id": "교회사-0241", "subject": "교회사", "section": "중세교회사", "qnum": 52, "stem": "다음 중 프란시스코 수도회에 대한 설명으로 올바르지 않은 것은?", "choices": ["교황 인노켄티우스 3세로부터 인정을 받았다.", "학문적 연구를 배제하고 오직 영적 체험과 신비적 경험을 추구했다.", "소속 수도사들의 사유재산 소유를 일체 금지하고 탁발로 생활을 유지했다.", "선교의 열정을 가지고 아프리카와 아시아에 선교사를 파송했다."], "answer": 2, "explanation": "청빈과 탁발을 강조했던 프린시스코 수도회는 교황 인노켄티우스 3세에게 공인을 받았으며 이후 선교의 열정을 가지고 유럽 이 외 지역에 여러 선교사들을 파송했다. 프란시스코 수도회는 학문 연구에 대한 관심도 커서 훌륭한 신학자들을 많이 배출했다."}, {"id": "교회사-0242", "subject": "교회사", "section": "중세교회사", "qnum": 53, "stem": "다음 중 도미니크 수도회에 대한 설명으로 올바른 것은?", "choices": ["교황 호노리우스 3세로부터 이단 정죄를 당했다.", "청빈과 탁발을 규율로 삼았다.", "오직 베네딕트 수도 규칙만을 준수했다.", "세속화된 당시 대학과는 거리를 두고 학문을 독자적으로 연구했다."], "answer": 2, "explanation": "도미니크 수도회는 교황 호노리우스 3세로부터 공인을 받았으며 베네딕트 수도회 규칙 이외에 탁발과 관련한 독자적인 규율도 제정해 지켰다. 도미니크 수도회 출신의 많은 학자들은 대학에서 신학을 가르쳤다. 대표적으로 아퀴나스가 도미니크 수도회의 수도사였다."}, {"id": "교회사-0243", "subject": "교회사", "section": "중세교회사", "qnum": 54, "stem": "12세기 후반 프랑스 남부지방에서 활동했던 이단인 카타리파가 주장한 여러 의견이라고 보기 가 장 어려운 주장은? 그리스도는 인간의 몸으로 성육신하지 않았다.", "choices": ["그리스도는 인간의 몸으로 성육신하지 않았다.", "물로 베푸는 세례는 진정한 세례가 아니다.", "신구약성경은 모두 계시된 진리이다.", "그리스도는 실제로 부활하지 않았다."], "answer": 3, "explanation": "카타리파는 신앙의 순수함을 추구했지만 신학적으로 정통교리를 벗어난 여러 내용들을 주장했다. 특히 신구약성경을 모두 인정 하지 않고 그리스도의 완전한 인성을 인정하지 않았기 때문에 성육신 교리와 부활 교리에서 정통교리를 벗어났다."}, {"id": "교회사-0244", "subject": "교회사", "section": "중세교회사", "qnum": 55, "stem": "12세기 프랑스 남부를 중심으로 활동한 왈도파에 대한 설명으로 타당하지 않은 것은?", "choices": ["구약은 거절하고 신약만을 인정했다.", "성경의 권위를 인정하고 순수하게 순종하려 했다.", "미사와 연옥 교리를 거부했다.", "서품한 성직자 이외의 교인들에게도 설교할 기회를 주었다."], "answer": 1, "explanation": "왈도파는 카타리파와 달리 당시 성경에 입각한 정통교리를 주장하였고, 종교개혁의 포문을 여는 역할을 감당하였다. 이들은 신구 약성경을 모두 존중하고 인정했으며 성경의 가르침에 따라 당시 로마 가톨릭의 잘못된 형식주의와 잘못된 교리들을 비판했다."}, {"id": "교회사-0245", "subject": "교회사", "section": "중세교회사", "qnum": 56, "stem": "다음 중 교황권의 전성기를 이룩한 교황 인노켄티우스 3세에 대한 바른 설명들만 묶은 것은? 가. 교황에게 황제를 임명하는 권세가 있다고 주장했다. 나. 교황의 보편적 권세와 관련해 \"한 목자 아래 한 양 떼가 있다\"라고 주장했다. 다. 공의회를 통해 화체설을 공인했다. 라. 교황의 유일한 권력 하에서 성직매매 등 부패가 만연했다. 마. 여러 탁발수도회를 비롯해 분파들에 대한 관용 정책을 펼쳤다.", "choices": ["가, 나, 다", "가, 다, 마", "나, 다, 라", "나, 라, 마"], "answer": 1, "explanation": "인노켄티우스 3세는 교황권의 전성기를 구가했던 교황이다. 보기 중 잘못된 설명은 라. 적어도 인노켄티우스 3세 시대에는 성직 매매와 같은 부패를 강하게 처벌하고 억제했다. 마. 탁발수도회들에 대해서는 관대한 정책을 펼쳤지만 이단과 분파에 대해서는 강력한 처벌을 계속했다."}, {"id": "교회사-0246", "subject": "교회사", "section": "중세교회사", "qnum": 57, "stem": "로마 교황권의 전성기였던 1302년 \"Unam Sanctam 이라는 교령을 발표하여 지상에 존재하는 두 검 가운데 세속의 검은 영적인 검의 지배와 판단을 받아야 한다고 주장했던 교황은?", "choices": ["인노켄티우스 3세", "호노리우스 3세", "그레고리우스 9세", "보니파키우스 8세"], "answer": 4, "explanation": "교황 보니파키우스 8세가 1302년 발표한 교령 \"Unam Sanctam'은 세속권에 대한 교황권의 우위를 선언한 대표적인 문서이다."}, {"id": "교회사-0247", "subject": "교회사", "section": "중세교회사", "qnum": 58, "stem": "1306년부터 시작된 로마 가톨릭의 비상 상황으로서 교황 클레멘트 5세가 로마를 떠나 프랑스에 머물기 시작하면서 1377년까지 계속된 혼란을 일컫는 말은?", "choices": ["아비뇽 유수", "교황청 대분열", "서임권 투쟁", "대립 교황"], "answer": 1, "explanation": "프랑스 국왕의 사주를 받은 친프랑스 추기경단들을 통해 선출된 교황 클레멘트 5세는 1306년 로마를 떠나 프랑스 아비뇽으로 이주했다. 이후 70년 동안 교황청이 아비뇽에 머물렀던 기간을 교황청의 아비뇽 포로 혹은 아비뇽 유수 시기라고 부른다."}, {"id": "교회사-0248", "subject": "교회사", "section": "중세교회사", "qnum": 59, "stem": "다음 중 14세기 잉글랜드에서 활동한 개혁자 위클리프에 대한 설명으로 올바른 것은?", "choices": ["대립 중이던 두 교황 사이에 아비뇽 교황의 정통성을 변호했다.", "선택자들로 이루어진 비가시적 교회의 중요성을 주장했다.", "성경 해석에 있어 훈련받은 성직자들의 독점적 권위를 강조했다.", "교황과 잉글랜드 국왕에게 정죄되어 화형을 당했다."], "answer": 2, "explanation": "14세기 잉글랜드의 신학자 위클리프는 아비뇽 측 교황을 지지하지 않았다. 성경 해석에 있어서는 성경 자체의 권위를 강조했으 며 그의 사후 사형선고가 이루어져 무덤에서 시신이 꺼내져 참수 및 화형당했다. 그는 선택자들로 이루어진 비가시적 교회의 중 요성을 주장했다."}, {"id": "교회사-0249", "subject": "교회사", "section": "중세교회사", "qnum": 60, "stem": "중세 후기 보헤미아의 개혁자 후스에 대한 설명으로 올바르지 않은 것은?", "choices": ["위클리프의 사상으로부터 영향을 받았다.", "1402년 프라하의 대주교로 취임했다.", "성찬에서 떡과 포도주를 모두 나누어주어야 한다는 이종성찬을 주장했다.", "1415년 콘스탄츠 회의에 소환되어 정죄를 받고 화형당했다."], "answer": 2, "explanation": "보헤미아의 신학자 후스는 위클리프의 영향을 받았다. 그는 프라하대학에 속한 학자로서 로마 가톨릭 대주교와 논쟁을 벌였다 교황청의 일종 성찬을 비판하고 떡과 포도주를 모두 성도들에게 베풀어야 한다는 이종성찬을 주장했다. 그는 1415년 콘스탄츠 공의회에 소집되어 정죄당한 후 화형당했다."}, {"id": "교회사-0250", "subject": "교회사", "section": "중세교회사", "qnum": 61, "stem": "다음 중 중세 후기부터 르네상스 시대 로마 가톨릭의 여러 문제들을 지적하며 활동한 개혁자들과 그들의 주요 주장을 잘못 연결한 것은? 위클리프- 선행과 공덕을 수용 후스 - 이종 성찬의 시행", "choices": ["위클리프- 선행과 공덕을 수용", "후스 - 이종 성찬의 시행", "사보나롤라- 사치와 허영의 척결", "에라스무스 - 미신적 의식 철폐"], "answer": 1, "explanation": "위클리프는 선행과 공덕은 구원과 무관하며, 행위를 강조하는 로마 가톨릭의 신학을 비판하였다."}, {"id": "교회사-0252", "subject": "교회사", "section": "중세교회사", "qnum": 63, "stem": "다음 중 14세기 독일 지역을 중심으로 전개된 신비주의 운동에 속해 활동한 인물로 볼 수 없는 사람은?", "choices": ["마이스터 에크하르트", "게하르트 흐루테", "하인리히 수소", "요한 타울러", "저"], "answer": 2, "explanation": "게하르트 흐루테는 오늘날 네덜란드 지역을 중심으로 전개된 공동체적 영성 운동인 공동생활형제단을 창시한 인물이다. 에크하 르트, 수소, 타울러와 비교할 때 신비주의적 성향을 가졌다고 보기는 어렵다."}, {"id": "교회사-0253", "subject": "교회사", "section": "중세교회사", "qnum": 64, "stem": "14세기 저지대지방에서 확산된 근대적 경건(Devotio Moderna)의 특징으로 볼 수 없는 것은?", "choices": ["그리스도의 가르침과 모범을 따르는 실천 노력", "개인적 차원보다 공동체적 차원의 경건 생활", "사유재산과 세속적 직업을 포기하는 절제된 삶", "기존 교회의 권위에 대한 순응"], "answer": 3, "explanation": "근대적 경건 운동은 그리스도의 가르침과 모범을 따르려 한 비성직자 중심의 공동체적 영성 운동이었다. 이들은 일반적인 직업 을 가진 채로 공동체 내에서 실천적 영성을 추구했다. 이들은 또한 기성 교회와 권위에 대한 순종적 태도를 가졌다."}, {"id": "교회사-0255", "subject": "교회사", "section": "중세교회사", "qnum": 66, "stem": "다음 중 1275년에 태어난 중세 정치사상가로서 \"모든 권력의 기초\"는 민중이며,  "투르의 감독 마르틴이 군대처럼 강압적으로 입교시키는 선교를 하였다.", "자국의 전통을 중시하여 타협점을 찾는 선교를 하였다.", "우상의 전당을 헐어버리는 강경한 조치를 취하였다."], "answer": 3, "explanation": "마르틴은 군인, 수도사, 선교사로 살아간 인물이며 고울(Gau) 지방에 수도원을 세움 저"}, {"id": "교회사-0264", "subject": "교회사", "section": "중세교회사", "qnum": 75, "stem": "다음 인물은 누구인가? 가. 독일인의 사도라고 불리는 이 사람은 영국의 귀족 출신으로 고등교육을 받았다. 나. 윌리브로드를 도와 선교활동을 하였다. 다. 베네딕트 수도사로서 학업에 전념하였고 수도사가 되었다. 라. 732년 교황에 의해 대주교로 임명되었다. 마. 로마 가톨릭을 위해 공헌한 사람이었다.", "choices": ["투르의 마틴", "보니파키우스", "카를 마르텔", "패트릭"], "answer": 2, "explanation": "'보니파키우스'라는 이름은 교황이 지어준 것이다."}, {"id": "교회사-0265", "subject": "교회사", "section": "중세교회사", "qnum": 76, "stem": "그레고리우스 7세에 대한 설명과 상관이 없는 것은? 성직자들의 독신을 주장하였다.", "choices": ["성직자들의 독신을 주장하였다.", "교회 내부의 부패를 개혁하려는 의지가 강했고 성직매매를 정죄하였다.", "카노사의 굴욕 사건 때문에 교황의 자리에서 물러났다.", "하인리히 4세를 두 번씩이나 파문하였다."], "answer": 3, "explanation": "힐데브란트는 1073년 그레고리우스 7세라는 이름으로 교황에 취임함"}, {"id": "교회사-0266", "subject": "교회사", "section": "중세교회사", "qnum": 77, "stem": "이슬람에 대한 설명 중 바르지 않은 것은? • 570년에 아라비아 메카에서 출생한 무함마드가 알라의 계시를 받았다는 데서 시작됨", "choices": ["570년에 아라비아 메카에서 출생한 무함마드가 알라의 계시를 받았다는 데서 시작됨", "사도 후 시대에 이르러 많은 기독교 종파들과 이단의 출현으로 기독교가 혼란한 시기에 일어나 크게 영향을 미친 종교", "코란을 경전으로 사용하며 절대복종을 원칙으로 하여 이슬람(복종)이라는 이름을 사용", "무함마드는 630년에 메카를 정복하고 우상을 제거하여 성지로 삼고 그 해에 사망함"], "answer": 4, "explanation": "무함마드는 632년에 사망한 것으로 알려짐"}, {"id": "교회사-0269", "subject": "교회사", "section": "중세교회사", "qnum": 80, "stem": "콘스탄티누스 실바누스가 시조인 이단 바울파에 대하여 설명한 것 중 틀린 것은?", "choices": ["이 세상은 악한 세력이 조성했고, 영은 신에게서 왔다는 이원론 주장", "그리스도는 천사로 오신 분, 하나님의 양자라고 주장", "바울 서신과 베드로 서신을 받아들였음", "수도원 제도, 외형적인 성례, 십자가, 성상 등 서방교회의 모든 제도를 거부함"], "answer": 3, "explanation": "신약은 베드로 서신을 제외하고는 모두 하나님의 말씀이라고 주장하였다"}, {"id": "교회사-0270", "subject": "교회사", "section": "중세교회사", "qnum": 81, "stem": "다음은 샤를마뉴 대제에 대한 설명이다. 그 내용이 사실과 다른 것은?", "choices": ["어거스틴의 \"신의 도성\"에 도전을 받고 그것을 건국정신으로 삼았다", "어린이에게 시편, 음악, 문법교육을 시키고 주일성수와 십일조, 전도를 강조함", "화상숭배를 용인하였다", "궁정학교를 열어 영국학자 알퀸(Alquin, 735-804)을 교수로 초청, 학문의 중심이 되게 함"], "answer": 3, "explanation": "오직 경배의 대상은 하나님뿐이며 화상숭배는 우상숭배요 미신적인 것이라고 주장하였다."}, {"id": "교회사-0271", "subject": "교회사", "section": "중세교회사", "qnum": 82, "stem": "신성로마제국(800-1806)에 관한 설명이다. 올바른 내용은?", "choices": ["샤를마뉴 대제부터 프란츠 2세까지를 일컫는 명칭", "800년 샤를마뉴 대제에게 교황 레오 1세가 신성로마 황제 대관식을 하면서 시작", "샤를마뉴 사후 분열된 제국을 오토 1세가 평정, 교황 인노켄티우스가 오토 1세에게 신성로마제 국 황제라는 칭호와 관을 수여함", "이 시대의 로마 제국은 기독교적 분위기에서 벗어남"], "answer": 1, "explanation": "교황 레오 3세가 샤를마뉴 대제에게 로마황제의 칭호를 주었다."}, {"id": "교회사-0272", "subject": "교회사", "section": "중세교회사", "qnum": 83, "stem": "역대 교황의 교령집이라는 이시도르 문서에 관한 설명으로 바르지 않은 것은?", "choices": ["이 책의 저자는 스페인 사람 이시도르로 알려졌으나 그의 저작이 아님이 밝혀졌다.", "교황의 세력을 증대시키기 위하여 쓴 위조문서로 '가짜 이시도르 전집'이라고 한다.", "교황 그레고리우스가 이 문서를 사용하여 자신의 이상을 실현하였다.", "종교개혁 이전까지 진짜 문서로 사용되었으며 1440년 로렌츠 발라가 위조문서임을 밝혔다."], "answer": 3, "explanation": "이 문서를 이용하여 자신의 이상을 실현한 사람은 교황 니콜라스 1세였다."}, {"id": "교회사-0273", "subject": "교회사", "section": "중세교회사", "qnum": 84, "stem": "동서 교회가 분리된 후 서방교회를 비정통으로 지칭하고 자신들을 정통교회라고 부르며 콘스탄티 노플 대주교를 최고의 직책으로 두었을 뿐 아니라 7성례를 행하고 예배 시 악기를 사용하지 않고 교회 안에 성상을 금지한 교회는?", "choices": ["그리스 정교회", "조지아 정교회", "이집트 정교회", "아르메니아 정교회"], "answer": 1, "explanation": "'헬라정교회'라는 이름으로도 불림(The Greek Orthodox Church)."}, {"id": "교회사-0274", "subject": "교회사", "section": "중세교회사", "qnum": 85, "stem": "동서 교회가 분리된 원인에 대하여 설명한 내용이다. 거리가 먼 것은 어느 것인가? 395년 동서로마 제국의 분리 때문이다.", "choices": ["395년 동서로마 제국의 분리 때문이다.", "직접적인 원인은 서방의 콘스탄티노플 대주교와 동방의 교황 사이에 일어난 교권투쟁이다.", "동서의 언어상의 차이 때문이다.", "화상예배와 성령론에 관한 교리적 차이 때문이다."], "answer": 2, "explanation": "로마교황과 콘스탄티노플 대주교 사이의 교권다툼, 서방의 교황과 동방의 콘스탄티노플 대주교 사이에 일어난 교권다툼이 직접 적인 요인이었다."}, {"id": "교회사-0275", "subject": "교회사", "section": "중세교회사", "qnum": 86, "stem": "그레고리우스 7세에 대한 설명이 아닌 것은?", "choices": ["그의 본명은 '힐데브란트(Hildebrant)'였다.", "그레고리우스 5세처럼 성공적인 교황이 되려고 자신을 그레고리우스 7세라 하였다.", "1073년 58세에 교황이 되어 70세에 죽었다.", "교직자 결혼과 교직 매매를 금지하고 교직임명과 교회재산 관리권을 교황하에 두었다."], "answer": 2, "explanation": "그레고리우스 7세의 은인은 그레고리우스 6세였다."}, {"id": "교회사-0276", "subject": "교회사", "section": "중세교회사", "qnum": 87, "stem": "카노사의 굴욕과 연관된 내용이다. 그 내용이 어울리지 않 anation": "독신, 성직자 결혼금지 조항은 여러 수도원의 생활수칙에 포함됨"}, {"id": "교회사-0287", "subject": "교회사", "section": "중세교회사", "qnum": 98, "stem": "스콜라 철학이란 무엇을 말하는 것인가? 8세기부터 15세기까지 중세교회에 지대한 영향을 끼친 철학이다.", "choices": ["8세기부터 15세기까지 중세교회에 지대한 영향을 끼친 철학이다.", "아리스토텔레스의 형식논리에서 벗어난 철학", "성경해석을 비평적으로 하는 철학", "로마교회의 신학에서 완전히 벗어난 철학"], "answer": 1, "explanation": "스콜라 철학은 신앙과 지성의 조화, 철학과 종교의 유기적인 조화를 강조한 학문으로 고대의 헬라 철학을 기독교에 적용시킨 중 세의 산물이다."}, {"id": "교회사-0288", "subject": "교회사", "section": "중세교회사", "qnum": 99, "stem": "스콜라 철학의 장점과 거리가 먼 것은? 진리를 해석할 때 철학적 합리성을 이용하여 논증한 것이다. 대학설립의 기초를 닦은 것이다.", "choices": ["진리를 해석할 때 철학적 합리성을 이용하여 논증한 것이다.", "대학설립의 기초를 닦은 것이다.", "역사적 평론을 경시한 점이다.", "진리를 해석할 때 오류 방지에 큰 도움이 되었다."], "answer": 3, "explanation": "역사적 평론을 경시한 것, 형식 논리를 과도히 적용한 것, 로마교회의 신학적 토대가 된 것은 스콜라 철학의 약점으로 제기된다."}, {"id": "교회사-0289", "subject": "교회사", "section": "중세교회사", "qnum": 100, "stem": "스콜라 철학자들의 이름과 저서를 연결한 것이다. 그 연결이 바른 것은?", "choices": ["스코투스 에리게나 - 독백", "아벨라르드 - 가짜 디오니시우스", "안셀름 - 속죄론", "보나벤투라 - 긍정과 부정"], "answer": 3, "explanation": "독백(안셀름), 가짜 디오니시우스(스코투스 에리게나), 긍정과 부정(아벨라르드)"}, {"id": "교회사-0290", "subject": "교회사", "section": "중세교회사", "qnum": 101, "stem": "스콜라 철학자 중 한 사람인 안셀름의 사상에 관한 설명으로 바르지 않은 것은?", "choices": ["신앙이 이성에 우선한다고 주장함", "하나님의 존재에 관한 증명 창안", "대속적 속죄관을 주장함", "성육신의 필요성을 인정하지 않음"], "answer": 4, "explanation": "그의 저서 \"대화\" 제1장 마지막 부분에서 '나는 알기 위하여 믿는다\"고 말했다. 이는 신앙이 이성에 우선한다는 의미를 내포하 지만 신앙이 계시의 내용을 합리적으로 연구하는 것을 통해서 완성된다는 의미이다."}, {"id": "교회사-0291", "subject": "교회사", "section": "중세교회사", "qnum": 102, "stem": "보나벤투라 이후 가장 영향력이 있었던 프란치스코 교단의 신학자 중 이성과 신앙의 분리를 주 장하였고, 토마스 아퀴나스의 반대자로 알려진 사람은?", "choices": ["안셀름", "피터 롬바르드", "둔스 스코투스", "스코투스 에레게나"], "answer": 3, "explanation": "둘 사이에 가장 시끄러운 논쟁은 마리아 무홈수태설이다. 스코투스는 마리아의 무흡수태설을 주장한 반면, 아퀴나스는 마리아도 원죄를 지니고 태어난 자라고 주장하였다."}, {"id": "교회사-0292", "subject": "교회사", "section": "중세교회사", "qnum": 103, "stem": "토마스 아퀴나스의 사상에 대하여 설명하는 내용 중 옳지 않은 것은? 신학연구의 목적은 하나님을 알고, 인간의 기원과 미래, 운명을 아는 것이다.", "choices": ["신학연구의 목적은 하나님을 알고, 인간의 기원과 미래, 운명을 아는
