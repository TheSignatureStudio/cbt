 "section": "근현대교회사", "qnum": 157, "stem": "개신교 정통주의에 대한 설명으로 합당하지 않은 것은?", "choices": ["개신교 정통주의는 성경의 권위와 교리의 중요성을 강조하였다.", "합리주의와 경건주의의 반발로 정통주의가 나타났다.", "영국에서는 합리주의가 경건주의보다 앞서 일어났다.", "독일에서는 경건주의 운동이 합리주의 운동보다 먼저 일어났다."], "answer": 2, "explanation": null}, {"id": "교회사-0560", "subject": "교회사", "section": "근현대교회사", "qnum": 158, "stem": "계몽주의가 끼친 영향에 대한 설명으로 타당하지 않은 것은?", "choices": ["계몽주의는 신학과 철학을 분리하려는 움직임을 가져왔다.", "계몽주의는 신앙을 절대적 순종의 영역에서 합리적인 이해의 영역으로 변경시켰다.", "계몽주의는 신앙은 반드시 인간의 이성에 뿌리를 두어야 한다는 경향을 촉발하였다.", "계몽주의는 종교적 당면 관심사를 도덕적인 면에서 초자연적인 면으로 변경시켰다"], "answer": 4, "explanation": "계몽주의는 초자연적인 신앙에 대한 반발로 이성을 강조하였다."}, {"id": "교회사-0561", "subject": "교회사", "section": "근현대교회사", "qnum": 159, "stem": "경건주의 운동에 관한 설명이 아닌 것은? 죄의 두려움과 회개의 강조", "choices": ["죄의 두려움과 회개의 강조", "정통주의에 대한 반동", "선교열정의 표출", "인간 이성의 강조"], "answer": 4, "explanation": "계몽주의가 경건주의에 대한 반발로 인간 이성을 강조하였다."}, {"id": "교회사-0562", "subject": "교회사", "section": "근현대교회사", "qnum": 160, "stem": "삼위일체와 같은 전통적인 교리를 거부하고 인간의 이성을 근간으로 하는 인본주의적 기독교를 설파했던 유럽의 소시니안주의처럼, 삼위일체 교리를 거부하고 계시의존적 신앙이 아닌 인간의 이성으로 이해할 수 있는 기독교를 강조하며, 자연과학과 일치하는 기독교를 모토로 삼은 미국 의 종교단체는 무엇인가?", "choices": ["몰몬교", "유니테리언", "여호와의 증인", "안식교"], "answer": 2, "explanation": null}, {"id": "교회사-0563", "subject": "교회사", "section": "근현대교회사", "qnum": 161, "stem": "미국의 인본주의적 신앙형태를 성경 중심의 신앙형태로 바꾸는 계기가 된 제1차 영적 대각성운 동에 대한 설명으로 타당하지 않은 것은?", "choices": ["설교보다 찬양운동이 중요한 부분을 차지했다.", "조나단 에드워즈 등이 중심이 되었다.", "회개와 하나님 주권이 강조되었다.", "칼빈주의적 부흥운동이었다."], "answer": 2, "explanation": "찰스 피니 등이 중심이 된 2차 대각성운동의 특징이 찬양 부르기이다."}, {"id": "교회사-0564", "subject": "교회사", "section": "근현대교회사", "qnum": 162, "stem": "제2차 대각성운동에 대한 설명으로 타당하지 않은 것은?", "choices": ["전통적인 칼빈주의 사상이 강조되었다.", "낙관주의적 인간관이 강조되었다.", "주요인물은 찰스 피니 등이었다.", "부흥은 많은 부분이 준비하는 방법과 사람에게 달렸다는 점을 강조하였다."], "answer": 1, "explanation": "찰스 피니 등이 중심이 된 2차 대각성운동은 알미니안주의적 경향의 부흥운동이었다."}, {"id": "교회사-0565", "subject": "교회사", "section": "근현대교회사", "qnum": 163, "stem": "제1차 대각성운동의 주역이 아닌 사람은?", "choices": ["존 웨슬리", "조나단 에드워즈", "조지 휫필드", "찰스 피니"], "answer": 4, "explanation": "찰스 피니 등은 2차 대각성운동의 주자였다."}, {"id": "교회사-0566", "subject": "교회사", "section": "근현대교회사", "qnum": 164, "stem": "1세기 동안 이어진 종교전쟁을 끝내고 유럽의 역사, 사회, 정치, 종교, 문화 전반에 엄청난 변화 를 가져다준 사건이며 종교개혁의 시대가 끝나고 근대교회사로의 진입을 알리는 신호탄이 된 사 건은?", "choices": ["베스트팔렌 조약", "아우크스부르크 종교화의", "웨스트민스터 신앙고백 제정", "낭트 칙령"], "answer": 2, "explanation": "베스트팔렌 평화조약(The Peace of Westiphalia)으로 새 시대가 시작되었다."}, {"id": "교회사-0568", "subject": "교회사", "section": "근현대교회사", "qnum": 166, "stem": "다음은 누구에 대한 설명인가? b) 실천이성 비판 (c) 판단력 비판 a) 순수이성 비판", "choices": ["칸트(Immanuel Kant, 1724-1804)", "루소(. J. Rousseau, 1712-1778)", "괴테(. W. von Goethe, 1749-1832)", "쉴러0. C. F. von schiller,1759-1805)"], "answer": 1, "explanation": null}, {"id": "교회사-0569", "subject": "교회사", "section": "근현대교회사", "qnum": 167, "stem": "예수회에 대한 설명으로 합당하지 않은 것은? 피우스 7세가 중심 역할을 했다. 도미니크 파를 흡수했다.", "choices": ["피우스 7세가 중심 역할을 했다.", "도미니크 파를 흡수했다.", "개신교의 수도원 운동을 이끌었다.", "성심회가 조직되었다."], "answer": 4, "explanation": "가톨릭의 개혁운동이다."}, {"id": "교회사-0570", "subject": "교회사", "section": "근현대교회사", "qnum": 168, "stem": "스코틀랜드 교회와 관련이 없는 것은?", "choices": ["자유교회(Free Church)", "언약도(Covenant)", "토머스 차머스(Thomas Chalmers)", "찰스 하지(Charles Hodge)"], "answer": 4, "explanation": "하지는 미국인이다."}, {"id": "교회사-0571", "subject": "교회사", "section": "근현대교회사", "qnum": 169, "stem": "옥스퍼드 운동(Oxford Movement:1833-1841)에 대한 설명이 아닌 것은?", "choices": ["옥스퍼드 대학을 중심으로 일어난 종교 운동이다.", "주역은 홀리클럽의 멤버인 존 웨슬리와 찰스 웨슬리 그리고 조지 휫필드였다.", "기독교의 침체를 회복하려는 열정이 담겨 있었다.", "건실하고 순수한 교회를 육성하기 위해 도덕적 재무장을 강조하였다."], "answer": 2, "explanation": "웨슬리 형제와 필드가 주역이었던 홀리클럽과 구분되어야 한다. 존 키이블(John Keble, 1792-1866), 리차드 프라우드(Richard H. Froude, 1803-1836), 존 뉴우먼(John H, Newman, 1801-1836) 등이 주역이었다"}, {"id": "교회사-0572", "subject": "교회사", "section": "한국교회사", "qnum": 1, "stem": "다음 중 경교에 대한 설명으로 바르지 않은 것은?", "choices": ["네스토리우스주의와 관련이 있다.", "경교가 중국에 전래된 것은 당나라 때인 635년경이다.", "당태종은 경교를 공인하였으나 당고종은 박해했다.", "석굴암의 십나한상, 돌십자가 등이 경교의 한국 전래의 증거라는 견해가 있다."], "answer": 2, "explanation": "당태종 때 경교가 공인되었고 당고종 때 국교로 인정받을 정도로 그들 모두 경교에 대해서 호의적이었다. 네스토리우스는 431 년 에베소 공의회에서 그리스도의 신성보다는 인성을 강조한 나머지 정죄되었고 페르시아 쪽으로 이동했다. 그의 신앙이 후진들 에 의해 경교라는 이름으로 당나라에 전파되었다."}, {"id": "교회사-0573", "subject": "교회사", "section": "한국교회사", "qnum": 2, "stem": "다음은 경교와 관련된 내용이다. 빈칸에 들어갈 적당한 말은? 경교는 635년 ( )을(를) 단장으로 하는 페르시아의 사절단을 통해서 당나라에 전해졌고, 중국에 경교의 전래가 역사적 사실로 확인되기 시작한 것은 1625년 ( )가 발견되면서부터이다.", "choices": ["이바스(Ibas)-당태종 중국비", "바르 스마스(Bar Sumas)-진국대법주비", "알로펜(Alopen)-대진경교유행중국비", "아다이(Addai)- 경교중국비"], "answer": 3, "explanation": "당태종은 알로펜 등을 환영했으며 알로펜은 641년까지 포교하였고, 진국대법주가 되었다."}, {"id": "교회사-0574", "subject": "교회사", "section": "한국교회사", "qnum": 3, "stem": "1816년 조선 최초의 성경 전래와 직접 관련이 없는 것은?", "choices": ["고대도", "마량진", "순조실록", "서해안 해도"], "answer": 4, "explanation": "1832년 7월 카를 귀즐라프가 한국 서해안을 방문했을 때 그는 고대도에 머물면서 국왕에게 선물을 보내고 그곳에서 서생을 통 해 주기도문을 번역하게 했으며 감자재배법을 가르치기도 했다."}, {"id": "교회사-0575", "subject": "교회사", "section": "한국교회사", "qnum": 4, "stem": "16세기부터 17세기에 이루어진 조선시대의 천주교 접촉과 관련이 없는 인물은?", "choices": ["이수광", "허균", "소현세자", "이승훈"], "answer": 1, "explanation": "이승훈(1756-1801)은 18세기의 사상가로 1784년 북경에서 그라몽(J. J. de Grammont) 신부에게 한국 최초의 천주교 세례 를 받았고 베드로라는 세례명을 얻었다."}, {"id": "교회사-0576", "subject": "교회사", "section": "한국교회사", "qnum": 5, "stem": "다음 중 조선시대 천주교와 관련하여 잘못된 내용은? 1784년 이승훈은 세례를 받았고, 1845년 김대건은 신부서품을 받았다.", "choices": ["1784년 이승훈은 세례를 받았고, 1845년 김대건은 신부서품을 받았다.", "전라도 진산 윤지충과 그 이웃 권상현은 제사 문제 등으로 참수형을 당했다.", "김순성과 이지연은 박해로부터 천주교인들을 보호했다.", "1836년 이래 입국한 프랑스 신부는 총 26명이며 이 중 12명이 순교했다."], "answer": 4, "explanation": "김순성은 천주교 신도를 가장하여 잉베르 신부의 거처를 알아내 밀고하였고 이지연은 세 명의 신부와 수많은 신도들을 순교하게 만들었다."}, {"id": "교회사-0577", "subject": "교회사", "section": "한국교회사", "qnum": 6, "stem": "다음 중 조선에 내한한 카를 귀츨라프(Karl Gutalaff)에 대한 설명으로 틀린 것은?", "choices": ["처음에 네덜란드 선교회에서 파송되었으나 중국선교를 위해 런던선교회로 옮겼다.", "1830년 제너럴 셔먼호의 통역관으로 승선하여 서해안에 도착했다.", "7월 25일 충청도 홍주만 고대도에 도착하여 관리들과 접촉할 수 있었다.", "그는 성경을 건네주고 서생 \"양이\"에게 주기도문을 번역하게 했다."], "answer": 2, "explanation": "귀츨라프는 로드 암허스트(Lord Amherst)호에 통역관, 선의(#금), 선목(4)으로 승선하여 1832년 7월 17일경에 황해도 서 해안 장산곶 근해에 상륙한 후 고대도로 이동했다."}, {"id": "교회사-0578", "subject": "교회사", "section": "한국교회사", "qnum": 7, "stem": "다음 중 로버트 J. 토마스 선교사와 관련된 내용으로 올바르지 않은 것은?", "choices": ["1839년 9월 7일 웨일즈의 라야다(Rhyader, Radnoshire)에서 출생했다.", "1863년 6월 4일 하노버교회에서 목사안수를 받았다.", "런던선교회 소속으로 중국에 도착하여 선교활동을 시작했다.", "한국에는 1866년에 한 번 내한하여 순교했다."], "answer": 2, "explanation": "토마스 선교사는 1865년과 1866년도에 내한하여 성경을 배포하고 복음을 전했다."}, {"id": "교회사-0579", "subject": "교회사", "section": "한국교회사", "qnum": 8, "stem": "다음 중 제너럴 셔먼호에 대한 설명으로 옳은 것은? 토마스 선교사가 책임자로서 제너럴 셔먼호를 이끌고 내한했다.", "choices": ["토마스 선교사가 책임자로서 제너럴 셔먼호를 이끌고 내한했다.", "제너럴 셔먼호의 방한 목적은 조선을 침략하기 위해서였다.", "제너럴 셔먼호에 상품은 없었고 무기로 중무장을 하고 있었다.", "제너럴 셔먼호의 주된 방한 목적은 통상이었다."], "answer": 4, "explanation": "당시 제너럴 셔먼호에는 배 소유주 미국인 프레스톤(W. B. Preston), 선장 미국인 페이지(Page), 항해사 미국인 윌슨(Wilson) 이 타고 있었고 이들은 많은 상품을 싣고 통상을 목적으로 향해를 지도했다."}, {"id": "교회사-0580", "subject": "교회사", "section": "한국교회사", "qnum": 9, "stem": "다음 중 존 로스와 존 맥킨타이어의 성경번역 사역에 동참한 한국인 조력자가 아닌 인물은?", "choices": ["이응찬", "e 백홍준", "이성하", "노춘경"], "answer": 3, "explanation": "성경번역 한국인 조력자들은 주로 의주 출신들이었다. 노춘경(노도사)은 존 로스 성경번역과는 관계가 없다. 노춘경은 알렌의 어 학선생이었으며 만주가 아닌 국내에서 최초로 세례를 받았다."}, {"id": "교회사-0581", "subject": "교회사", "section": "한국교회사", "qnum": 10, "stem": "다음 중 존 로스의 성경번역 활동과 관계가 없는 사항은?", "choices": ["만주 우장지역", "서상륜, 서경조, 김진기", "현토한한신약전서", "예수성교견셔"], "answer": 2, "explanation": "「현토한한신약전서」는 이수정이 일본에서 토를 달아 번역한 책이다."}, {"id": "교회사-0582", "subject": "교회사", "section": "한국교회사", "qnum": 11, "stem": "다음 중 이수정에 관한 설명으로 바르지 않은 것은?", "choices": ["임오군란 당시 민비의 생명이 위급할 때 구해주었다.", "임오군란 이후 일본 수신사의 수행원으로 동행했다.", "일본 농학자 쯔다센으로부터 한 권의 한문성경을 전해 받고 성경을 배웠다.", "우찌무라 간조로부터 세례를 받았다."], "answer": 3, "explanation": "이수정은 1883년 4월 29일 일본에 건너간 지 9개월 만에 로개주초교회에서 야스카와 토오루 목사로부터 세례문답을 받은 후, 미국 선교사 조지 낙스(George W. Knox)로부터 세례를 받았다."}, {"id": "교회사-0583", "subject": "교회사", "section": "한국교회사", "qnum": 12, "stem": "다음 중 초기 한국교회 설립에 중추적인 역할을 한 인물과 교회가 잘못 짝지어진 것은?", "choices": ["김청송 - 집안현교회", "백홍준- 의주교회", "서상륜 - 소래교회", "서경조 - 널다리골교회"], "answer": 3, "explanation": "널다리(판동)교회는 1893년 마포삼열(Samuel A. Moffet)이 한석진의 도움으로 세운 교회로서 서경조와는 직접 관련이 없 다. 이 교회는 이후 장대현교회로 발전되었다. 토마스 선교사로부터 성경책을 받은 최치량의 집이 널다리골교회의 시작이었다."}, {"id": "교회사-0584", "subject": "교회사", "section": "한국교회사", "qnum": 13, "stem": "다음 중 한국에 입국하여 활동한 미국 북장로회 선교사들만 모아놓은 것은?", "choices": ["언더우드, 스크랜턴, 레이놀즈", "사무엘 마펫, 아펜젤러, 말콤 펜윅", "제임스 게일, 로버트 하디, 찰스 알렌 클락", "언더우드, 사무엘 마펫, 윌리엄 베어드"], "answer": 4, "explanation": "스크랜턴과 아펜젤러는 미 북감리회, 레이놀즈는 미 남장로교회 파송선교사였다. 말콤 펜윅은 독립선교사였다가 침례교와 연관을 맺었다. 제임스 게일과 로버트 하디는 캐나다 YMCA에서 파송을 받아 입국했지만, 이후 각각 로교와 감리교에 소속되어 활동 했다."}, {"id": "교회사-0585", "subject": "교회사", "section": "한국교회사", "qnum": 14, "stem": "다음 중 언더우드(Horace Grant Underwood)에 대한 설명으로 틀린 것은? O 1885년 4월 5일 제물포에 도착했다.", "choices": ["1885년 4월 5일 제물포에 도착했다.", "\"한국선교의 아버지\", \"성경번역', \"복음전도자\"라고 불린다.", "승동교회를 설립했다.", "한국 선교를 촉구했으며, 테이트, 레이놀즈와 전킨의 입국에 크게 영향을 미쳤다."], "answer": 4, "explanation": "승동교회는 사무엘 F. 무어(Samuel F. Moore, 모삼열) 목사에 의해 설립되었다."}, {"id": "교회사-0586", "subject": "교회사", "section": "한국교회사", "qnum": 15, "stem": "다음 중 초기 한국 개신교 선교정책으로 볼 수 없는 것은? 광혜원을 시작으로 하는 의료정책 배재학당을 비롯한 미션스쿨 정책", "choices": ["광혜원을 시작으로 하는 의료정책", "배재학당을 비롯한 미션스쿨 정책", "성경번역 및 문서출판 제한정책", "네비우스 선교정책"], "answer": 2, "explanation": "언더우드와 아펜젤러 등의 선교사들은 성경번역을 충실하게 감당했다. 또한 성경과 기독교 서적 등을 왕성하게 출판하여 보급했다."}, {"id": "교회사-0587", "subject": "교회사", "section": "한국교회사", "qnum": 16, "stem": "다음 중 장로교회가 세운 초기 미션스쿨에 해당하는 것은?", "choices": ["이화학당", "경신학당", "배재학당", "호수돈여학교"], "answer": 3, "explanation": "아펜젤러의 배재학당, 스크랜턴 여사의 이화학당, 캐롤(Carral) 선교사의 호수돈여학교 등은 모두 감리교 계열 미션스쿨이다. 장 로교 계열 미션스쿨인 경신학당은 언더우드 학당, 구세학당 등으로 불렸다."}, {"id": "교회사-0588", "subject": "교회사", "section": "한국교회사", "qnum": 17, "stem": "다음 선교사들 중 1887년도 설립된 성경번역위원회 활동과 가장 거리가 먼 인물은?", "choices": ["언더우드", "아펜젤러", "하디", "스크랜턴"], "answer": 3, "explanation": "알렉산더 하디는 위원회에 추가로 임명을 받았지만 성경을 번역하는 작업에 전념하지 못했다."}, {"id": "교회사-0589", "subject": "교회사", "section": "한국교회사", "qnum": 18, "stem": "다음 중 초기 한국교회 선교지 분할(Comity of Missions) 협정에 의해 결정된 선교구역을 잘못 연결한 것은?", "choices": ["북장로회 - 서울. 경기도지역, 경북지역, 황해, 평남과 평북지역 등", "남장로회 - 전남•전북 및 제주지역 등", "호주장로회 - 부산 및 경남지역", "캐나다장로회 - 원주, 횡성, 평창, 춘천, 철원 등 강원지역"], "answer": 4, "explanation": "원주, 횡성, 춘천, 철원 등 강원지역은 미국 남북감리교회가 주로 맡아 선교활동을 했다. 캐나다로회는 함경남북도 지역을 담 당했다."}, {"id": "교회사-0590", "subject": "교회사", "section": "한국교회사", "qnum": 19, "stem": "다음은 네비우스 선교정책에 관한 내용이다. 빈칸에 들어갈 적당한 말로 바르게 짝지어진 것은? 일반적으로 네비우스 핵심정책은 (), 자전, 자치였다. 곽안련 선교사는 이 선교정책의 보다 더 중요한 핵심은 ( )에 있다고 주장했다.", "choices": ["자선 - 사회봉사", "자립 - 성경공부", "자족 - 구제", "자성 - 기도"], "answer": 1, "explanation": "존 리빙스턴 네비우스(John L. Nevius)는 중국에서 선교활동을 하다가 1890년 6월 7일 서울을 방문하여 네비우스 정책(Nevius Methods)을 제안했다. 그러나 곽안련 선교사는 네비우스 선교정책에서 자립, 자전, 자치보다 더 중요한 것은 성경공부라고 평 가했다."}, {"id": "교회사-0591", "subject": "교회사", "section": "한국교회사", "qnum": 20, "stem": "남장로회 선교부는 전주, 군산, 목포, 광주에 선교지부를 차례로 개설했는데 이때 목포와 광주에 선교지부를 설립한 선교사는 다음 중 누구인가?", "choices": ["전킨", "유진 벨", "레이놀즈", "해리슨"], "answer": 4, "explanation": "유진 벨(Eugene Bell) 선교사는 1897년 목포양동교회(현재 목포새한교회)와 목포선교지부를 개설했고, 1904년 12월에 오웬 (C. C. Owen) 선교사와 김윤수 등과 함께 광주 양림동에 광주 양림리교회를 개척하고 광주 선교스테이션을 개설했다."}, {"id": "교회사-0592", "subject": "교회사", "section": "한국교회사", "qnum": 21, "stem": "다음 중 초기 한국교회 부흥운동과 발생연도가 잘못 연결된 것은? 1903년 원산부흥운동", "choices": ["1903년 원산부흥운동", "1906년 목포부흥운동", "1907년 평양대부흥운동", "1908년 백만인구령운동"], "answer": 2, "explanation": "백만인구령운동은 1909년 7월 12일 남감리교 개성선교부의 선교사들, 갬블, 리드, 스톡스의 기도모임을 통하여 시작되었고, 그 해 가을 장로교와 감리교의 장감연합공의회에서 \"백만인을 그리스도에게로!\"라는 슬로건 하에 본격적으로 전개되었다."}, {"id": "교회사-0593", "subject": "교회사", "section": "한국교회사", "qnum": 22, "stem": "다음 중 초기 한국교회 부흥운동과 주요 인물을 잘못 연결한 것은?", "choices": ["원산부흥운동 - 하디", "목포부흥운동 - 저다인", "평양대부흥운동 - 길선주", "백만인구령운동- 이반 로버츠"], "answer": 2, "explanation": "백만인구령운동은 국내 선교사들을 중심으로 발화하여 장감연합공의회에서 본격적으로 전개되었다. 그와 때를 맞추어서 해외 유 명 부흥강사 윌버 채프만(J. Wilbur Chapman)과 찰스 알렉산더(Charles M. Alexander)가 입국하여 구령운동을 촉진시키는 데 큰 역할을 했다. 이반 로버츠는 1904년 웨일즈 부흥운동에 쓰임 받았던 인물이다."}, {"id": "교회사-0594", "subject": "교회사", "section": "한국교회사", "qnum": 23, "stem": "다음 중 빈칸에 들어갈 알맞은 말을 바르게 연결한 것은? 초기 한국교회의 부흥운동에 앞서 부흥을 위한 기도회가 있었다. 중국에서 활동하던 남감리교 선교사 ( )와 캐나다 정로교 선교사 ( ) 두 여선교사는 선교사들 가운데 부흥의 역사가 일어나도록 종종 함께 모여 기도회를 가졌다. 하디는 이것이 1903년 원산부흥운동의 불씨가 되었다고 말했다.", "choices": ["엘러즈 - 멘지스", "스크랜턴 - 테이트", "화이트 - 맥컬리", "니븐 - 하이트"], "answer": 3, "explanation": "화이트(M. C. White)와 맥컬리(L. H. McCully)의 기도가 있었으며, 이들을 비롯하여 원산 주재 여선교사들은 1903년 8월 24 일~30일까지 하디를 주강사로 하여 \"연합성경공부 및 기도회\"를 가졌다."}, {"id": "교회사-0595", "subject": "교회사", "section": "한국교회사", "qnum": 24, "stem": "원산부흥 이전 로버트 하디가 3년간 정열을 쏟았지만 선교사역을 실패했던 도시는 어디인가?", "choices": ["청진", "지경대(터)", "함흥", "철원"], "answer": 2, "explanation": "3년간 선교사역에 실패했던 지경대(터)였지만, 은혜를 경험한 하디가 1904년에 그곳을 찾아 12일 동안 사경회를 이끌었다."}, {"id": "교회사-0596", "subject": "교회사", "section": "한국교회사", "qnum": 25, "stem": "다음 중 평양대부흥운동과 가장 관련이 없는 선교사는?", "choices": ["제임스 홀(Willian James Hall)", "그레이험 리(Graham Lee)", "존스톤(Howard Agnew Johnston)", "블레어(William N. Blair)"], "answer": 4, "explanation": "북감리교 선교사 제임스 홀은 평양에서 헌신적으로 의료사역을 하였고, 청일전쟁 중에 부상당한 이들을 치료하다가 발진티푸스 에 걸려 1894년 11월 24일 소천했다."}, {"id": "교회사-0597", "subject": "교회사", "section": "한국교회사", "qnum": 26, "stem": "다음 중 빈칸에 들어갈 알맞은 말은? 1907년 ( )부터 15일까지 평양 ( )에서 4개의 장로교 선교회가 연합으로 개최한 큰 규모의 평안남도 겨울 남자 도사경회가 열렸다. 이때 평양대부흥운동이 일어났다.", "choices": ["1월 1일 - 산정현교회", "1월 2일 - 장대현교회", "2월 7일 - 장대현교회", "2월 5일 - 남산현교회※ 소위 한국의 오순절이라고 할 수 있는 평양대부흥운동은 1907년 1월 2일부터 15일까지 장대현교회에서 열렸다. 이때를 기점으로 평양시내와 도시를 넘어 부흥의 역 사가 확산되었다."], "answer": 3, "explanation": null}, {"id": "교회사-0598", "subject": "교회사", "section": "한국교회사", "qnum": 27, "stem": "다음 중 평양대부흥운동과 관련된 내용으로 올바르지 않은 것은?", "choices": ["장대현교회에서 시작된 부흥은 평양과 도시의 경계를 넘어 확산되었다.", "부흥은 미션스쿨과 성경학교와 평양신학교에 일어났다.", "평양의 성령의 역사는 서울, 선천, 청주, 광주, 대구 등 전국으로 퍼져 나갔다.", "부흥운동은 한반도 내에서만 일어났다."], "answer": 2, "explanation": "평양대부흥의 역사는 국경을 넘어 중국으로 번져나갔다. 예를 들어 중국에서 사역하던 고포드(J. L. Goforth) 선교사가 입국하 여 부흥의 현장을 방문하여 은혜를 받고, 그를 통해 중국에서도 놀라운 역사가 일어났다."}, {"id": "교회사-0599", "subject": "교회사", "section": "한국교회사", "qnum": 28, "stem": "다음 중 백만인구령운동에 대한 설명과 관계가 없는 것은?", "choices": ["장대현교회 길선주 목사와 박치록 장로를 주축으로 한 새벽기도가 불씨를 제공했다.", "백만인구령운동은 지방에서는 호응이 저조해서 전국적 확대는 없었다.", "장감연합공의회에서 백만인구령운동의 실행을 위해 게일을 의장에, 서기에 밀러, 언더우드, 벙커 로 구성된 위원회를 구성했다.", "이때 날연보(preaching day)와 권찰제도(Leader of Tens)가 채택되어 큰 역할을 했다."], "answer": 4, "explanation": "백만인구령운동은 1910년에 들어서면서 전국적인 운동으로 확대되었다."}, {"id": "교회사-0600", "subject": "교회사", "section": "한국교회사", "qnum": 29, "stem": "다음 중 한국교회 신학교 설립에 관한 내용으로 바르지 않은 것은?", "choices": ["한국교회 신학교는 평양대부흥을 기점으로 설립되었다.", "감리교는 신학반, 신학회, 신학부로 발전하다가, 1907년 남북감리회 선교부가 합동하여 협성신 학교를 설립하였다.", "장로교는 1890년 신학반이 있었고, 1901년에 평양에서 평양 장로회신학교(평양신학교)가 설립 되었다.", "동양선교회는 1911년에 경성 무교정에 세운 전도관에서 임시 성서학원을 개설하고, 이듬해 교 사(#숨)를 신축하고 본격적으로 신학교육에 돌입했다."], "answer": 1, "explanation": "이미 신학반이나 신학회의 형태로 발전하다가 평양신학교는 1901년에, 감리교 협성신학교는 1907년에 설립되었다."}, {"id": "교회사-0601", "subject": "교회사", "section": "한국교회사", "qnum": 30, "stem": "다음 중 각 교단의 신학교에서 발간한 신학지를 바르게 연결한 것은?", "choices": ["장로교 - 신학세계", "감리교 - 신학지남", "성결교 - 활천", "침례교 - 신앙세계"], "answer": 2, "explanation": "감리교 신학교인 협성신학교는 1916년 「신학세계」를 창간했고 장로교의 신학교인 평양신학교는 1918년 「신학지남』을 창간했다."}, {"id": "교회사-0602", "subject": "교회사", "section": "한국교회사", "qnum": 31, "stem": "다음 중 한국교회사에서 1907년에 일어난 사건이 아닌 것은?", "choices": ["평양대부흥운동", "평양신학교 1회 졸업", "자로교 최초의 목사 7인 안수", "독노회가 7개 대리회를 노회로 승격하여 7개 노회의 총회 결성 결의"], "answer": 4, "explanation": "1907년에 일어난 주요한 일을 추가하면 독노회의 결성이다. 아울러 7개 노회가 총회를 결성하기로 결의한 때는 1917년 9월 17 일 열린 제5회 독노회 때이다."}, {"id": "교회사-0603", "subject": "교회사", "section": "한국교회사", "qnum": 32, "stem": "다음 중 장로교의 1907년 독노회에 대한 바르지 않은 설명은? 1907년 9월 17일 평양 장대현교회에서 개최되었다.", "choices": ["1907년 9월 17일 평양 장대현교회에서 개최되었다.", "소회(1)를 대신해 7개의 대리회(44포)를 두어 노회의 위임 사무를 처리하도록 했다.", "회장은 언더우드 선교사였다.", "장로교 신앙에 기초한 신앙고백인 12신조를 채택했다."], "answer": 3, "explanation": "최초의 독노회 회장은 사무엘 마(마포삼열) 선교사이다."}, {"id": "교회사-0604", "subject": "교회사", "section": "한국교회사", "qnum": 33, "stem": "다음 중 1907년 임직한 한국장로교회 최초의 7인 목사에 속하지 않는 인물은?", "choices": ["길선주", "양전백", "송인서", "김종섭"], "answer": 4, "explanation": "김종섭은 방기창과 함께 1901년부터 평양신학교에서 공부했지만 1910년 제3회로 졸업했다."}, {"id": "교회사-0605", "subject": "교회사", "section": "한국교회사", "qnum": 34, "stem": "다음 중 1901년부터 1907년까지 평양 장로회신학교에서 학생들을 지도한 선교사가 아닌 인물은? 마포삼열(Samuel A. Moffett)", "choices": ["마포삼열(Samuel A. Moffett)", "마라연(Charles 1. Mclaren)", "이길함(Graham Lee)", "왕길지(G. O. Engel)"], "answer": 3, "explanation": "마라연은 호주 장로회 의료선교사로서 1911년 10월에 부산에 도착하여 경남지역 배병원에서 활동하면서 서울 세브란스병원에 서도 연합 사역을 감당했다."}, {"id": "교회사-0606", "subject": "교회사", "section": "한국교회사", "qnum": 35, "stem": "1912년 9월 1일에 결성된 대한예수교장로회 제1회 총회의 총회장은 누구였는가?", "choices": ["마펫(마포삼열)", "언더우드(원두우)", "엥겔(왕길지)", "레이놀즈(이늘서)"], "answer": 4, "explanation": "1907년 독노회 회장은 마포삼열이었고 1912년 총회장은 언더우드 선교사였다."}, {"id": "교회사-0607", "subject": "교회사", "section": "한국교회사", "qnum": 36, "stem": "1907년에 평양신학교를 졸업하고 같은 해 독노회에서 목사 안수를 받은 후 제주도로 파송되어 선교활동을 했던 인물은?", "choices": ["윤식명", "한석진", "이기풍", "서경조"], "answer": 3, "explanation": "이기풍은 장로교 최초의 7인 목사 중에 한 명으로 제주도 선교의 초석을 놓았다. 1908년 1월 11일 장대현교회에서 길선주 목 사의 인도로 제주도 선교 파송예배를 드렸다."}, {"id": "교회사-0608", "subject": "교회사", "section": "한국교회사", "qnum": 37, "stem": "다음 중 일제 강점기 활동한 한국교회의 신학자들과 그들의 신학 사상을 바르게 연결한 것으로 보기 가장 어려운 것은? 김교신 - 무교회주의 ② 김재준 - 신정통주의", "choices": ["김교신 - 무교회주의", "김재준 - 신정통주의", "이용도 - 보수주의", "박형룡 - 정통주의"], "answer": 2, "explanation": "이용도 목사는 체험 위주 부흥운동을 전개한 신비주의 부흥사라고 평가할 수 있다. 장로교 총회에서는 그를 이단으로 정죄했고, 그가 속했던 감리교도 그를 배척했다."}, {"id": "교회사-0609", "subject": "교회사", "section": "한국교회사", "qnum": 38, "stem": "다음 중 을미사 이후 선교사들이 보여주었던 태도로 올바른 것은? © 언더우드, 아멘젤러, 에비슨, 게일, 헐버트 등 선교사들은 매일 밤 고종 황제의 안전을 위해 불 침번을 섰다.", "choices": ["언더우드, 아멘젤러, 에비슨, 게일, 헐버트 등 선교사들은 매일 밤 고종 황제의 안전을 위해 불 침번을 섰다.", "춘생문 사건이 일어나자 선교사들이 왕을 보호하기 위해서 위험을 무릅쓰고 입궐했다.", "언더우드 부부는 1896년 9월 고종 황제의 생일에 사람들을 모화관에 모이도록 하여 기도 및 찬양집회 등 경축행사를 진행했다.", "대부분의 선교사들이 일제의 만행에 방관했다."], "answer": 4, "explanation": "일제의 침략에 대해 선교사들은 되도록 중립을 지키려 했다. 그러나 을미사변이 일어나자 언더우드, 에비슨, 헐버트 등의 선교사 들은 직접 불침번을 섰고 춘생문 사건 때는 위험을 무릅쓰고 고종 황제를 보호하려 했다. 특히 언더우드 선교사 부부는 모화관 에서 기독교식으로 군주 생신을 위한 기념행사를 주관했다."}, {"id": "교회사-0610", "subject": "교회사", "section": "한국교회사", "qnum": 39, "stem": "다음 중 을미사변 이후에 나타난 한국기독교의 대응이 아닌 것은?", "choices": ["성탄절과 교회 절기에 십자가기와 태극기를 좌우에 게양하였다.", "애틋한 나라사랑의 마음을 담은 애국가를 만들어서 불렀다.", "명성황후 시해와 관련한 장•감 합동 기도회를 개최하였다.", "전국장로교회는 날짜를 정하지 않고 나라를 위해 기도했다."], "answer": 3, "explanation": "길선주 장로의 발의로 1905년 11월에 전국장로교회가 열려 1주일간 나라를 위한 기도회를 개최했다."}, {"id": "교회사-0611", "subject": "교회사", "section": "한국교회사", "qnum": 40, "stem": "다음 중 105인 사건에 대한 설명으로 잘못된 것은? 기독교와 무관한 정치적 사건이었다.", "choices": ["신민회를 압살하려는 일제의 조작이었다.", "1910년의 경술국치 이후 발생한 한국인에 대한 가장 규모가 큰 탄압이었다.", "이 사건으로 인해 민족독립에 대한 염원이 더 고양되었다.", "저"], "answer": 3, "explanation": "105인 사건으로 인해 실형을 선고 받은 사람들 중에 기독교인이 91명이었고, 이 중 장로교인은 80명으로서 대다수가 한국장로 교인들이었다."}, {"id": "교회사-0612", "subject": "교회사", "section": "한국교회사", "qnum": 41, "stem": "다음 중 독립운동을 위하여 1918년 여운형, 장덕수, 김철, 선우혁, 한진교 등이 중국 상해에서 조직하여 파리강화대회에 김규식을 대표로 파견한 단체는?", "choices": ["대한인국민회", "신한청년당", "신흥무관학교", "신민회"], "answer": 2, "explanation": "신한청년당은 당시 파리강화회의에 대표를 파견하기 위해서 독립운동을 준비하던 여운형을 주축으로 결성한 단체로서 김규식을 대표로 파견했다. 주요인물인 여운형, 선우혁, 서병호, 김규식 등은 기독교인들이었다."}, {"id": "교회사-0613", "subject": "교회사", "section": "한국교회사", "qnum": 42, "stem": "다음 중 안창호와 이승만이 주도했던 독립운동 기관으로서 1909년 2월에 하와이와 미주 한인들 이 결성하였으며 이후 약소민족동맹회의에 참석하여 약소민족의 독립을 주장하고 기관지로서 \"신 한민보\"를 발행한 단체는?", "choices": ["신한청년당", "신민회", "대한인국민회", "흥사단"], "answer": 1, "explanation": "대한인국민회에서 이승만, 정한경, 민찬호를 파리강화대회에 대표로 파견하였지만 비자가 나오지 않아 참석은 성사되지 못했다. 이승만과 안창호는 모두 기독교인이었다."}, {"id": "교회사-0614", "subject": "교회사", "section": "한국교회사", "qnum": 43, "stem": "다음 중 3.1운동 준비과정에 대한 내용으로 바르지 않은 것은? 1919년 2월 상해교포 대표 선우혁 집사가 비밀리에 입국하여 선천 양전백 목사를 만났다.", "choices": ["1919년 2월 상해교포 대표 선우혁 집사가 비밀리에 입국하여 선천 양전백 목사를 만났다.", "서북지역에서는 윤원삼 집사가 교사들을, 안세환 집사는 숭실대학 학생 이보식, 박형룡 등을 설 득하여 찬동을 얻어냈다.", "서울에서는 박희도 등 YMCA와 이갑성 등 남대문 세브란스 병원에서 준비하고 있었다.", "천도교 측은 교주 손병희가 처음부터 주도적으로 독립만세운동을 준비하도록 했다."], "answer": 2, "explanation": "천도교 측은 최린을 비롯하여 권동진, 오세창 등이 준비하였고, 시간이 좀 흐른 후 손병희의 동의를 얻어냈다. 그가 처음부터 주 도한 것은 아니었다."}, {"id": "교회사-0615", "subject": "교회사", "section": "한국교회사", "qnum": 44, "stem": "국내에서 3.1운동을 준비하는 과정에서 기독교계를 결집하고 천도교 측과 연합운동으로 이끌어 가는 데 가장 중추적인 역할을 한 인물은?", "choices": ["이승훈", "손병희", "박희도", "신석구"], "answer": 4, "explanation": "이승훈 장로는 기독교계를 결집하여 천도교 측과 연합하는 데 중추적인 역할을 담당했다."}, {"id": "교회사-0616", "subject": "교회사", "section": "한국교회사", "qnum": 45, "stem": "다음 중 3.1운동 당시 민족대표 33인으로 참여한 인물들 중 7명의 장로교 출신 인물에 속하지 않는 사람은?", "choices": ["길선주", "양전백", "이갑성", "박희도"], "answer": 2, "explanation": "33인 민족대표 중 장로교 출신은 길선주 목사, 양전백 목사, 유여대 목사, 김병조 목사, 이승훈 장로, 이갑성 집사, 이명룡 장로 7인이었다. 박희도 선생은 감리교인이었다."}, {"id": "교회사-0617", "subject": "교회사", "section": "한국교회사", "qnum": 46, "stem": "다음 빈칸에 들어갈 알맞은 내용을 고르시오 1919년 3월 1일 오후 2시에 민족대표들은 ( )에서 모여 독립선언을 했고, 학생들과 시민들은 ( )에서 모여 독립선언서를 낭독하고 독립만세를 외치면서 시가행진을 했다.", "choices": ["파고다(탑골)공원 - 파고다(탑골)공원", "태화관 - 파고다(탑골)공원", "남산공원 - 시청앞 광장", "파고다공원 - 서울역 광장"], "answer": 4, "explanation": "민족대표들은 원래 파고다공원에서 독립선언을 하려고 했으나, 폭력 사태의 가능성이 있다는 박희도 선생의 제안에 손병희 선생 의 단골이었던 태화관에서 독립선언을 낭독하게 되었다. 한편 학생들과 시민들은 2시가 되어 파고다공원에 몰려들었고 예기치 않게 경신학교 출신 정재용 선생이 독립선언문을 낭독하게 되었다."}, {"id": "교회사-0618", "subject": "교회사", "section": "한국교회사", "qnum": 47, "stem": "캐나다 장로교 의료 선교사로서 세브란스의대 교수였으며 우리 민족의 참상을 사진에 담아 일본 의 폭정과 야만성을 세계에 폭로함으로써 후에 \"민족대표 34인\"이라고 불린 선교사는?", "choices": ["조지 맥큔(G. S. McCune)", "사무엘 마펫(Samuel A. Moffett)", "벡커(A. L. Becker)", "스코필드(Frank W. Schofield)"], "answer": 2, "explanation": "스코필드(석호필) 선교사는 입국한 캐나다 의료선교사로서 3.1운동에 공헌을 했다."}, {"id": "교회사-0619", "subject": "교회사", "section": "한국교회사", "qnum": 48, "stem": "다음 중 조선물산장려운동에 대한 설명으로서 틀린 것은?", "choices": ["1920년 7월 30일 평양 차관리 야소교 서원 2층에서 발기하였다.", "조만식이 임시 회장, 김동원, 김형숙 등 40~50명이 모여 발기대회를 가졌다.", "창립총회는 1922년 6월 20일에 열리게 되었고, 표어를 현상공모하기도 했다.", "자작회와 토산애용부인회는 조선물산장려회와 긴장과 경쟁관계에 있었다."], "answer": 4, "explanation": "조선물산장려회와 자작회 그리고 토산애용부인회는 조직은 달랐지만 같은 목표를 갖고 있었으며 서로 협력적 관계였다."}, {"id": "교회사-0620", "subject": "교회사", "section": "한국교회사", "qnum": 49, "stem": "다음 중 서재필과 함께 독립협회를 결성했고 YMCA 총무로서 강력한 지도력을 발휘했으며 수많 은 청년들을 지도했던 성경교사로서 \"침략문명에 유린된 조선청년아, 기하라\"고 외친 인물은?", "choices": ["이상재", "윤치호", "홍재기", "박승봉"], "answer": 3, "explanation": "1912년 8월 연동교회 당회는 경기충청노회에 3인의 장로 허락을 청원했는데 그 청원인물 가운데 이상재가 포함되어 있었다. 그는 \"평신도로서 나라와 겨레를 위해 봉사하는 것이 원\"이라 하여 피택장로에 머물렀다."}, {"id": "교회사-0621", "subject": "교회사", "section": "한국교회사", "qnum": 50, "stem": "장로교 청년운동인 청년면려회(면려청년회)는 금주•단연 등 절제운동을 펼쳐나갔다. 다음 중 설립 당시부터 각 지회에 절제운동을 적극적으로 전개해 나가기 위해 설치한 것은 무엇인가?", "choices": ["전도소", "시약소", "치리소", "계독부"], "answer": 3, "explanation": "청년면려회에서는 각 지회에 계독부(#)를 두고 절제운동을 적극적으로 전개해 나갔다."}, {"id": "교회사-0622", "subject": "교회사", "section": "한국교회사", "qnum": 51, "stem": "다음 중 신사참배에 대한 설명으로 바르지 않은 것은? 신도(해치)는 일본 민족 특히 일본 왕들이 아마테라스라고 불리는 태양여신의 직접 후손이라는 종교사상이다.", "choices": ["신도(해치)는 일본 민족 특히 일본 왕들이 아마테라스라고 불리는 태양여신의 직접 후손이라는 종교사상이다.", "일본 고유의 종교이며 일제는 가는 곳마다 신도의 신전인 신사를 세운다.", "일제는 신사참배를 통하여 대내적으로 왕을 중심으로 자국민의 단결을 도모하고 대외적으로 조 선을 동화하고 지배하려 했다.", "일제는 한국인에게 신사참배를 국가의식을 포함한 종교의식으로서 강요했다."], "answer": 4, "explanation": "일제는 한국인들에게 신사신도, 즉 신사참배는 종교가 아닌 국가의식 혹은 국민의례라고 주장하면서 참여를 유도했다."}, {"id": "교회사-0623", "subject": "교회사", "section": "한국교회사", "qnum": 52, "stem": "장로교 총회가 천주교와 감리교를 이어서 신차참배를 결의한 연도와 총회는 언제인가?", "choices": ["1938년 제27회 총회", "1937년 제26회 총회", "1936년 제25회 총회", "1935년 제24회 총회"], "answer": 1, "explanation": "1938년 9월 9일 오후 8시에 평양서문외예배당에서 회집되었다. 당시 홍택기 총회장이 사회를 봤고 가부(@존) 결의에 있어 불 법적인 절차로 진행되었음에도 불구하고 총회장은 신사참배가 결의되었다고 주장했다."}, {"id": "교회사-0624", "subject": "교회사", "section": "한국교회사", "qnum": 53, "stem": "일제는 미션스쿨부터 신사참배를 강요했는데 다음 중 신사참배 강요에 순응하면서 미션스쿨을 유 지하고자 했던 선교부는 어디인가?", "choices": ["미 북장로회", "@ 캐나다 장로회", "호주 장로회", "미 남장로회"], "answer": 2, "explanation": "캐나다 장로회는 신사참배에 순응하면서 미션스쿨을 유지하려 했다. 나머지 3개의 장로회 선교부는 미션스쿨이 폐교가 되더라도 신사참배를 할 수 없다고 결정했다."}, {"id": "교회사-0625", "subject": "교회사", "section": "한국교회사", "qnum": 54, "stem": "다음 중 신사참배 강요에 순응했던 인물은?", "choices": ["주기철 목사", "김길창 목사", "박관준 장로", "이기선 목사"], "answer": 2, "explanation": "김길창 목사는 1938년 제27차 조선예수교장로회 총회가 신사참배 가결을 했을 때 부총회장이었고 직접 전국노회장들을 인솔하 여 평양신사에 가서 참배했다."}, {"id": "교회사-0626", "subject": "교회사", "section": "한국교회사", "qnum": 55, "stem": "다음 중 한국교회에 자유주의가 들어온 배경이나 통로와 가장 거리가 먼 것은?", "choices": ["감리교 신학", "근대고등교육과 진화론", "캐나다 선교회와 일본신학교", "맥코믹 신학교"], "answer": 4, "explanation": "마펫, 베어드를 비롯한 보수적인 맥코믹 신학교 선교사들에 의해서 운영된 평양신학교 및 한국장로교회의 신학적 성향은 보수적 이었다."}, {"id": "교회사-0627", "subject": "교회사", "section": "한국교회사", "qnum": 56, "stem": "다음 중 \"아빙돈단권주석\"이 성경의 파괴적 고등비평의 원리와 종교진화론적 관점, 그리스도의 처 녀 탄생을 부인하고 예수님의 육체적 부활을 부인하는 등 자유주의 사상을 따랐다고 비판한 신학 자는?", "choices": ["송창근", "박형룡", "류형기", "김재준"], "answer": 2, "explanation": "박형룡 박사는 또한 『아빙돈단권주석, 이 그리스도의 신성을 의문시하였으며, 십자가 대속론은 바울신학에 불과하다고 보는 견해 를 담았다고 평가했다. 길선주 목사도 이 주석을 심도 있게 비판하면서 총회석상에서 신학적 문제를 제기했다."}, {"id": "교회사-0628", "subject": "교회사", "section": "한국교회사", "qnum": 57, "stem": "다음 중 한국교회에서 발생한 정통신학에 대한 도전이라고 볼 수 있는 논쟁이 아닌 것은?", "choices": ["김영주의 창세기 모세 저작권 논쟁", "한상동이 제기한 신사참배자 권징논쟁", "김춘배가 제기한 여권논쟁", "신홍우와 적극신앙단 논쟁"], "answer": 2, "explanation": "출옥성도들이 제기한 일제 강점기 신사참배에 대한 철저한 회개 요구와 이를 주도한 교단 책임자들에 대한 권징 요구는 신학을 지키기 위한 논쟁이라고 말하기는 어렵다."}, {"id": "교회사-0629", "subject": "교회사", "section": "한국교회사", "qnum": 58, "stem": "박형룡 박사가 당시에 일고 있었던 신학적 혼란에 정통주의적 답을 주기 위해서 저술한 대표적인 변증적 저술과 아빙돈단권주석에 맞서 책임 편집을 맡은 저술을 바르게 연결한 것은? 「교의학, - 「신구약 전권 성경주석」 「저작전집』- 「교의신학 서론」", "choices": ["「교의학, - 「신구약 전권 성경주석」", "「저작전집』- 「교의신학 서론」", "『근대신학 난제선평」- 『표준성경주석』", "「정통신학과 위기신학』- 「비교종교학』"], "answer": 3, "explanation": "박형룡 박사는 자유주의 신학의 확산에 맞서 변증적 저술인 「근대신학 난제선평」을 출간했으며 아빙돈단권주석에 맞서 「표준성 경주석」의 책임 편집을 맡았다."}, {"id": "교회사-0630", "subject": "교회사", "section": "한국교회사", "qnum": 59, "stem": "해방 후 신학교 설립에 관한 내용으로 잘못된 것은?", "choices": ["1940년 4월 19일 승동교회 지하에서 조선신학교가 개교했다.", "조선신학교는 평양신학교의 보수적 신학을 그대로 계승했다.", "조선신학교는 \"황국의 기독교 교역자 양성\"을 목적으로 하였고, 성경의 무오성이나 축자영감을 반대했다.", "1947년 4월에 51인의 조선신학교 학생들이 조선신학교 신학교육이 자유주의라는 것을 총회에 진정했다."], "answer": 2, "explanation": "조선신학교는 평양신학교의 신학사상을 계승하지 않고 오히려 자유주의 및 신신학을 가르쳤다. 이런 학풍의 반발로 고려신학교 가 개교했다."}, {"id": "교회사-0631", "subject": "교회사", "section": "한국교회사", "qnum": 60, "stem": "한국장로교회 분열에 관한 설명 가운데 빈칸에 들어갈 알맞은 연대를 묶은 것은? )년에 고신파(고려파)의 분열이 있었고, 조선신학교 신학사상으로 갈등이 시작되어 ( )년에 기장파가 분열되었다. 1959년에는 연동 측이 분열하여 통합 측과 합동 측으로 되었다.", "choices": ["1952-1953년", "1953-1953년", "1954-1956년", "1954-1957년"], "answer": 1, "explanation": "기장 측이나 통합 측의 분열과 달리 고려파의 분열(분리)은 신학적인 문제가 아니었다. 고려신학교에 대한 이사들과 박형룡 박사 의 견해 문제, 경남노회에서의 총회파와 출옥성도파 사이의 갈등이 점차 확대된 결과라고 볼 수 있다."}, {"id": "교회사-0632", "subject": "교회사", "section": "한국교회사", "qnum": 61, "stem": "다음 중 6.25 한국전쟁 이후 발흥한 이단 창시자와 단체를 잘못 연결한 것은?", "choices": ["나운몽- 용문산 기도원 (애향숙)", "문선명 - 세계기독교통일신령협회", "박태선 - 전도관 (신앙촌)", "황국주 - 예수교장막성전"], "answer": 4, "explanation": "문선명은 자칭 재림주', \"문예수\"라고 주장했고 신구약 성경을 미완성의 경전이라면서 자신의 원리강론(주)모:품)이 신구약을 2 완성한 성약(5k%G)이라고 주장했다."}, {"id": "교회사-0633", "subject": "교회사", "section": "한국교회사", "qnum": 62, "stem": "다음 중 토착화신학에 관한 내용으로 부정확하게 짝지어진 것은?", "choices": ["윤성범-성()의신학", "서남동 - 생명신학", "유동식 - 문화신학", "안병무 - 민중신학"], "answer": 2, "explanation": "유동식은 불교와 천도교를 복음의 요소를 반영하고 있는 종교로 평가했다. 그리고 원효를 그리스도 이전의 크리스천' 이라고 주 장했다."}, {"id": "교회사-0634", "subject": "교회사", "section": "한국교회사", "qnum": 63, "stem": "다음은 경교(#형)에 관한 설명이다. 바르지 않은 것은? 경교는 이미 오래전 중국으로 전래되었다.", "choices": ["경교는 이미 오래전 중국으로 전래되었다.", "431년 에베소 회의에서 정죄된 네스토리우스 일파들이 페르시아로 이동했는데 그들의 신앙이 경교라는 이름으로 알려졌다.", "이들의 신앙은 알로펜을 위시한 사절단을 통해서 635년부터 명나라에 전파되었다.", "그 경교가 한반도에 전해졌는지 여부는 아직 분명하지 않다."], "answer": 3, "explanation": "635년 경교가 전래될 당시 중국은 당나라 시대였다."}, {"id": "교회사-0635", "subject": "교회사", "section": "한국교회사", "qnum": 64, "stem": "우리나라에 전래된 천주교에 관한 다음 설명 중 바르지 못한 것은?", "choices": ["천주교는 병자호란 때 세스페데스에 의해서 전파되었다.", "세스페데스의 사역은 주로 침략국 사병들에게 국한되었지만, 조선인들과도 어느 정도 접촉이 있 었다.", "우리나라의 천주교 수용은 선교사들이 입국하여 전파하기보다, 한국인이 직접 중국을 왕래하면 서 관심을 갖게 되었다는 것이 특징이다.", "1784년 이승훈이 조선인 최초로 천주교 세례를 받았다."], "answer": 1, "explanation": "병자호란- 임진왜란"}, {"id": "교회사-0636", "subject": "교회사", "section": "한국교회사", "qnum": 65, "stem": "다음의 한국 개신교 초기 전래 기록 중 잘못된 것은?", "choices": ["1832년 화란 선교사 귀츨라프가 만주에서 한국인에게 선교하였다.", "1882년 누가, 요한복음을 번역한 로스역 성경이 발행되었다.", "1866년 미국 남장로교 선교사 토마스가 대동강변에서 순교하였다.", "1885년 미 감리교 선교사 아펜젤러가 한국에 도착했다."], "answer": 3, "explanation": "토마스 선교사는 스코틀랜드 출신이다."}, {"id": "교회사-0637", "subject": "교회사", "section": "한국교회사", "qnum": 66, "stem": "미국 북장로교 선교사로서 갑신정변 때 의사로 활약한 사람은 누구인가?", "choices": ["알렌", "언더우드", "토마스", "칼빈 마티어"], "answer": 1, "explanation": "알렌은 1884년 한국 최초의 의료선교사로 내한하여 갑신정변 때 부상을 당한 고종 황제의 처남 민영익을 치료하였다."}, {"id": "교회사-0638", "subject": "교회사", "section": "한국교회사", "qnum": 67, "stem": "중국 북경의 남당을 방문하여 신부에게서 필담으로 교리를 배우고 1784년 귀국하기 직전 예수회 신부 그라몽에게 세례를 받고 '베드로'라는 세례명을 받은 한국 최초의 천주교 수세자는 누구인 가?", "choices": ["김대건", "이승훈", "정약전", "정약용"], "answer": 2, "explanation": "이승훈은 부친인 이동욱을 따라서 동지사 일행으로 북경에 가게 되었다."}, {"id": "교회사-0639", "subject": "교회사", "section": "한국교회사", "qnum": 68, "stem": "1866년 8월에 미국 상선 제너럴 셔먼호를 타고 조선에 왔다가 대동강 기슭에서 순교한 선교사는 누구인가?", "choices": ["귀츨라프", "토마스", "사무엘 모펫", "언더우드"], "answer": 2, "explanation": "토마스 선교사를 처형한 박춘권은 1899년 세례를 받고 영수가 되었다."}, {"id": "교회사-0640", "subject": "교회사", "section": "한국교회사", "qnum": 69, "stem": "카를 귀츨라프와 거리가 먼 것은?", "choices": ["최초의 개신교 선교사", "1832년 고대도", "한문성경을 왕에게 선물", "최초로 사도신경을 한글로 번역"], "answer": 4, "explanation": "귀츨라프가 최초로 번역한 것은 주기도문이다."}, {"id": "교회사-0641", "subject": "교회사", "section": "한국교회사", "qnum": 70, "stem": "1887년에 신약 전체를 번역하여 「예수성교전서」라는 이름으로 3,000부를 출판한 선교사는 누구 인가?", "choices": ["언더우드", "로스", "토마스", "맥클레이"], "answer": 2, "explanation": "스코틀랜드의 선교사인 존 로스 등이 번역한 예수성교전서는 우리나라 최초의 한글신약전서로서 등록문화재 제669호가 되었다"}, {"id": "교회사-0642", "subject": "교회사", "section": "한국교회사", "qnum": 71, "stem": "로스와 맥킨타이어를 도와 성경을 번역하고 황해도 소래에 가서 한국 최초의 교회, 소래교회를 설립한 전도자는 누구인가?", "choices": ["서상륜", "이수정", "박영효", "이응찬"], "answer": 1, "explanation": "서상륜은 만주에서 홍삼 장사를 하다가 31세에 장티푸스로 사경을 헤맬 때 맥킨타이어의 구호를 받은 후 완쾌되어 신자가 되었다."}, {"id": "교회사-0643", "subject": "교회사", "section": "한국교회사", "qnum": 72, "stem": "성결교회가 선교를 위해 조직한 단체의 이름은 무엇인가?", "choices": ["성서학원", "동양선교회", "대한기독교회", "기독청년회"], "answer": 2, "explanation": "동양선교회(Oriental Missionary Society)는 1901년 미국 선교사 카우만에 의하여 일본에서 설립되었다."}, {"id": "교회사-0644", "subject": "교회사", "section": "한국교회사", "qnum": 73, "stem": "구세군 선교에 대한 설명으로 옳지 않은 것은?", "choices": ["구세군 창설자 윌리엄 부스(W. .", "교회의 운영 방법과 기구에 관한 한 개교회주의를 지향한다.", "교회 자체가 자격이 있어 보이는 사람을 뽑아 그 사람에게 복음 전도의 임무를 맡긴다.", "지방 사람들에게 그 지방의 건축양식으로 적당한 크기의 예배당을 짓도록 유도한다."], "answer": 2, "explanation": "교회의 운영 방법과 기구를 지방교회가 관리하고 경영할 수 있는 범위 내에서 발전시킨다."}, {"id": "교회사-0652", "subject": "교회사", "section": "한국교회사", "qnum": 81, "stem": "언더우드 선교사와 관련한 연도 중에 잘못된 것은? 미 북장로교 선교사 파송(1884년)", "choices": ["미 북장로교 선교사 파송(1884년)", "새문안교회 설립(1887년)", "신혼여행 겸하여 서북지방 순회 전도(1889년)", "소천(1916년)"], "answer": 1, "explanation": "언더우드는 1885년에 입국."}, {"id": "교회사-0653", "subject": "교회사", "section": "한국교회사", "qnum": 82, "stem": "1890년 6월, 7명의 장로교회 선교사가 미국 북장로교회에서 중국에 파송한 선교사 네비우스(Rer John Nevius)를 초청하여 수양회를 진행하면서 토론을 거쳐 세운 한국선교정책은 무엇인가?", "choices": ["북장로교회 의료모델 선교정책", "네비우스 선교정책", "구세군 구제모델 선교정책", "교육모델 선교정책"], "answer": 2, "explanation": "네비우스 선교정책은 18세기 구미 선교정책인 토착선교의 원리를 반영한 것으로 자치, 자립, 자전의 원리를 중심으로 교회의 발 전에 크게 이바지하였다."}, {"id": "교회사-0654", "subject": "교회사", "section": "한국교회사", "qnum": 83, "stem": "네비우스 선교정책의 내용이 아닌 것은?", "choices": ["자립 전도", "자립 정치", "자립 경영", "자립 성경번역"], "answer": 4, "explanation": "네비우스 선교정책은 철저한 성경공부를 강조했으나 성경번역은 3대 정책에 들지 않는다."}, {"id": "교회사-0655", "subject": "교회사", "section": "한국교회사", "qnum": 84, "stem": "1907년에 세워진 독노회의 결의 사항이 아닌 것은? 7명의 목사장립", "choices": ["7명의 목사장립", "이기풍 목사를 제주도 선교사로 파송 결의", "장로회 12신조와 장로교 정치 채택", "평양신학교 설립 결의"], "answer": 4, "explanation": "1901년에 마포삼열 선교사에 의하여 평양신학교는 설립되었다."}, {"id": "교회사-0656", "subject": "교회사", "section": "한국교회사", "qnum": 85, "stem": "알렌 선교사와 거리가 먼 것은? 1884년 미 북장로회 의료선교사로 입국", "choices": ["1884년 미 북장로회 의료선교사로 입국", "갑신정변 때 민영의 치료", "광혜원 설립", "정동교회 설립"], "answer": 4, "explanation": "정동교회는 아펜젤러에 의하여 설립."}, {"id": "교회사-0657", "subject": "교회사", "section": "한국교회사", "qnum": 86, "stem": "다음 중 조선 최초의 개신교 세례와 관련이 없는 것은?", "choices": ["1886년 7월에 국내 최초의 개신교 세례가 언더우드 선교사에 의해서 집례되었다.", "노춘경(노도사)을 대표로, 총 5명이 함께 세례를 받았다.", "이 최초 개신교 세례를 시작으로 1887년 9월 27일 장로교 새문안교회가 설립되었다.", "1887년 10월 9일에는 아펜젤러의 감리교 정동교회가 설립되었다."], "answer": 2, "explanation": "최초의 개신교 수세자는 노도경 한 사람이다."}, {"id": "교회사-0658", "subject": "교회사", "section": "한국교회사", "qnum": 87, "stem": "각 지역과 그 지역에 세워진 최초의 교회를 연결한 것 중 바르지 않은 것은? 서울- 새문안교회, 부산 - 부산진교회", "choices": ["서울- 새문안교회, 부산 - 부산진교회", "평양- 장대현교회, 전주 - 서문교회", "황해도 - 양림교회,광주 - 소래교회", "대구- 대구제일교회, 인천 - 내리감리교회"], "answer": 3, "explanation": "황해도-소래교회, 광주-양림교회"}, {"id": "교회사-0659", "subject": "교회사", "section": "한국교회사", "qnum": 88, "stem": "주기도문을 한국어로 번역한 최초의 외국인 선교사는?", "choices": ["하멜", "카를 귀츨라프", "알렌", "언더우드"], "answer": 2, "explanation": "1932년 카를 귀츨라프는 고대도 주민들에게 한문성경을 나누어주고, 주기도문을 번역하였다."}, {"id": "교회사-0660", "subject": "교회사", "section": "한국교회사", "qnum": 89, "stem": "권철신, 이승훈 등이 순교하고 정약용이 유배를 당한 박해는 언제 있었는가?", "choices": ["기해박해", "신해박해", "신유박해", "병인박해"], "answer": 3, "explanation": "신유박해는 1801년 순조 1년에 있었던 천주교인들 박해로 청나라 신부 주문모도 처형되었다."}, {"id": "교회사-0661", "subject": "교회사", "section": "한국교회사", "qnum": 90, "stem": "3.1 운동 이후 일제가 기독교인들에 대한 보복으로 성도들을 예배당에 가두고 불을 질러 모두 죽 게 한 사건은 어느 교회에서 일어났는가?", "choices": ["제물포교회", "용암리교회", "제암리교회", "소래교회"], "answer": 3, "explanation": "1919년 4월 5일에 있었던 제암리교회 학살사건으로 30여 명의 목숨을 잃었다."}, {"id": "교회사-0662", "subject": "교회사", "section": "한국교회사", "qnum": 91, "stem": "다음 중 1903년 원산에서 있었던 대부흥운동에 관한 설명 중 틀린 것은?", "choices": ["성경, 복음, 기도에 대한 열정이 바탕에 있었다.", "화이트(M. C. White)와 맥컬리(L. H. McCully)라고 하는 두 여선교사의 기도가 있었다.", "연합 성경공부 및 기도회 에서 선교사 하디가 먼저 은혜를 받은 후 성령의 역사가 일어났다.", "당시 하다는 목회에 있어 이미 상당한 만큼의 열매를 거두고 있었으나, 이 운동을 계기로 열매 는 기하급수적으로 늘어나게 되었다."], "answer": 4, "explanation": "당시 하다는 목회에 있어 많은 열매를 거두지 못했던 암담한 상황에 있었다."}, {"id": "교회사-0663", "subject": "교회사", "section": "한국교회사", "qnum": 92, "stem": "1907년 최초로 독노회가 조직되고 노회가 열렸을 때 목사장립을 받은 사람으로 보성학교를 세웠 으며 또 3.1운동에 참여하였던 이는 누구인가?", "choices": ["한석진", "서경조", "양전백", "송인서"], "answer": 3, "explanation": "양전백은 평북 선천 출신으로 민족대표 33인의 한 사람이기도 하다."}, {"id": "교회사-0664", "subject": "교회사", "section": "한국교회사", "qnum": 93, "stem": "최초로 번역한 성경의 이름과 번역자와 연도가 바르게 연결된 것은?", "choices": ["마가복음 - 언더우드 - 1885", "누가복음- 존 로스 - 1882", "마가복음 - 귀츨라프 - 1832", "요한복음 - 아펜젤러 - 1885"], "answer": 2, "explanation": "존 로스는 1882년에 누가복음과 함께 요한복음도 번역하여 반포하였다."}, {"id": "교회사-0665", "subject": "교회사", "section": "한국교회사", "qnum": 94, "stem": "우리나라에서 베푼 국내 최초의 세계자와 유아세례자는 누구인가?", "choices": ["최명호 - 김창식", "노춘경 - 최명호", "노춘경 - 서병호", "노춘경 - 서경조"], "answer": 3, "explanation": "노춘경은 일명 노도사로서, 알렌을 필두로 여러 선교사의 어학선생을 거치면서 기독교를 접하게 되었다."}, {"id": "교회사-0666", "subject": "교회사", "section": "한국교회사", "qnum": 95, "stem": "이 사람은 성경번역이 그에게 맡겨진 시대적 사명이라 확신하고 마가복음 번역(1883년), 신약 마 가전 복음서 언해(1884년)를 완성하였는데 1885년 4월 5일 제물포 항을 통해 입국한 언더우드와 아펜젤러가 이 사람이 번역한 성경을 가지고 들어왔다. 그는 누구인가?", "choices": ["이용찬", "이수정", "서상륜", "이성하"], "answer": 2, "explanation": "이수정은 1882년 수신사 수행원 자격으로 일본에 갔다가 기독교를 접하고 이듬해 세례를 받았다. 한반도에 선교사를 파송해 줄 것을 미국교회에 요청하는 편지를 보냄으로 조선의 마게도냐인으로 불린다."}, {"id": "교회사-0667", "subject": "교회사", "section": "한국교회사", "qnum": 96, "stem": "1909년 여름 개성의 남감리교 선교사들의 간절한 기도운동, 거의 같은 시기 평양 장대현교회에서 시작된 길선주 목사의 새벽기도 운동, 그리고 같은 해 9월 한국에 입국한 일단의 해외 유명 부흥 사들의 순회전도 집회를 통해 이 운동이 발흥되었다. 이 운동은 무엇인가?", "choices": ["원산 부흥운동", "백만인 구령운동", "평양대부흥운동", "목포부흥운동", "2"], "answer": 2, "explanation": "비록 목표인 100만 명을 구원하지는 못하였지만 전국에 부흥의 불길이 다시 타오르는 계기가 되었다."}, {"id": "교회사-0668", "subject": "교회사", "section": "한국교회사", "qnum": 97, "stem": "평양대부홍운동이 1907년 1월 평양 장대현교회당에서 시작되어 놀라운 역사가 나타났는데 한 달 이 지난 그해 2월에 길선주를 통하여 서울 장로 연합사경회에서도 같은 역사가 나타났다. 그 장 소는 어디인가?", "choices": ["승동교회", "새문안교회", "동대문교회", "남대문교회"], "answer": 2, "explanation": "길선주 목사의 설교를 통하여 교회지도자들과 성도들이 회개하는 역사가 일어났다. 당시 그는 황해도의 김익두(숲), 의주의 이기선(주보)과 함께 3대 권능(fE) 목사'로 불렸다"}, {"id": "교회사-0669", "subject": "교회사", "section": "한국교회사", "qnum": 98, "stem": "복음전도와 민족운동이라는 두 가지를 상생개념으로 삼고 신민회를 창설하고 이후에 흥사단을 이 끈 사람은?", "choices": ["조만식", "안창호", "이상재", "서재필"], "answer": 2, "explanation": "1911년 안창호가 미국으로 망명한 후에 일제에 의해서 조작된 '105인 사건'으로 신민회가 해체되었다. 그러나 1913년 5월 샌 프란시스코에서 흥사단을 창설하여 본국에서 이루지 못한 대성학교• 신민회 청년학우회의 뜻을 실현하기 위하여 노력하였다"}, {"id": "교회사-0670", "subject": "교회사", "section": "한국교회사", "qnum": 99, "stem": "1907년 평양대부흥운동의 설명이다. 잘못된 것은? @ 남녀노소, 유무식자, 선교사, 국내교역자, 신구신자를 막론하고 성령의 감화를 받았다.", "choices": ["남녀노소, 유무식자, 선교사, 국내교역자, 신구신자를 막론하고 성령의 감화를 받았다.", "집회에 참석한 모든 이가 자신의 죄와 과실을 공개적으로 고백했다.", "학교는 2주간 휴학하고 일반 사무 중지, 상가까지 철수하고 오직 기도에만 힘썼다.", "이 운동은 만주, 봉천 등의 중국 교회에까지 영향을 미쳤고, 세계 교계에도 적지 않은 충격을 주어 주목을 받게 되었다."], "answer": 1, "explanation": "집회에 참석한 모든 이가 자신의 죄를 공개적으로 고백한 것은 아니다."}, {"id": "교회사-0671", "subject": "교회사", "section": "한국교회사", "qnum": 100, "stem": "마펫(마포삼열) 선교사와 거리가 먼 것은?", "choices": ["평양신학교 초대교장", "평양지역 선교의 아버지", "장대현교회 1대 담임목사", "대한예수교장로회 초대 총회장"], "answer": 4, "explanation": "초대 총회장은 언더우드."}, {"id": "교회사-0672", "subject": "교회사", "section": "한국교회사", "qnum": 101, "stem": "한국교회 초기에 성경은 이들에 의해서 널리 보급되기 시작하였다. 이들은 성경 외에도 찬송가, 교리문답서, 선교달력을 '복음궤짝'이라는 상자에 넣어서 짊어지고 학교, 서당, 공동작업장, 잔칫 집, 장터를 돌아다니면서 팔았다. 이런 수단을 통하여 식자층이나 부유층보다는 복음에 목말라있 던 가난한 민중들 가운데 복음이 널리 전해졌다. 이들을 부르는 호칭은 무엇이었는가?", "choices": ["조사", "성경 교사", "권서인(매서인)", "성경 인쇄인"], "answer": 3, "explanation": "의주 지방 출신의 권서인 백홍준(B*/*)은 무보수로 한문서적과 한글 복음서를 배포시켰다. 또 서상륜(1차)은 1882년 10월 6일 한국 최초로 영국성서공회로부터 권서인으로 파송받았다."}, {"id": "교회사-0673", "subject": "교회사", "section": "한국교회사", "qnum": 102, "stem": "만주지역에서 사역한 캐나다 선교사로 평양 부흥을 목격한 후 \"성령의 불길이 한국을 휩쓸었을 때라는 책으로 1907년 평양 대부흥에 관한 기록을 남긴 사람은?", "choices": ["조나단 고포드", "사무엘 모펫", "제임스 게일", "토마스 하디"], "answer": 1, "explanation": "평양대부흥을 목격한 고포드는 중국으로 돌아가 만주대부흥(Manchurian revival)의 주역이 되었다. 고포드와 그의 동역자들은 중국교회의 부흥을 위해 매일 오후 4시에 기도했다."}, {"id": "교회사-0674", "subject": "교회사", "section": "한국교회사", "qnum": 103, "stem": "다음은 교육선교를 한 선교사들과 그들의 활동이 바르게 연결되지 않은 것은?", "choices": ["언더우드 - 연희전문학교", "아펜젤러 - 배재학당", "스크랜턴 - 이화학당", "맥켄지 - 경신학교"], "answer": 4, "explanation": "경신학교는 언더우드에 의하여 세워졌다."}, {"id": "교회사-0675", "subject": "교회사", "section": "한국교회사", "qnum": 104, "stem": "다음 중 초기 한국교회에 유입되었던 자유주의 사상과 그 주동자의 연결이 올바른 것은? 창세기 모세 저작권에 대한 의심- 김영주 여성의 가르침 허용 - 김춘배", "choices": ["창세기 모세 저작권에 대한 의심- 김영주", "여성의 가르침 허용 - 김춘배", "아빙돈단권주석 - 정경옥", "적극적 신앙단 - 김홍우"], "answer": 2, "explanation": "아빙돈단권주석은 감리교 유형기 목사의 주도하에 발간되었다."}, {"id": "교회사-0676", "subject": "교회사", "section": "한국교회사", "qnum": 105, "stem": "한국 장로교회의 분열과 합동에 대한 연결이 잘못된 것은?", "choices": ["1940년 4월 19일 승동교회 지하에서 설립된 조선신학교는 보수교단의 정체성을 확립하는 데 중요한 기여를 했다.", "1952년 한국장로교회에서 고려파가 분열해 나갔다.", "1953년 김재준이 대표하는 조선신학교의 신학문제로 시작된 갈등으로 기장 측이 분열해 나갔다.", "1959년에는 WCC 참여를 둘러싼 논쟁으로 인해 승동 측과 연동 측 사이에 총회가 분열되어 통합과 합동으로 분리되었다."], "answer": 1, "explanation": "1947년 4월 조선신학교의 학생 51명이 자유주의 신학 교육에 문제를 제기하는 사건이 벌어졌다."}, {"id": "교회사-0677", "subject": "교회사", "section": "한국교회사", "qnum": 106, "stem": "한국 장로교의 분열에 대한 역사적 사실 중 그 내용이 맞지 않는 것은? 1953년 제38회 총회에서 김재준을 신학문제로 제명, 기독교장로회 분열 1959년 제44회 총회에서 합동(승동 측)과 통합(연희 측) 분열", "choices": ["1953년 제38회 총회에서 김재준을 신학문제로 제명, 기독교장로회 분열", "1959년 제44회 총회에서 합동(승동 측)과 통합(연희 측) 분열", "1979년 제64회 총회에서 합동과 합동보수 측 분열", "1981년 제66회 총회에서 합동과 대신 측 분열"], "answer": 4, "explanation": "1981년 66회 총회에서 합동과 합동 개혁파의 분열이 있었다."}, {"id": "교회사-0678", "subject": "교회사", "section": "한국교회사", "qnum": 107, "stem": "한국교회가 한국 사회에 끼친 영향과 관계가 없는 것은?", "choices": ["의료사업", "문화사업", "교육사업", "국가정치"], "answer": 4, "explanation": "한국교회가 한국사회에 미친 영향은 의료, 문화, 교육사업이다."}, {"id": "교회사-0679", "subject": "교회사", "section": "한국교회사", "qnum": 108, "stem": "한국 최초로 서울과 원산에 세워진 교회와 설립자가 바르게 연결된 것은? 서 서울- 새문안교회 - 언더우드 / 원산- 명석동교회 - 소안론 2", "choices": ["서울- 새문안교회 - 언더우드 / 원산- 명석동교회 - 소안론", "서울- 새문안교회- 베어드 / 원산- 구암교회 - 소안론", "서울-새문안교회 배위량/ 원산- 서문교회 - 소안론", "서울- 새문안교회- 맥켄지/ 원산- 소래교회 - 소안론"], "answer": 1, "explanation": "서울 새문안교회는 1885년 언더우스에 의해 원산 명석동교회는 1893년 소안론에 의해 시작되었다."}, {"id": "교회사-0680", "subject": "교회사", "section": "한국교회사", "qnum": 109, "stem": "한국교회사에 등장하는 최초의 일들과 그 이름을 연결한 것이다. 잘못된 것은? 성가대 - 평양 장대현교회 ② 한국인 선교사- 이기풍", "choices": ["성가대 - 평양 장대현교회", "한국인 선교사- 이기풍", "근대식 병원 - 광혜원", "주기도문 번역 - 알렌"], "answer": 4, "explanation": "주기도문을 번역한 사람은 카를 귀츨라프 선교사이다."}, {"id": "교회사-0681", "subject": "교회사", "section": "한국교회사", "qnum": 110, "stem": "1981년 제66회 총회에서 장로교 합동과 함동개혁파의 분열이 일어났다. 합동과 개혁파의 합동 은 몇 년도 몇 회 총회에서 이루어졌는가? 2005년, 제90회 총회 ② 2004년, 제89회 총회", "choices": ["2005년, 제90회 총회", "2004년, 제89회 총회", "2003년, 제88회 총회", "2002년, 제87회 총회"], "answer": 1, "explanation": "2005년 9월 27일 대전중앙교회(최병남 목사}에서 열린 제90회 총회에서 역사적인 합동예배가 드려졌다. 개혁총회 총대 461명 이 입장하자 합동총회 총대 976명은 기립박수로 이들을 맞이했다. 총 1.437명의 총대들이 모여 합동예배를 드렸다."}, {"id": "교회사-0682", "subject": "교회사", "section": "한국교회사", "qnum": 111, "stem": "한국기독교장로회 측이 분리되어 나간 것은 김재준의 신학문제가 요인이었다. 몇 회 총회에서 일어난 사건인가?", "choices": ["제34회 총회", "제35회 총회", "제38회 총회", "제39회 총회"], "answer": 3, "explanation": "1953년 제38회 총회에서 제36, 37회 총회 결의의 정당성을 재확인하고, 김재준 목사 파면을 결의하였다. 이에 대해서 조선신 학교 측은 1953년 6월 10일 조선신학교에서 법통 38회 총회를 개최하여 교단은 완전히 분열되었다. 1954년 6월 교단 명칭을 대한기독교장로회로 명명하였다."}, {"id": "교회사-0683", "subject": "교회사", "section": "한국교회사", "qnum": 112, "stem": "1938년 제27회 총회에서 신사참배는 종교가 아니라 국민의식이라 하여 반대를 무릅쓰고 가결하 였다. 이 결의를 취소한 총회와 그 연도는 언제인가? 제39회 총회, 1954년 ② 제44회 총회, 1959년", "choices": ["제39회 총회, 1954년", "제44회 총회, 1959년", "제47회 총회, 1962년", "제64회 총회, 1979년"], "answer": 1, "explanation": "1954년 제39회 총회에서 남북한 노회의 대표들이 참석한 가운데 안건(권연호 목사 제안)으로 받아, 신사참배 결의가 불법인 것 으로 취소하는 정식 결의를 한다. 당시 총회 기간 중 회개의 성찬과 3시간 특별기도회를 열고, 6월 한 주일 전국교회가 회개하 는 의미로 연보하여 신사참배를 거부한 순교자들의 가족을 위로하는 일을 실시하였다."}, {"id": "교회사-0684", "subject": "교회사", "section": "한국교회사", "qnum": 113, "stem": "한국 초기 선교사들의 신앙은 보수적이며 철저한 청교도적 신앙이었다. 다음 중 청교도적 신앙 의 특징이 아닌 것은? 의식의 권위를 강조한다. ② 성경적 신학을 견지한다.", "choices": ["의식의 권위를 강조한다.", "성경적 신학을 견지한다.", "복음 전파에 주력한다.", "주일 성수를 강조한다."], "answer": 4, "explanation": "말씀, 성경의 권위를 강조한다."}, {"id": "교회사-0685", "subject": "교회사", "section": "한국교회사", "qnum": 114, "stem": "한국교회에 전파된 청교도 신학의 특징과 거리가 있는 것은?", "choices": ["성경의 권위를 강조하였다.", "보수주의적 성향이 강했다.", "주일을 성수하고 복음전파에 힘썼다.", "관혼상제를 개혁하고 여권신장에 힘썼다."], "answer": 4, "explanation": "보수주의적 청교도신학의 주된 관심은 관혼상제 개혁과 거리가 멀었다."}, {"id": "교회사-0686", "subject": "교회사", "section": "한국교회사", "qnum": 115, "stem": "다음은 누구를 설명하는 말인가? 가. 협성신학교를 졸업한 후 1928년에 목사 안수. 신비주의적 체험을 말씀보다 강조함. 나. 지지기반을 하층민으로 하였으며 집에 장애인 신학생 20명을 데려다 공부시켰다. 다. 병으로 33세의 이른 나이에 사망하였다. 라. 원산의 접신파 한준명을 옹호하다가 이단으로 정죄되었다.", "choices": ["이용도", "이유성", "김교신", "황국주"], "answer": 1, "explanation": "그의 신비주의적 신앙은 기존교회의 의심을 받기 시작하여 1931년 10월 장로교의 황해노회가 그에게 금족령을 시달하였으며, 1932년 4월에는 평양노회가 평양기도단에 제한을 가하여 그를 규제하였다. 같은 해 11월에는 그가 속해 있던 감리교 경성지방 회에 평양노회의 이단문의가 제기되어 중부연회는 1933년 3월 휴직처분을 결정하였다."}, {"id": "교회사-0687", "subject": "교회사", "section": "한국교회사", "qnum": 116, "stem": "우찌무라 간조 아래서 함석헌과 함께 배우고 최태용과 함께 무교회주의 운동을 시작한 사람은 누구인가?", "choices": ["양도천", "김교신", "김장호", "박태선"], "answer": 2, "explanation": "일본 유학 당시 일본의 군국주의에 반대하고 일본기독교의 자주성을 주장하면서, 무교회운동을 전개하던 우찌무라 간조의 사상 에 깊은 영향을 받았다."}, {"id": "교회사-0688", "subject": "교회사", "section": "한국교회사", "qnum": 117, "stem": "각 지역에 최초로 세워진 교회, 연도와 설립자가 바르게 연결되지 않은 것은? 황해도-소래교회-1883-최의덕", "choices": ["황해도-소래교회-1883-최의덕", "평양-장대현교회-1893-모펫", "부산-초량교회-1893-배위량", "서울 새문안교회-1887-언더우드"], "answer": 1, "explanation": "평안도 의주 출신의 서상륜은 인삼장사로 만주를 오고 갔는데, 영국 개신교 선교사 존 로스 목사를 만나 기독교를 받아들이고 성경번역을 도왔다. 그의 동생 서경조와 서상은 황해도 장연구 대구면 송천리 소래마을의 한 초가집에서 1883년 5월 16일 한국교회사 처음으로 한국인이 스스로 개신교 교회를 세웠다."}, {"id": "교회사-0689", "subject": "교회사", "section": "한국교회사", "qnum": 118, "stem": "1965년 12월 3일에 \"삼천만을 그리스도에게로\"라는 표어 아래 전도훈련, 부흥집회, 전도집회와 노방전도 등을 시작하고 빌리 그래함 목사를 한국으로 초청하기 위한 전국복음화운동위원회를 발족했다. 다음 중 이 위원회의 주축 인물이 아닌 사람은?", "choices": ["김활란", "김의환", "한경직", "홍현설"], "answer": 3, "explanation": "김의환은 엑스플로 74 준비 과정에 참여했던 인물이다."}, {"id": "교회사-0690", "subject": "교회사", "section": "한국교회사", "qnum": 119, "stem": "다음은 한국의 이단들과 그 특징을 열거한 것이다. 바르게 연결된 것은? 박태선 - 피가름의 혼음교리를 주장하며 스스로를 동방의 의인이라고 칭했다. 문선명 - 원리강론이 신구약을 완성한 '성약 이라고 주장하며, 신앙촌을 건립했다.", "choices": ["박태선 - 피가름의 혼음교리를 주장하며 스스로를 동방의 의인이라고 칭했다.", "문선명 - 원리강론이 신구약을 완성한 '성약 이라고 주장하며, 신앙촌을 건립했다.", "나운몽 - 동양적 특수 신령신학을 제창하면서 자신을 '감람나무'라 주장했다.", "유동식 - 불트만의 비신화화 사상을 적용하여, \"환인, 환웅, 환검은 하나님이다\"라고 주장했다."], "answer": 1, "explanation": "신앙촌- 박태선, '감람나무'라 주장 - 박태선, \"환인, 환웅, 환검은 하나님이다\" - 윤성범"}, {"id": "교회사-0691", "subject": "교회사", "section": "한국교회사", "qnum": 120, "stem": "대한예수교장로회 총회가 31회와 32회 사이 3년 동안 총회를 개회하지 못하였다. 왜 3년 동안 총회가 열리지 못했는가? ® 일제의 심한 핍박 때문에 열리지 못했다. 교단 분열의 아픔 때문에 마음이 하나가 되지 못했기 때문이다.", "choices": ["일제의 심한 핍박 때문에 열리지 못했다.", "교단 분열의 아픔 때문에 마음이 하나가 되지 못했기 때문이다.", "105인 사건의 후유증이 교회에 남아 있어서 총회를 열지 못했다.", "3년간은 전시 관계로 총회를 열지 못하였다."], "answer": 4, "explanation": "31회는 1942년 평양 서문박교회에서, 32회는 1946년 서울 승동교회에서 열렸다."}, {"id": "교회사-0692", "subject": "교회사", "section": "한국교회사", "qnum": 1, "stem": "다음 중 오늘날 이탈리아 지역에서 발생한 사건을 시대 순서대로 바르게 연결한 것은? 가. 가리발디가 이탈리아의 통일을 위해 비토리아 임마누엘 2세에게 정복한 땅을 바쳤다. 나. 콘스탄티누스가 밀비안 다리 전투에서 막센티우스를 격파했다. 다. 동고트 왕 데오도릭이 황제 제논의 지원하에 오도아케르를 물리쳤다. 라. 교황 요한 23세가 공의회를 소집했다. 마. 교황 율리우스 2세가 라파엘로에게 \"아테네 학당\"을 그리게 했다.", "choices": ["나-라-다-라-가", "나-다-마-가- 라", "③라-나-다-마 -가", "라- 다- 나- 마- 가"], "answer": 2, "explanation": "가리발디는 1861년 자신이 석권한 지역을 이탈리아의 통일을 위해 비토리아 임마누엘 2세에게 헌납했다. 콘스탄티누스는 321 년 밀비안 전투에서 막센티우스를 격파하고 서로마의 황제권을 쟁취했다. 동고트 왕 데오도릭은 493년 라벤나를 점령하고 오도 아케르를 물리쳤다. 교황 요한 23세는 1962년 제2차 바티칸 공의회를 개최하여 첫 회기를 진행했다. 교황 율리우스 2세는 라 파엘로에게 바티칸 사도 궁전 내부에 \"아테네 학당'을 그리게 했고 이 그림은 1510년 완성되었다."}, {"id": "교회사-0693", "subject": "교회사", "section": "한국교회사", "qnum": 2, "stem": "다음 중 오늘날 영국 지역에서 발생한 역사적 사건을 시대 순서대로 바르게 연결한 것은? 가. 이 지역 출신인 펠라기우스가 원죄의 유전을 부정하여 신학적 논쟁을 일으켰다. 나. 프로슬로기온을 저술한 안셀름이 캔터베리 대주교에 취임했다. 다. 위클리프가 성경의 권위를 강조하며 비가시적 교회의 중요성을 주장했다. 라. 여왕이 통일령을 발표해 공동기도서의 사용을 명령했다. 마. 올리버 크롬웰이 왕당파를 제거하고 공화제를 수립했다. ①가-나-라-다-마 ②나-가-다-마- 라 3가 -나-다-라-마 ④ 나- 가- 라- 다- 마", "choices": ["가-나-라-다-마", "나-가-다-마- 라", "가 -나-다-라-마", "나- 가- 라- 다- 마"], "answer": 3, "explanation": "오늘날 영국인 브리타니아 출신 수도사였던 펠라기우스는 400년 전후 브리타니아 선교에 헌신했으며 이후 로마 제국 여러 지역 을 순회하면서 자신의 사상을 주장했으나 어거스틴을 비롯한 여러 신학자들과 감독들의 거센 비판을 받았다. 안셀름은 전임 란 플랑크의 뒤를 이어 1093년부터 1109년까지 잉글랜드에서 캔터베리 대주교를 지냈다. 14세기 후반 활동한 옥스포드 대학의 신학자 존 위클리프는 1378년 \"교회에 관하여\"(De Ecclesiae)를 발표하여 비가시적 교회의 중요성을 역설했다. 잉글랜드 튜더 왕조의 여왕 엘리자베스 1세는 왕으로 즉위한 직후인 1559년 통일령을 명령하여 영국교회의 예배의식을 국교회의 방식으로 통 일하려 했다. 올리버 크롬엘은 1649년 찰스 1세를 처형하고 \"호국경\"에 취임하여 청교도적 도덕성에 기초한 공화제를 시작했다."}, {"id": "교회사-0694", "subject": "교회사", "section": "한국교회사", "qnum": 3, "stem": "다음 중 오늘날 독일에서 발생한 역사적 사건을 시대 순서대로 바르게 연결한 것은? 가. 오토 1세가 신성로마제국 황제로 즉위했다. 나. 토마스 아퀴나스가 쾰른 대학에서 신학을 공부했다. 다. 바르멘 선언이 발표되었다. 라. 프로이센의 재상 비스마르크가 문화투쟁을 통해 독일의 통일을 주도했다. 마. 율법의 유효성을 둘러싼 아그리콜라와 멜란히톤의 신학적 논쟁이 벌어졌다. ①나-가-다-마-라 ②가 -나-라-마-다", "choices": ["나-가-다-마-라", "가 -나-라-마-다", "나-가-마-다-라", "가-나-마-라-다"], "answer": 4, "explanation": "936년 즉위한 동프랑크 왕국의 오토 1세는 로마 교황의 인정을 받아 962년 신성로마제국의 황제로 즉위했다. 토마스 아퀴나스 는 1248년경 쾰른 대학교에서 알베르투스 마그누스로부터 신학 지도를 받았다. 독일 고백교회의 지도자들은 1934년 히틀러의 전체주의 통치에 반대해 \"바르멘 선언\"을 발표했다. 비스마르크는 1862년 프로이센 수상에 임명되어 독일 통일을 위해 독일 남 부의 로마 가톨릭 세력을 억압하는 문화투쟁을 전개했다. 독일 루터파 내에서 아그리콜라와 멜란히톤 사이에 발생한 율법폐기론 관련 논쟁은 16세기의 사건이다."}, {"id": "교회사-0695", "subject": "교회사", "section": "한국교회사", "qnum": 4, "stem": "다음 중 프랑스 지역에서 발생한 역사적 사건을 시대 순서대로 바르게 연결한 것은? 가. 국민공회의 공포정치 하에서 기존의 12개월 달력이 폐지되고 혁명력이 도입되었다. 나. 프랑스 최초의 개혁교회 총회가 소집되었다. 다. 파리 대학 총장 니콜라스 콥의 연설문으로 인한 개신교 박해가 시작되었다. 라. 프랑스 왕 필립 4세가 교황 클레멘트 5세를 아비뇽으로 이주시켰다. 마. 아키텐의 기욤 1세가 수도사 베르노를 초청해 클루니 수도원을 창설했다.", "choices": ["마-라-다-나-가", "라-마-다-나-가", "라 -마-다-가 -나", "마-라-나-다-가"], "answer": 1, "explanation": "1789년 일어난 프랑스 대혁명 과정에서 국민공회는 단원제 입법기관으로서 1792년부터 1795년까지 혁명 정부를 이끌면서 극 단적인 공포정치를 시행했다. 종교개혁 시기 프랑스 전역으로 확산한 개혁교회의 첫 총회가 1559년 5월 파리에서 개최되었다. 파리 대학 총장으로 취임한 니콜라스 콥은 1533년 11월 1일 마튀렝 교회에서 전한 취임 연설에서 종교개혁 신학을 천명했고 그 결과 콥과 그의 동료들이 당국의 수배를 받았다. 중세 시대 교회의 영적 권세와 세속 권세의 갈등 가운데 프랑스 왕 필립 4 세가 정치적 수완을 발휘해 클레멘트 5세를 교황으로 선출하고 1309년 프랑스 남부의 도시 아비뇽으로 이주시킴으로써 70년간 계속된 아비뇽 유수가 시작되었다. 프랑스 서남부 지역인 아키텐의 영주 기욤 1세의 초청을 받아 수도사 베르노가 클루니 수도 원을 창립한 것은 주후 910년이었다."}, {"id": "교회사-0696", "subject": "교회사", "section": "한국교회사", "qnum": 5, "stem": "다음 중 서구 역사에 나타난 중요한 사조와 그 대표자들을 바르게 연결한 것은?", "choices": ["스토아주의 - 아벨라르두스", "스콜라주의 - 포르피리우스", "경험주의 - 파스칼", "계몽주의 - 몽테스키외"], "answer": 4, "explanation": "아벨라르두스는 12세기 스콜라주의 신학자이며 포르피리우스는 3세기 신플라톤주의 사상가이다. 파스칼은 17세기 안센주의적 입장에서 예수회의 사변적 신학에 반대했다. 프랑스의 몽테스키외는 1750년 \"법의 정신을 발표해 삼권의 분립을 주장한 계몽 주의 사상가이다."}, {"id": "교회사-0697", "subject": "교회사", "section": "한국교회사", "qnum": 6, "stem": "다음 중 각 시대에 등장한 역사적으로 중요한 조약들과 그 내용을 잘못 연결한 것은? 베르됭 조약(843)- 프랑크 왕국의 3분할 확정", "choices": ["베르됭 조약(843)- 프랑크 왕국의 3분할 확정", "아우크스부르크 평화조약(1555) - 프랑스에서 발생한 위그노 전쟁의 종식", "베스트팔렌 조약(1648)- 독일에서 발생한 30년 전쟁의 종식", "베르사이유 조약(1919)- 1차 세계대전의 종식"], "answer": 2, "explanation": "1555년 체결된 아우크스부르크 평화조약은 독일에서 발생한 종교전쟁을 종식하기 위해 루터파 영주들과 황제를 비롯한 로마 가 톨릭 영주들 사이에 체결된 강화조약이다."}, {"id": "교회사-0698", "subject": "교회사", "section": "한국교회사", "qnum": 7, "stem": "다음 중 각 시대에 나타난 중요한 전쟁과 시작된 시대를 바르게 연결한 것은?", "choices": ["십자군 전쟁 - 13세기", "백년 전쟁 - 14세기", "보불 전쟁 - 18세기", "러일 전쟁 - 19세기"], "answer": 2, "explanation": "십자군 전쟁은 1095년 출정한 첫 원정으로 시작되었다. 보불 전쟁은 비스마르크가 독일 통일을 위해 프랑스를 상대로 벌인 전 쟁으로서 1870년 시작되었다. 21일 전쟁은 일본과 러시아 사이에 벌어진 제국주의 전쟁으로서 1904년 2월 한반도에서 발발했 다. 영국과 프랑스의 왕가들 사이에 벌어진 백년 전쟁은 1337년에 시작되었다."}, {"id": "교회사-0699", "subject": "교회사", "section": "한국교회사", "qnum": 8, "stem": "다음 중 각 시대와 그 시대를 대표하는 라틴어 명칭이나 구호를 바르게 연결한 것은?", "choices": ["로마제국 전성기 - ad fontes", "중세 교황 전성기 - Pax Romana", "르네상스 인문주의 - Sola Scritura", "종교개혁 시대 - cuius regio eius religio"], "answer": 4, "explanation": "\"ad fontes\"(근원으로)는 서구 문화의 근원을 회복하려 했던 르네상스 인문주의의 대표적 구호이다. Pax Romana\"(로마의 평 화)는 1세기 초 아우구스투스 황제 시대 이루어진 로마의 정치적 안정기를 일컫는 명칭이다. \"Sola Scriptura\"(오직 성경으로) 는 16세기 종교개혁 시대의 대표적인 구호이다. \"cuius regio eius reigio\"는 \"통치자의 종교가 곧 그 지역의 종교\"라는 뜻으 로 16세기 종교개혁 시대에 독일의 제후들의 정치적 타협의 결정을 대변하는 문구이다."}, {"id": "교회사-0700", "subject": "교회사", "section": "한국교회사", "qnum": 9, "stem": "다음 중 서양의 주요 군주들과 그들의 치적을 잘못 연결한 것은?", "choices": ["유스티니아누스 황제(재위 527-565)- 로마 제국의 기존 영토를 수복하고 법률 체계를 정비했다.", "샤를마뉴 대제(재위 800-814)- 로마 제국의 황제로 즉위하여 카롤링거 르네상스를 일으켰다.", "루이 14세(재위 1643-1715) - 절대왕정 하에서 퐁텐블로 칙령을 발표해 위그노들에게 예배의 자유를 허락했다.", "빌헬름 1세(재위 1861-1888)- 수상 비스마르크에 의해 독일이 통일되어 황제로 즉위했다."], "answer": 3, "explanation": "프랑스 부르봉 왕조의 루이 14세는 무려 70여 년간 통치하면서 절대왕정을 구축했고 그 과정에서 개신교의 예배의 자유를 박탈 하는 등 위그노들을 박해했다."}, {"id": "교회사-0701", "subject": "교회사", "section": "한국교회사", "qnum": 10, "stem": "다음 중 각 시대의 전환기에 발생한 중요한 사건들을 연결한 것으로 가장 부적합한 것은?", "choices": ["5세기 초대교회 시대에서 중세교회 시대로 전환기 - 서로마 제국의 멸망", "16세기 중세교회 시대에서 종교개혁 시대로 전환기- 교황청의 아비뇽 유수와 대분열", "18세기 정통주의 시대에서 근대교회 시대로 전환기 - 계몽주의 사상과 프랑스 대혁명", "20세기 근대 시대에서 탈근대 시대로의 전환기 - 두 차례의 세계대전"], "answer": 2, "explanation": "교황청의 아비뇽 유수(1309-1378)와 대분열(1379-1417)은 14세기에 시작되어 15세기 초에 종결되었다. 종교개혁은 100년 후인 16세기 초에 발생했고 당시 교황은 공의회주의를 누르고 서유럽 내에서 독점적 위상을 회복해 있었다. 따라서 다른 전환 기의 사건들과 비교할 때 교황청의 혼란은 종교개혁이 일어나는 한 원인이기는 했지만 직접적인 원인이라고 볼 수는 없다. • 시대종합 주요 교회사 사건"}, {"id": "교회사-0702", "subject": "교회사", "section": "한국교회사", "qnum": 11, "stem": "다음 중 오늘날 미국 지역에서 발생한 중요한 교회사적 사건을 시대순으로 바르게 연결한 것은? 가. 무디와 생키가 대중 집회를 통해 부흥운동을 이끌었다. 나. 조지 필드가 방문하여 순회 설교를 진행했다. 다. 메이플라워호가 플리머스 항에 도착했다. 라. 알렉산더 휘태커 목사가 버지니아 제임스 강가에서 목회를 시작했다. 마. 드와이트가 주도한 예일 대학의 부흥운동이 일어났다.", "choices": ["다-라-나-마-가", "다-라-나-가 -마", "라-다-나-마-가", "라-다-나-가 -마"], "answer": 3, "explanation": "무디와 생키가 주도한 제3차 대각성운동은 미국의 남북전쟁 시기인 1850년대에 시작되었다. 조지 필드는 1739년부터 1740 년까지 북아메리카 동부 식민주들을 순회하며 설교했다. 메이플라워호는 1620년 매사추세츠 플리머스에 도착했다. 알렉산더 휘 태커는 1611년 신대륙 식민지 버지니아에 도착해 목회를 시작했다. 예일대학교 총장이었던 드와이트가 주도한 예일대학의 부흥 운동은 1780년대 일어났다."}, {"id": "교회사-0703", "subject": "교회사", "section": "한국교회사", "qnum": 12, "stem": "오늘날 스코틀랜드 지역에서 발생한 중요한 교회사적 사건을 시대 순서대로 바르게 연결한 것은? 가. 제1치리서가 제정되었다. 나. 콜룸바누스가 아이오나에 수도원을 설립했다. 다. 패트릭 해밀턴이 순교했다. 라. 국교회 정책에 맞서 국민언약이 체결되었다. 마. 잉글랜드 의회파와 엄숙동맹과 계약을 체결했다. ①나-다-가-마-라 ② 다-나-가-마-라", "choices": ["나-다-가-마-라", "다-나-가-마-라", "나-다-가-라-마", "다-나-가-라-마"], "answer": 3, "explanation": "\"제1치리서\"는 1560년 스코틀랜드의 종교개혁 중 제정되었다. 아일랜드의 수도사 콜룸바누스는 563년 아이오나 섬에 수도원을 창설하고 스코틀랜드 지역의 선교를 전개했다. 패트릭 해밀턴은 루터의 개혁사상을 설교하다가 1528년 스코틀랜드 세인트앤드 루스에서 이단 죄목으로 화형을 당했다. 스코틀랜드의 장로교인들은 찰스 1세가 강요한 국교회 정책에 저항하며 1638년 국민언 약을 체결했다. 잉글랜드의 왕당파와 의회파 사이에 전쟁이 발발하자 1643년 스코틀랜드의 장로교파가 잉글랜드 의회파와 연대 하여 \"엄숙동맹과 계약\"을 체결했다."}, {"id": "교회사-0704", "subject": "교회사", "section": "한국교회사", "qnum": 13, "stem": "다음 중 로마 가톨릭 교황들과 그들의 주요 활동이나 업적을 잘못 연결한 것은?", "choices": ["다마수스 1세 - 제롬에게 성경을 라틴어로 번역할 것을 지시했다.", "그레고리우스 7세 - 카노사에서 황제 하인리히 4세를 굴복시켰다.", "우르바누스 2세 - 성지 탈환을 위한 십자군 출병을 요청했다.", "피우스 9세 - 제2차 바티칸 공의회를 소집했다."], "answer": 4, "explanation": "교황 피우스 9세는 1869년 제1차 바티칸 공의회를 소집했다. 제2차 바티칸 공의회는 교황 요한 23세가 1962년 소집했다."}, {"id": "교회사-0705", "subject": "교회사", "section": "한국교회사", "qnum": 14, "stem": "다음 중 교회 역사상 중요한 사건과 그 결과를 가장 부적절하게 연결한 것은? 니케아 공의회(325)- 아리우스파를 정죄하고 삼위일체 정통 교리가 제시되었다.", "choices": ["니케아 공의회(325)- 아리우스파를 정죄하고 삼위일체 정통 교리가 제시되었다.", "제1차 취리히 논쟁(1523)- 최초의 개신교 도시국가가 선포되었다.", "도르트 회의(1618) - 아르미니우스주의가 거절되고 칼빈주의 예정론이 재확인되었다.", "에든버러 선교대회(1910)- 세계교회협의회(WCC)가 발족했다."], "answer": 4, "explanation": "1910년의 에든버러 선교대회는 개신교 선교를 종합하고 앞으로의 선교 방향을 전망한 최초의 국제 선교대회였다. 그러나 세계 교회협의회는 두 차례 세계대전 이후 국제적 협의 기구들이 통합되어 1948년 암스테르담에서 첫 총회를 열었다."}, {"id": "교회사-0706", "subject": "교회사", "section": "한국교회사", "qnum": 15, "stem": "다음과 같은 중요한 교회사적 사건들이 일어난 도시는? 가. 455년 교황 레오 1세가 반달족의 침입을 막아냈다. 나. 800년 프랑크 왕 샤를마뉴가 새로운 황제로 즉위했다. 다. 1215년 화체설이 공인되었다. 라. 1870년 교황무류설이 선포되었다.", "choices": ["밀라노", "로마", "아비뇽", "파리"], "answer": 2, "explanation": "로마와 로마 내에 위치한 바티칸은 초대교회로부터 교황의 중요한 정책과 활동이 이루어진 도시였다. 천주교를 \"로마 가톨릭\"이 라고 부르는 것은 이들이 보편교회의 수위권과 통치권이 로마라는 특정 도시의 주교에게 있다고 여전히 주장하기 때문이다."}, {"id": "교회사-0707", "subject": "교회사", "section": "한국교회사", "qnum": 16, "stem": "다음 중 기독교의 변화에 지대한 영향을 준 역사적 운동과 그 결과를 잘못 연결한 것은? 게르만 민족의 대이동 - 교회가 적극적으로 이민족 선교에 나섰다.", "choices": ["게르만 민족의 대이동 - 교회가 적극적으로 이민족 선교에 나섰다.", "프랑스 대혁명 - 전통적 기독교 신앙에 대한 비판과 회의가 크게 일어났다.", "산업혁명 - 유물론적 세계관이 확산되어 서구 사회에서 기독교가 크게 쇠퇴했다.", "3.1 운동 - 기독교가 제국주의에 반대하여 민족의 자주와 독립의 정신을 고취했다."], "answer": 3, "explanation": "18세기 중반부터 시작된 영국의 산업혁명으로 인해 나타난 경제 및 사회 구조의 큰 변화는 교회에게도 큰 도전이 되었다. 그러 나 산업혁명의 결과 교회가 크게 쇠퇴하지는 않았다. 도리어 산업혁명과 함께 진행된 영국의 식민지 확장에 의해 영국교회는 서 계선교를 더 활발하게 전개할 수 있었다. 또 영국 국내에서는 산업화로 인해 발생한 여러 가지 문제들을 대처하기 위한 복음주 의 운동이 다양하고 활발하게 나타났다. 웨슬리가 시작한 감리교 운동도 산업혁명 시대에 계속되었다."}, {"id": "교회사-0708", "subject": "교회사", "section": "한국교회사", "qnum": 17, "stem": "다음 중 교회 역사상 소집된 중요한 회의가 개최 순서대로 바르게 연결된 것은?", "choices": ["칼케돈 회의 - 마르부르크 회의 - 제1차 바티칸 회의 - 제4차 라테란 회의", "니케아 회의 - 트렌트 회의 - 마르부르크 회의 - 제2차 바티칸 회의", "칼케돈 회의 - 제4차 라테란 회의 - 트렌트 회의 - 제1차 바티칸 회의", "니케아 회의 - 트렌트 회의 - 제2차 바티칸 회의 - 바젤 회의"], "answer": 3, "explanation": "개최 연도순으로 정리하면 니케아 회의는 325년, 칼케돈 회의는 451년, 제4차 라테란 회의는 1215년, 바젤 회의는 1431년, 마르부르크 회의는 1529년, 트렌트 회의는 1545년, 제1차 바티칸 회의는 1869년에 개최되었다."}, {"id": "교회사-0709", "subject": "교회사", "section": "한국교회사", "qnum": 18, "stem": "다음 중 16세기 종교개혁 시대 이후 활동한 개혁파 신학자들을 활동 연대 순서대로 바르게 연결 한 것은?", "choices": ["존 칼빈- 프란치스쿠스 고마루스- 데오도르베자 - 사무엘 러더포드", "존 녹스 - 사무엘 러더포드 - 박형룡 - 헤르만 바빙크", "토마스 굿- 하인리히 불링거- 아브라함 카이퍼 - 벤자민 워필드", "존 오웬- 조나단 에드워즈- 찰스 핫지 - 그레샴 메이"], "answer": 4, "explanation": "각 개혁파 신학자의 생몰연도는 출생연도 순서대로 정리하면 다음과 같다. 하인리히 불링거(1504-1575), 존 칼빈(1509-1564). 존 녹스(1513-1572), 데오도르베자(1519-1605), 프란치스쿠스 고마루스(1563-1641), 사무엘 러더포드(1600-1661), 토마스 굿원(1600-1680), 존 오웬(1616-1683), 조나단 에드워즈(1703-1758), 찰스 핫자(1797-1878), 아브라함 카이퍼(1937-1920), 벤자민 워필드(1851-1921), 헤르만 바빙크(1854-1921), 그레샴 메이천(1881-1937), 박형룡(1897-1978)"}, {"id": "교회사-0710", "subject": "교회사", "section": "한국교회사", "qnum": 19, "stem": "각 시대의 전환기에 발생한 중요한 교회사적 사건들을 연결한 것 중 가장 부적합한 것은?", "choices": ["5세기 초대교회 시대에서 중세시대로의 전환- 교황청의 혼란과 수도원의 약화", "16세기 중세시대에서 종교개혁 시대로의 전환- 히브리어와 헬라어 원어 성경의 재발견", "18세기 정통주의 시대에서 근대 계몽주의 시대로의 전환-로마 가톨릭의 수구화와 자유주의 신학의 출현", "20세기 근대에서 탈근대 시대로의 전환 - 기독교의 세계화와 신학의 다변화"], "answer": 1, "explanation": "5세기 게르만 민족의 이동과 서로마 제국의 멸망으로 시작된 중세시대의 시작에서 로마 교황은 종교뿐 아니라 세속권력의 영역 에서도 더 큰 역할을 했다. 이 시기에는 수도원 운동이 체계적으로 발전하여 기독교의 문화와 전통을 보존하고 게르만족을 교화 하는 중심지 역할을 담당했다."}, {"id": "교회사-0711", "subject": "교회사", "section": "한국교회사", "qnum": 20, "stem": "다음 중 각 시대의 변화에 맞추어 로마 가톨릭이 보여준 모습에 대한 설명으로 타당하지 않은 것 은?", "choices": ["9세기 - 세속 권력과 연대하여 서유럽에서 새로운 주도권을 확보했다.", "14세기 - 교황청이 분열되어 공의회주의 운동이 일어났다.", "17세기 - 개신교에 맞선 신학적 변호와 더불어 타 문화권 선교에 나섰다.", "20세기 - 현대 사회에 적응하는 과정에서 교황의 수위권과 화체설을 타협했다."], "answer": 4, "explanation": "20세기의 새로운 변화에 맞추어 로마 가톨릭의 신학적 폭이 넓어지고 타종교 및 타문화를 대하는 태도가 유연해진 것이 사실이 다. 그러나 로마 가톨릭은 교황 수위권이나 화체설, 마리아 숭배사상 같은 그들의 핵심적 교리들을 결코 타협하지 않았다. • 시대종합 주요 기독교 문헌들"}, {"id": "교회사-0712", "subject": "교회사", "section": "한국교회사", "qnum": 21, "stem": "다음 중 교회사적으로 중요한 신학 작품의 저자와 저술 시기를 모두 바르게 연결한 것은?", "choices": ["그리스도를 본받아 - 슈페너 - 18세기", "성경의 명료성과 확실성 - 츠빙글리 16세기", "교회교의학 - 칼 바르트 - 19세기", "신앙감정론 - 토마스 아 켐피스 - 15세기"], "answer": 2, "explanation": "\"그리스도를 본받아\"는 15세기 \"근대적 경건\" 운동에 속했던 토마스 아 켐피스의 작품이다. \"교회교의학'은 바르트의 작품이며 20세기에 출판되었다. \"신앙감정론'은 조나단 에드워즈의 대표적인 작품으로서 18세기에 발표되었다. \"성경의 명료성과 확실성\" 은 16세기 종교개혁 시대 츠빙글리가 쓴 작품이다."}, {"id": "교회사-0713", "subject": "교회사", "section": "한국교회사", "qnum": 22, "stem": "다음 중 교회사에 나타난 중요한 저작들을 발표 순서대로 바르게 연결한 것은? 가. 아퀴나스의 \"신학대전\" 나. 칼빈의 \"기독교강요* 다. 어거스틴의 \"하나님의 도성\" 라. 존 번연의 \"천로역정\" 마. 루터의 \"의지의 속박에 관하여\" ①가-다-마-라-나 ② 다-가-마-나-라", "choices": ["가-다-마-라-나", "다-가-마-나-라", "가-다-라-마-나", "다-가-나 -마-라"], "answer": 2, "explanation": "아퀴나스의 \"신학대전\"은 1485년 출간되었다. 칼빈의 \"기독교강요\" 초판은 1536년 출간되었다. 어거스틴의 하나님의 도성\"은 426년 처음 발표되었다. 존 번연의 \"천로역정\"은 1678년에 처음 발표되었다. 루터의 \"의지의 속박에 관하여\"는 1525년 출판 되었다."}, {"id": "교회사-0714", "subject": "교회사", "section": "한국교회사", "qnum": 23, "stem": "다음 중 교회사에 나타난 성경과 관련한 중요한 문서들을 발표 순서대로 바르게 연결한 것은? 가. 오리겐의 \"헥사플라\" 나. 에라스무스의 \"헬라어 신약성경\" 다. 디아스포라 유대인들의 70인경\" 라. 제롬의 \"벌게이트\" 마. 불트만의 \"공관복음 전승사\" ①다-가-라-마-나 ② 다-라-가-마 -나", "choices": ["다-가-라-마-나", "다-라-가-마 -나", "다 -가-라-나-마", "다-라-가-나- 마"], "answer": 3, "explanation": "오리겐의 \"헥사플라'는 3세기인 230년에서 240년 사이에 저술되었다. 에라스무스의 \"헬라어 신약성경\"은 1516년 처음 저술된 후 여러 차례 개정되었다. 디아스포라 유대인들에 의해 알렉산드리아에서 편찬된 70인경'은 주전 4세기경 저술이 시작된 것으 로 알려져 있다. 제롬의 라틴어 성경 번역인 \"벌게이트\" 번역 작업은 382년 시작되어 4세기 말 일단 완료되었으며 16세기까지 계속 개정되었다. 불트만의 대표적 저술인 \"공관복음 전승사\"는 1921년 출간되었다."}, {"id": "교회사-0715", "subject": "교회사", "section": "한국교회사", "qnum": 24, "stem": "교회사적으로 중요한 의미를 가진 다음의 여러 문서들 중 개혁파 전통에서 제정된 문서만을 묶은 것은? 가. 39개조 (1556) 나. 67개조 (1523) 다. 95개조 (1517) 라. 도르트 신조 (1619) 마. 일치 신조 (1557) 바. 램버스 신조 (1595)", "choices": ["나, 라, 바", "가, 나, 마", "나, 라, 마", "가, 다, 바"], "answer": 2, "explanation": "39개조는 잉글랜드 국교회의 신앙고백으로서 기본적으로는 칼빈주의를 따르지만 교회제도 등에 있어서는 개혁교회의 입장과 차 이를 보여준다. 95개조는 1517년 루터가 면죄부 판매를 반대하기 위해 비텐베르크 대학에 게시한 문서이다. 일치 신조 역시 루터파에서 발생한 신학적 논쟁을 종식시키기 위해 1577년 제정된 문서이다. 츠빙글리가 작성한 67개조(1523)와 네덜란드 개 혁교회가 제정한 도르트 신조(1619)는 개혁파 전통에서 나타난 문서들이다. 잉글랜의 청교도들이 작성한 램버스 신조(1595)는 엘리자베스 1세 통치기 영국 국교회에서 작성하여 채택한 문서이지만 도르트 회의에 앞서 칼빈주의 예정론을 변호하기 위해 청 교도들이 주도하여 작성했기 때문에 개혁파 신학 전통을 따른 문서라고 분류할 수 있다."}, {"id": "교회사-0716", "subject": "교회사", "section": "한국교회사", "qnum": 25, "stem": "교회사적으로 중요한 의미를 가진 다음의 칙령들 중 국왕이 신앙과 예배의 자유를 허용하기 위해 내린 명령들만 묶은 것은? 가. 집회령 (1662 잉글랜드) 나. 생 제르맹 칙령 (1562 프랑스) 다. 통일령 (1559 잉글랜드) 라. 퐁텐블로 칙령 (1685 프랑스) 마. 밀라노 칙령 (325 로마제국) 바. 낭트 칙령 (1598 프랑스)", "choices": ["가, 나, 마", "나, 다, 마", "가, 다, 마", "나, 마, 바"], "answer": 4, "explanation": "1662년의 \"집회령'은 찰스 2세가 청교도들을 억압하기 위해 내린 \"비밀집회 금지령\"이다. 1562년의 \"생 제르맹 령\"은 섭정 인 캐더린 메디치가 위그노들의 예배의 자유를 잠시 허용하기 위해 내린 명령이다. 1559년의 \"통일령\"은 엘리자베스 1세가 즉 위한 직후 공동기도서를 강제하고 청교도들을 통제하기 위해 내린 명령이다. \"퐁텐블로 칙령'(1685)은 루이 14세가 위그노들을 억압하기 위해 위그노들에게 예배의 자유를 허락했던 \"낭트 칙령 (1598)을 폐지한 명령이다. \"밀라노 칙령'은 기독교에 대한 박 해를 종식시킨 로마 제국 콘스탄티누스 황제의 칙령이다."}, {"id": "교회사-0717", "subject": "교회사", "section": "한국교회사", "qnum": 26, "stem": "다음 중 기독교 역사에 등장했던 중요한 신학적 저술들과 그 주요 내용을 바르게 연결한 것은?", "choices": ["안셀름의 프로슬로기온\"- 그리스도의 성육신을 이성적으로 설명함", "터툴리안의 \"프락세아스 반박\"- 니케아 신조의 동일본질을 변호함", "마틴 부써의 \"그리스도의 왕국\" - 국가 차원의 종교개혁 방안을 제안함", "하르낙의 교리사\"- 자유주의 신학으로부터 정통 교리를 변호함"], "answer": 3, "explanation": "11세기 초기 스콜라신학자 안셀름은 \"프로슬로기온\"에서 존재론적 신존재 증명을 제시했다. 3세기 교부 터툴리안은 \"프락세아스 반박\"에서 양태론을 비판했지만 니케아 신조는 그 뒤인 4세기에 작성되었다. 스트라스부르크에서 활약한 16세기의 종교개혁자 마틴 부써는 잉글랜드로 망명한 후 \"그리스도의 왕국\"을 저술하여 국가 차원의 종교개혁과 사회개혁 방안을 제시했다. 19세기 독일의 자유주의 신학자 하르낙은 교리사\"를 저술하여 기독교의 정통 교리가 헬레니즘의 산물이라고 주장함으로써 근대 자유주 의 신학을 대변했다."}, {"id": "교회사-0718", "subject": "교회사", "section": "한국교회사", "qnum": 27, "stem": "다음 중 중요한 개신교의 신앙고백 및 선언들과 그 저술에 참여한 주요 저자들을 잘못 연결한 것 은? 아우크스부르크 신앙고백(1530)- 필립 멜란히톤", "choices": ["아우크스부르크 신앙고백(1530)- 필립 멜란히톤", "프랑스 신앙고백 (1560) - 기드 브레", "바르멘 선언(1934) - 칼 바르트", "로잔 언약(1974) - 존 스토트"], "answer": 2, "explanation": "프랑스 신앙고백, 혹은 갈리아 신앙고백은 칼빈의 초안을 받아 프랑스 개혁교회의 목사였던 샹디외가 작성했다. 한편 기드 브레 는 프랑스 신앙고백을 자료로 삼아 오늘날 벨기에 지역에서 불어로 벨기에 신앙고백을 작성했다."}, {"id": "교회사-0719", "subject": "교회사", "section": "한국교회사", "qnum": 28, "stem": "다음 중 오늘날 독일 지역에서 발표된 신학 작품들만을 묶은 것은? 가. 토마스 아 켐피스의 그리스도를 본받아\"(1418) 나. 마틴 루터의 그리스도인의 자유\"(1520) 다. 마틴 부써의 \"테트라폴리탄 신앙고백'(1530) 라. 필립 슈페너의 경건한 열망' (1680) 마. 쇠렌 키에르케고르의 공포와 전율\"(1843) 바. 본회퍼의 \"나를 따르라' (1937)", "choices": ["가, 나, 마", "가, 라, 바", "나, 다, 마", "나, 라, 바"], "answer": 4, "explanation": "토마스 아 켐피스의 \"그리스도를 본받아\"는 오늘날 네덜란드 지역에서 작성되었다. 마틴 부써의 \"테트라폴리탄 신앙고백\"이 작성 된 스트라스부르크는 오늘날 프랑스에 속해 있다. 공포와 전율\"을 포함한 키에르케고르의 작품들은 대부분 덴마크에서 출간되었다."}, {"id": "교회사-0720", "subject": "교회사", "section": "한국교회사", "qnum": 29, "stem": "다음 중 기독교 사상 발전에 영향을 준 철학자들의 저술을 발표 순서대로 바르게 연결한 것은? 가. 존 로크의 \"인간오성론\" 나. 르네 데카르트의 \"방법서설\" 다. 임마누엘 칸트의 순수이성비판\" 라. 피코 델라 미란돌라의 \"인간의 존엄성에 관하여\"", "choices": ["라-나-가-다", "나-라-가 -다", "라-가 -나-다", "나-라-다-가"], "answer": 1, "explanation": "영국의 경험론자인 존 로크의 인간오성론\"은 1686년 출간되었다. 네덜란드 출신 합리론 철학자 르네 데카르트의 \"방법서설'은 1637년 출간되었다. 독일의 철학자 임마누엘 칸트의 순수이성비판'은 1781년 출간되었다. 이탈리아의 르네상스 인문주의자인 피코 델라 미란돌라의 \"인간의 존엄성에 관하여\"는 1486년 저술되었다."}, {"id": "교회사-0721", "subject": "교회사", "section": "한국교회사", "qnum": 30, "stem": "다음 중 근대 교회 역사 가운데 등장한 중요한 역사적 문서들을 발표 순서대로 바르게 연결한 것 은? 웨스트민스터 신앙고백- 영국 권리장전- 메이플라워 협약- 미국 독립선언서 - 프랑스 인권선언", "choices": ["웨스트민스터 신앙고백- 영국 권리장전- 메이플라워 협약- 미국 독립선언서 - 프랑스 인권선언", "메이플라워 협약- 웨스트민스터 신앙고백- 영국 권리장전- 미국 독립선언서 - 프랑스 인권선언", "웨스트민스터 신앙고백- 메이플라워 협약- 영국 권리장전- 프랑스 인권선언 - 미국 독립선언서", "메이플라워 협약- 웨스트민스터 신앙고백 - 프랑스 인권선언 - 영국 권리장전 - 미국 독립선언서"], "answer": 2, "explanation": "제정된 순서대로 설명하면 메이플라워 협약은 1620년 체결되었으며, 웨스트민스터 신앙고백은 1648년 의회의 승인을 받았다. 영국의 권리장전은 명예혁명 직후인 1689년 발표되었으며 미국 독립선언서는 1776년 발표되었다. 프랑스 인권선언은 1798년 프랑스 대혁명이 발생한 직후 발표되었다. ® 시대종합 주요 신학자와 신학사상"}, {"id": "교회사-0722", "subject": "교회사", "section": "한국교회사", "qnum": 31, "stem": "다음 중 교회 역사상 등장했던 이단적 사상과 그 출현 시기를 바르게 연결한 것은?", "choices": ["아리우스주의 - 5세기", "소키누스파 - 15세기", "몰몬교 - 18세기", "문선명의 통일교 - 20세기"], "answer": 4, "explanation": "아리우스파는 4세기 알렉산드리아에서 출현했으며, 소키누스파는 16세기에 이탈리아에서 시작하여 폴란드에서 본격적으로 세력 을 획득했다. 몰몬교는 19세기 미국에서 등장했으며 문선명의 통일교는 20세기에 등장했다."}, {"id": "교회사-0723", "subject": "교회사", "section": "한국교회사", "qnum": 32, "stem": "다음 중 기독교 신학의 역사 가운데 서로 치열한 신학적 논쟁을 벌인 상대를 잘못 연결한 것은?", "choices": ["네스토리우스와 알렉산드리아의 키릴루스", "베르나르두스와 아벨라르두스", "아브라함 카이퍼와 헤르만 바빙크", "박형룡과 김재준"], "answer": 3, "explanation": "네스토리우스와 키릴루스, 베르나르두스와 아벨라르두스, 그리고 김재준과 박형룡은 서로의 신학적 입장을 직접 비판하며 치열한 논쟁을 벌였다. 이들과 비교할 때 네덜란드의 개혁신학자들인 아브라함 카이퍼와 헤르만 바빙크는 서로 치열한 신학적 논쟁을 벌인 관계는 아니다."}, {"id": "교회사-0724", "subject": "교회사", "section": "한국교회사", "qnum": 33, "stem": "다음 중 교회사에 있어 중요한 활동을 한 신학자와 그 신학자가 속한 교파를 바르게 연결한 것 은?", "choices": ["블레이즈 파스칼 - 얀센주의", "시몬 에피스코피우스 - 칼빈주의", "알브레히트 리츨 - 알미니우스주의", "프리드리히 슐라이어마허 - 루터주의"], "answer": 4, "explanation": "블레이즈 파스칼은 안센주의의 입장에서 예수회의 신학과 교황청의 독재를 비판했다. 시몬 에피스코피우스는 17세기 네덜란드의 알미니우스주의자였다. 19세기 루터파 신학자 알브레히트 리출은 자유주의 신학자이다. 프리드리히 슐라이어마허는 개혁파 목사 였으며 정통주의 신학과 차별되는 \"감정의 신학\"을 주장함으로써 새로운 신학적 방향을 모색했다."}, {"id": "교회사-0725", "subject": "교회사", "section": "한국교회사", "qnum": 34, "stem": "다음 중 정통 기독교 교리와 그 교리들의 성립에 있어 동기를 제공한 잘못된 사상을 가장 직접적 으로 연결한 것은?", "choices": ["칼케돈 기독론 - 아리우스주의", "칼빈주의 예정론 - 계몽주의", "개혁주의 교회론 - 교황지상주의", "성경 영감론 - 알미니우스주의"], "answer": 3, "explanation": "451년 제정된 칼케돈 신조의 기독론은 네스토리우스주의와 유티케스의 단성론을 모두 정죄했다. 1619년 도르트 신조를 통해 재확인된 칼빈주의 예정론은 인문주의의 영향을 받은 알미니우스주의 입장을 거절하고 하나님의 주권을 강조했다. 장로교 제도 로 대표되는 개혁주의 교회론은 교황지상주의를 성경적, 역사적 근거를 갖추지 못했다고 반대했다. 한 예로 1648년 제정된 웨 스트민스터 신앙고백은 교황을 적그리스도라고 명시하기까지 했다. 1674년 스위스 개혁교회가 채택한 스위스 일치 신조는 소뮈 르 학파의 합리주의적 성경관에 맞서 성경의 축자적 영감을 옹호했다. 이후 구프린스턴 신학자들이 주장한 성경영감론은 주로 자유주의 신학이나 성경에 대한 고등비평에 맞서기 위해 재차 강조되었다."}, {"id": "교회사-0726", "subject": "교회사", "section": "한국교회사", "qnum": 35, "stem": "다음 중 각 시대별로 새롭게 등장한 개신교회의 중요한 사상을 바르게 연결한 것은?", "choices": ["17세기 - 자유주의", "18세기 - 종교다원주의", "19세기 - 신복음주의", "20세기 - 신정통주의"], "answer": 4, "explanation": "자유주의는 18세기 계몽주의의 영향으로 시작되어 19세기에 주로 나타났다. 종교다원주의는 19세기에 시작되었으나 20세기 후 반부터 크게 부각되었다. 신복음주의는 20세기 후반 크게 영향력을 발휘했다. 바르트와 브룬너가 대표하는 신정통주의는 20세 기 초 자유주의에 대한 반성으로 등장했다."}, {"id": "교회사-0727", "subject": "교회사", "section": "한국교회사", "qnum": 36, "stem": "다음은 기독교 신학의 중요 인물과 그들의 신학적 강조점에 대한 설명이다. 올바른 설명만 묶은 것은? 가. 닛사의 그레고리우스는 정통 기독론 확립을 위해 페리코레시스\" 개념을 주장했다. 나. 토마스 아퀴나스는 \"신학대전\"을 통해 스콜라 사상의 방대한 체계를 구축하려 했다. 다. 테오도르베자는 철학적 사변을 배제하고 되도록 성경만으로 신학적 주제를 논증하려 했다. 라. 조나단 에드워즈는 신학뿐 아니라 철학과 자연과학에 걸친 다양한 분야에 대한 글을 남겼다. 마. 폴 털리히는 실존주의적 관점에서 하나님을 존재의 근거이며 신앙의 궁극적 관심이라고 주장했다.", "choices": ["가, 다, 라", "나, 라, 마", "가, 나, 라", "나, 다, 마"], "answer": 3, "explanation": null}, {"id": "교회사-0728", "subject": "교회사", "section": "한국교회사", "qnum": 37, "stem": "다음은 기독교 역사를 대표하는 중요 신학자들과 그들이 비판했던 대상들에 대한 설명이다. 바르 게 연결한 것만을 묶은 것은? 가. 순교자 유스티누스는 기독교를 변증하기 위해 헬라 철학의 권위를 비판했다. 나. 아벨라르두스는 성경과 교부들의 의견이 항상 일치하지 않음을 지적하여 중세신학의 방법론을 비판했다. 다. 마틴 켐니츠는 개혁파 신학의 입장에서 트렌트 회의의 화체설을 비판했다. 라. 조지 휫필드는 감리교 운동을 전개하면서 칼빈주의의 예정론을 숙명론이라고 비판했다. 마. 바르트는 하나님의 말씀의 신학을 주장하며 19세기 이후 자유주의 신학을 비판했다. @ 가, 나, 마 ③ 나, 다, 마 ④ 나, 라, 마 @ 가, 다, 라", "choices": ["가, 나, 마", "나, 다, 마", "나, 라, 마", "가, 다, 라"], "answer": 2, "explanation": "잘못된 설명만 지적하면 트렌트 신학을 비판했던 마틴 켐니츠는 개혁파가 아니라 루터파 신학자였다. 조지 휫필드는 감리교 운 동을 전개하면서도 웨슬리와 달리 칼빈주의적 예정론을 옹호했고 이로 인해 동역자인 웨슬리와 논쟁을 벌이기까지 했다."}, {"id": "교회사-0729", "subject": "교회사", "section": "한국교회사", "qnum": 38, "stem": "다음 중 개혁파 전통에 속하는 신학자만을 묶은 것은? 가. 존 위클리프 나. 기욤 파렐 다. 얀 후스 라. 틸레만 헤수시우스 마. 앤드루 멜빌 바. 피터 마터 버미글리", "choices": ["가, 라, 마", "@ 가, 다, 마", "나, 라, 바", "나, 마, 바"], "answer": 4, "explanation": "개혁파 전통은 16세기 종교개혁 시대 스위스를 중심으로 성경해석과 성찬론, 교회론에서 루터파 및 재세례파와 분명한 차이를 샤 보여준 신학적 전통으로 형성되었으며 이후 프랑스와 네덜란드를 거쳐 스코틀랜드와 잉글랜드로 확산되었다. 존 위클리프는 종 교개혁 이전인 14세기 잉글랜드에서 활동한 개혁적 신학자였다. 기욤 파렐은 1536년 칼빈을 제네바 사역에 초청한 인물로서 개혁파 전통에 속하는 인물이다. 얀 후스는 종교개혁 이전인 15세기 보헤미아에서 활동한 신학자였다. 틸레만 헤수시우스는 하 이델베르크에서 개혁파 신학자들과 성찬론을 둘러싼 논쟁을 전개했던 루터파 신학자였다. 앤드루 멜빌은 녹스의 뒤를 이어 스코 틀랜드에서 종교개혁을 주도하고 장로교회를 확립했던 인물로서 개혁파 전통에 속한다. 피터 마터 버미글리는 이탈리아 출신으 로서 취리히와 제네바를 거쳐 잉글랜드 옥스포드 대학에서 활동하며 특히 개혁파의 성찬 이론을 확립했던 신학자이다."}, {"id": "교회사-0730", "subject": "교회사", "section": "한국교회사", "qnum": 39, "stem": "다음 중 각 시대별로 활동한 주요 신학자들과 그들에게 직접적 영향을 준 철학 사상을 바르게 연 결한 것은? 라인홀트 니버 - 페브로니우스주의", "choices": ["라인홀트 니버 - 페브로니우스주의", "리처드 백스터 - 에피쿠로스주의", "알베르투스 마그누스 - 아리스토텔레스주의", "요한 크리소스톰 - 에라스투스주의"], "answer": 3, "explanation": "페브로니우스주의는 19세기 독일에서 로마 교황의 수위권을 비판하기 위해 출현한 공의회주의적 사상으로서 20세기 미국의 신 학자인 니버와 직접적 관련은 없다. 17세기 영국의 청교도인 리처드 백스터는 초대교회에 영향을 주었던 헬레니즘 사상인 에피 쿠로스주의로부터 직접적인 영향을 받지는 않았다. 13세기 스콜라신학자인 알베르투스 마그누스는 아리스토텔레스의 철학을 활 용해 신학적 논의를 전개했다. 요한 크리소스톰은 5세기 안디옥 출신의 콘스탄티노플 감독이자 유능한 설교자였으며, 에라스투 스주의는 16세기 이후 나타난 사상으로서 세속 국가가 교회를 보호하고 관리해야 한다는 교회론적 사상이었다."}, {"id": "교회사-0731", "subject": "교회사", "section": "한국교회사", "qnum": 40, "stem": "다음 중 각 시대별로 활동한 주요 신학자들과 그들이 주장한 신학 이론을 가장 부적절하게 연결 한 것은?", "choices": ["유티케스 - 단성론", "윌리엄 오- 유명론", "필립 멜란히톤 - 수반이론", "테야르 드 샤르댕- 유신진화론"], "answer": 3, "explanation": "수반이론(Doctrine of Concomitant), 혹은 수반교리는 포도주를 제외한 떡만을 성도들에게 분배했던 로마 가톨릭의 \"일종성찬' 행태의 근거인 교리이다. 멜란히톤은 종교개혁자로서 로마 가톨릭의 수반이론을 반대하고 떡과 포도주를 모두 분배하는 \"이종성 찬을 주장했다. • 세계선교와 비서구권 기독교의 역사"}, {"id": "교회사-0732", "subject": "교회사", "section": "한국교회사", "qnum": 41, "stem": "다음 중 타민족을 향한 선교 사역과 가장 관련이 없는 사건은? 아이단의 린디스판 수도원 설립", "choices": ["아이단의 린디스판 수도원 설립", "메이플라워호 이주민들의 협약 체결", "예수회 출신 마테오 리치의 \"천주실의\" 저술", "로스의 한글 성경번역"], "answer": 2, "explanation": "635년 아이단은 잉글랜드 북부 린디스판에 수도원을 설립하여 앵글로족이 세운 왕국들을 향한 선교를 전개했다. 예수회 출신 선교사 마테오 리치는 1584년 자신이 명나라 선교 중 저술한 \"천주실록'을 개정해 1603년 \"천주실의'를 출판했고 이 책에서 기독교 신학을 중국의 유교 사상에 맞추어 변증했다. 스코틀랜드 출신 존 로스 선교사는 의주 출신 한국 청년들의 도움을 받아 만주에서 신약성경을 번역해 이후 한국 선교의 중요한 기초를 제공했다. 메이플라워호의 이민과 이들이 체결한 협약은 북미 원 주민을 향한 타민족 선교라고 보기는 어렵다."}, {"id": "교회사-0733", "subject": "교회사", "section": "한국교회사", "qnum": 42, "stem": "다음 중 현대 사회의 변화에 맞추어 교회의 정체성과 선교의 내용을 적용하려 한 세계교회협의회 (WCC)의 개최지를 순서대로 바르게 연결한 것은? 암스테르담- 나이로비- 캔버라 - 포르토 알레그로 - 부산", "choices": ["암스테르담- 나이로비- 캔버라 - 포르토 알레그로 - 부산", "암스테르담 - 캔버라- 밴쿠버 - 하라레 - 부산", "암스테르담- 포르토 알레그로- 웁살라- 밴쿠버 - 부산", "암스테르담- 웁살라- 하라레- 캔버라 - 부산"], "answer": 1, "explanation": "1948년 암스테르담에서 첫 총회를 연 세계교회협의회(WCC)는 7년 정도 기간을 두고 여러 대륙을 돌며 총회를 개최해 왔다. 총회의 순서와 연도는 다음과 같다. 스웨덴의 웁살라(1968)- 케냐의 나이로비(1975)- 캐나다의 밴쿠버(1983)- 호주의 캔버 라(1992)- 짐바브웨의 하라레(1998)- 브라질의 포르토 알레그로(2006)- 한국의 부산(2013) - 독일 칼스루에(2021 예정)"}, {"id": "교회사-0734", "subject": "교회사", "section": "한국교회사", "qnum": 43, "stem": "다음 인물 중 1813년 스코틀랜드에서 태어났으며 런던선교회의 의료 선교사로 파송을 받아 아프 리카에서 활동하던 중 아프리카 종단 교통로를 탐험하여 이후 선교활동에 기여하려 했던 인물은?", "choices": ["헨리 모던 스탠리", "데이비드 리빙스턴", "윌리엄 캐리", "허드슨 테일러"], "answer": 2, "explanation": "데이비드 리빙스턴은 1813년 스코틀랜드에서 태어났으며 런던선교회의 파송으로 1841년 아프리카 보츠와나에 파송되었다. 그 는 선교 사역과 더불어 아프리카 일대를 탐험하여 선교를 위한 교통로를 확보하는 일에 일생을 바쳤다."}, {"id": "교회사-0735", "subject": "교회사", "section": "한국교회사", "qnum": 44, "stem": "다음 중 오세아니아 지역의 기독교 선교와 관련이 없는 인물은?", "choices": ["제임스 쿡", "리차드 존슨", "사무엘 마스든", "아도니람 저드슨"], "answer": 4, "explanation": "제임스 쿡은 오세아니아 일대를 탐험한 인물이었다. 리차드 존슨은 죄수 호송선을 이끌고 호주에 처음으로 도착한 군목이었다. 사무엘 마스든은 1814년 뉴질랜드로 파송된 호주의 첫 선교사였다. 아도니람 저드슨은 미국 최초의 해외 파송 침례교 선교사로 서 동남아시아 미얀마를 중심으로 사역했다."}, {"id": "교회사-0736", "subject": "교회사", "section": "한국교회사", "qnum": 45, "stem": "다음 중 19세기 말부터 20세기 초 중국의 정치적 격변기 중국 기독교에 대한 설명으로 올바른 것은?", "choices": ["미국의 선교사 허드슨 테일러는 1865년 중국 내지 선교를 주도했다.", "1899년 발생한 의화단 사건은 기독교에 대한 반대 운동이었다.", "1911년 청나라를 무너뜨린 신해혁명을 주도한 쑨원은 기독교에 적대적이었다.", "1924년 제1차 국공합작을 통해 중국 내에서 기독교가 다시 성장할 수 있었다."], "answer": 2, "explanation": "중국내지선교화를 창설한 허드슨 테일러는 영국의 선교사였다. 서양 세력과 기독교 선교사들에 대한 반발로 인해 1899년 의회 단 사건이 발생했다. 쑨원은 기독교인이었다. 1924년 일제에 맞서기 위해 중국국민당과 중국공산당 사이에 결성된 국공합작은 기독교의 발전에 큰 도움이 되지는 않았다. 호"}, {"id": "교회사-0737", "subject": "교회사", "section": "한국교회사", "qnum": 46, "stem": "다음 중 남아프리카공화국 기독교에 대한 설명으로 적절하지 않은 것은?", "choices": ["17세기 핍박을 피해 이주한 보어인들은 대다수가 네덜란드의 개혁교회에 속했다.", "19세기 남아공의 흑인 주민들 사이에서 혼합주의적 기독교 신앙이 확산했다.", "1948년 백인정부가 인종차별정책을 법으로 제정했다.", "1994년 흑인인 넬슨 만델라가 대통령에 당선된 이후 칼빈주의를 표방하는 개혁교회가 크게 성 장했다."], "answer": 4, "explanation": "1994년 넬슨 만델라가 대통령에 당선되고 인종분리정책이 철폐되었으나 이 일을 계기로 칼빈주의를 표방하는 남아공의 개혁교 회가 크게 성장하지는 않았다."}, {"id": "교회사-0738", "subject": "교회사", "section": "한국교회사", "qnum": 47, "stem": "다음 중 1990년대 소련과 동유럽의 공산권 붕괴 전후 기독교의 역할과 상황에 대한 설명으로 올 바르지 않은 것은? © 동유럽 공산권의 붕괴 과정에 폴란드 출신 교황 요한 바오로 2세의 영향이 있었다.", "choices": ["동유럽 공산권의 붕괴 과정에 폴란드 출신 교황 요한 바오로 2세의 영향이 있었다.", "소련의 붕괴와 분할 이후 공산정권과 동조하던 러시아 정교회는 크게 쇠퇴했다.", "구소련에서 독립한 중앙아시아 여러 국가들은 기독교에 대한 박해를 계속하고 있다.", "코카서스 지방의 아제르바이잔과 아르메니아 사이의 갈등 원인에는 종교 문제가 있다."], "answer": 2, "explanation": "1989년 소련의 공산정권이 붕괴한 이후 그동안 탄압을 받던 러시아 정교회는 새로운 정부의 지원하에 많이 회복되었다. 대표적 으로 옐친 전 대통령과 현 통치자 푸틴은 모두 정교회에 우호적인 정책을 펼쳐왔다."}, {"id": "교회사-0739", "subject": "교회사", "section": "한국교회사", "qnum": 48, "stem": "다음 중 20세기 이후 라틴 아메리카의 기독교에서 일어난 사건이 아닌 것은?", "choices": ["미국의 먼로선언으로 라틴 아메리카가 유럽의 영향력으로부터 벗어나기 시작했다.", "여러 국가의 독재 정권에 맞서 로마 가톨릭 사제들이 민주화 운동에 동참했다.", "페루의 구티에레즈 신부가 해방신학을 주장했다.", "오순절 계통 교단을 중심으로 개신교 신앙의 부홍 운동이 일어났다."], "answer": 4, "explanation": "유럽이 아메리카 대륙에 간섭해서는 안 된다고 주장한 미국 먼로 대통령의 선언은 1823년에 발표되었다. 이 선언의 목적 가운 데는 라틴 아메리카 지역에 대한 미국의 지배력을 확보하려는 의도도 있었다. 라틴 아메리카에서 나타난 해방신학과 로마 가톨 릭 사제들의 정치적 활동은 1960년대부터 시작되었다. 20세기 말부터 이 지역에 오순절 계통 교단들의 부흥이 일어났다."}, {"id": "교회사-0740", "subject": "교회사", "section": "한국교회사", "qnum": 49, "stem": "20세기 후반 일어난 사건들 중 기독교에 대한 박해가 심화되는 계기와 가장 거리가 먼 사건은?", "choices": ["중국의 문화대혁명(1966-1976)", "이란의 이슬람 혁명(1978)", "걸프 전쟁(1991)", "이슬람 국가(IS)의 출현"], "answer": 3, "explanation": "중국의 문화대혁명과 이란의 이슬람 혁명, 그리고 최근 벌어진 이슬람 국가의 테러는 모두 반기독교적 경향을 띠었다. 그러나 미국과 이라크 사이에 벌어진 1차 걸프 전쟁은 주로 정치적, 경제적 이유로 발생했고 기독교에 대한 적대적 태도나 박해는 크 게 나타나지 않았다."}, {"id": "교회사-0741", "subject": "교회사", "section": "한국교회사", "qnum": 50, "stem": "21세기 현재 선교가 이루어지고 있는 아시아의 각 나라와 그 나라의 가장 교세 규모가 큰 종교를 바르게 연결한 것은?", "choices": ["인도 - 이슬람교", "말레이시아 - 힌두교", "미얀마 - 불교", "캄보디아 - 기독교"], "answer": 3, "explanation": "많은 인구가 거주하고 있는 남아시아와 동남아시아 지역은 오래된 종교 문화가 기독교 선교에 큰 장애가 되고 있다. 인도는 힌 두교, 말레이시아는 이슬람교, 캄보디아는 불교가 거의 대다수의 인구를 차지한다. 미얀마는 불교 인구가 89%에 이르며 불교의 정치적 영향력도 크다."}, {"id": "교회사-0742", "subject": "교회사", "section": "기출 2020", "qnum": 1, "stem": "다음 중 초대교회 시대 로마 제국의 특징과 가장 거리가 먼 것은?", "choices": ["계층적인 신분사회였다.", "잘 정돈된 도로망과 더불어 일관된 법률 체계를 추구했다.", "사상적으로 헬레니즘을 수용했다.", "로마의 종교와 문화를 일방적으로 강요했다."], "answer": 4, "explanation": null}, {"id": "교회사-0743", "subject": "교회사", "section": "기출 2020", "qnum": 2, "stem": "다음 중 신약성경이 기록될 당시 존재했던 유대교 분파가 아닌 것은?", "choices": ["사두개파", "알비파", "바리새파", "에세네파"], "answer": 2, "explanation": null}, {"id": "교회사-0744", "subject": "교회사", "section": "기출 2020", "qnum": 3, "stem": "초대교회 시대 기독교에 대한 박해를 주도했던 황제로 볼 수 없는 인물은?", "choices": ["네로", "도미티아누스", "마르쿠스 아우렐리우스", "갈리에
