임을 받지 않은 자", "이명증서만 가지고 오면 본 교회의 집사의 권한으로 봉사할 수 있다.", "전입 후 2년이 지나야 피선거권을 갖는다."], "answer": 3, "explanation": "정치 제6장 제4조 4항 참고 — 집사의 칭호 1. 시무 집사 : 본 교회에서 임직 혹은 취임 받아 시무하고 있는 집사 546 제3부 헌법(정치) 2. 휴직 집사 : 본 교회에서 집사로 시무하다가 휴직 중에 있거나 혹은 사임된 자 3. 은퇴 집사 : 연하여 은퇴한 집사 4. 무임 집사 : 타 교회에서 이명 와서 아직 취임을 받지 못한 집사이니, 만 70세 미만인 자는 서리 집사직을 맡을 수 있고, 본 교회에 전입하여 만 2년이 경과하고, 공동의회에서 집사로 피선되면 취임식만 행하고 안수 없이 시무 집사가 된다."}, {"id": "헌법-0420", "subject": "헌법", "section": "정치", "qnum": 421, "stem": "집사의 칭호에 대한 설명으로 맞는 것은? 시무집사: 본 교회에서 임직 혹은 취임 받아 시무하고 있는 집사", "choices": ["시무집사: 본 교회에서 임직 혹은 취임 받아 시무하고 있는 집사", "휴직집사: 타 교회에서 이명 와서 아직 취임을 받지 못한 집사", "은퇴집사: 본 교회에서 집사로 시무하다가 휴직 중에 있거나 혹은 사임된 자", "무임집사: 연로하여 은퇴한 집사"], "answer": 1, "explanation": "6장 - 4조 ※ 2016년 기출문제"}, {"id": "헌법-0421", "subject": "헌법", "section": "정치", "qnum": 422, "stem": "다음 중 집사의 자격에 맞지 않는 것은? @ 집사는 선한 명예와 진실한 믿음과 지혜와 분별력이 있는 존숭을 받아야 한다.", "choices": ["집사는 선한 명예와 진실한 믿음과 지혜와 분별력이 있는 존숭을 받아야 한다.", "집사의 행위는 복음에 합당해야 한다.", "집사는 그 생활이 다른 사람의 모범이 될 만한 자 중에서 선택한다.", "집사가 되지 못하면 장로 후보에 오를 수 없다."], "answer": 4, "explanation": "정치 제6장 제2조 — 집사의 자격 집사는 선한 명예와 진실한 믿음과 지혜와 분별력이 있어 존승(0)을 받고 행위가 복음에 합당하며, 그 생활이 다른 사람의 모범이 될 만한 자 중에서 선택한다. 봉사적 의무는 일반 신자의 마땅히 행할 본분( #)인 집사 된 자는 더욱 그러하다(딤전 3:8~13)."}, {"id": "헌법-0422", "subject": "헌법", "section": "정치", "qnum": 423, "stem": "다음 중 집사를 선출하는 공동회의 투표수의 얼마 이상을 얻어야 하는가?", "choices": ["3분의 1", "2분의 1", "4분의 3", "3분의 2"], "answer": 4, "explanation": "정치 제21장 제1조 5항 참고 • 장로와 집사의 선출, 임직 — 공동의회 1. 회원 본 교회 무흠 입교인은 다 회원 자격이 있다. 2. 소집 공동의회는 당회가 필요로 인정할 때와 제직회의 청원이나 무흠 입교인 3분의 1 이상 청원이나 상회의 명령이 있는 때에 당회의 결의로 소집한다. 3. 임원 지교회의 당회장과 당회 서기는 공동의회의 회장과 서기를 겸한다. 당회장이 없는 경우에는 그 당회가 임시 회장을(본 노회 목사 중) 청할 것이요 회록은 따로 작성(\"et)하여 당회 서기가 보관한다. 4. 회집 1. 헌법(정치) 전문 563 총회 강도사고시 문제집 당회는 개회할 날짜와 장소와 의안(3)을 1주일 전에 교회에 광고 혹은 통지하고 그 작정한 시간에 출석하는 대로 개회하되 회집 수가 너무 적으면 회장은 권하여 다른 날에 다시 회집한다. 5. 회의(딸콤) 연말 정기 공동의회에서는 당회의 경과 상황을 들으며 제직회와 부속 각 회의 보고와 교회 경비 결산과 예산서를 채용하며 그 밖에 법대로 제출하는 사건을 의결하나니 일반 의결은 과반수로 하되, 목사 청빙 투표에는 투표수 3분의 2 이상의 가와 입교인 과반수의 승낙을 요하며 장로, 집사 및 권사 선거에는 투표수 3분의 2 이상의 가로 선정한다. 부동산 변동은 지교회의 규정(정관)대로 하고, 규정이 없는 경우에는 공동의회 회원 3분의 2 이상의 찬성으로 결정한다."}, {"id": "헌법-0423", "subject": "헌법", "section": "정치", "qnum": 424, "stem": "장로의 선출과 임직에 관한 설명으로 옳은 것은?", "choices": ["장로는 교인들의 투표로 선출하나, 목사가 그 후보를 지명할 수 있다.", "다른 교회에서 장로로 시무하던 자는 이미 장로의 신분이 있으므로 본 교회 공동의회 출석회원 과반수의 찬성으로 취임할 수 있다.", "장로로 선출된 자라도 임직을 받기 전에는 당회에 참석하거나 직무를 수행할 수 없다. ® 장로가 같은 노회 안에서 교회를 옮긴 후, 그 교회에서 장로로 취임하려면 반드시 노회에서 고 시는 면제되나 면접은 보아야 한다.", "장로는 노회에서 고시하여 합격하고, 사도적 모범을 따라 노회가 안수함으로 임직한다."], "answer": 3, "explanation": "4번의 경우, 이명은 해야 하나. 고시 건은 노회 규칙대로, 즉 노회가 정한 대로 하면 된다. 반드시 고시부의 면접을 요하는 것 은 아니다. (제84회 총회결의) 5번은 노회가 안수하는 것이 아니다."}, {"id": "헌법-0424", "subject": "헌법", "section": "정치", "qnum": 425, "stem": "안수에 관한 것으로 옳은 것은? 교회의 모든 직분은 안수하여 세운다. 집사는 반드시 안수식을 통해서 임직한다.", "choices": ["교회의 모든 직분은 안수하여 세운다. 집사는 반드시 안수식을 통해서 임직한다.", "성직을 받지 않은 자라도 병자를 위해 안수할 수 있다.", "목사와 장로의 임직에서 장로도 안수할 수 있다.", "권사는 항존직원이므로 반드시 안수하여 세워야 한다."], "answer": 3, "explanation": "1번의 경우, 임시직은 안수 없다. 2번의 경우 집사는 서리집사와 달리 반드시 안수해야 한다. 항존직이기 때문이다. 3번 성직을 받은 자 외에는 병자를 위해 안수하는 것은 삼가야 한다(헌법적 규칙 제12조) 4번의 경우, 장로의 임직에는 장로도 안수식에 참여하지만, 목사의 임직에는 참여할 수 없다. 5번, 권사는 항존직이 아니다. 그래서 안수하지 않는다."}, {"id": "헌법-0425", "subject": "헌법", "section": "정치", "qnum": 426, "stem": "직원을 선거함에 대한 설명으로 옳은 것은 무엇인가?", "choices": ["선거 투표는 무흠 입교인이 기도하는 마음으로 공개적으로 할 것이다.", "직원 선거에 있어서 오직 후보자만 선거운동을 할 수 있다.", "6개월 이상 무고히 계속해서 본 교회 예배회에 참석하지 않은 교인의 경우에는 선거권은 있으 나 피선거권은 없다.", "연기명 투표에서 투표정원수를 초과하여 기록한 표, 지정한 투표용지를 사용하지 않거나 잘못 기록된 투표지는 무효표로 한다.", "모든 무효표는 총표수에 포함하지 않는다"], "answer": 4, "explanation": "1번은 비밀히 할 것이고, 2번은 선거운동을 할 수 없다. 3번은 선거권, 피선거권 모두 없다. 5번은 무효표 중에 백표는 총투표 수에 포함되지 않는다. ※ 헌규 제7조1-4항 참고"}, {"id": "헌법-0426", "subject": "헌법", "section": "정치", "qnum": 427, "stem": "다음 중 장로, 집사 선거 방법에 대한 설명으로 옳지 않은 것은? 치리장로와 집사는 각 지교회가 공동의회 규칙에 의하여 선거한다. 공동의회의 일반적 결의는 과반수로 가결하고 목사, 로, 집사, 권사 선거는 3분의 2의 찬성으 로 가결된다.", "choices": ["치리장로와 집사는 각 지교회가 공동의회 규칙에 의하여 선거한다.", "공동의회의 일반적 결의는 과반수로 가결하고 목사, 로, 집사, 권사 선거는 3분의 2의 찬성으 로 가결된다.", "장로와 집사 선거는 선거운동을 통해서 자신의 소신을 밝혀야 하나 단 당회가 후보를 추천할 수 있다.", "양심의 자유와 교회의 자유에 의하여 어느 회에서든지 그 직원을 선정하는 권한은 그 회에 있다."], "answer": 3, "explanation": "정치 제13장 제1조, 제1장 제1조 5항 규 제7조 1항 참고 — 선거 방법 치리 장로와 집사는 각 지교회가 공동의회 규칙에 의하여 선거하되 투표 3분의 2 이상의 찬성을 요한다. 단, 당회가 후보를 추천할 수 있다."}, {"id": "헌법-0428", "subject": "헌법", "section": "정치", "qnum": 429, "stem": "다음 중 장로집사 선거의 선거권과 피선권에 관한 설명으로 옳지 않은 것은?", "choices": ["무고히 계속 6개월 이상 본 교회 예배회에 참석하지 아니한 교인은 선거와 피선거권이 중지된다.", "장로 집사의 피선거권은 남자 입교인으로 규정하고 있다.", "이명 이래한 입교인이라도 본 교회 출석한 지 6개월 미만이면 선거권이 없다.", "이명증서를 당회가 받았으면 그 시각부터 선거권이 있다."], "answer": 3, "explanation": "정치 제13장 제1조, 제6장 제4조 4항, 헌규 제7조 2항 참고 — 선거 방법 치리 장로와 집사는 각 지교회가 공동의회 규칙에 의하여 선거하되 투표 3분의 2 이상의 찬성을 요한다. 단, 당회가 후보를 추천할 수 있다."}, {"id": "헌법-0429", "subject": "헌법", "section": "정치", "qnum": 430, "stem": "다음 중 장로집사 선거의 선거권과 피선거권에 관한 설명으로 옳은 것은? 이명 이래한 입교인은 이명증서 접수하고 접수통지서 발송 후부터 선거권이 주어진다.", "choices": ["이명 이래한 입교인은 이명증서 접수하고 접수통지서 발송 후부터 선거권이 주어진다.", "이명 이래한 입교인이라도 본 교회 출석한 지 6개월 미만이면 선거권이 없다.", "이명 이래한 집사는 당회가 이명증서를 받고 접수통지서를 발송함과 동시에 피선거권이 있다.", "이명 이래한 장로는 당회가 이명증서를 받고 접수통지서를 발송함과 동시에 피선거권이 있다."], "answer": 1, "explanation": "정치 제13장 제1조, 제6장 제4조 ④. 제94회 총회 결의 — 선거 방법 치리 장로와 집사는 각 지교회가 공동의회 규칙에 의하여 선거하되 투표 3분의 2 이상의 찬성을 요한다. 단, 당회가 후보를 추천할 수 있다."}, {"id": "헌법-0430", "subject": "헌법", "section": "정치", "qnum": 431, "stem": "다음 중 장로 집사의 임직승낙과 임직에 관한 설명으로 옳지 않은 것은? 장로는 노회에 청원하여 노회의 선택허락을 받아야 한다.", "choices": ["장로는 노회에 청원하여 노회의 선택허락을 받아야 한다.", "장로는 선거하여 노회가 고시하고 승인해야 한다.", "집사를 노회가 고시하지 않는 것은 집사직을 박대하는 잘못이다.", "장로나 집사를 선택하여 반년 이상 교양하고 장로는 노회의 고시 후에 임직하며 집사는 당회가 고시한 후에 임직한다."], "answer": 3, "explanation": "정치 제13장 제1-2조, 제9장 제5조 4항 참고"}, {"id": "헌법-0431", "subject": "헌법", "section": "정치", "qnum": 432, "stem": "다음 중 장로, 집사 임직순서에 관한 설명으로 옳지 않은 것은? 저", "choices": ["교회가 당회의 정한 날짜와 장소에 모여 개회하고 목사가 강도한다.", "장로 집사직의 근원과 성질의 어떠한 것과 품행과 책임의 어떠한 것을 간단히 설명한다.", "장로, 집사 임직식에 3분의 2 이상의 교인이 참석하여 서약하지 않으면 임직은 무효이다.", "임직서약의 근거는 교회 자유원리에 의한 것으로 자기를 대표하는 일꾼을 임직하면서 성경과 헌법을 인정하지 않는 자 6", "subject": "헌법", "section": "정치", "qnum": 437, "stem": "임직 예식에서 직분자가 해야 하는 서약이 아닌 것은?", "choices": ["신구약 성경은 하나님의 말씀임을 서약한다.", "본 장로회 정치와 권징조례와 예배모범을 정당한 것으로 서약한다.", "주 안에서 같은 직원 된 형제들과 동심협력하기로 맹세한다.", "담임목사에게 충성하기로 서약한다."], "answer": 4, "explanation": "정치 제13장 3조 15장 10조 ※ 2016년 기출문제 수정"}, {"id": "헌법-0438", "subject": "헌법", "section": "정치", "qnum": 439, "stem": "다음 중 장로, 집사 선거와 임직에 맞지 않는 것은?", "choices": ["당회가 후보를 추천할 수 있다.", "공동의회에서 선거한다.", "투표수 2/3 이상의 찬성을 요한다.", "노회가 고시, 승인하고 당회가 임직한다."], "answer": 4, "explanation": null}, {"id": "헌법-0439", "subject": "헌법", "section": "정치", "qnum": 440, "stem": "다음은 목사의 선거 및 임직과 관련된 설명이다. 이것은 무엇에 관련된 내용인가? \"어느 목사나 강도사에게든지 청빙서를 드리면 그 교회가 원하는 줄로 인정할 것이요 그 목사나 강도사가 그 청빙서를 접수하면 승낙하는 것으로 인정한다.\"", "choices": ["청빙 승낙", "청빙서 제정(분물)", "서약 변경", "청빙 준비"], "answer": 1, "explanation": "정치 제15장 제5조 참고 — 청빙 승낙 어느 목사나 강도사에게든지 청빙서를 드리면 그 교회가 원하는 줄로 인정할 것이요 그 목사나 강도사가 그 청빙서를 접수하면 승낙하는 것으로 인정한다. 강도사가 청빙서를 받아 목사로 임직하게 될 경우에는 노회는 구애되는 것이 없으면 동시에 위임식까지 행한다."}, {"id": "헌법-0440", "subject": "헌법", "section": "정치", "qnum": 441, "stem": "다음 중 임직자를 안수할 때 장로, 집사 안수위원이 아닌 것은?", "choices": ["원로목사", "~ 담임목사", "시무장로", "집사"], "answer": 4, "explanation": null}, {"id": "헌법-0441", "subject": "헌법", "section": "정치", "qnum": 442, "stem": "다음 중 장로, 집사의 시무투표에 관한 설명으로 옳지 않은 것은?", "choices": ["시무투표를 규정한 것은 교회의 부패를 방지하기 위한 것이다.", "한 번 임직한 후에는 주권자인 교인의 견제를 받는 장치가 없기 때문에 치리권자의 치리와 주 권자인 교인과의 상호견제의 형평을 이루기 위함이다.", "7년에 1차씩이라는 것은 임직한 후 7년, 14년, 21년이 되는 해에만 할 수 있다.", "7년에 1차씩이라는 것은 임직한 지 7년이 지나면 필요에 따라 할 수 있고 시무투표한 날로 다 시 7년이 되면 또 시무투표할 수 있다."], "answer": 3, "explanation": "정치 제13장 제4조 참고 — 임기 치리 장로, 집사직의 임기는 만 70세까지다. 단, 7년에 1차씩 시무 투표 할 수 있고 그 표결수는 과반수를 요한다."}, {"id": "헌법-0442", "subject": "헌법", "section": "정치", "qnum": 443, "stem": "다음 중 장로, 집사의 시무투표에 관한 설명으로 옳은 것은?", "choices": ["7년에 1차씩이라는 것은 임직한 후 7년, 14년, 21년이 되는 해에만 할 수 있다.", "7년에 1차씩이라는 것은 임직한지 7년이 지나면 필요에 따라 할 수 있고 시무투표한 날로 다시 7년이 되면 또 시무투표할 수 있다.", "시무투표는 장로에게만 해당되고 집사는 해당되지 않는다.", "시무투표의 표결 수는 과반수이나 원칙은 처음 임직 때와 같이 3분의 2 이상의 표결 수를 요한다."], "answer": 2, "explanation": "정치 제13장 제4조 — 임기 치리 장로, 집사직의 임기는 만 70세까지다. 단, 7년에 1차씩 시무 투표 할 수 있고 그 표결수는 과반수를 요한다."}, {"id": "헌법-0443", "subject": "헌법", "section": "정치", "qnum": 444, "stem": "장로의 직무 정지의 요건으로 제시한 것이 아닌 것은? ® 연로하거나 병약하여 직무를 계속할 수 없을 때, 본인의 동의나 노회의 권고로 당회가 그 직위 를 해면할 수 있다.", "choices": ["직무상 교인 다수와 불합하게 되더라도 이단 시상에 물들었거나 도덕적으로 문제가 있지 않으 면 당회는 어떤 경우에도 그 직위를 해면할 수 없다.", "상회의 권고가 있으면 당회는 그 사임서를 받아 직위를 해제할 수 있다.", "이단성이나 부도덕함의 죄가 있으면 그에 대한 당회의 재판이 있어야 해면된다.", "장로의 시무 기간이 완료되었을 때는 자동으로 직무가 정지된다."], "answer": 2, "explanation": "2번은 그 경우에도 본인의 동의나 노회의 권고가 있으면 당회는 그 직위를 해면할 수 있다고 해야 한다. (정치문답 109문답 참조)"}, {"id": "헌법-0444", "subject": "헌법", "section": "정치", "qnum": 445, "stem": "장로의 휴직 또는 사직에 관한 설명으로 옳지 않은 것은? 장로의 권고휴직이나 권고사직에 대하여 본인이 원하지 않으면 항소할 수 있다.", "choices": ["장로가 범죄는 없을지라도 교회의 덕을 세우지 못하면 당회는 협의하여 그 휴직 또는 사직을 결정할 수 있다.", "장로가 노혼이나 신병으로 시무할 수 없으면 사직하게 할 수 있다.", "교회원의 태반이 그 시무를 원치 않으면 시무장로를 사직게 할 수 있다.", "장로의 휴직이나 사직에 대한 당회 결의는 공동의회나 노회의 허락을 받을 필요가 없다."], "answer": 1, "explanation": "권고사직이나 권고휴직에 대한 불복은 행정건이므로 \"소원\"하는 것이다. 재판건이 아니므로 항소할 수는 없다."}, {"id": "헌법-0445", "subject": "헌법", "section": "정치", "qnum": 446, "stem": "휴직, 또는 사직한 장로가 다시 복직하게 되는 것에 관한 설명으로 옳은 것은?", "choices": ["본 교회에서 장로로 임직받은 자가 다른 교회로 이명하였 다시 본 교회로 돌아온다면 자동적 으로 복직한다. 휴직장로가 재신임 투표 시에는 당회원 3분의 2 이상의 찬성으로 복권한다.", "본 교회로 전입한 무임장로는 만 2년이 경과하여야 공동의회에서 시무장로 후보가 될 수 있다.", "당회의 권고로 사직하게 된 장로의 경우에 소원하지 않았어도 노회는 직권으로 복직을 명할 수 있다.", "무임 또는 휴직장로가 시무장로로 피선되어 임직하게 될 때에는 첫 임직과 같은 절차를 밟아야 한다."], "answer": 3, "explanation": "1번은 다시 공동의회에서 투표해야 한다.(95회 총회결의) 2번 당회결의만으로 복권할 수 없다. 공동의회 3분의 2 이상의 찬성 이 있어야 한다. (95회 총회결의) 3번, 소원하지 않았으면 노회는 복직을 명할 수 없다. 5번은 취임식을 하되, 안수는 없다.(94 회 총회결의) 3번은 정치 제6장 제4조 4항의 규정을 준용하도록 총회가 결의함(94회 총회결의) — 집사의 칭호 1. 시무 집사 : 본 교회에서 임직 혹은 취임 받아 시무하고 있는 집사 546 제3부 헌법(정치) 2. 휴직 집사 : 본 교회에서 집사로 시무하다가 휴직 중에 있거나 혹은 사임된 자 3. 은퇴 집사 : 연하여 은퇴한 집사 4. 무임 집사 : 타 교회에서 이명 와서 아직 취임을 받지 못한 집사이니, 만 70세 미만인 자는 서리 집사직을 맡을 수 있고, 본 교회에 전입하여 만 2년이 경과하고, 공동의회에서 집사로 피선되면 취임식만 행하고 안수 없이 시무 집사가 된다."}, {"id": "헌법-0446", "subject": "헌법", "section": "정치", "qnum": 447, "stem": "교회 직원에게 그 직임을 면해야 하는 사유로 헌법이 정한 것이 아닌 것은 무엇인가?", "choices": ["성일을 범한 경우", "치리회를 상대로 사법에 고소나 고발을 한 경우", "음주나 흡연을 한 경우", "사람을 구타한 경우", "고의로 교회 의무금을 드리지 않은 경우"], "answer": 2, "explanation": "헌법적 규칙 제2조 5항에서는 직임을 면하는 사유를 규정하고 있으나, 재정의 횡령이나 배임에 관한 규정은 없다."}, {"id": "헌법-0447", "subject": "헌법", "section": "정치", "qnum": 448, "stem": "다음 중 자유 휴직에 관한 설명으로 옳지 않은 것은?", "choices": ["장로 혹 집사가 노혼하거나 신병으로 시무할 수 없을 때 본인이 청원한다.", "이단이나 악행은 없을지라도 교회원 태반이 그 시무를 원치 않을 때 본인이 청원한다.", "휴직은 당회의 결의로 처리한다.", "교회의 직원은 어떤 경우든 스스로 휴직할 수 없고 죽도록 충성해야 한다."], "answer": 4, "explanation": "정치 제13장 제5조 참고 — 자유 휴직과 사직 장로 흑 집사가 노혼(분)하거나, 신병(휴)으로 시무할 수 없거나, 이단이나 악행((T)은 없을지라도 1. 헌법(정치) 전문 555 총회 강도사고시 문제집 교회원 태반이 그 시무를 원하지 아니할 때, 본인의 청원에 의하여 휴직과 사직을 당회의 결의로 처리한다."}, {"id": "헌법-0448", "subject": "헌법", "section": "정치", "qnum": 449, "stem": "다음 중 자유 사직에 관한 설명으로 옳지 않은 것은?", "choices": ["자유사직은 본인이 청원하여 그 직을 포기하겠다는 것이다.", "자로 혹 집사가 노혼하거나 신병으로 시무할 수 없을 때 본인이 청원한다.", "이단이나 악행은 없을지라도 교회원 태반이 그 시무를 원치 않을 때 본인이 청원한다.", "사직한 경우에는 다시 그 직을 다시 임직하려면 당회에 청원하여 당회의 결의로 임직하여 시무 할 수 있다."], "answer": 4, "explanation": "정치 제13장 제5조 참고 — 자유 휴직과 사직 장로 흑 집사가 노혼(분)하거나, 신병(휴)으로 시무할 수 없거나, 이단이나 악행((T)은 없을지라도 1. 헌법(정치) 전문 555 총회 강도사고시 문제집 교회원 태반이 그 시무를 원하지 아니할 때, 본인의 청원에 의하여 휴직과 사직을 당회의 결의로 처리한다."}, {"id": "헌법-0449", "subject": "헌법", "section": "정치", "qnum": 450, "stem": "다음 중 권고휴직에 관한 설명으로 옳지 않은 것은? 자로나 집사가 범죄는 없을지라도 노혼하거나 교회에 덕을 세우지 못하게 된 경우 당회가 권고 휴직하게 할 수 있다.", "choices": ["자로나 집사가 범죄는 없을지라도 노혼하거나 교회에 덕을 세우지 못하게 된 경우 당회가 권고 휴직하게 할 수 있다.", "권고 휴직하게 한 사실은 당회록에 기록한다.", "교인들이 투표하여 임직하였으므로 당회의 결정으로 권고휴직 시킬 수 없다.", "본인이 원하지 아니하면 소원할 수 있다."], "answer": 3, "explanation": "정치 제13장 제5조 참고 — 자유 휴직과 사직 장로 흑 집사가 노혼(분)하거나, 신병(휴)으로 시무할 수 없거나, 이단이나 악행((T)은 없을지라도 1. 헌법(정치) 전문 555 총회 강도사고시 문제집 교회원 태반이 그 시무를 원하지 아니할 때, 본인의 청원에 의하여 휴직과 사직을 당회의 결의로 처리한다."}, {"id": "헌법-0450", "subject": "헌법", "section": "정치", "qnum": 451, "stem": "다음 중 권고사직에 관한 설명으로 옳지 않은 것은? 장로나 ction": "정치", "qnum": 457, "stem": "다음 직원의 연결이 옳지 않은 것은 무엇인가?", "choices": ["목사 - 항존직원", "선지자 - 창설직원", "전도사 - 임시직원", "장로 - 항존직원", "권사 - 임시직원"], "answer": 2, "explanation": "선지자는 비상직원이다. 창설직원은 \"사도\"이다."}, {"id": "헌법-0457", "subject": "헌법", "section": "정치", "qnum": 458, "stem": "권사에 대한 설명으로 옳지 않은 것은?", "choices": ["권사는 제직회의 회원이 된다.", "권사는 당회의 지도 아래 교인들을 심방한다.", "권사는 항존직이나 안수 없이 임직한다.", "권사의 정년 만 70세까지이다.", "여신도 중 만 45세 이상 된 입교인 중에서 선출한다."], "answer": 3, "explanation": "권사는 종신직이나 항존직은 아니다. 따라서 안수 없이 취임한다. 다만 만 70세까지만 시무한다."}, {"id": "헌법-0458", "subject": "헌법", "section": "정치", "qnum": 459, "stem": "권사의 종류에 대한 설명으로 옳지 않게 연결한 것은?", "choices": ["시무권사 - 본 교회의 권사로 그 직무를 수행하는 자 원로권사- 권사로 만 20년 이상 시무하고 명예롭게 퇴임한 권사", "은퇴권사 - 연로하여 시무에서 물러난 권사", "명예권사 - 여신도 중 60세 이상 된 입교인 중에서 당회가 임명한다.", "무임권사 - 타 교회에서 이명 와서 아직 취임 받지 못한 권사"], "answer": 2, "explanation": "원로권시라는 제도는 없다. 이는 권사가 종신직일 뿐 항존직이 아님을 반영한 것이다. 또한 유일하게 직분에 \"명예'를 붙인 것 이 권사직인데, 이는 그 직분이 항존직이 아닌 까닭이다."}, {"id": "헌법-0459", "subject": "헌법", "section": "정치", "qnum": 460, "stem": "권사의 선출과 임직에 관한 설명으로 옳은 것은?", "choices": ["목사 또는 당회가 그 후보를 추천할 수 있다.", "권사는 안수 없이 임직한다.", "타 교회에 이명 오게 된 권사는 그 교회의 시무권사가 될 수는 없다.", "모든 권사는 반드시 공동의회 3분의 2 이상의 찬성을 얻어야 한다.", "권사의 경우에는 공동의회에서 피택되면 반드시 취임식을 해야 하는 것은 아니다."], "answer": 2, "explanation": "1번, 목사 개인에게 후보추천권이 있는 것은 아니다. 3번은 타 교회에서 이명 온 권사도 공동의회를 거쳐 시무권사가 될 수 있 다. 4번은 명예권사는 당회에서 임명한다. 5번은 반드시 취임식을 거쳐야 한다. 왜냐하면 취임식에서 서약과 더불어 공포가 있 기 때문이다."}, {"id": "헌법-0460", "subject": "헌법", "section": "정치", "qnum": 461, "stem": "교회 직원 중 권사의 명칭에 해당되지 않는 것은?", "choices": ["무임권사", "협동권사", "은퇴권사", "( 명예권사", "WI. 실전문제 675"], "answer": 2, "explanation": null}, {"id": "헌법-0461", "subject": "헌법", "section": "정치", "qnum": 462, "stem": "다음 중 권사의 직무와 권한에 대한 설명으로 맞지 않는 것은?", "choices": ["당회의 지도 아래 교인을 방문한다.", "특히 믿음이 연약한 교인들을 돌아보아 권면하는 자이다.", "병환자와 환난 당한 자를 돌아본다.", "교인의 모범이 되며 본 교회에서 충성되게 봉사하는 자"], "answer": 4, "explanation": "정치 제3장 제3조 3항 참고 — 교회의 임시 직원 교회 사정에 의하여 다음과 같은 직원을 안수(호‡) 없이 임시로 설치()한다. 단 교회의 모든 임시직의 설치 연한은 70  "헌법", "section": "정치", "qnum": 479, "stem": "다음 교회의 준직원에 대한 설명 중 잘못된 것은?", "choices": ["강도사", "목사후보생", "개인으로는 당회 관리 아래 있다", "직무상으로는 총회 아래 있다"], "answer": 4, "explanation": null}, {"id": "헌법-0479", "subject": "헌법", "section": "정치", "qnum": 480, "stem": "다음 준직원에 대한 설명 중 맞지 않는 것은? 강도사는 총회의 고시로 노회의 인허를 받은 자이다.", "choices": ["강도사는 총회의 고시로 노회의 인허를 받은 자이다.", "목사후보생은 목사직을 희망하는 자로 노회의 자격심사를 받은 자이다.", "강도사와 목사후보생은 개인으로는 당회, 직무상으로는 노회의 관할 아래 있다.", "준직원도 제직회원이 될 수 있다."], "answer": 4, "explanation": "정치 제3장 제4조 참고 — 준직원(#랜트) 강도사와 목사 후보생은 준직원이다. 1. 강도사는 당회의 추천에 의하여 총회의 고시로 노회에서 강도할 인허를 받고 그 지도대로 일하되 교회 치리권은 없다. 2. 목사 후보생은 목사직을 희망하는 자로 노회에서 자격 심사를 받고 그 지도대로 신학에 관한 학과로써 수양을 받는 자이다. 3. 강도사와 목사 후보생은 개인으로는 그 당회 관리 아래 있고 직무상으로는 노회 관리 아래 있다."}, {"id": "헌법-0480", "subject": "헌법", "section": "정치", "qnum": 481, "stem": "다음 강도사에 대한 설명 중 맞지 않는 것은?", "choices": ["노회고시 후에 노회의 인허를 받고 강도할 수 있다.", "노회의 지도대로 일하되 교회의 치리권은 없다.", "강도사가 4년간 강도하는 데 덕을 세우지 못하면 인허를 취소할 수 있다.", "강도사는 준직원으로 개인으로는 당회, 직무상으로는 노회 관리 아래 있다."], "answer": 1, "explanation": "정치 제3장 제4조, 제14장 제8조, 77번 해설 참고 — 준직원(#랜트) 강도사와 목사 후보생은 준직원이다. 1. 강도사는 당회의 추천에 의하여 총회의 고시로 노회에서 강도할 인허를 받고 그 지도대로 일하되 교회 치리권은 없다. 2. 목사 후보생은 목사직을 희망하는 자로 노회에서 자격 심사를 받고 그 지도대로 신학에 관한 학과로써 수양을 받는 자이다. 3. 강도사와 목사 후보생은 개인으로는 그 당회 관리 아래 있고 직무상으로는 노회 관리 아래 있다."}, {"id": "헌법-0481", "subject": "헌법", "section": "정치", "qnum": 482, "stem": "다음 중 어떤 때에 강도사의 인허를 노회가 취소할 수 있는가?", "choices": ["강도사가 4년간 강도하는 데 덕을 세우지 못하면 인허를 취소할 수 있다.", "강도사가 인허 후 2년 안에 목사고시에 합격하지 못하면 취소할 수 있다.", "강도사가 소속 노회에서 다른 노회로 이거하면 인허를 취소한다.", "타 노회 교회로 이명하면서 당회 간의 이명과 노회가 이명을 한 경우에 취소할 수 있다."], "answer": 1, "explanation": "정치 제14장 제8조 참고 — 인허 취소 강도사가 4년간 강도하는 데 덕을 세우지 못하는 경우에는 노회가 결의에 의하여 인허를 취소할 수 있다."}, {"id": "헌법-0482", "subject": "헌법", "section": "정치", "qnum": 483, "stem": "다음 중 목사후보생의 자격에 관한 설명으로 옳지 않은 것은? 신학교에 입학한 남학생이면 목사후보생이다.", "choices": ["신학교에 입학한 남학생이면 목사후보생이다.", "성경의 원리와 법의 규정에 의하여 남자라야 한다.", "무흠 입교인이라야 목사 후보생의 자격이 있다.", "소명의식이 분명한 자라야 한다."], "answer": 1, "explanation": "2020년 기출문제"}, {"id": "헌법-0483", "subject": "헌법", "section": "정치", "qnum": 484, "stem": "다음 중 강도사에 관한 설명으로 옳지 않은 것은? \" 강도사가 4년간 아무 교회도 청빙을 받지 못하면 노회가 권고하고 1년 후에 노회의 결의에 의 하여 인허를 취소할 수 있다.", "choices": ["강도사가 4년간 아무 교회도 청빙을 받지 못하면 노회가 권고하고 1년 후에 노회의 결의에 의 하여 인허를 취소할 수 있다.", "강도사 인허란 총회가 실시하는 강도사 고시에 합격한 자를 노회가 정식으로 강도함을 승인하 는 것이다.", "강도사는 당회에 참석할 수 있고 공동의회 의장도 될 수 있다.", "강도 인허를 받은 목사 후보생을 강도사라 한다."], "answer": 3, "explanation": "2020년 기출문제"}, {"id": "헌법-0484", "subject": "헌법", "section": "정치", "qnum": 485, "stem": "목사후보생, 전도사, 강도사에 대한 설명으로 틀린 것은?", "choices": ["목사후보생과 강도사는 교회의 준직원이다.", "총신 신학대학원의 지도를 받아야 한다.", "당회의 치리 하에 있다.", "직무상으로는 노회의 치리를 받는다.", "개인적으로는 교회에 소속되어 있다."], "answer": 2, "explanation": "2019년 기출문제"}, {"id": "헌법-0485", "subject": "헌법", "section": "정치", "qnum": 486, "stem": "다음 중 강도사의 기관청빙에 관한 설명으로 맞지 않는 것은?", "choices": ["종교상 도리와 본분을 교훈하는 직무를 당할 때 목사로 임직할 수 있다.", "기독교신문이나 서적에 관한 일에 시무하는 경우 목사로 임직할 수 있다.", "노회나 지교회나 교회에 관계되는 기독교 교육기관에서 청빙을 받을 때 목사로 임직할 수 있다.", "청빙을 받지 못해도 기관목사로 임직 받을 수 있다."], "answer": 4, "explanation": "정치 제4장 제3조 2.4.5.6항, 제15장 제1조 참고 — 목사의 직무 하나님께서 모든 목사 되는 자에게 각각 다른 은혜를 주사 상당한 사역을 하게 하시니 교회는 저희 재능대 로 목사나 교사나 그 밖의 다른 직무를 맡길 수 있다(엡 4:11). 1. 목사가 지교회를 관리할 때는 양무리 된 교인을 위하여 기도하며, 하나님 말씀으로 교훈하고 강도하며, 찬송하는 일과 성례를 거행할 것이요, 하나님을 대리하여 축복하고 어린이와 청년을 교육하며 고시하고 교우를 심방하며 궁핍한 자와 병자와 환난 당한 자를 위로하고 장로와 합력(솜/])하여 치리권을 행사한다. 2. 목사가 종교상 도리와 본분을 교훈하는 직무를 받을 때는 목자같이 돌아보며 구원하기 위하여 각 사람의 마음 가운데 성경의 씨를 뿌리고 결실되도록 힘쓴다. 3. 선교사로 외국에 선교할 때에는 성례를 거행하며 교회를 설립하고 조직할 권한이 있다. 4. 목사가 기독교 신문이나 서적에 관한 사무를 시무하는 경우에는 교회에 덕의(:)를 세우고 복음을 전하는 데 유익하도록 힘써야 한다. 5. 기독교 교육 지도자로 목사가 노회나 지교회나 교회에 관계되는 기독교 교육 기관에서 청빙을 받으면 교육하는 일로 시무할 수 있다. 6. 강도사가 위 2, 4, 5항의 직무를 감당할 때 노회의 고시를 받고 지교회 목사가 될 자격까지 충분한 줄로 인정하면 목사로 임직할 수 있다. 7. 동성애자와 본 교단의 교리에 위배되는 이단에 속한 자가 요청하는 집례를 거부하고, 교회에 …"}, {"id": "헌법-0486", "subject": "헌법", "section": "정치", "qnum": 487, "stem": "다음 중 강도사의 기관청빙에 관한 설명으로 옳은 것은? @ 강도사는 지교회의 청빙이 없으면 목사로 임직할 수 없다.", "choices": ["강도사는 지교회의 청빙이 없으면 목사로 임직할 수 없다.", "기독교신문이나 서적에 관한 일에 시무하는 경우 지교회 목사가 될  "section": "정치", "qnum": 489, "stem": "다음 중 강도사는 어디에 속하는가?", "choices": ["개인적-당회, 직무상-노회", "개인적-당회, 직무상 -총회", "개인적-노회, 직무상-총회", "개인적-노회, 직무상-노회"], "answer": 1, "explanation": null}, {"id": "헌법-0489", "subject": "헌법", "section": "정치", "qnum": 490, "stem": "강도사고시 및 인허는 어디에서 하는가?", "choices": ["고시와 인허는 총회에서 한다.", "고시는 총회, 인허는 교회", "고시는 노회, 인허는 총회", "고시는 총회, 인허는 노회"], "answer": 4, "explanation": "14장- 3, 5조 ※ 2016년 기출문제"}, {"id": "헌법-0490", "subject": "헌법", "section": "정치", "qnum": 491, "stem": "다음 중 목사후보생과 강도사 양성의 요의에 관한 설명으로 옳지 않은 것은?", "choices": ["목사의 중임을 연약하고 부적당한 자에게 위임함으로 성역이 사람의 멸시됨을 면하기 위하여 교회를 교도 치리할 자의 능력을 시험해야 한다.", "목사후보생이란 목사가 되기 원하여 신학을 학습하는 남자세례교인이다.", "목사후보생은 당회가 실시하는 목사후보생고시에 합격하여야 한다.", "노회가 강도사로 인허한 후 특별한 이유가 없으면 총회고시 합격 후 1개년 이상 노회 지도 아 래서 본직의 경험을 수양한 후에야 목사고시에 응할 수 있다."], "answer": 3, "explanation": "정치 제14장 제1조 참고 — 양성의 요의(춤) 목사의 중임을 연약하고 부적당(Tm)한 자에게 위임함으로 성역(14)이 사람의 멸시됨을 면하기 위하며, 또한 교회를 교도(행복) 치리할 자의 능력을 알기 위하여 성경에 명한 대로 목사 지원자를 먼저 시험하는 것이 가하다(딤전 3:6, 딤후 2:2). 이러므로 총회가 신학 졸업생을 고시하고, 노회가 강도사로 인허한 후, 그 강도사는 특별한 이유가 없으면 총회 고시 합격 후 1개년 이상 노회 지도 아래서 본직의 경험을 수양한 후에야 목사 고시에 응할 수 있다."}, {"id": "헌법-0491", "subject": "헌법", "section": "정치", "qnum": 492, "stem": "다음 중 목사후보생의 자격에 관한 설명으로 옳지 않은 것은?", "choices": ["성경의 원리와 법의 규정에 의하여 남자라야 한다.", "무흠 입교인이라야 목사 후보생의 자격이 있다", "소명의식이 분명한 자라야 한다.", "타 교파 교회 교인도 제한 없이 본 교단의 목사후보생이 될 수 있다."], "answer": 4, "explanation": "정치 제14장 1조"}, {"id": "헌법-0492", "subject": "헌법", "section": "정치", "qnum": 493, "stem": "다음 중 강도사에 관한 설명으로 옳지 않은 것은?", "choices": ["강도인허를 받은 목사후보생을 강도사라 한다.", "강도사는 담임목사가 아니라도 당회에 참석할 수 있고 공동의회 의장도 될 수 있다.", "강도사가 4년간 강도하는 데 덕을 세우지 못하는 경우에는 노회 결의에 의하여 인허를 취소할 수 있다.", "강도사 인허란 총회가 실시하는 강도사고시에 합격한 자를 본 노회가 정식으로 강도함을 승인 하는 예식을 강도사 인허식이라고 한다."], "answer": 2, "explanation": "정치 제14장 제3, 5. 6, 8조 참고"}, {"id": "헌법-0493", "subject": "헌법", "section": "정치", "qnum": 494, "stem": "강도사고시에 제출할 서류가 아닌 것은?", "choices": ["노회추천서", "총회추천서", "이력서", "지원서"], "answer": 2, "explanation": "14장 3조"}, {"id": "헌법-0494", "subject": "헌법", "section": "정치", "qnum": 495, "stem": "강도사고시 종목이 아닌 것은?", "choices": ["조직신학", "예배모범", "구두", "교회사"], "answer": 2, "explanation": "14장 4조"}, {"id": "헌법-0496", "subject": "헌법", "section": "정치", "qnum": 497, "stem": "다음 중 강도사 고시 및 인허에 대한 설명으로 옳지 않은 것은? • 강도사 인허를 청원하는 자는 반드시 총회가 지교회의 무흠 회원 됨을 증명하는 당회증명과 노 회추천서 및 지원서와 이력서를 제출하게 한다.", "choices": ["강도사 인허를 청원하는 자는 반드시 총회가 지교회의 무흠 회원 됨을 증명하는 당회증명과 노 회추천서 및 지원서와 이력서를 제출하게 한다.", "본 장로회 신학교를 졸업하지 않아도 소속노회의 추천이 있으면 강도사고시에 응할 수 있다.", "고시는 총회가 하나 인허는 노회가 한다.", "총회는 그 사람의 신턱과 종교상 이력을 시문하여 성역을 구하는 이유를 묻고 고시는 신중히 한다."], "answer": 2, "explanation": "정치 제14장 제3조 참고 — 강도사 고시 및 인허 강도사 인허를 청원하는 자는 반드시 총회가 그 덕행(15)이 단정함과 지교회의 무흠 회원 됨을 증명하는 당회 증명과 노회 추천서 및 지원서와 이력서를 제출하게 할 것이요, 총회는 그 사람의 신덕과 종교상 이력 을 시문(#터)하며 성역(14)을 구하는 이유를 묻되 그 고시는 신중히 하고 인허는 노회가 한다."}, {"id": "헌법-0497", "subject": "헌법", "section": "정치", "qnum": 498, "stem": "다음 중 강도사고시 응시자의 제출서류에 대한 설명으로 옳지 않은 것은?", "choices": ["당회장의 증명서(품행단정여부, 무흠기록을 갖출 것)", "노회의 추천서(목사 되기에 합당하다는 내용을 갖출 것)", "본인의 지원서와 이력서 및 신학교 졸업증명서", "강도사 고시합격증"], "answer": 4, "explanation": "정치 제14장 제3조 — 강도사 고시 및 인허 강도사 인허를 청원하는 자는 반드시 총회가 그 덕행(15)이 단정함과 지교회의 무흠 회원 됨을 증명하는 당회 증명과 노회 추천서 및 지원서와 이력서를 제출하게 할 것이요, 총회는 그 사람의 신덕과 종교상 이력 을 시문(#터)하며 성역(14)을 구하는 이유를 묻되 그 고시는 신중히 하고 인허는 노회가 한다."}, {"id": "헌법-0498", "subject": "헌법", "section": "정치", "qnum": 499, "stem": "다음 중 강도사고시 종목이 아닌 것은?", "choices": ["조직신학과 교회사", "교회사와 교회헌법(정치)", "주해와 강도", "권징조례와 예배모범"], "answer": 4, "explanation": "정치 제14장 제4조 참고 — 고시 종목 고시는 구두(미)와 필기 2종이 있으니 그 과목은 아래와 같다. 조직신학, 교회 헌법, 교회사, 논문, 주해(1), 강도. 고시부장은 강도사 지원자의 실지 능력을 알아보기 위하여 고시 5개월 전에 아래와 같은 고시 문제를 556 제3부 헌법(정치) 준다. 논문, 주해(13), 강도."}, {"id": "헌법-0499", "subject": "헌법", "section": "정치", "qnum": 500, "stem": "다음 중 강도사 인허와 인허의 중요성과 인허 후 이전에 관한 설명이 아닌 것은? 8", "choices": ["강도사 인허를 받지 못하면 강도할 공인의 자격이 없는 것이다.", "강도사 인허를 받은 후에 다른 노회지방으로 이거하게 되면 노회의 허락을 얻어 강도사 이명증 서를 받아 그 노회에 드린다.", "강도사는 노회원이 아니므로 당회장의 이명증서로 다른 노회로 이명한다.", "총회에서 시행하는 강도사고시에 합격한 다음 해당노회에서 인허 받는다."], "answer": 3, "explanation": "정치 제14장 제6,7조 참고"}, {"id": "헌법-0500", "subject": "헌법", "section": "정치", "qnum": 501, "stem": "다음 중 목사 후보생에 대한 설명으로 틀린 것은 무엇인가?", "choices": ["교회에서 자격 심사를 받은 자", "노회의 지도하에 신학을 공부하는 자", "개인으로는 그 당회의 관리 아래 있다.", "직무상으로는 노회 관리 아래 있다."], "answer": 1, "explanation": "정치 제3장 제4조 — 준직원(#랜트) 강도사와 목사 후보생은 준직원이다. 1. 강도사는 당회의 추천에 의하여 총회의 고시로 노회에서 강도할 인허를 받고 그 지도대로 일하되 교회 치리권은 없다. 2. 목사 후보생은 목사직을 희망하는 자로 노회에서 자격 심사를 받고 그 지도대로 신학에 관한 학과로써 수양을 받는 자이다. 3. 강도사와 목사 후보생은 개인으로는 그 당회 관리 아래 있고 직무상으로는 노회 관리 아래 있다."}, {"id": "헌법-0501", "subject": "헌법", "section": "정치", "qnum": 502, "stem": "목사후보생과 강도사에 관한 설명으로 옳지 않은 것은?", "choices": ["목사의 중임이 멸시함을 받지 않기 위해서 목사지원자를 먼저 시험하는 것이 옳다.", "강도사 고시에 응시하려면 2년 이상의 교회 사역 경험이 있어야 한다.", "강도사 인허 후 1년 이상 노회의 지도 아래 본직의 경험을 수양해야 목사 고시에 응할 수 있다.", "교단이 인정하는 신학교에 입학하고자 하면 노회에 청원하여 그 노회의 관하에서 양성을 받는다.", "본 교단의 지도아래 수양을 받지 않은 자는 신학졸업 후, 1년간 총회 신학교에서 신학과 교회 헌법을 수업한 후에 강도사 고시 자격을 얻을 수 있다."], "answer": 3, "explanation": "강도사 인허 후가 아니라, 강도사 고시 합격 후 1년이 경과해야 한다. (정치 제14장 1조, 2조) 2번은 104회 총회 결의임."}, {"id": "헌법-0502", "subject": "헌법", "section": "정치", "qnum": 503, "stem": "강도사 인허에 관한 설명으로 옳지 않은 것은?", "choices": ["강도사가 되려 하는 자는 총회의 치리에 복종하겠다고 서약한다.", "총회는 강도사 고시를 시행하며 인허는 노회가 한다.", "강도사 인허를 청원하는 자는 무흠 회원임을 증명하는 당회증명을 제출해야 한다.", "인허 후에 다른 지방 노회로 이거하려면 강도사 이명증서를 받아 그 노회에 드린다. ® 4년간 강도하는 데 덕을 세우지 못한 경우에는 자동으로 강도사 인허가 취소된다."], "answer": 1, "explanation": "강도사 인허식에서는 \"노회의 치리에 복종\"한다는 것을 서약할 뿐이다. 총회의 정치, 권징조례, 예배모범을 받아들이겠다고 서약 하는 것은 목사 임직에서의 서약이다. @ 각급 치리회"}, {"id": "헌법-0503", "subject": "헌법", "section": "정치", "qnum": 504, "stem": "장로교회 정치는 치리회를 중심으로 이루어진다. 다음 중 치리회가 아닌 것은 무엇인가?", "choices": ["당회", "시찰회", "노회", "대회", "총회"], "answer": 2, "explanation": "1997년 강도사 고시 문제 ※ 시찰회는 치리회가 아니다."}, {"id": "헌법-0504", "subject": "헌법", "section": "정치", "qnum": 505, "stem": "각 치리회의 고유한 특권에 대한 설명으로 옳지 않은 것은? 당회는 한 지교회의 교인을 다스리는 직무와 직권이 있다.", "choices": ["노회는 총회가 정한 구역 안에 교회를 설립, 합병 등 각 지교회를 통치한다.", "노회와 총회는 도리와 헌법을 해석할 전권이 있다.", "총회는 소원, 상소, 청원, 헌의건 등을 접수 처리하는 최종치리회이다.", "노회는 소속 노회의 목사에 대한 치리권을 갖는다."], "answer": 3, "explanation": "도리와 헌법 해석할 전권은 오직 총회만 갖는다. ※ 정치 총론 5. 정치 제9장 제5조, 제10장 제6조, 제12장 제4.5조."}, {"id": "헌법-0505", "subject": "헌법", "section": "정치", "qnum": 506, "stem": "교회를 치리하는 것과 관련된 설명으로 옳은 것은 무엇인가?", "choices": ["교회는 신성한 기관이므로 정치 조직과 제도를 필요로 하지 않는다.", "교회의 치리권은 목사에게 있고, 당회는 이를 협력하는 것이다.", "가장 성경적인 교회 치리는 시무 장로들을 통해서 이루어지는 것이다.", "치리권은 그 치리회에 배타적으로 귀속된 것이므로 상회는 전혀 간여할 수 없다.", "교회의 치리권은 협의적, 봉사적, 영적, 도덕적이어야 한다."], "answer": 5, "explanation": "1번에서 교회는 정치와 조직을 필요로 한다. 2번에서 치리권은 개인에게 있지 않고, 치리회에 귀속된다. 3번에서 가장 성경적인 교회 치리는 치리회를 통해서 이루어진다. 4번에서 치리권은 고유한 권한이지만, 배타적 권한은 아니다. 상급치리회의 검사와 관 찰을 받는다. (정치 제8장 2조) ※ 김룡, 2부)을 파#』 (서울: 총신대학출판부, 1984), 292 참조"}, {"id": "헌법-0506", "subject": "헌법", "section": "정치", "qnum": 507, "stem": "치리회의 성질과 관할에 대한 설명으로 옳지 않은 것은? • 모든 치리회는 총회적 성질을 갖는다.", "choices": ["각 치리회는 각 사건을 처리함에 고유한 특권이 있다.", "교회의 교리와 정치에 대한 쟁론 사건은 순서를 따라 상회로 상소함이 가하다.", "각 치리회가 처결한 것은 전국교회의 결정이 된다.", "각 치리회의 관할 영역에서 이루어진 사건에 대하여 상급치리회가 자의적으로 간섭할 수는 없다."], "answer": 1, "explanation": "1번의 경우, 모든 치리회는 총회적 성질을 갖는 것이 아니라 노회적 성질을 갖는다고 하는 것이 옳다. 5번의 경우에는 각 치리 회는 고유한 특권이 있으므로 상급치리회가 자의적으로 간섭할 수는 없지만, 법적인 근거를 갖고 있는 경우에는 간섭할 수 없다."}, {"id": "헌법-0508", "subject": "헌법", "section": "정치", "qnum": 509, "stem": "치리회에게 부여된 권한에 대한 설명으로 옳지 못한 것은? 각 치리회는 국법상의 시벌을 과하는 권한이 없다.", "choices": ["교회의 질서에 불복하는 자에게 교인의 특권을 향유하지 못하게 할 수 있다.", "성경적 권위를 보장하기 위하여 증거를 수합하여 시벌할 수 있다.", "관할 밖에 있는 자라도 소환하여 증거를 제출하게 할 수 있다.", "교리에 패역한 자와 회개치 아니한 자를 교인 중에서 출교할 수 있다."], "answer": 4, "explanation": "관할 아래 있는 교인을 소환하여 증거를 제출하게 할 수 있을 뿐이다. (정치 제8장 4조)"}, {"id": "헌법-0509", "subject": "헌법", "section": "정치", "qnum": 510, "stem": "다음 중 각 치리회의 고유한 특권에 대한 설명으로 맞지 않는 것은? 당회는 한 지교회의 교인을 다스리는 직무와 직권이 있다.", "choices": ["당회는 한 지교회의 교인을 다스리는 직무와 직권이 있다.", "노회는 총회가 정한 구역 안에 교회를 설립, 합병, 등 각 지교회를 통치한다.", "노회와 총회는 도리와 헌법을 해석할 전권이 있다.", "총회는 소원, 상소, 청원, 헌의건 등을 접수 처리하는 최종치리회이다."], "answer": 3, "explanation": "정치총론 5. 정치 제9장 제5조, 제10장 제6조, 제12장 제4.5조."}, {"id": "헌법-0510", "subject": "헌법", "section": "정치", "qnum": 511, "stem": "다음 중 치리회가 아닌 것은?", "choices": ["당회", "공동의회", "노회", "총회"], "answer": 2, "explanation": "2020년 기출문제"}, {"id": "헌법-0511", "subject": "헌법", "section": "정치", "qnum": 512, "stem": "다음 중 헌의 및 청원에 대하여 결의하는 것을 목적으로 하는 회의체가 아닌 것은?", "choices": ["당회", "노회", "시찰회", "공동의회"], "answer": 3, "explanation": null}, {"id": "헌법-0512", "subject": "헌법", "section": "정치", "qnum": 513, "stem": "다음 중 치리회 안에서 목사와 장로의 권한의 동등에 관한 설명으로 옳은 것은?", "choices": ["목사와 장로는 치리회 안에서 결의권이 동등하다.", "목사가 항상 장(토)이 되게 한 것은 위헌적이다.", "목사와 장로는 언제나 노회나 총회의 사무에 대한 권한이 있다.", "목사가 없는 허위교회에서는 장로도 당회장이 될 수 있다."], "answer": 1, "explanation": "정치 제5장 제2조, 136번 문제 해설 참고 — 장로의 권한 강도와 교훈은 그의 전무 책임은 아니나 각 치리회에서는 목사와 같은 권한으로 각 항 사무를 처리한다(딤 전 5:17, 롬 12:78) 헌"}, {"id": "헌법-0513", "subject": "헌법", "section": "정치", "qnum": 514, "stem": "다음 중 치리회 안에서 목사와 장로의 권한이 동등해야 하는 이유는?", "choices": ["양권의 동등은 교회의 부패를 방지하기 위해서이다.", "목사와 장로는 치리회 안에서 결의권이 동등하다.", "목사는 언제나 노회나 총회의 사무에 대한 권한이 있다.", "목사가 없는 허위교회에서는 장로도 당회장이 될 수 있으므로,"], "answer": 1, "explanation": "정치 제5장 제2조, 136번 해설 참고 — 장로의 권한 강도와 교훈은 그의 전무 책임은 아니나 각 치리회에서는 목사와 같은 권한으로 각 항 사무를 처리한다(딤 전 5:17, 롬 12:78) 헌"}, {"id": "헌법-0514", "subject": "헌법", "section": "정치", "qnum": 515, "stem": "다음 중 치리회 안에서 목사와 장로의 권한의 동등에 대한 설명으로 옳지 않은 것은?", "choices": ["성직권과 기본권의 동등과 형평을 유지케 하는 적당한 방도가 되기 때문이다.", "성직권과 기본권의 동등은 교회의 부패를 방지하기 위해서이다.", "치리회 안에서 목사와 장로는 권한이 동등한데 목사가 항상 당회장이 되는 것은 불공평하다.", "목사와 장로는 치리에서 결의권이 동등하다."], "answer": 3, "explanation": "정치 제5장 제2조, 136번 문제 해설 참고 — 장로의 권한 강도와 교훈은 그의 전무 책임은 아니나 각 치리회에서는 목사와 같은 권한으로 각 항 사무를 처리한다(딤 전 5:17, 롬 12:78) 헌"}, {"id": "헌법-0515", "subject": "헌법", "section": "정치", "qnum": 516, "stem": "다음 중 목사직과 장로직의 차이점에 대한 설명으로 옳지 않은 것은? \" 목사와 장로는 그 택하여 세우는 회가 다르다", "choices": ["목사와 장로는 그 택하여 세우는 회가 다르다", "장로는 목사가 장립하고 목사는 노회가 장립한다.", "장로가 목사가 될 때에는 다시 장립을 받을 필요가 없다.", "장로는 성례(세례와 성찬)를 관리하지 못한다."], "answer": 3, "explanation": "정치 제4장 제3조, 제5장 제4조 1항, 제13장 1,2.3조, 제15장 1-3,5,6.9,10조 참고, 1930년 제19회 총회 결의(목사는 강도 권, 축도권, 당회장권이 있고 장로에게는 없다. 장로가 안수 및 축복 기도를 못하는 이유에 대하여는 성경 중 사도의 행한 것으 로 목사가 그 특권을 전수하여 금일까지 거행했기 때문이다) — 목사의 직무 하나님께서 모든 목사 되는 자에게 각각 다른 은혜를 주사 상당한 사역을 하게 하시니 교회는 저희 재능대 로 목사나 교사나 그 밖의 다른 직무를 맡길 수 있다(엡 4:11). 1. 목사가 지교회를 관리할 때는 양무리 된 교인을 위하여 기도하며, 하나님 말씀으로 교훈하고 강도하며, 찬송하는 일과 성례를 거행할 것이요, 하나님을 대리하여 축복하고 어린이와 청년을 교육하며 고시하고 교우를 심방하며 궁핍한 자와 병자와 환난 당한 자를 위로하고 장로와 합력(솜/])하여 치리권을 행사한다. 2. 목사가 종교상 도리와 본분을 교훈하는 직무를 받을 때는 목자같이 돌아보며 구원하기 위하여 각 사람의 마음 가운데 성경의 씨를 뿌리고 결실되도록 힘쓴다. 3. 선교사로 외국에 선교할 때에는 성례를 거행하며 교회를 설립하고 조직할 권한이 있다. 4. 목사가 기독교 신문이나 서적에 관한 사무를 시무하는 경우에는 교회에 덕의(:)를 세우고 복음을 전하는 데 유익하도록 힘써야 한다. 5. 기독교 교육 지도자로 목사가 노회나 지교회나 교회에 관계되는 기독교 교육 기관에서 청빙을 받으면 교육하는 일로 시무할 수 있다. 6. 강도사가 위 2, 4, 5항의 직무를 감당할 때 노회의 고시를 받고 지교회 목사가 될 자격까지 충분한 줄로 인정하면 목사로 임직할 수 있다. 7. 동성애자와 본 교단의 교리에 위배되는 이단에 속한 자가 요청하는 집례를 거부하고, 교회에 …"}, {"id": "헌법-0516", "subject": "헌법", "section": "정치", "qnum": 517, "stem": "다음 중 목사직과 장로직의 차이점에 대한 설명으로 옳은 것은?", "choices": ["목사는 강도권, 축도권, 당회장권이 있고 장로에게는 없다.", "장로가 목사가 될 때에는 다시 장립을 받을 필요가 없다.", "비상한 경우에는 장로도 성례(세례와 성찬)를 관리할 수 있다.", "장로도 치리회 안에서 동등한 권한이 있으므로 목사 임직에 참여할 수 있다."], "answer": 1, "explanation": "정치 제4장 제3조, 제5장 제4조 1항, 제13장 1-3조, 제15장 1-3.5.6.9, 10조 — 목사의 직무 하나님께서 모든 목사 되는 자에게 각각 다른 은혜를 주사 상당한 사역을 하게 하시니 교회는 저희 재능대 로 목사나 교사나 그 밖의 다른 직무를 맡길 수 있다(엡 4:11). 1. 목사가 지교회를 관리할 때는 양무리 된 교인을 위하여 기도하며, 하나님 말씀으로 교훈하고 강도하며, 찬송하는 일과 성례를 거행할 것이요, 하나님을 대리하여 축복하고 어린이와 청년을 교육하며 고시하고 교우를 심방하며 궁핍한 자와 병자와 환난 당한 자를 위로하고 장로와 합력(솜/])하여 치리권을 행사한다. 2. 목사가 종교상 도리와 본분을 교훈하는 직무를 받을 때는 목자같이 돌아보며 구원하기 위하여 각 사람의 마음 가운데 성경의 씨를 뿌리고 결실되도록 힘쓴다. 3. 선교사로 외국에 선교할 때에는 성례를 거행하며 교회를 설립하고 조직할 권한이 있다. 4. 목사가 기독교 신문이나 서적에 관한 사무를 시무하는 경우에는 교회에 덕의(:)를 세우고 복음을 전하는 데 유익하도록 힘써야 한다. 5. 기독교 교육 지도자로 목사가 노회나 지교회나 교회에 관계되는 기독교 교육 기관에서 청빙을 받으면 교육하는 일로 시무할 수 있다. 6. 강도사가 위 2, 4, 5항의 직무를 감당할 때 노회의 고시를 받고 지교회 목사가 될 자격까지 충분한 줄로 인정하면 목사로 임직할 수 있다. 7. 동성애자와 본 교단의 교리에 위배되는 이단에 속한 자가 요청하는 집례를 거부하고, 교회에 …"}, {"id": "헌법-0517", "subject": "헌법", "section": "정치", "qnum": 518, "stem": "다음 중 목사직과 장로직의 동등한 점은 무엇인가?", "choices": ["목사는 다른 당회의 청함을 받아 임시당회장이 될 수 있으나 치리장로의 직분을 임시라도 행하 지 못한다.", "장로는 각 치리회에서는 목사와 같은 권한으로 각 사무를 처리한다.", "장로도 당회장으로 파송받은 목사와 같이 다른 교회 당회원이 될 수 있다.", "각 치리회 안에서 권한이 같으므로 목사도 장로의 직분을 행할 수 있다."], "answer": 2, "explanation": "정치 제5장 제2조 참고 — 장로의 권한 강도와 교훈은 그의 전무 책임은 아니나 각 치리회에서는 목사와 같은 권한으로 각 항 사무를 처리한다(딤 전 5:17, 롬 12:78) 헌"}, {"id": "헌법-0518", "subject": "헌법", "section": "정치", "qnum": 519, "stem": "다음 중 목사직과 장로직의 사역상 동등한 권리는?", "choices": ["장로도 자동으로 목사와 같이 노회원이므로 노회 관할 교회를 총찰할 수 있다.", "치리회에서 각항 사무를 처리할 때 발언권과 결의권이 동등하다.", "각 치리회 안에서 권한이 같으므로 목사도 장로의 직분을 행할 수 있다.", "장로는 상회원이 되어도 복사와 동등한 권리를 가질 수 없다."], "answer": 2, "explanation": "정치 제5장 제2조 — 장로의 권한 강도와 교훈은 그의 전무 책임은 아니나 각 치리회에서는 목사와 같은 권한으로 각 항 사무를 처리한다(딤 전 5:17, 롬 12:78) 헌"}, {"id": "헌법-0519", "subject": "헌법", "section": "정치", "qnum": 520, "stem": "다음 중 장로의 목사와의 협동에 대한 설명으로 옳지 않은 것은? 장로의 직무인 치리권 및 치리권과 관계되는 직무는 장로가 독담하는 직무나 권세가 아니다. ® 교회의 모든 직무의 중심인 말씀 증거직무를 전담하는 목사와 협동해야 한다.", "choices": ["장로의 직무인 치리권 및 치리권과 관계되는 직무는 장로가 독담하는 직무나 권세가 아니다.", "교회의 모든 직무의 중심인 말씀 증거직무를 전담하는 목사와 협동해야 한다.", "목사나 장로나 치리회 안에서 동등한 만큼 치리회 밖에서도 동등하다.", "치리회 안에서는 동등한 치리회원이지만 치리회 밖에서는 목사의 교훈에 순복할 양 무리 중의 한 사람이다."], "answer": 3, "explanation": "정치 제5장 제4조 1항 — 장로의 직무 1. 교회의 신령적 관계를 총찰한다. 치리 장로는 교인의 택함을 받고 교인의 대표자로 목사와 협동하여 행정과 권징을 관리하며, 지교회 혹은 전국 교회의 신령적 관계를 총찰한다. 2. 도리 오해(콤(주)나 도덕상 부패를 방지한다. 주께 부탁 받은 양무리가 도리 오해나 도덕상 부패에 이르지 않기 위하여 당회로나 개인으로 선히 권면 하되 회개하지 아니하는 자가 있을 때에는 당회에 보고한다. 1. 헌법(정치) 전문 545 총회 강도사고시 문제집 3. 교우를 심방하되 위로, 교훈, 간호한다. 교우를 심방하되 특별히 병자와 조상자(3토#)를 위로하며 무식한 자와 어린아이들을 가르치며 간호할 것이니 평신도보다 장로는 신분(화)상 의무와 직무(83)상 책임이 더욱 중하다. 4. 교인의 신앙을 살피고 위하여 기도한다. 장로는 교인과 함께 기도하며, 위하여 기도하고 교인 중에 강도의 결과를 찾아본다. 5. 특별히 심방할 자를 목사에게 보고한다. 병환자와 슬픔을 당한 자와 회개하는 자와 특별히 구조 받아야 할 자가 있는 때에는 목사에게 보고한다."}, {"id": "헌법-0520", "subject": "헌법", "section": "정치", "qnum": 521, "stem": "다음 중 장로의 목사와 협력에 대한 설명으로 옳은 것은?", "choices": ["교회의 모든 직무의 중심인 말씀 증거직무를 전담하는 목사와 협동해야 한다.", "장로에게도 치리권이 있으므로 치리권과 관계되는 직무는 독단적으로 할 수 있다.", "장로도 치리권이 있고 치리회 안에서 권한이 동등하므로 반드시 목사를 주체로 할 필요는 없다.", "장로는 언제나 목사에게 무조건 복종해야 한다."], "answer": 1, "explanation": "정치 제5장 제4조 1항, 제4장 제3조 1항, 제8장 제2조 — 장로의 직무 1. 교회의 신령적 관계를 총찰한다. 치리 장로는 교인의 택함을 받고 교인의 대표자로 목사와 협동하여 행정과 권징을 관리하며, 지교회 혹은 전국 교회의 신령적 관계를 총찰한다. 2. 도리 오해(콤(주)나 도덕상 부패를 방지한다. 주께 부탁 받은 양무리가 도리 오해나 도덕상 부패에 이르지 않기 위하여 당회로나 개인으로 선히 권면 하되 회개하지 아니하는 자가 있을 때에는 당회에 보고한다. 1. 헌법(정치) 전문 545 총회 강도사고시 문제집 3. 교우를 심방하되 위로, 교훈, 간호한다. 교우를 심방하되 특별히 병자와 조상자(3토#)를 위로하며 무식한 자와 어린아이들을 가르치며 간호할 것이니 평신도보다 장로는 신분(화)상 의무와 직무(83)상 책임이 더욱 중하다. 4. 교인의 신앙을 살피고 위하여 기도한다. 장로는 교인과 함께 기도하며, 위하여 기도하고 교인 중에 강도의 결과를 찾아본다. 5. 특별히 심방할 자를 목사에게 보고한다. 병환자와 슬픔을 당한 자와 회개하는 자와 특별히 구조 받아야 할 자가 있는 때에는 목사에게 보고한다."}, {"id": "헌법-0521", "subject": "헌법", "section": "정치", "qnum": 522, "stem": "다음 중 정치의 필요에 대한 설명으로 맞지 않는 것은?", "choices": ["교회를 치리함에는 명백한 정치와 조직이 있어야 한다.", "교회의 치리권은 당회, 노회, 대회, 총회 같은 치리회에 있다.", "교회는 하나님이 통치하시니 정치는 필요 없다.", "교회의 치리권은 개인에게 있지 않다."], "answer": 3, "explanation": "정치 제8장 제1조 참고 — 정치의 필요 교회를 치리함에는 명백한 정치와 조직이 있어야 한다(고전 14:40). 정당한 사리(화)와 성경 교훈과 사도 시대 교회의 행사(F특)에 의지한즉 교회 치리권은 개인에게 있지 않고 당회, 노회, 대회, 총회 같은 치리회에 있다(행 15:6)."}, {"id": "헌법-0522", "subject": "헌법", "section": "정치", "qnum": 523, "stem": "교회정치의 필요에 관한 설명으로 옳은 것은?", "choices": ["교회를 치리함에는 명백한 정치와 조직이 있어야 하며 교회 치리권은 개인에게 있지 않고 당회, 노회, 대회, 총회 같은 치리회에 있다.", "교회는 하나님이 다스리시니 정치는 필요하지 않다.", "교회의 치리권은 당회, 공동의회 등 치리회에 있다.", "개인이 치리권을 행사하게 되면 치리권자의 영향력에 따라 소신껏 일할 수 있다."], "answer": 1, "explanation": "정치 제8장 제1조 — 정치의 필요 교회를 치리함에는 명백한 정치와 조직이 있어야 한다(고전 14:40). 정당한 사리(화)와 성경 교훈과 사도 시대 교회의 행사(F특)에 의지한즉 교회 치리권은 개인에게 있지 않고 당회, 노회, 대회, 총회 같은 치리회에 있다(행 15:6)."}, {"id": "헌법-0523", "subject": "헌법", "section": "정치", "qnum": 524, "stem": "다음 정치의 필요 중 교회와 조직과 정치와의 관계에 대한 설명으로 옳지 않은 것은?", "choices": ["교회는 사회성을 지니고 있기에 반드시 조직이 따르게 되고 조직이 있는 곳에는 정치가 있기 마련이다.", "조직과 정치가 공존하는 곳에 올바른 교회가 존재한다.", "교회는 조직과 정치의 밀접한 관계를 유지하며 하나님의 나라를 확장해 가고 있는 것이다.", "조직이 없어도 교회는 목회자의 지도에 따라 얼마든지 바른 정치를 할 수 있다."], "answer": 4, "explanation": "정치 제8장 제1.2조"}, {"id": "헌법-0524", "subject": "헌법", "section": "정치", "qnum": 525, "stem": "다음 정치의 필요 중 치리권의 소재에 대한 설명으로 맞지 않는 것은?", "choices": ["교회의 치리권은 개인에게 있는 것이 아니라 당회, 노회 등에 있다.", "성경의 역사가 치리권을 치리회에 있게 한 것이다.", "당회나 노회 등 치리회에서 치리권을 행사하면 큰 오류는 범하지 않는다.", "당회나 노회, 총회 등 치리회에서 치리권을 행사해도 큰 오류는 범할 수 있다."], "answer": 3, "explanation": "정치 제8장 제1조 — 정치의 필요 교회를 치리함에는 명백한 정치와 조직이 있어야 한다(고전 14:40). 정당한 사리(화)와 성경 교훈과 사도 시대 교회의 행사(F특)에 의지한즉 교회 치리권은 개인에게 있지 않고 당회, 노회, 대회, 총회 같은 치리회에 있다(행 15:6)."}, {"id": "헌법-0525", "subject": "헌법", "section": "정치", "qnum": 526, "stem": "다음 정치의 필요 중 치리권의 성질과 관할에 대한 설명으로 맞지 않는 것은?", "choices": ["각 치리회에 등급이 있다.", "각 회는 고유한 특권이 있으나 순서대로 상회의 검사와 관할을 받는다.", "각 치리회는 각립한 개체가 아니요 서로 연합한 연합체이다.", "각 치리회에서 결정한 사항은 그 치리회에 한한다."], "answer": 4, "explanation": "정치 제8장 제2조 — 치리회의 성질과 관할 교회 각 치리회에 등급(쪽)은 있으나 각 회 회원은 목사와 장로분이므로 각 회가 다 노회적 성질이 있으며, 같은 자격으로 조직한 것이므로 같은 권리가 있으나 그 치리의 범위는 교회 헌법에 규정하였다. 1. 교회의 교리와 정치에 대하여 쟁론(목) 사건이 발생하면 성경 교훈대로 교회의 성결과 화평을 성취하기 위하여 순서에 따라 상회에 상소함이 가하며, 각 치리회는 각 사건을 적법(lit)하게 처리하기 위하여 1. 헌법(정치) 전문 547 총회 강도사고시 문제집 관할 범위를 정할 것이요, 각 회( )는 고유한 특권이 있으나 순서대로 상회의 검사와 관할을 받는다 2. 각 치리회는 각립(표)한 개체가 아니요 서로 연합한 것이니 어떤 회에서 어떤 일을 처결하든지 그 결정은 법대로 대표된 치리회로 행사하게 하는 것인즉 전국 교회의 결정이 된다."}, {"id": "헌법-0526", "subject": "헌법", "section": "정치", "qnum": 527, "stem": "다음 중 치리회가 아닌 것은?", "choices": ["당회", "노회", "공동의회", "총회"], "answer": 3, "explanation": "정치 제8장 제1조 참고 — 정치의 필요 교회를 치리함에는 명백한 정치와 조직이 있어야 한다(고전 14:40). 정당한 사리(화)와 성경 교훈과 사도 시대 교회의 행사(F특)에 의지한즉 교회 치리권은 개인에게 있지 않고 당회, 노회, 대회, 총회 같은 치리회에 있다(행 15:6)."}, {"id": "헌법-0527", "subject": "헌법", "section": "정치", "qnum": 528, "stem": "다음 중 치리회가 아닌 것은? 당회 ② 총회", "choices": ["당회", "총회", "노회", "시찰회"], "answer": 4, "explanation": "정치 제8장 제1조 참고 — 정치의 필요 교회를 치리함에는 명백한 정치와 조직이 있어야 한다(고전 14:40). 정당한 사리(화)와 성경 교훈과 사도 시대 교회의 행사(F특)에 의지한즉 교회 치리권은 개인에게 있지 않고 당회, 노회, 대회, 총회 같은 치리회에 있다(행 15:6)."}, {"id": "헌법-0529", "subject": "헌법", "section": "정치", "qnum": 530, "stem": "다음 중 집사에 관한 원심권을 가진 치리회는 어느 치리회인가?", "choices": ["총회", "@ 노회", "공동의회", "당회"], "answer": 4, "explanation": "정치 제8장 제1조, 제9장 제5조 4항, 권징조례 제4장 제19조 참고 — 정치의 필요 교회를 치리함에는 명백한 정치와 조직이 있 뜻은 성경에 있으므로 성경만 잘 살펴서 처리하면 된다.", "폐회 시 기도는 하나님의 뜻을 찾아 처결하였으니 이 일을 통하여 하나님께 영광이 되며 결정 한 일을 추진할 능력을 주실 것을 기도해야 한다."], "answer": 3, "explanation": "정치 제8장 제3조 참고 — 치리회의 회집 당회와 노회는 매년 1회 이상, 대회와 총회는 매년 1회 회집하되 기도로 개회와 폐회한다."}, {"id": "헌법-0555", "subject": "헌법", "section": "정치", "qnum": 556, "stem": "다음 중 치리회의 재판전에 대한 설명으로 맞지 않는 것은?", "choices": ["주 예수 그리스도의 이름과 그의 직권과 명의로 판결을 선포한다.", "즉결하는 경우 치리회석상에서 범죄와 자복은 재판치리회에서의 범죄와 자복을 말한다.", "고소사건이라고 해서 전부 재판절차를 통하여 판결하는 것이 아니라 정치부에 보내 처리해도 된다.", "각급치리회가 가진 재판권은 오직 겸비한 마음으로 예수 그리스도의 교훈을 따라 처리해야 한다."], "answer": 3, "explanation": "정치 제8장 제4조 참고 — 치리회의 권한 교회 각 치리회는 국법상 시벌(1)을 과()하는 권한이 없고(눅 12:2~14, 요 18:30) 오직 도덕과 신령 상 사건에 대하여 교인으로 그리스도의 법을 순종하게 하는 것뿐이다(행 15:1, 32). 만일 불복하거나 불법한 자가 있으면 교인의 특권을 향유(호)하지 못하게 하며, 성경의 권위를 보장하기 위하여 증거를 수합(내슴) 하여 시벌하며, 교회 정치와 규례(5)를 범한 자를 소환하여 심사하기도 하며, 관할 아래에 있는 교인을 소환하여 증거를 제출하게 할 수도 있으니 가장 중한 벌은 교리에 패역한 자와 회개하지 아니한 자를 교인 중에서 출교할 뿐이다(마 18:15~17, 고전 5:4~5) 제9 당회"}, {"id": "헌법-0556", "subject": "헌법", "section": "정치", "qnum": 557, "stem": "다음 중 장로회 정치의 3심제 하의 치리회가 아닌 것을 고르시오.", "choices": ["당회", "공동의회", "노회", "총회"], "answer": 2, "explanation": "정치 제8장 제1조 — 정치의 필요 교회를 치리함에는 명백한 정치와 조직이 있어야 한다(고전 14:40). 정당한 사리(화)와 성경 교훈과 사도 시대 교회의 행사(F특)에 의지한즉 교회 치리권은 개인에게 있지 않고 당회, 노회, 대회, 총회 같은 치리회에 있다(행 15:6)."}, {"id": "헌법-0557", "subject": "헌법", "section": "정치", "qnum": 558, "stem": "다음 교회 정치와 치리회 중 '제8장 제1조 정치의 필요'에 대한 설명 중 틀린 것은 무엇인가? 교회를 치리함에는 명백한 정치와 조직이 있어야 한다.", "choices": ["교회를 치리함에는 명백한 정치와 조직이 있어야 한다.", "정당한 사리와 성경 교훈을 의지한다.", "사도시대 교회의 행사와는 상관없다.", "교회 치리권은 개인에게 있지 않고 당회, 노회, 대회, 총회 같은 치리회에 있다."], "answer": 3, "explanation": "정치 제8장 제1조 참고 — 정치의 필요 교회를 치리함에는 명백한 정치와 조직이 있어야 한다(고전 14:40). 정당한 사리(화)와 성경 교훈과 사도 시대 교회의 행사(F특)에 의지한즉 교회 치리권은 개인에게 있지 않고 당회, 노회, 대회, 총회 같은 치리회에 있다(행 15:6)."}, {"id": "헌법-0558", "subject": "헌법", "section": "정치", "qnum": 559, "stem": "당회와 노회는 연 몇 회 이상 회집되어야 하는가? \" 1회 ② 2회 ③ 3회 ④ 4회", "choices": ["1회", "2회", "3회", "4회"], "answer": 1, "explanation": "8장 3조 ※ 2016년 기출문제"}, {"id": "헌법-0559", "subject": "헌법", "section": "정치", "qnum": 560, "stem": "교인에 대한 가장 중한 벌은?", "choices": ["수찬정지", "제명", "정직", "출교"], "answer": 4, "explanation": "8장 4조 ※ 2016년 기출문제"}, {"id": "헌법-0561", "subject": "헌법", "section": "정치", "qnum": 562, "stem": "당회에 관한 설명으로 옳지 않은 것을 고르시오", "choices": ["당회가 있는 교회를 조직교회라고 한다.", "당회는 지교회의 파송을 받은 담임목사와 치리장로로 조직한다.", "폐당회는 치리장로가 없어진 상태를 말한다.", "당회를 조직하려는 교회는 세례교인 25인 이상을 요한다.", "세례교인 520명인 교회는 장로를 최대 20명까지 세울 수 있다."], "answer": 2, "explanation": "당회는 노회의 파송을 받아 지교회를 담임하는 목사와 치리장로로 조직한다."}, {"id": "헌법-0562", "subject": "헌법", "section": "정치", "qnum": 563, "stem": "조직교회와 미조직교회에 대한 설명으로 옳은 것은?", "choices": ["세례교인의 수와 상관없이 지교회에 치리장로가 있으면 그 교회는 조직교회이다.", "당회가 조직되어 있어도 세례교인 수가 10명뿐이면 미조직교회이다.", "미조직교회는 세례교인 수가 15인 이상으로 당회가 조직되지 못한 교회이다.", "④", "조직교회이어도 세례교인이 25인담임목사가 사임하게 이상인 교회는 모두 되면 미조직교회가 된다. 조직교회이다."], "answer": 3, "explanation": "1번에서 세례교인이 25인 이상을 유지해야 한다. 2번에서 세례교인이 10명분이면 기도처이다. 교회는 세례교인 15인 이상이어 야 한다. 4번에서는 조직교회에서 담임목사가 사임하면 허위교회가 될 뿐 미조직교회로 되는 것은 아니다. 5번에서 세례 교인이 25인이어도 당화를 조직해야 조직교회가 된다."}, {"id": "헌법-0563", "subject": "헌법", "section": "정치", "qnum": 564, "stem": "다음 중 합법적으로 당회가 개회될 수 있는 경우는 어떤 것인가? 목사를 포함하여 총 2인으로 조직된 당회에 장로 1인이 부득이 참여하지 못한 경우", "choices": ["목사를 포함하여 총 3인으로 조직된 당회에 목사 1인과 장로 1인이 참석한 경우", "목사를 포함하여 총 5인으로 조직된 당회에 목사 1인과 장로 2인이 참석한 경우", "목사를 포함하여 총 7인으로 조직된 당회에 목사 1인과 장로 3인이 참석한 경우", "목사를 포함하여 총 9인으로 조직된 당회에 목사 1인과 장로 4인이 참석한 경우"], "answer": 2, "explanation": "장로 2인인 당회에서는 목사 1인과 장로 1인 이상이 참석하면 성수가 된다. 그러나 그 외의 경우에는 목사와 로 과반수가 참 석해야 된다."}, {"id": "헌법-0564", "subject": "헌법", "section": "정치", "qnum": 565, "stem": "당회장에 대한 설명으로 옳은 것은?", "choices": ["당회장은 교인의 대표자로 지교회의 담임목사가 된다.", "허위교회의 당회는 노회에 속한 목사 1인을 청하여 대리당회장이 되게 할 수 있다.", "본 교회 목사가 신병이 있거나 출타하게 될 때 목사는 자신을 대신하여 당회를 이끌도록 대리 당회장 될 사람을 임의로 지정할 수 있다.", "대리당회장도 당회의 개회성수에 포함되므로 의결권이 있다.", "당회장이 존재하더라도 특별한 사정이 있으면 대리당회장으로 당회를 사회케 할 수 있다."], "answer": 5, "explanation": "당회장이 존재하는 교회에서 당회장 본인의 신상에 관한 것을 처리하거나, 신병이나 출타 중일 경우에는 대리당회장에게 당회를 사회케 할 수 있다. 1번의 경우, 당회장은 교인의 대표가 아닌 교회의 대표자이다. 2번의 경우, 허위교회는 대리당회장을 청할 수 없고, 임시당회장을 청할 수 있다. 3번의 경우, 대리당회장을 지정할 때에는 당회의 결의가 있어야 한다. 4번은 대리당회장 은 개회성수에 포함되지 않으며, 의결권도 없다. 단지 사회만 할 뿐이다."}, {"id": "헌법-0565", "subject": "헌법", "section": "정치", "qnum": 566, "stem": "당회의 임시회장에 대한 설명으로 옳지 않은 것은?", "choices": ["목사가 없는 교회에 노회가 파송한 당회장이다.", "목사가 없는 교회에 노회가 파송한 당회장이 없을 때 당회가 회집할 때마다 청하여 사회케 하 는 목사이다.", "원로복사는 정년이 지났으면 노회 소속 지교회의 임시당회장이 될 수 없다.", "목사가 없는 부득이한 경우에는 자로 중 1인이 회장이 되어 당회를 열어 교인의 행실에 대하여 권장할 수 있다.", "임시당회장은 교회를 대표할 수도 없고, 재판권도 없다."], "answer": 4, "explanation": "3번의 경우, 78회 총회결의는 언권회원은 임시당회장이 될 수 없다고 결의한 바 있다. 이는 정년이 지난 원로목사는 언권회원 일 뿐이므로 노회 소속 지교회의 임시당회장이 될 수 없다. 5번의 경우, 103회 총회결의에 의하면 임시당회장은 재판권이 없다."}, {"id": "헌법-0566", "subject": "헌법", "section": "정치", "qnum": 567, "stem": "당회의 직무에 해당하지 않는 것은?", "choices": ["총회에 파송할 총대를 선정하여 청원한다.", "주소 변경한 교인에게 이명서를 접수 또는 교부하며 제명도 한다.", "목사가 없을 때에는 노회의 허락을 받아 다른 목사를 청하여 성례를 시행하게 한다.", "집사를 임직함에 당회가 고시하여 임직한다.", "각종 현금을 수집할 날짜와 방침을 작정한다."], "answer": 1, "explanation": "당회는 노회에 파송할 장로총대를 선정하여 청원할 수는 있어도 총회총대를 선정하여 청원할 수는 없다. 이는 노회의 직무이다."}, {"id": "헌법-0567", "subject": "헌법", "section": "정치", "qnum": 568, "stem": "교회마다 비치해야 하는 문서에 해당하지 않는 것은?", "choices": ["교인의 각종 명부", "당회록 및 공동의회록", "재판회록", "공문서 발송 및 접수 대장", "본 교회의 사기"], "answer": 4, "explanation": "공문서 수발대장은 꼭 필요한 것 중의 하나일 수 있다. 그러나 교회헌법은 그것을 규정하지 않고 있다. 한편 헌법적 규칙 제13 조에서는 \"본 교회의 사기\"를 비치해야 한다고 한 것은 매우 특별하다."}, {"id": "헌법-0568", "subject": "헌법", "section": "정치", "qnum": 569, "stem": "당회가 비치해야 하는 명부록에 해당하지 않는 것은?", "choices": ["제명인 명부", "입교인 명부", "책벌 및 해벌인 명부", "혼인 명부", "별세인 명부"], "answer": 1, "explanation": "제명인은 명부에서 제명된 사람을 가리킨다. 명부에서 제명처리만 하면 되고, 굳이 제명인 명부를 작성할 필요는 없다. 별명부는 제명인 명부는 아니다. 그것은 실종교인의 명부이다."}, {"id": "헌법-0569", "subject": "헌법", "section": "정치", "qnum": 570, "stem": "다음 별명부에 대한 설명으로 옳은 것은?", "choices": ["별명부는 당회가 비치해야 하는 명부는 아니다.", "1년 이상 실종된 교인의 명부이다.", "별명부는 교회가 특별 관리해야 하는 대상에 대한 명부이다.", "임직자들의 직분과 임직년도를 기록한 명부이다.", "교회 내에 특별한 헌신으로 기념해야 할 사람들을 기록한 명부이다. 각 사람의 특별한 헌신 내 용을 기록하고, 교훈을 삼는다."], "answer": 2, "explanation": "별명부는 일종의 실종교인의 명부이다. 또는 교인의 의무를 수행하지 않음으로 제명하지는 않지만, 별명부에서 유보적으로 관리 하는 것이다."}, {"id": "헌법-0570", "subject": "헌법", "section": "정치", "qnum": 571, "stem": "폐당회에 대한 설명으로 옳지 않은 것은?", "choices": ["장로 1인으로 조직된 당회에서 장로가 사망하면 폐당회가 된다.", "정로 2인으로 조직된 당회에서 1인 장로가 정년으로 은퇴하고, 남은 장로가 아직 정년 이전이 지만 함께 은퇴하여 원로장로로 추대된 경우에는 폐당회가 아니다.", "폐당회가 되면 목사가 정상적으로 위임된 경우에도 그 위임이 즉시 해제되지 않는다.", "위임목사가 폐당회를 이유로 위임이 해제되었어도 일정한 요건을 갖추면 그 교회에 계속하여 시무목사로 시무할 수 있다.", "고령화된 농어촌 교회의 경우, 거의 모든 교인이 정년인 경우에는 장로가 정년으로 은퇴하게 되 어도 일시적으로 폐당회는 유보된다."], "answer": 2, "explanation": "폐당회는 당회에 시무장로가 없다는 의미이다. 정년 전에 은퇴한 원로장로뿐인 교회의 당회는 폐당회이다. (제60회 총회회의록 참조)"}, {"id": "헌법-0571", "subject": "헌법", "section": "정치", "qnum": 572, "stem": "다음 중 당회의 권징치리는 어디까지 효력이 미치는가?", "choices": ["당회의 권징은 지교회만 효력이 미친다.", "당회의 권징은 소속노회 안에만 효력이 미친다.", "당회의 권징은 전국교회에 효력이 미친다.", "당회의 권징은 대회 안에까지만 효력이 미친다."], "answer": 3, "explanation": "정치 제1장 제8조, 제8장 제2조 2항 참고 ※ 2020년 기출문제 — 권장 교회가 이상(AL) 각 조의 원리를 힘써 지키면 교회의 영광과 복을 증진(1원)할 것이니 교회의 권징은 도덕상과 신령상의 것이요, 국법상의 시벌(6)이 아닌즉, 그 효력(*))은 정치의 공정(소표)과 모든 사람 의 공인(소)과 만국 교회의 머리 되신 구주의 권고와 은총에 있다."}, {"id": "헌법-0572", "subject": "헌법", "section": "정치", "qnum": 573, "stem": "다음 중 당회의 직무가 아닌 것은?", "choices": ["노회에 총대를 파송하여 청원과 보고를 한다", "공동의회를 통해 장로, 집사를 선택하여 반년 이상 교양한다", "교인의 입회와 퇴회를 결정한다 교회 기관인 전도회와 면려회의 임원을 임명한다", "각종 헌금 수집하는 일을 주장한다"], "answer": 4, "explanation": "2019년 기출문제"}, {"id": "헌법-0574", "subject": "헌법", "section": "정치", "qnum": 575, "stem": "다음 중 당회가 비치해야 할 명부록이 아닌 것은?", "choices": ["노회총대 파송 명부", "혼인 명부", "별 명부", "입교인 명부", "이전인 명부"], "answer": 1, "explanation": "2019년 기출문제"}, {"id": "헌법-0575", "subject": "헌법", "section": "정치", "qnum": 576, "stem": "다음 중 당회의 성수로 맞지 않는 것은?", "choices": ["장로 2인이 있을 시 장로 1인과 당회장의 출석으로 성수가 된다", "정로 3인 이상이 있을 시 장로 과반수와 당회장의 출석으로 성수가 된다", "장로 1인만 있을 경우 장로 1인과 당회장의 출석으로 성수가 된다", "장로 1인 당회에 장로 치리 문제나 다른 사건이 있을 시 장로가 반대할 때는 당회장이 당회를 운영할 수 있다", "자로 1인 당회에 자로 치리 문제나 다른 사건이 있을 시 장로가 반대할 때는 노회에 보고하여 처리한다"], "answer": 4, "explanation": "2019년 기출문제"}, {"id": "헌법-057 하고, 3번은 노회가 노회를 개척할 수 없다. 그것은 총회의 권한이다. 4번은 최대 4명까지 파송할 수 있다. 5번은 세례교인이 25명 미만의 경우에는 당회가 사실상 폐당회가 된다. 따라서 장로를 노회에 총대로 파송할 수 없다."}, {"id": "헌법-0650", "subject": "헌법", "section": "정치", "qnum": 651, "stem": "노회가 개회할 수 있는 성수에 대한 설명으로 옳은 것은?", "choices": ["회원 과반수의 출석이 있어야 한다.", "목사와 총대 장로 각 3인 이상으로 기본 출석인원이 6인 이상이어야 한다.", "목사 또는 총대장로의 전체 출석이 6인 이상이어야 한다. 목사와 총대장로의 전체 출석이 6인 이상이어야 하나 목사와 장로는 각각 1인 이상 출석해야 한다.", "전체 출석이 과반수가 되면 참석한 장로가 1인이어도 개회된다."], "answer": 2, "explanation": "노회의 개회 성수는 목사와 장로 각각 3인 이상이 출석하여야 한다."}, {"id": "헌법-0651", "subject": "헌법", "section": "정치", "qnum": 652, "stem": "노회의 회원에 대한 설명으로 옳지 않은 것은?", "choices": ["각 지교회의 위임목사, 시무목사는 물론 부목사도 회원권을 갖는다.", "다른 교단에서 본 교단으로 이적해 온 목사는 총회신학원에서 2년 이상 신학과목을 이수한 것 으로 회원권을 갖고, 노회의 임원이 될 수도 있다.", "정년 이전의 원로목사는 회원권을 갖고 있으므로 총회 총대가 될 수 있다.", "총회나 노회가 파송한 기관사무를 위임한 목사는 언권회원이다.", "시무목사라도 노회가 허락하면 노회장과 총회총대가 될 수 있다."], "answer": 4, "explanation": "정치 제10장 3조에 의하면 각 지교회를 시무 목사\"에게 회원권이 있다고 한다. 여기에서의 시무 목사는 목사의 명칭에 나오는 시무목사를 의미하는 것이 아니다. 지교회를 시무하는 목사를 지칭하면 위임목사, 시무목사, 부목사\"를 포함한다. 단 시무목사 는 3년마다. 부목사는 1년마다 그 시무를 허락받아야 한다. 허락받지 못하면 회원권을 상실하고 언권회원이 된다. 93회 총회결 의, 98회 총회결의 참조)"}, {"id": "헌법-0652", "subject": "헌법", "section": "정치", "qnum": 653, "stem": "장로가 노회의 회원권을 갖게 되는 것과 무관한 것은?", "choices": ["총대 천서는 노회 서기에게 접수한다.", "장로는 천서를 받아야 노회의 회원권을 가질 수 있다.", "천서가 없는 장로는 소속 노회의 언권회원일 뿐이다.", "천서가 접수되었어도 서기가 호명하기 전에는 회원권을 갖지 못한다.", "지교회 당회가 천서했더라도 협동장로는 회원권이 없다."], "answer": 3, "explanation": "정로는 천서가 없으면 단지 교회소속일 뿐이며, 소속 노회에서 아무런 회원권이 없다."}, {"id": "헌법-0653", "subject": "헌법", "section": "정치", "qnum": 654, "stem": "헌법 정치 제10장 3조는 노회의 회원에 대하여 규정하면서 \"각 지교회의 시무목사\"에게 회원권 이 있다고 한다. 다음 중 \"지교회 시무목사\"에 해당하는 것을 모두 포함한 것은?", "choices": ["위임목사, 시무목사", "위임목사, 부목사", "위임목사, 부목사, 교육목사", "위임목사, 시무목사, 부목사", "위임목사, 시무목사, 부목사, 교육목사"], "answer": 4, "explanation": "노회의 회원으로 위임목사, 시무목사, 부목사는 \"각 지교회를 시무하는 목사에 해당하고, 교육목사는 해당하지 않는다."}, {"id": "헌법-0654", "subject": "헌법", "section": "정치", "qnum": 655, "stem": "다음 중 노회의 언권회원이 아닌 목사는 누구인가?", "choices": ["정년이 지난 원로목사", "정년 이전에 은퇴한 은퇴목사", "시무하는 교회가 없는 무임목사 노회나 총회가 기관 사무를 위임한 기관목사", "신학교에서 교수하는 교육목사"], "answer": 4, "explanation": "노회나 총회가 기관 사무를 위임한 기관목사는 노회의 회원이다."}, {"id": "헌법-0655", "subject": "헌법", "section": "정치", "qnum": 656, "stem": "노회회집에 관한 설명으로 옳지 않은 것은?", "choices": ["노회는 정기회와 임시회로 나뉘며, 정기회는 예정한 장소와 날짜에 회집한다.", "개회성수를 계산할 때에는 정회원인 목사와 총대장로의 수를 합하여 재적인원으로 본다.", "정기회는 재적인원 과반수의 출석으로 개회한다.", "정기회는 개회성수가 되면 노회의 일체 사무를 처리한다.", "특별한 사건이 있으면 각 다른 지교회 목사 3인과 각 다른 지교회 장로 3인 이상의 청원에 의 해 회장이 임시회를 소집할 수 있다."], "answer": 3, "explanation": "노회는 정기회든 임시회든 목사 3인, 장로 3인의 출석으로 개회할 수 있다."}, {"id": "헌법-0656", "subject": "헌법", "section": "정치", "qnum": 657, "stem": "노회 임시회에 관한 설명으로 옳지 않은 것은?", "choices": ["임시회는 정기회를 폐한 후, 특별한 사건이 있는 경우에 회집한다.", "회장이 유고한 때에는 부회장 또는 서기가 대리로 소집한다.", "임시회를 소집할 때에는 회의할 안건과 회집 날짜를 통지하여야 한다.", "회집 날짜에 10일 선기하여 각 회원에게 통지하여야 한다.", "목사, 장로 각 3인 이상의 제안으로 현장에서 안건을 상정하여 결의할 수 있으며, 이를 현장동 의, 또는 긴급동의라고 한다."], "answer": 5, "explanation": "5번의 경우에는 현장 동의에 대한 설명이다. 그러나 이것은 정기회에서만 허용되는 것이다. 임시회에서는 통지서에 적시한 안건 만을 결의할 수 있다. 그 밖의 결의는 모두 무효이다. M. 실전문제 715"}, {"id": "헌법-0657", "subject": "헌법", "section": "정치", "qnum": 658, "stem": "노회가 임시회를 소집할 수 없는 경우에 해당하는 것은?", "choices": ["정기회에서 맡긴 재판건으로 임시회를 소집할 수는 없다.", "정기회에서 결의된 안건에 대해서 사정 변경을 이유로 임시회를 소집할 수 없다.", "임시회는 재판국 설치를 위해서 소집할 수는 없다.", "임시회는 지교회에서 올라온 소원전을 처리하기 위해 소집할 수 없다.", "1달 뒤면 정기회가 회집하게 되는 경우에는 임시회를 소집할 수 없다."], "answer": 1, "explanation": "임시회를 재판회로 변경할 수도 없고, 임시회는 정기회에서 맡긴 재판건을 새롭게 다룰 수 없다.(Presbyterian Digest, 179 참 조) 임시회는 필요시 소집할 수 있다. (대한예수교장로회 표준회의규정 제34조 참조)"}, {"id": "헌법-0659", "subject": "헌법", "section": "정치", "qnum": 660, "stem": "다음 중 노회가 어떤 당회에 보조 당회원을 파송하지 못하는 이유에 대한 설명이 아닌 것은? 교회자유 원리에 위배되기 때문이다.", "choices": ["교회자유 원리에 위배되기 때문이다.", "양심자유 원리에 위배되기 때문이다.", "노회는 당회장을 파송할 수는 있어도 당회원을 파송할 수는 없다.", "미조직교회는 반드시 타 교회 장로를 청하여 임시당회를 조직하고 사무를 처리해야 한다."], "answer": 4, "explanation": "정치 제1장 제6조 참고 — 직원 선거권 교회 직원의 성격과 자격과 권한과 선거와 위임하는 규례는 성경에 기록되었으니 어느 회에서든지 그 직원을 선정하는 권한은 그 회에 있다."}, {"id": "헌법-0660", "subject": "헌법", "section": "정치", "qnum": 661, "stem": "아래의 목사 중 노회의 정회원이 아닌 목사는?", "choices": ["위임목사", "시무목사", "무임목사", "원로목사(정년 이전)"], "answer": 3, "explanation": "2018년 기출문제"}, {"id": "헌법-0661", "subject": "헌법", "section": "정치", "qnum": 662, "stem": "다음 중 노회 개회 충족 요건에 맞지 않는 것은? 예정된 장소", "choices": ["예정된 장소", "예정된 날짜", "목사, 장로회원 과반수 이상 출석", "목사 3인, 장로 3인 이상 출석"], "answer": 3, "explanation": null}, {"id": "헌법-0663", "subject": "헌법", "section": "정치", "qnum": 664, "stem": "다음 중 누가 제출한 안건을 노회가 처리할 수 있는가?", "choices": ["각 당회에서 규칙대로 제출하는 헌의와 청원과 상소 및 고소와 문의와 위탁판결을 접수하여 처 리한다.", "노회의 정회원이 제출하는 안건을 접수하여 처리한다.", "노회 안에 장로회나 교역자회가 제출하는 안건을 접수하여 처리한다.", "시찰회의 결의로 상정하는 헌의나 청원을 접수 처리한다."], "answer": 1, "explanation": "정치 제10장 제6조 2 참고 — 노회의 직무 1. 노회는 그 구역에 있는 당회와 지교회와 목사와 강도사와 전도사와 목사 후보생과 미조직교회를 총찰한 다. 2. 노회는 각 당회에서 규칙대로 제출하는 헌의와 청원과 상소 및 소원과 고소와 문의와 위탁 판결을 접수하 여 처리하며, 재판건은 노회의 결의대로 권징 조례에 의하여 재판국에 위임 처리하게 할 수 있다(고전 6:1, 8, 딤전 5:19). 상소건 등은 접수하여 상회에 보낸다. 3. 목사 후보생을 고시하여 받고 그 교육, 이명, 권징하는 것과 강도사를 인허하고 이명, 권징, 면직을 관리 하며 지교회의 장로 선거를 승인하며 피택 장로를 고시하여 임직을 허락하고 전도사를 고시하여 인가하 며 목사 지원자의 고시, 임직, 위임, 해임, 전임, 이명, 권징을 관리하며(딤전 4:14, 행 13:2~3) 당회록과 재판 회록을 검열하여 처리 사건에 찬부(검)를 표하며 도리와 권징에 관한 합당한 문의를 해석한다(행 15:10, 갈 2:2~5). 4. 교회의 신성과 화평을 방해하는 언행을 방지하며(행 15:22, 24) 교회 실정과 폐해(#봄)를 감시하고 교정(표)하기 위하여 각 지교회를 시찰한다(행 20:17, 30, 6:2, 15:30). 5. 지교회를 설립, 분립, 합병, 폐지 및 당회를 조직하는 것과 지교회와 미조직교회의 목사의 청빙과 전도와 학교와 재정 일체 사항의 처리 방침을 지도 방조한다. 6. 본 노회의 청원과 헌의를 …"}, {"id": "헌법-0664", "subject": "헌법", "section": "정치", "qnum": 665, "stem": "다음 중 누가 노회에 헌의와 청원과 위탁판결을 청원할 수 있는가?", "choices": ["시찰장", "노회소속 목사", "총대장로", "각 당회"], "answer": 4, "explanation": "정치 제9장 제5조 8항, 제10장 제6조 2항 참고"}, {"id": "헌법-0665", "subject": "헌법", "section": "정치", "qnum": 666, "stem": "다음 중 노회의 요의(토)에 대한 설명으로 옳지 않은 것은?", "choices": ["그리스도의 몸 된 교회가 나뉘어 여러 지교회가 되었으니 서로 협의하며 도와 교회 도리의 순 전을 보전하는 데 의의가 있다.", "권징을 동일하게 하기 위함이다.", "교회는 머리이신 그리스도께서 다스리시니 꼭 노회 같은 상회가 필요한 것은 아니다.", "교회의 도리의 순전의 보전과 동일한 권징과 신앙상 지식과 바른 도리를 합심발휘하며 부도덕 을 금지하기 위하여 노회와 같은 상회가 있는 것이 긴요하다."], "a , 9:31, 21:20, 2:41~47, 4:4). 이런 각 교회가 한 노회 아래 속하였고(행 15:2~4, 11:22, 30, 21:17~18) 에베소 교회 외에도 많은 지교회가 있고 노회가 있는 증거가 있다(행 19:18, 20) (비교. 고전 16:8, 9, 19, 행 18:19. 24~26, 20:17~18, 25~31, 36~37, 계 2:1~6"}, {"id": "헌법-0670", "subject": "헌법", "section": "정치", "qnum": 671, "stem": "다음 중 노회를 통한 교회 권징의 유익에 관한 설명으로 옳지 않은 것은?", "choices": ["교회의 신성과 성결을 유지하기 위해 행하는 권징을 동일한 기준을 좇아 시행함으로 공평한 질 서를 따라 교회가 번영하게 된다.", "각 교회가 성경과 헌법에 따라 권징을 시행하면 노회와 같은 상회와 상관없이 공평한 질서를 따라 교회의 신성과 성결을 유지할 수 있다.", "노회와 같은 상회가 있어서 상소하거나 상고할 길이 있기 때문에 하회도 상회를 의식하여 모든 사건을 가볍게 여기지 못하므로 상회와 권징을 일치할 수 있다.", "노회와 같은 상회가 있으므로 범죄의 내용이나 동기, 목적, 정상이 같은데도 교회마다 다른 벌 을 줄 수 없을 것이다."], "answer": 2, "explanation": "정치 제10장 제1조 참고 — 노회의 요의(토춤 그리스도의 몸 된 교회가 나뉘어 여러 지교회가 되었으니(행 6:1~6, 9:31, 21:20) 서로 협의하며 도외 교회 도리의 순전을 보전하며, 권징을 동일하게 하며, 신앙상 지식과 바른 도리를 합심하여 발휘하며, 배도(#2)함과 부도덕(7월()을 금지할 것이요, 이를 성취하려면 노회와 같은 상회(1)가 있는 것이 긴요 하다(사도 시대 노회와 같은 회가 있었나니 교회가 분산한 후에 다수의 지교회가 있던 것은 모든 성경에 확연하다) (행 6:5~6, 9:31, 21:20, 2:41~47, 4:4). 이런 각 교회가 한 노회 아래 속하였고(행 15:2~4, 11:22, 30, 21:17~18) 에베소 교회 외에도 많은 지교회가 있고 노회가 있는 증거가 있다(행 19:18, 20) (비교. 고전 16:8, 9, 19, 행 18:19. 24~26, 20:17~18, 25~31, 36~37, 계 2:1~6"}, {"id": "헌법-0671", "subject": "헌법", "section": "정치", "qnum": 672, "stem": "다음 중 노회를 조직함에 있어 교회 수와 목사와 장로 수에 대한 설명으로 옳지 않은 것은? 한 노회 안에 교회 수는 반드시 조직교회가 21개 이상이 되어야 한다.", "choices": ["한 노회 안에 교회 수는 반드시 조직교회가 21개 이상이 되어야 한다.", "대회와 총회는 선거로 선출하는 동수의 목사와 장로를 총대로 파송하기 때문에 목사와 장로의 수가 같으나 노회는 그 수가 같지 않다.", "각 당회가 파송하는 총대는 목사의 수와 장로의 수가 동수여야 장로회 정치 원리에 맞다.", "노회는 그 지방 안에 모든 목사는 다 노회원이 되고 장로는 당회에서 파송한 장로들로만 회원 권이 구비되므로 그 수가 같지 않다."], "answer": 3, "explanation": "정치 제10장 제2조 참고 — 노회 조직 노회는 일정한 지방 안에 모든 목사와 각 당회에서 총대로 세례 교인 200명 미만이면 1인, 200명 이상 500명 미만이면 2인, 500명 이상 1,000명 미만은 3인, 1,000명 이상은 4명씩 파송하는 장로로 조직한다. 단, 21당회 이상을 요한다."}, {"id": "헌법-0672", "subject": "헌법", "section": "정치", "qnum": 673, "stem": "다음 중 노회 조직에 관한 설명으로 옳은 것은? \" 노회는 일정한 지방 안에 있는 모든 목사와 각 당회에서 정치 제10자 제2조의 규정에 따라 파 송하는 장로로 조직하되 단, 21당회 이상을 요한다.", "choices": ["노회는 일정한 지방 안에 있는 모든 회 이상 이면 목사, 장로 각 1인씩 더 파송한다.", "증경총회장은 언권회원이 된다."], "answer": 4, "explanation": "정치 제11장 제1조 참고 — 대회 조직 대회는 1지방 안 모든 노회(3개 이상 노회 됨을 요한다)를 관할하는 회니 각 노회에서 파송하는 총대 목사와 장로로 조직하되 목사와 장로는 그 수를 서로 같게 한다. 총대는 매 5당회에 목사, 장로 각 1인 비율로 파송하며 5당회가 미급되고 3당회 이상이면 목사, 장로 각 1인씩 더 택하고 3당회가 미급(*X)되는 노회는 목사, 장로 각 1인씩 언권 회원으로 참석한다. 단, 1당회에 총대 목사, 장로 각 1인을 초과하지 못한다."}, {"id": "헌법-0743", "subject": "헌법", "section": "정치", "qnum": 744, "stem": "다음 중 대회의 권한과 직무가 아닌 것은?", "choices": ["노회 판결에 대한 공소 및 상고를 수리 처결한다.", "모든 하회의 문의에 대하여 결정 지시권이 있다.", "교회의 건덕과 유익될 일을 각 교회에 권장하며 총회에 헌의할 수 있다.", "대회는 총회에 헌의와 청원을 제출할 수 있고, 교인과 노회의 목사에 대한 원치리권이 있다."], "answer": 4, "explanation": "정치 제11장 제4조 참고 체 — 대회 권한과 직무 1. 노회 판결에 대한 공소 및 상고를 수리 처결한다. 2. 모든 하회의 문의에 대하여 결정 지시권이 있다. 3. 각 노회록을 검사 인준한다. 4. 각 노회에 법규(#※)를 위반한 사실이 있으면 교정하게 하고 교회 헌법을 잘 준수하게 한다. 5. 노회를 설립, 합병, 분설(41)하며 노회 구역을 변경하는 일을 행할 수 있다. 552 제3부 헌법(정치) 6. 교회의 건덕(81분)과 유익될 일을 각 교회에 권장하며 총회에 헌의할 수 있다. 7. 대회는 고소, 소원, 공소, 상고에 대한 결정을 전권으로 행하되 직접 판결하든지 또한 하회에 반환할. 수 있다. 8. 대회에 제기한 상고, 고소, 문의의 안건이 교회의 도리나 헌법에 관계 되는 일이 아니면 대회가 최종 심의료유플함)회가 된다. 9. 당회는 교인을 직접, 노회는 목사를 직접 재판할 수 있으나 대회는 노회에서 판결한 데 대하여 불복 상고한 것이나 노회에서 제출한 문의 같은 문서(x)를 받은 후에야 재판할 수 있다. 10. 대회가 하회(Te)에 대하여 만일 불법한 사건이 있는 줄로 아는 때는 상고하는 일이 없을 지라도 자세히 조사하며, 하회 회록을 검사하여 과연 사실이 있으면 심사 교정하든지 하회에 명령하여 교정하게 한다. 11. 대회는 재판국을 두어(국원은 목사 장로 9인 이상) 권징 조례대로 재판한다. 재판국 개회 성수는 국원 4분의 3 이상이 출석하여야 개심하며 …"}, {"id": "헌법-0744", "subject": "헌법", "section": "정치", "qnum": 745, "stem": "다음 중 대회 회집에 관한 설명으로 맞지 않는 것은? 대회는 매년 1회 정기회로 회집한다.", "choices": ["대회는 매년 1회 정기회로 회집한다.", "필요한 때는 임시회와 계속회도 할 수 있다.", "대회는 교인에 관한 사건의 최종심의회이다.", "임시회는 목사, 자로 각 3인의 청원에 의하여 회장이 소집한다."], "answer": 4, "explanation": "정치 제11장 제5조 참고 — 대회 회집 대회는 매년 1회 정기회로 회집하고 필요한 때는 임시회와 계속회도 할 수 있다. 임시회는 2개 노회의 목사 장로 각 3인의 청원에 의하여 회장이 임시회를 소집한다. 임시회는 개회 10일 전기하여 회집 통지서와 의안을 관하 각 회원에게 통고하고 통지(3AD)서에 기재한 안전만 의결(8)한다."}, {"id": "헌법-0745", "subject": "헌법", "section": "정치", "qnum": 746, "stem": "다음 중 대회 회록 및 보고에 대한 설명으로 맞지 않는 것은? 서기는 회의록을 작성 보관하며 대회 상황을 총회에 보고한다.", "choices": ["서기는 회의록을 작성 보관하며 대회 상황을 총회에 보고한다.", "대회 회록은 1년에 한 번씩 총회의 검사를 받는다.", "특별히 재판기록을 자세히 기록한다.", "대회는 최종심도 되기 때문에 총회의 검사를 받거나 총회에 보고하지 않아도 된다."], "answer": 4, "explanation": "정치 제11장 제6조 참고 — 회록 및 보고 서기는 회의록을 작성 보관하며 특별히 재판 기록을 자세히 하여 총회의 검사를 받으며 대회 상황을 총회에 보고한다."}, {"id": "헌법-0746", "subject": "헌법", "section": "정치", "qnum": 747, "stem": "대한예수교장로회의 모든 지교회 및 치리회의 최고회는 무엇이라고 하는가?", "choices": ["공동의회", "당회", "노회", "대회", "총회"], "answer": 5, "explanation": null}, {"id": "헌법-0747", "subject": "헌법", "section": "정치", "qnum": 748, "stem": "총회의 개회성수에 대한 설명으로 옳은 것은?", "choices": ["노회의 과반수 출석", "총대 목사, 장로의 각 과반수 출석", "노회의 1/3과 총대목사, 장로 각 1/3 출석", "노회의 과반수와 총대목사, 장로 각 과반수 출석", "노회의 과반수와 총대목사, 장로 각 1/3 출석"], "answer": 4, "explanation": null}, {"id": "헌법-0748", "subject": "헌법", "section": "정치", "qnum": 749, "stem": "총회의 조직에 관한 설명으로 옳지 않은 것은? 총회는 각 노회에서 파송한 목사와 장로로 조직한다.", "choices": ["총회는 개회 2개월 전에 소집날짜와 장소를 정해 각 총대에게 통지해야 한다.", "각 노회 지방의 매 7당회에서 목사 1인, 자로 1인씩 파송한다.", "노회는 총회 총대 될 사람을 투표로 선거해야 하지만, 투표 방식은 노회의 자율에 따른다.", "7당회가 못 되는 경우에는 4당회 이상이면, 목사, 정로 각 1인씩 더 파송할 수 있다."], "answer": 2, "explanation": "총회는 총회 규칙에 따라 개회하고, 개회 날짜와 장소에 대한 통지에 관해서는 별도의 규정을 두고 있지 않다. 2번의 경우에는 개회 2개월 전에 노회는 총회총대의 명단을 총회에 보고해야 한다는 것을 고친 것이다."}, {"id": "헌법-0749", "subject": "헌법", "section": "정치", "qnum": 750, "stem": "총회 총대 수는 조직교회의 수에 따라 결정되는데 조직교회의 수를 계산한 것으로 올바른 것은?", "choices": ["허위교회이면 치리장로가 있어도 조직교회 수에 포함되지 않는다.", "치리 장로가 정년 이전에 은퇴하여 원로장로로 추대된 경우에는 조직교회 수에 포함된다.", "목사가 정년이 넘었음에도 당회와 공동의회의 결의를 거쳐 그 목사로 계속 시무케 하는 경우에 그 교회는 조직교회 수에 포함되지 않는다.", "위임목사와 치리장로가 존재하더라도 세례교인의 수가 20인이면 조직교회 수에 포함되지 않는다.", "당회가 조직된 교회에서 공동의회를 통해 강도사를 담임목사로 청빙하기로 하고, 그 과정에 있다 는 교회는 조직교회 수에 포함되지 않는다."], "answer": 4, "explanation": "조직교회는 당회장(임시당회장 포함)과 당회가 구성되어 있고, 세례교인이 25인 이상이면 된다. 사고가 있거나 혹은 여타의 다른 문제가 있더라도 이 요건만을 만족시키면 조직교회 수에 포함된다."}, {"id": "헌법-0750", "subject": "헌법", "section": "정치", "qnum": 751, "stem": "총회 총대의 선거와 자격에 관한 설명으로 옳지 않은 것은?", "choices": ["총회 총대는 총회 전 정기노회에서 선택한다.", "총회 개회 6개월 이상을 격하여 택하여야 한다.", "새로 조직된 노회 총대는 개회 후 임원 선거 전에 노회 설립보고를 먼저 받고 총대로 허락한다.", "총회 총대가 될 장로는 그 회에 속한 장로회원으로 한다.", "총대를 선거하는 투표는 노회가 정한 대로 하되, 목사 총대는 위임목사 중에서 선출해야 한다."], "answer": 2, "explanation": "총회 개회 6개월 이상을 격하여 택할 수 없다. 따라서 영구총대를 지정하는 것은 위법하다. 정치 제22장 제1조 참고 — 총회 총대 자격 1. 총회 총대는 총회 전 정기 노회에서 선택할 것인데 총회 개회 6개월 이상을 격하여 택하지 못한다. 2. 새로 조직한 노회 총대는 개회 후 임원 선거 전에 그 노회 설립 보고를 먼저 받고 총대로 허락한다. 3. 총대 될 장로 자격은 그 회에 속한 장로 회원으로 한다."}, {"id": "헌법-0751", "subject": "헌법", "section": "정치", "qnum": 752, "stem": "총회 총대로 선출된 자가 총회 총대로 참석하지 못하게 된 경우에 대한 설명으로 옳지 않은 것은? 이를 위해서 총대 선거 시 차순으로 부총대 몇 사람을 정해둔다.", "choices": ["이를 위해서 총대 선거 시 차순으로 부총대 몇 사람을 정해둔다.", "원총대에 유고가 발생하면 부총대와 교체한다.", "원홍대가 총회에 출석하였다가 부득이하여 회의장을 떠나게 된 경우, 원총대는 소속 노회의 부 총대 중 1인을 택하여 총대권을 위임, 대행케 할 수 있다.", "원총대에게 유고가 있어 부총대와 교체하게 될 때에는 노회의 허락을 필요로 하지 않는다.", "노회에서 선출한 총대라도 총회 서기가 호명하기 전에는 총대 자격이 없다."], "answer": 3, "explanation": "총회 개회 중 총대의 교체는 반드시 총회의 허락을 받아야 하며, 자기 임의로 부총대와 교체하지 못한다. (정치 제22장 2조)"}, {"id": "헌법-0754", "subject": "헌법", "section": "정치", "qnum": 755, "stem": "총회의 권한에 해당하지 않는 것은?", "choices": ["총회는 강도사를 고시하며 전국교회를 통솔한다.", "총회는 교회 헌법을 해석할 전권이 있다.", "총회는 노회, 대회를 설럽, 합병, 분립 및 폐지하는 것을 한다.", "교회를 분립하게 하는 쟁단을 진압한다.", "교회 재산에 대한 쟁론은 총회가 직접 처결한다."], "answer": 5, "explanation": "총회는 교회 재산에 대한 쟁론을 직접 처결하지 않는다. 노회가 결정한 후, 상고가 있으면 접수 판결하는 것이다. (정치 제12장 5조 4항)"}, {"id": "헌법-0755", "subject": "헌법", "section": "정치", "qnum": 756, "stem": "총회 파회에 대한 설명으로 옳은 것은?", "choices": ["총회는 기도로 개회하고, 기도함과 감사함과 축도함으로 산회한다.", "총회는 파회함으로 회무를 종결하고 파한다.", "총회는 긴급한 사정이 있으면 임시회로 모일 수 있다.", "총회가 파한 후에 새로이 헌의된 안건들에 대하여는 총회 임원회, 각 상비부 및 위원회 등이 각각 처결한다.", "총회가 파회한 후에 현의된 상소건에 대해서는 총회재판국으로 이관하여 처리케 할 수 있다."], "answer": 4, "explanation": "총회 임원회, 상비부, 위원회 등은 총회가 위임한 사건만을 처리할 수 있고, 긴급히 발생한 사건에 대하여는 총회실행위원회가 이를 처리할 수 있을 뿐이다. 총회는 파회하면 기존에 상정된 모든 헌의안은 종결되고, 파회 이후에 상정된 헌의안은 다음 총회 에서 다루게 되어 있다."}, {"id": "헌법-0756", "subject": "헌법", "section": "정치", "qnum": 757, "stem": "다음 중 총회의 정의에 대한 설명으로 맞지 않는 것은?", "choices": ["총회는 대한예수교장로회의 모든 지교회 및 치리회의 최고회이다.", "총회는 개회 시부터 산회 시까지만 총회이고 총회를 마친 후에는 없어진다.", "총회가 최고회라 함은 총회가 심리하여 결정한 상고건에 대한 처결은 변경할 회가 지상에는 없 음을 의미한다.", "장로회 정치는 당회, 노회, 대회, 총회의 4개 치리회가 있으므로 장로회 정치는 4심제이다."], "answer": 4, "explanation": "정치 제12장 제1조 참고 — 총회의 정의(*함 총회는 대한예수교장로회의 모든 지교회 및 치리회의 최고회(료)니 그 명칭은 대한예수교장로회 총회 라 한다."}, {"id": "헌법-0757", "subject": "헌법", "section": "정치", "qnum": 758, "stem": "다음 중 총회 조직에 관한 설명으로 옳지 않은 것은?", "choices": ["총회는 각 노회에서 파송한 목사와 장로로 조직하되 그 수는 같게 한다.", "총대는 각 노회 지방의 매 7당회에서 목사 1인, 장로 1인씩 파송하되, 1당회에서 목사, 장로 각 1인을 초과하지 못한다.", "총대는 총회 전 정기노회에서 투표 선거하여 개회 2개월 전에 총회서기에게 송달한다.", "총회 총대는 노회에서 투표하여 선출되며 노회원이면 누구나 총대가 된다."], "answer": 4, "explanation": "정치 제12장 제2조 참고 — 총회의 조직 총회는 각 노회에서 파송한 목사와 장로로서 조직하되 목사와 장로는 그 수를 서로 같게 하고 총대는 각 노회 지방의 매 7당회에서 목사 1인, 로 1인씩 파송하되 노회가 투표 선거하여 개회 2개월 전에 총회 서기에게 송달(중)하고 차점순(E)으로 부총대 몇 사람을 정해 둔다. 단, 7당회 못되는 경우에는 4당회 이상에는 목사로 각 1인씩 더 파송할 수 있다. 3당회 이하 되는 노회는 목사• 장로 각 1인씩 언권 회원으로 참석한다. 총회 총대는 1당회에서 목사•장로 각 1인을 초과하지 1. 헌법(정치) 전문 553 총회 강도사고시 문제집 못한다."}, {"id": "헌법-0759", "subject": "헌법", "section": "정치", "qnum": 760, "stem": "다음 중 총회 총대 파송기준에 대한 설명으로 옳지 않은 것은?", "choices": ["각 노회가 총회 총대를 파송하는 기준은 반드시 총회 전 정기노회에서 투표로 선출한다.", "총회 개회 6개월 이상을 격하여 선거하지 못한다.", "부득이한 경우에는 노회의 임원임사부에서 총대를 선정해도 된다.", "노회가 파송하는 총대의 수는 매 7당회에서 목사, 장로 각 1명씩으로 하되, 1당회에서 목사, 장 로 각 1인을 초과하지 못한다."], "answer": 3, "explanation": "정치 제12장 제2조, 제22장 제1조 참고 — 총회의 조직 총회는 각 노회에서 파송한 목사와 장로로서 조직하되 목사와 장로는 그 수를 서로 같게 하고 총대는 각 노회 지방의 매 7당회에서 목사 1인, 로 1인씩 파송하되 노회가 투표 선거하여 개회 2개월 전에 총회 서기에게 송달(중)하고 차점순(E)으로 부총대 몇 사람을 정해 둔다. 단, 7당회 못되는 경우에는 4당회 이상에는 목사로 각 1인씩 더 파송할 수 있다. 3당회 이하 되는 노회는 목사• 장로 각 1인씩 언권 회원으로 참석한다. 총회 총대는 1당회에서 목사•장로 각 1인을 초과하지 1. 헌법(정치) 전문 553 총회 강도사고시 문제집 못한다."}, {"id": "헌법-0760", "subject": "헌법", "section": "정치", "qnum": 761, "stem": "다음 중 총회 총대 파송기준에 관한 설명으로 옳은 것은?", "choices": ["각 노회가 총회 총대를 파송하는 기준은 반드시 총회 전 정기노회에서 투표로 선출하되 6개월 이상 격하여 택하지 못한다.", "부득이한 경우에는 노회의 임원정치부에서 총대를 선정해도 된다.", "총회총대는 1당회에서 목사, 장로 각 1인을 초과하지 못하지만 언권회원은 1인씩 더 파송할 수", "총회 총대는 반드시 노회의 정회원이 아니어도 된다."], "answer": 1, "explanation": "정치 제12장 제2조, 제22장 1조 — um": 782, "stem": "다음 중 총회의 상비부 설치권과 특별위원회 설치권과 신학교와 대학교 설립권에 대한 설명으로 옳지 않은 것은?", "choices": ["총회는 비상설체 조직이어서 파회하면 다 없어지고 상비부, 이사회, 특별위원들이 1년간 총회의 권한을 가지고 총회가 위탁한 안건 등을 처리한다.", "상비부는 총회가 맡기지 않은 일은 어떠한 일이라도 처리할 수 없는 의회 민주정치가 장로회 정치이다.", "특별위원은 상비부에서 처리하기에 애매한 특별한 사안을 위하여 위원을 선정하여 맡기는 위원 회로서 특별위원회이다.", "총회가 설치한 특별위원회는 총회가 정하고 맡겨준 사건에 대하여 총회의 권한을 가지고 처리 하므로 종결된다."], "answer": 4, "explanation": "정치 제12장 제5조 5항 참고 — 총회의 권한 1. 총회는 교회 헌법(신조, 요리 문답, 정치, 권징 조례, 예배 모범)을 해석할 전권이 있고 교리(행)와 권징에 관한 쟁론(폴)을 판단하고 지교회와 노회의 오해와 부도덕(71분)한 행위를 경책하며 권계(87 #하며 변증(4)한다. 2. 총회는 노회, 대회를 설립, 합병, 분립하기도 하며 폐지하는 것과 구역을 작정하며 강도사 지원자를 고시하며 전국 교회를 통솔하며, 본 총회와 다른 교파 교회 간에 정한 규례에 의하여 교통한다. 3. 교회를 분열(4)하게 하는 재단(목)을 진압하며 전 교회(죽)를 위하여 품행을 단정하게 하고, 인애(1)와 성실과 성결한 덕을 권장하기 위하여 의안(추)을 제출하여 실행하도록 계도(=+[)한다. 4. 어느 교회에서든지 교회 재산에 대하여 쟁론이 있어 노회가 결정한 후 총회에 상고하면 이것을 접수하여 판결한다. 5. 내외지 전도 사업이나 기타 중대 사건을 주관할 위원을 설치(산)할 수 있으며 신학교와 대학교를 설립 할 수 있다. 6. 총회의 재산은 총회 소유로 한다."}, {"id": "헌법-0782", "subject": "헌법", "section": "정치", "qnum": 783, "stem": "다음 중 총회의 정례회 회집에 관한 설명으로 옳지 않은 것은? 총회는 매년 1회 정례로 회집하되 예정한 날짜에 회집한다.", "choices": ["총회는 매년 1회 정례로 회집하되 예정한 날짜에 회집한다.", "총회가 모이면 당석에서 직접 처결하는 일 외에는 1년 동안 행할 일을 의결하여 상비부에 맡기 고 총회는 없는 상태로 돌아간다.", "각 노회에서 파송한 총대를 호명한 때부터 회원권을 구비하고 개회 선언 시부터 산회 시까지만 존재하는 치리회이다.", "총회는 할 일이 많은데 정례회 1번만 모이고 임시회가 없는 것은 잘못된 것으로 헌법을 개정해 야 할 사안이다."], "answer": 4, "explanation": "정치 제12장 제6조 참고 — 총회의 회집 총회는 매년 1회 정례로 회집하되 예정한 날짜에 회장이 출석하지 못할 때는 부회장 혹 전 회장이 개회하 고 신 회장을 선거할 때까지 시무할 것이요. 각 총대는 서기가 천서를 접수 호명(2)한 후부터 회원권이 있다."}, {"id": "헌법-0783", "subject": "헌법", "section": "정치", "qnum": 784, "stem": "다음 중 총회 개회 폐회의식에 관한 설명으로 옳지 않은 것은?", "choices": ["총회는 기도로 개회하고 파회하고 해마다 새로 조직하여 모이는 회합이다.", "총회는 기도함과 감사함으로 축도로 산회한다.", "총회는 장로회 각 치리회 중 당회, 노회, 대회와는 달리 파회를 선언한다.", "총회가 폐회의식을 마치고 파회되면 모든 총회의 상비부서의 활동은 중지된다."], "answer": 4, "explanation": "정치 제12장 제6조 참고 — 총회의 회집 총회는 매년 1회 정례로 회집하되 예정한 날짜에 회장이 출석하지 못할 때는 부회장 혹 전 회장이 개회하 고 신 회장을 선거할 때까지 시무할 것이요. 각 총대는 서기가 천서를 접수 호명(2)한 후부터 회원권이 있다."}, {"id": "헌법-0784", "subject": "헌법", "section": "정치", "qnum": 785, "stem": "다음 중 총회 총대자격에 관한 규정 설명으로 옳지 않은 것은?", "choices": ["총회 총대는 총회 전에 선출하되 6개월을 격하여 택하지 못한다.", "새로 조직한 노회 총대는 개회 후 임원선거 전에 그 노회 설립 보고를 먼저 받고 총대로 허락한다.", "총대 될 자로 자격은 그 노회에 속한 장로 회원으로 한다.", "총회 총대는 반드시 정기노회에서 선택하여야 하는 것은 아니다."], "answer": 4, "explanation": "정치 제22장 제1조 참고 — 총회 총대 자격 1. 총회 총대는 총회 전 정기 노회에서 선택할 것인데 총회 개회 6개월 이상을 격하여 택하지 못한다. 2. 새로 조직한 노회 총대는 개회 후 임원 선거 전에 그 노회 설립 보고를 먼저 받고 총대로 허락한다. 3. 총대 될 장로 자격은 그 회에 속한 장로 회원으로 한다."}, {"id": "헌법-0785", "subject": "헌법", "section": "정치", "qnum": 786, "stem": "다음 중 총회 총대자격에 관한 규정 설명으로 옳은 것은?", "choices": ["총회 총대는 반드시 정기노회에서 선택하여야 하는 것은 아니다.", "새로 조직한 노회의 총대는 개회 후 임원 선거 전에 그 노회 설립보고를 받고 총대로 허락한다.", "총대 될 장로 자격은 그 노회소속 지교회 장로 중에서 선출한다.", "총회 총대는 총회 개회 7개월 전까지만 선출하면 된다."], "answer": 2, "explanation": "정치 제22장 제1조 — 총회 총대 자격 1. 총회 총대는 총회 전 정기 노회에서 선택할 것인데 총회 개회 6개월 이상을 격하여 택하지 못한다. 2. 새로 조직한 노회 총대는 개회 후 임원 선거 전에 그 노회 설립 보고를 먼저 받고 총대로 허락한다. 3. 총대 될 장로 자격은 그 회에 속한 장로 회원으로 한다."}, {"id": "헌법-0786", "subject": "헌법", "section": "정치", "qnum": 787, "stem": "총회 언권회원이 아닌 사람은?", "choices": ["본 총회의 파송으로 외국에서 선교하는 선교사", "전도목사", "본 총회의 증경총회장", "본회의 증경부총회장"], "answer": 2, "explanation": "정치 제22장 총회 총대 - 3조"}, {"id": "헌법-0787", "subject": "헌법", "section": "정치", "qnum": 788, "stem": "다음 중 총회 총대 교체에 관한 규정 설명으로 옳지 않은 것은?", "choices": ["총회 원총대가 출석하였다가 자기 임의로 부총대와 교체하지 못한다.", "부득이한 때에는 총회의 허락으로 부총대와 교체할 수 있다.", "각 노회가 총회에 총대를 파송하는 권이 있다 할지라도 이 파송권은 결코 교체권을 포함하지는 않는다.", "각 노회가 총회에 총대파송권이 있으므로 총대 교체할 권한도 있다."], "answer": 4, "explanation": "정치 제22장 제2조 참고 — 총대 교체 총회 원총대가 출석하였다가 자기 임의로 부총대와 교체하지 못할 것이나 부득이한 때에는 총회의 허락으 로 부총대와 교체할 수 있다."}, {"id": "헌법-0788", "subject": "헌법", "section": "정치", "qnum": 789, "stem": "다음 중 총회 언권회원에 관한 규정으로 옳지 않은 것은?", "choices": ["본 총회의 파송으로 외국에서 선교하는 선교사", "파견증서만 가지고 와서 본 총회 산하에서 선교에 종사하는 외국선교사", "본 총회의 증경총회장과 부총회장", "언권회원이 발언을 요청하면 회장은 반드시 발언권을 주어야 한다."], "answer": 4, "explanation": "정치 제22장 제3조 참고 — 언권 회원 1. 본 총회의 파송으로 외국에서 선교하는 선교사 2. 파견 증서만 가지고 와서 본 총회 산하에서 선교에 종사하는 외국 선교사 3. 본 총회의 증경 총회장과 부총회장 4. 단, 총회에서 허락을 받아야 발언할 수 있다."}, {"id": "헌법-0789", "subject": "헌법", "section": "정치", "qnum": 790, "stem": "다음 총회의 직무에 관한 설명 중 틀린 것은? 총회는 소속 교회 및 치리회의 모든 사무와 그 연합 관계를 총찰한다.", "choices": ["총회는 소속 교회 및 치리회의 모든 사무와 그 연합 관계를 총찰한다.", "하회에서 합법적으로 제출하는 헌의와 청원과 상고와 소원과 문의와 위탁 판결을 접수하여 처 리한다.", "각 하회록을 검열하여 찬부를 표하고 산하 각 교회 간에 서로 연락하여 교통하며 신뢰하게 한다.", "산하 교회와 하회의 재정을 감사한다."], "answer": 4, "explanation": "정치 제12장 제4조 참고 — 총회의 직무 총회는 소속 교회 및 치리회의 모든 사무와 그 연합 관계를 총찰하며, 하회에서 합법적으로 제출하는 헌의와 청원과 상고와 소원과 고소와 문의와 위탁 판결을 접수하여 처리하고, 각 하회록을 검열하여 찬부를 표하고 산하 각 교회 간에 서로 연락하며 교통하며 신뢰(1)하게 한다."}, {"id": "헌법-0790", "subject": "헌법", "section": "정치", "qnum": 791, "stem": "총회 총대는 각 노회를 대표하는 사람으로 각 노회에서 몇 당회당 목사 1인, 장로 1인을 총회어 파송할 수 있는가?", "choices": ["각 5당회당", "각 6당회당", "각 7당회당", "각 8당회당"], "answer": 3, "explanation": "2017년 기출문제 • 교회의 각종 회의"}, {"id": "헌법-0791", "subject": "헌법", "section": "정치", "qnum": 792, "stem": "다음 중 지교회에서 공동의장, 당회장, 제직회장, 재판회장을 목사가 할 수밖에 없는 이유로 맞 는 것은?", "choices": ["목사는 다스리는 직무 외에 말씀의 직무를 가지고 있기 때문이다.", "목사의 성직권이 약해지면 조합정치나 자유정치가 되기 때문이다.", "장로와 목사는 치리회 안에서 결의권이 동등하기 때문이다.", "목사와 장로는 세우는 회가 다르기 때문이다."], "answer": 1, "explanation": "정치 제5장 제2조 • 공동의회 — 장로의 권한 강도와 교훈은 그의 전무 책임은 아니나 각 치리회에서는 목사와 같은 권한으로 각 항 사무를 처리한다(딤 전 5:17, 롬 12:78) 헌"}, {"id": "헌법-0792", "subject": "헌법", "section": "정치", "qnum": 793, "stem": "공동의회에 대한 설명으로 옳지 않은 것은?", "choices": ["공동의회는 일종의 교인총회에 해당한다. e 공동의회의 회원은 본 교회의 무흠 입교인이다.", "공동의회는 당회가 필요하다고 인정한 때 당회의 결의로 회집할 수 있다.", "공동의회는 상회의 명령이 있으면 즉각 소집해야 한다.", "무흠 입교인 3분의 1 이상의 연명으로 공동의회 소집을 청원할 수 있다."], "answer": 4, "explanation": "공동의회는 당회가 필요하다고 인정한 때, 제직회의 청원이나 무흠 입교인 3분의 1 이상의 청원이나 상회의 명령이 있는 때에 당회의 결의로 소집한다.(정치 제21장 1조) 상회의 명령이 있어도 당회의 결의가 있어야 한다."}, {"id": "헌법-0793", "subject": "헌법", "section": "정치", "qnum": 794, "stem": "다음 중 공동의회의 회원이 아닌 자는? 만 18세의 남자 세례교인 ② 만 30세의 여자 권사", "choices": ["만 18세의 남자 세례교인", "만 30세의 여자 권사", "만 20세의 유아세례교인", "수찬정지 중인 시무장로", "정년 은퇴한 원로목사"], "answer": 4, "explanation": "무흠 입교인이어야 하기 때문에 아무런 교회의 징계 중에 있지 않아야 한다. 시무장로라도 징계 중일 때에는 공동의회의 회원이 될 수 없다."}, {"id": "헌법-0794", "subject": "헌법", "section": "정치", "qnum": 795, "stem": "조직교회의 공동의회 임원에 대한 설명으로 옳지 않은 것은? 당회장은 공동의회의 회장이 된다.", "choices": ["공동의회 서기는 제직회 서기가 겸한다.", "당회장이 없는 교회는 임시회장을 청할 것이다.", "임시회장은 본 노회 목사 중에서 하되, 시무목사도 가능하다.", "회의록 작성은 따로 하되, 당회 서기가 보관한다."], "answer": 2, "explanation": "공동의회 서기는 반드시 당회 서기가 겸하게 되어 있다."}, {"id": "헌법-0795", "subject": "헌법", "section": "정치", "qnum": 796, "stem": "공동의회 회집에 관한 설명으로 옳은 것은? • 공동의회는 개회할 날짜, 장소에 관해서는 반드시 고지하여야 하나, 의안에 대해서는 고지하지 않아도 된다.", "choices": ["공동의회는 매년 1회 이상 회집하는 것이 원칙이나 특별한 안건이 없으면 회집하지 않을 수 있다.", "공동의회의 회집을 위해서는 반드시 개회 1주일 전에 교회 앞에 광고, 또는 통지하여야 하나 상회의 지시가 있는 경우에는 그렇지 않다.", "공동의회는 회원 과반수의 참석을 필요치 않으며 적은 수가 모여도 모인 대로 개회된다.", "공동의회로 회집한 날짜에 개회성수가 되어 개회되었으면 회집안에 대하여 반드시 처리해야 하 며 미룰 수 없다."], "answer": 4, "explanation": "공동의회는 작정한 시간에 출석한 대로 개회한다. 모인 수가 너무 적으면 회장은 권하여 다른 날에 다시 회집한다. (제21장 1조 4)"}, {"id": "헌법-0796", "subject": "헌법", "section": "정치", "qnum": 797, "stem": "당회의 결의로 공동의회를 소집할 요건이 아닌 것은 무엇인가?", "choices": ["제직회의 청원이 있을 때", "당회가 필요로 인정할 때", "무흠 입교인 과반수 이상의 청원이 있을 때", "상회의 명령이 있을 때"], "answer": 3, "explanation": "2018년 기출문제"}, {"id": "헌법-0797", "subject": "헌법", "section": "정치", "qnum": 798, "stem": "다음 중 공동의회를 소집할 목적이 아닌 것은?", "choices": ["예산 결산을 처리할 때", "장로, 집사, 권사를 선거할 때", "교인의 총의를 필요로 할 때", "제직회의 청원이 있을 때"], "answer": 4, "explanation": "정치 제21장 제5조 참고"}, {"id": "헌법-0799", "subject": "헌법", "section": "정치", "qnum": 800, "stem": "다음 중 공동의회 회집에 대한 설명 중 틀린 것은? \" 당회는 개회날짜, 장소, 의안을 1주일 전 교회에 광고한다.", "choices": ["당회는 개회날짜, 장소, 의안을 1주일 전 교회에 광고한다.", "작정한 시간에 출석한 대로 개회한다.", "회집수가 너무 적으면 회장이 권하여 다시 회집한다.", "반드시 3분의 2의 출석으로 성수가 된다."], "answer": 4, "explanation": "정치 제21장 제4조 참고"}, {"id": "헌법-0800", "subject": "헌법", "section": "정치", "qnum": 801, "stem": "다음 공동의회를 소집할 이유와 시기 중 틀린 것은?", "choices": ["당회가 필요하다고 인정할 때", "상회 즉 노회나 총회의 지시가 있을 때는 당회결의 없이 소집한다.", "제직회의 청원이 있을 때", "무홈 입교인의 3분의 1이상의 청원이 있을 때"], "answer": 2, "explanation": "정치 제21장 제2조 참고 — 제직회 1. 조직 지교회 당회원과 집사와 권사를 합하여 제직회를 조직한다. 회장은 담임 목사가 겸무하고 서기와 회계를 선정한다. 당회는 각각 그 형편에 의하여 제직회 사무를 처리하기 위하여 서리 집사에게 제직 회원의 권리를 줄 수 있다. 2. 미조직교회 제직회 미조직교회에서는 목사, 전도사, 권사, 서리 집사, 전도인들이 제직회 사무를 임시로 집행한다. 3. 재정 처리 ① 제직회는 공동의회에서 위임하는 금전을 처리한다. ② 구제와 경비에 관한 사건과 금전 출납(L)은 모두 회에서 처리하며 회계는 회의 결의에 의하여 금전 을 출납한다. ③ 제직회는 매년 말 공동의회에 1년간 경과 상황과 일반 수지(4cx)결산을 보고하며 익년도(3#)) 교회 경비 예산을 편성 보고하여 회에 통과하며 회계는 장부의 검사를 받는다. 4. 제직회 개회 성수 회원 과반수의 출석으로 개회 성수가 되나 통상적인 사무 처리는 출석하는 회원으로 개회하여 처리할 수 있다. 5. 정기회 매월 1회 또는 1년에 4회 이상 정기회를 정함이 편하다."}, {"id": "헌법-0801", "subject": "헌법", "section": "정치", "qnum": 802, "stem": "다음 중 공동의회의 의결정족수에 관한 규정 설명으로 옳지 않은 것은?", "choices": ["법대로 제출하는 사건을 의결할 때 일반의결은 과반수로 의결한다.", "목사 청빙 투표에는 투표수 3분의 2 이상의 가와 입교인 과반수의 승낙이 있어야 한다.", "장로, 집사 및 권사 선거에는 투표수 3분의 2 이상의 가로 의결한다.", "목사청빙 투표에는 제적 교인 3분의 2의 출석과 투표수 3분의 2 이상 가와 입교인 과반수의 승낙을 요한다."], "answer": 4, "explanation": "정치 제21장 제5조 참고"}, {"id": "헌법-0802", "subject": "헌법", "section": "정치", "qnum": 803, "stem": "다음 중 공동의회 회원권에 대한 규정 설명으로 옳지 않은 것은? 원칙적으로 본 교회 교적에 등재된 무흠 입교인이라야 회원권이 있다.", "choices": ["원칙적으로 본 교회 교적에 등재된 무흠 입교인이라야 회원권이 있다.", "이명증서를 가지고 와서 이명접수하고 접수통지서 발송 후부터 회원권이 있다.", "이명증서를 가지고 오면 이명수 이전이라도 회원권이 있다.", "본 교회 교적부에 등재된 입교인이라도 벌 아래 있는 자는 회원권이 없다."], "answer": 3, "explanation": "정치 제21장 제1조 1항 참고 — 공동의회 1. 회원 본 교회 무흠 입교인은 다 회원 자격이 있다. 2. 소집 공동의회는 당회가 필요로 인정할 때와 제직회의 청원이나 무흠 입교인 3분의 1 이상 청원이나 상회의 명령이 있는 때에 당회의 결의로 소집한다. 3. 임원 지교회의 당회장과 당회 서기는 공동의회의 회장과 서기를 겸한다. 당회장이 없는 경우에는 그 당회가 임시 회장을(본 노회 목사 중) 청할 것이요 회록은 따로 작성(\"et)하여 당회 서기가 보관한다. 4. 회집 1. 헌법(정치) 전문 563 총회 강도사고시 문제집 당회는 개회할 날짜와 장소와 의안(3)을 1주일 전에 교회에 광고 혹은 통지하고 그 작정한 시간에 출석하는 대로 개회하되 회집 수가 너무 적으면 회장은 권하여 다른 날에 다시 회집한다. 5. 회의(딸콤) 연말 정기 공동의회에서는 당회의 경과 상황을 들으며 제직회와 부속 각 회의 보고와 교회 경비 결산과 예산서를 채용하며 그 밖에 법대로 제출하는 사건을 의결하나니 일반 의결은 과반수로 하되, 목사 청빙 투표에는 투표수 3분의 2 이상의 가와 입교인 과반수의 승낙을 요하며 장로, 집사 및 권사 선거에는 투표수 3분의 2 이상의 가로 선정한다. 부동산 변동은 지교회의 규정(정관)대로 하고, 규정이 없는 경우에는 공동의회 회원 3분의 2 이상의 찬성으로 결정한다."}, {"id": "헌법-0803", "subject": "헌법", "section": "정치", "qnum": 804, "stem": "다음 중 공동의회 회원권에 관한 규정 설명으로 옳지 않은 것은?", "choices" "choices": ["권사는 자동적으로 제직회원이 되는 종신직이다.", "서리집사는 당회가 제직회원의 권리를 줄 수 있다.", "미조직교회에서는 제직회 사무를 임시로 집행한다.", "조직교회에서도 노회 고시에 합격한 전도사는 제직회원이 될 수 있다."], "answer": 4, "explanation": "정치 제3 제3조 1항 1, 3항 1), 제21장 제2조 1, 2항 참고 — 제직회 1. 조직 지교회 당회원과 집사와 권사를 합하여 제직회를 조직한다. 회장은 담임 목사가 겸무하고 서기와 회계를 선정한다. 당회는 각각 그 형편에 의하여 제직회 사무를 처리하기 위하여 서리 집사에게 제직 회원의 권리를 줄 수 있다. 2. 미조직교회 제직회 미조직교회에서는 목사, 전도사, 권사, 서리 집사, 전도인들이 제직회 사무를 임시로 집행한다. 3. 재정 처리 ① 제직회는 공동의회에서 위임하는 금전을 처리한다. ② 구제와 경비에 관한 사건과 금전 출납(L)은 모두 회에서 처리하며 회계는 회의 결의에 의하여 금전 을 출납한다. ③ 제직회는 매년 말 공동의회에 1년간 경과 상황과 일반 수지(4cx)결산을 보고하며 익년도(3#)) 교회 경비 예산을 편성 보고하여 회에 통과하며 회계는 장부의 검사를 받는다. 4. 제직회 개회 성수 회원 과반수의 출석으로 개회 성수가 되나 통상적인 사무 처리는 출석하는 회원으로 개회하여 처리할 수 있다. 5. 정기회 매월 1회 또는 1년에 4회 이상 정기회를 정함이 편하다."}, {"id": "헌법-0814", "subject": "헌법", "section": "정치", "qnum": 815, "stem": "각 지방 내에 편리한 대로 조직할 수 있는 회는 무엇인가?", "choices": ["연합당회", "연합제직회", "연합노회", "연합총회"], "answer": 2, "explanation": "2018년 기출문제"}, {"id": "헌법-0815", "subject": "헌법", "section": "정치", "qnum": 816, "stem": "제직회 개회 성수로 맞는 것은 무엇인가? 회원 3분의 1의 출석으로 ② 회원 과반수의 출석으로", "choices": ["회원 3분의 1의 출석으로", "회원 과반수의 출석으로", "회원 3분의 2의 출석으로", "회원이 회집되는 대로"], "answer": 2, "explanation": "2018년 기출문제"}, {"id": "헌법-0817", "subject": "헌법", "section": "정치", "qnum": 818, "stem": "제직회의 조직 대상이 아닌 직분은 무엇인가? ^ 지교회 당회원 ② 집사 ③ 권사 q 원로장로", "choices": ["지교회 당회원", "집사", "권사", "원로장로"], "answer": 4, "explanation": "2018년 기출문제"}, {"id": "헌법-0818", "subject": "헌법", "section": "정치", "qnum": 819, "stem": "다음 중 제직회에 대한 설명으로 옳지 않은 것은?", "choices": ["지교회 당회원과 집사와 권사를 합하여 제직회를 조직한다", "회장은 담임목사가 겸무하고 서기와 회계를 선정한다", "당회는 각각 그 형편에 의하여 서리집사에게 제직회 회원의 권리를 줄 수 있다", "제직회는 공동의회에서 위임하는 금전을 처리한다", "매월 1회 또는 1년에 3회 이상 정기회를 정함이 편하다"], "answer": 5, "explanation": "2019년 기출문제"}, {"id": "헌법-0819", "subject": "헌법", "section": "정치", "qnum": 820, "stem": "다음 중 제직회 조직에 관한 규정 설명으로 옳지 않은 것은?", "choices": ["지교회 당회원과 집사와 권사를 합하여 제직회를 조직한다", "회장은 담임목사가 겸무하고 서기와 회계를 선정한다", "당회는 각각 그 형편에 의하여 서리집사에게 제직회 회원의 권리를 줄 수 있다", "지교회의 목사, 장로, 집사, 권사, 서리집사, 전도사를 )) 교회 경비 예산을 편성 보고하여 회에 통과하며 회계는 장부의 검사를 받는다. 4. 제직회 개회 성수 회원 과반수의 출석으로 개회 성수가 되나 통상적인 사무 처리는 출석하는 회원으로 개회하여 처리할 수 있다. 5. 정기회 매월 1회 또는 1년에 4회 이상 정기회를 정함이 편하다."}, {"id": "헌법-0828", "subject": "헌법", "section": "정치", "qnum": 829, "stem": "다음 중 제직회의 정기회와 개회성수에 관한 규정 설명으로 옳지 않은 것은?", "choices": ["제직회의 개회 성수는 과반수의 출석으로 성수가 된다.", "통상적 사무처리는 출석하는 회원으로 개회하여 처리할 수 있다.", "정기회는 매월 1회 또는 1년에 4회 이상 정기회를 정함이 편하다.", "제직회 개회 성수는 과반수 이상의 출석으로만 성수가 된다."], "answer": 4, "explanation": "정치 제21장 제2조 4, 5항 참고 — 제직회 1. 조직 지교회 당회원과 집사와 권사를 합하여 제직회를 조직한다. 회장은 담임 목사가 겸무하고 서기와 회계를 선정한다. 당회는 각각 그 형편에 의하여 제직회 사무를 처리하기 위하여 서리 집사에게 제직 회원의 권리를 줄 수 있다. 2. 미조직교회 제직회 미조직교회에서는 목사, 전도사, 권사, 서리 집사, 전도인들이 제직회 사무를 임시로 집행한다. 3. 재정 처리 ① 제직회는 공동의회에서 위임하는 금전을 처리한다. ② 구제와 경비에 관한 사건과 금전 출납(L)은 모두 회에서 처리하며 회계는 회의 결의에 의하여 금전 을 출납한다. ③ 제직회는 매년 말 공동의회에 1년간 경과 상황과 일반 수지(4cx)결산을 보고하며 익년도(3#)) 교회 경비 예산을 편성 보고하여 회에 통과하며 회계는 장부의 검사를 받는다. 4. 제직회 개회 성수 회원 과반수의 출석으로 개회 성수가 되나 통상적인 사무 처리는 출석하는 회원으로 개회하여 처리할 수 있다. 5. 정기회 매월 1회 또는 1년에 4회 이상 정기회를 정함이 편하다."}, {"id": "헌법-0829", "subject": "헌법", "section": "정치", "qnum": 830, "stem": "다음 중 연합제직회 조직과 직무에 관한 규정 설명으로 옳지 않은 것은?", "choices": ["각 지방 내에 편리한 대로 연합제직회를 조직할 수 있다.", "회원은 그 지방 내 목사, 전도사와 지교회 제직회에서 파송한 총대 1인 이상으로 조직하되 임 원은 투표로 선정한다.", "그 지방 내 합동재정과 전도, 기타 부흥사업과 주일학교 및 기독교 교육에 관한 일을 의정할 수 있다.", "연합제직회는 치리권은 없으나 지교회를 관할할 권한은 있다."], "answer": 4, "explanation": "정치 제21장 제3조 1, 2항 참고 — 연합 제직회 1. 조직 각 지방 내에 편리한 대로 연합 제직회를 조직할 수 있다. 회원은 그 지방 내에 목사 전도사와 지교회 제직회에서 파송한 총대 1인 이상으로 조직하되 임원은 투표로 선정한다. 2. 직무 본 회에 치리권은 없으나 그 지방 내 합동 재정과 전도 기타 부흥 사업과 주일 학교 및 기독교 교육에 관한 일을 의정()할 수 있고 그 지방 내 교회 및 전도 상황 보고를 접수하며 남녀 전도사와 전도인을 선정하되 전도사는 노회의 승인을 받는다. 564 제3부 헌법(정치)"}, {"id": "헌법-0830", "subject": "헌법", "section": "정치", "qnum": 831, "stem": "다음 연합제직회의 직무에 관한 규정 설명으로 옳지 않은 것은? ^ 합동재정 처리 ② 주일학교 등 기독교 교육에 관한 사업", "choices": ["합동재정 처리", "주일학교 등 기독교 교육에 관한 사업", "전도 및 교회부흥에 관한 사업", "지방 내 교회 치리권"], "answer": 4, "explanation": "정치 제21장 제3조 1, 2항 — 연합 제직회 1. 조직 각 지방 내에 편리한 대로 연합 제직회를 조직할 수 있다. 회원은 그 지방 내에 목사 전도사와 지교회 제직회에서 파송한 총대 1인 이상으로 조직하되 임원은 투표로 선정한다. 2. 직무 본 회에 치리권은 없으나 그 지방 내 합동 재정과 전도 기타 부흥 사업과 주일 학교 및 기독교 교육에 관한 일을 의정()할 수 있고 그 지방 내 교회 및 전도 상황 보고를 접수하며 남녀 전도사와 전도인을 선정하되 전도사는 노회의 승인을 받는다. 564 제3부 헌법(정치)"}, {"id": "헌법-0831", "subject": "헌법", "section": "정치", "qnum": 832, "stem": "다음 중 제직회에 관한 설명으로 틀린 것은?", "choices": ["지교회 당회원과 집사와 권사를 합하여 제직회를 조직한다.", "회장은 담임목사가 겸무하고 서기와 회계를 선정한다.", "미조직교회의 경우 목사, 전도사, 권사, 서리집사, 전도인들이 제직회 사무를 임시로 집행한다.", "회원 3분의 1 이상이 출석해야 개회한다."], "answer": 4, "explanation": "정치 제21장 제2조 참고 1 속회 — 제직회 1. 조직 지교회 당회원과 집사와 권사를 합하여 제직회를 조직한다. 회장은 담임 목사가 겸무하고 서기와 회계를 선정한다. 당회는 각각 그 형편에 의하여 제직회 사무를 처리하기 위하여 서리 집사에게 제직 회원의 권리를 줄 수 있다. 2. 미조직교회 제직회 미조직교회에서는 목사, 전도사, 권사, 서리 집사, 전도인들이 제직회 사무를 임시로 집행한다. 3. 재정 처리 ① 제직회는 공동의회에서 위임하는 금전을 처리한다. ② 구제와 경비에 관한 사건과 금전 출납(L)은 모두 회에서 처리하며 회계는 회의 결의에 의하여 금전 을 출납한다. ③ 제직회는 매년 말 공동의회에 1년간 경과 상황과 일반 수지(4cx)결산을 보고하며 익년도(3#)) 교회 경비 예산을 편성 보고하여 회에 통과하며 회계는 장부의 검사를 받는다. 4. 제직회 개회 성수 회원 과반수의 출석으로 개회 성수가 되나 통상적인 사무 처리는 출석하는 회원으로 개회하여 처리할 수 있다. 5. 정기회 매월 1회 또는 1년에 4회 이상 정기회를 정함이 편하다."}, {"id": "헌법-0832", "subject": "헌법", "section": "정치", "qnum": 833, "stem": "속회에 대한 설명으로 옳지 않은 것은?", "choices": ["지교회의 속회는 당회의 치리와 관할과 지도를 받는다.", "노회나 대회나 총회의 지경 안에 보급된 속회는 그 치리회 관할 아래 있다.", "각 회의 명칭, 규칙제정, 임원선택, 재정출납은 그 소속 치리회의 검사와 감독과 지도를 받는다.", "각 지교회 혹은 여러 지교회는 전도사업과 자선사업 등을 위해 여러 가지 회를 조직할 수 있다.", "지교회의 각 회에는 당회원 중에서 고문(자문위원)을 지정해야 한다."], "answer": 5, "explanation": "당회원이나 다른 직원으로 각 기관에 고문을 정하여 연락 지도할 수 있다. (정치 제20장 2조) 꼭 당회원 중에서만 고문을 지정해 야 하는 것은 아니다."}, {"id": "헌법-0833", "subject": "헌법", "section": "정치", "qnum": 834, "stem": "다음 중 속회 조직과 속회관리에 관한 규정 설명으로 옳지 않은 것은? • 지교회나 혹 여러 지교회가 전도사업과 자선사업을 위해 여러 가지 회를 조직할 수 있다.", "choices": ["지교회나 혹 여러 지교회가 전도사업과 자선사업을 위해 여러 가지 회를 조직할 수 있다.", "지교회나 혹 여러 지교회가 도리를 가르치는 것과 은혜 중에서 자라기 위하여 여러 가지 회를 조직할 수 있다.", "어느 지교회든지 여러 회가 있으면 그 교회 당회의 치리와 관할과 지도를 받아야 한다.", "각 속회는 자율적으로 운영하는 것이므로 당회가 간섭하는 것은 부당하다."], "answer": 4, "explanation": "정치 제20장 제1,2조 참고"}, {"id": "헌법-0834", "subject": "헌법", "section": "정치", "qnum": 835, "stem": "다음 중 각 속회의 권한에 관한 규정 설명으로 옳지 않은 것은? 각 속회는 교회 헌법에 의하여 그 명칭과 규칙을 제정하는 것을 그 치리회의 검사와 감독과 지 도를 받는다. 각 속회는 교회 헌법에 의하여 임원 택하는 것을 치리회의 검사와 감독을 받는다.", "choices": ["각 속회는 교회 헌법에 의하여 그 명칭과 규칙을 제정하는 것을 그 치리회의 검사와 감독과 지 도를 받는다.", "각 속회는 교회 헌법에 의하여 임원 택하는 것을 치리회의 검사와 감독을 받는다.", "각 속회는 교회 헌법에 의하여 재정 출납하는 것을 치리회의 검사와 감독과 지도를 받는다.", "각 속회는 교회 헌법에 보장되어 있으므로 치리회의 감독이나 지도를 받지 않는다."], "answer": 4, "explanation": "정치 제20장 제3조 참고 . 회장과 서기 ® 회장 — 속회 권한 이런 각 회가 그 명칭과 규칙을 제정하는 것과 임원 택하는 것과 재정 출납하는 것을 교회 헌법에 의하여 그 치리회의 검사와 감독과 지도를 받는다."}, {"id": "헌법-0835", "subject": "헌법", "section": "정치", "qnum": 836, "stem": "각 회의체에서 회장의 직권에 관한 설명으로 옳지 않은 것은? @ 회장은 개회와 폐회를 주관한다.", "choices": ["회장은 각 회원이 다른 회원의 언권을 침해하지 못하게 한다.", "가부 동수인 경우에는 회장이 결정한다.", "회장이 날인한 등본은 각 치리회에서 원본과 같이 인정된다.", "회장은 회의질서를 유지할 수 없는 경우에 비상정회를 선언할 수 있다."], "answer": 4, "explanation": "각 치리회에서 원본과 같이 인정되는 것은 회장이 아니라 서기가 날인한 등본이다. (정치 제19장 4조)"}, {"id": "헌법-0836", "subject": "헌법", "section": "정치", "qnum": 837, "stem": "다음 중 각 치리회 회장에 관한 규정 설명으로 옳지 않은 것은?", "choices": ["교회 각 치리회는 모든 사무를 질서 있고 신속하게 처리하기 위하여 회장을 선택할 것이다.", "회장의 임기는 각 치리회가 정한 규칙대로 한다.", "당회장을 제외한 회장을 선거할 때는 각 치리회가 정한 규칙에 의해 선거한다.", "각 치리회는 회장을 선거할 때는 각 치리회가 정한 규칙에 의해 선거한다."], "answer": 4, "explanation": "정치 제19장 제1조, 제9장 제3조 참고 — 회장 교회 각 치리회는 모든 사무를 질서 있고 신속하게 처리하기 위하여 회장을 선택할 것이요 그 임기는 그 회의 규칙대로 한다."}, {"id": "헌법-0837", "subject": "헌법", "section": "정치", "qnum": 838, "stem": "다음 중 회장 유고 시 의장 대리 서열과 총대권에 대한 설명으로 옳지 않은 것은?", "choices": ["회장 유고 시에 부회장이 대리하는 것은 일반적인 상식이다.", "부회장도 유고 시에는 직전회장, 증경회장 순으로 하고 증경회장도 모두 유고 시에는 최선 장립 자가 의장이 된다.", "최선 장립자가 다수일 때는 최연장자가 맡게 된다.", "총대는 각 노회에서 투표하여 선출되고 총회 서기가 천서를 접수하면 자동적으로 총회의 회원 이 되며 회장을 대리할 수도 있다."], "answer": 4, "explanation": "정치 제12장 제6조, 표준회의규정 제2장 21조 — 총회의 회집 총회는 매년 1회 정례로 회집하되 예정한 날짜에 회장이 출석하지 못할 때는 부회장 혹 전 회장이 개회하 고 신 회장을 선거할 때까지 시무할 것이요. 각 총대는 서기가 천서를 접수 호명(2)한 후부터 회원권이 있다."}, {"id": "헌법-0838", "subject": "헌법", "section": "정치", "qnum": 839, "stem": "다음 중 각 치리회 회장에 관한 규정 설명으로 옳은 것은?", "choices": ["각 치리회는 회장을 선거할 때는 각 치리회가 정한 규칙에 의해 선거한다.", "각 치리회 회장과 재판사건이 관계되면 재판 법규에 의해서 신속히 처리한다.", "교회 각 치리회는 모든 사무를 질서 있고 신속하게 처리하기 위하여 회장을 선택할 것이다.", "공동의회 회장은 당회장이 겸한다."], "answer": 3, "explanation": "정치 제19장 제1조, 제9장 제3조 참고 — 회장 교회 각 치리회는 모든 사무를 질서 있고 신속하게 처리하기 위하여 회장을 선택할 것이요 그 임기는 그 회의 규칙대로 한다."}, {"id": "헌법-0839", "subject": "헌법", "section": "정치", "qnum": 840, "stem": "다음 중 누가 각 치리회의 회장이 될 수 있는가에 대한 설명으로 옳지 않은 것은? 당회장은 항상 지교회 담임목사가 된다.", "choices": ["당회장은 항상 지교회 담임목사가 된다.", "당회장은 형편상 같은 노회 소속 다른 목사가 회장이 될 수 있다.", "당회에 목사를 구할 수 없는 비상한 경우에는 장로가 당회장이 될 수 있다.", "당회 이외의 각 치리회는 회의 규칙에 의거하여 회장을 선출한다."], "answer": 3, "explanation": "정치 제19장 제1조, 제9장 제3조 참고 — 회장 교회 각 치리회는 모든 사무를 질서 있고 신속하게 처리하기 위하여 회장을 선택할 것이요 그 임기는 그 회의 규칙대로 한다."}, {"id": "헌법-0840", "subject": "헌법", "section": "정치", "qnum": 841, "stem": "다음 중 회장의 사회권 상실에 관한 설명으로 옳지 않은 것은?", "choices": ["회장 자신의 신상에 관한 문제와 회장이 심의안건 토의에 발언한 경우", "회장 소속 하회의 상소건이나 위탁판결을 심의할 때", "재석회원 3분의 2 이상의 결의로 회장의 사회권을 일시 정지시킬 수 있다.", "회장이 비상정회를 선언한 경우에는 사회권이 상실된다."], "answer": 4, "explanation": "정치 제19장 제2조, 표준회의규정 제2장 제19조, 20조 참조 — 회장의 직권 회장은 그 회가 허락하여 준 권한 안에서 회원으로 회칙을 지키게 하고 회석의 질서를 정돈하며 개회, 폐회를 주관하고 순서대로 회무를 지도하되 잘 의논한 후에 신속한 방법으로 처리하고 각 회원이 다른 회원의 언권을 침해하지 못하게 하며 회장의 승낙으로 언권을 얻은 후에 발언하게 하되 의안(%) 범위 밖에 탈선하지 않게 하고 회원 간에 모욕 혹은 풍자적 무례한 말을 금하며 회무 진행 중에 퇴장을 금하며 가부를 물을 의제(6)는 회중에 밝히 설명한 후에 가부를 표결할 것이요 가부 동수인 때는 회장이 결정하 고 회장이 이를 원하지 않으면 그 안건은 자연히 부결된다. 회장은 매사건에 결정을 공포할 것이요 특별한 일로 회의 질서를 유지할 수 없는 경우에는 회장이 비상 정회를 선언할 수 있다. 562 제3부 헌법(정치)"}, {"id": "헌법-0841", "subject": "헌법", "section": "정치", "qnum": 842, "stem": "다음 중 회장의 사회권 상실에 관한 설명으로 옳지 않은 것은?", "choices": ["회장 소속 하회의 상소건이나 위탁판결을 심의할 때", "회장 자신의 신상에 관한 문제", "회장이 심의안건에 대하여 회장석을 내려와 발언한 경우", "회원 과반수가 사회권의 정지를 요구했을 경우"], "answer": 4, "explanation": "정치 제19장 제1조, 표준회의규정 제12장 제20조 참조 — 회장 교회 각 치리회는 모든 사무를 질서 있고 신속하게 처리하기 위하여 회장을 선택할 것이요 그 임기는 그 회의 규칙대로 한다."}, {"id": "헌법-0842", "subject": "헌법", "section": "정치", "qnum": 843, "stem": "다음 중 회장의 직권에 관한 규정 설명으로 옳지 않은 것은?", "choices": ["회장은 회원으로 회칙을 지키게 하고 회석의 질서를 정돈한다
