swer": 3, "explanation": "정치 총론"}, {"id": "헌법-0045", "subject": "헌법", "section": "정치", "qnum": 45, "stem": "조합정치의 특징이 아닌 것은 무엇인가? 치리와 권징을 자유롭게 한다", "choices": ["치리와 권징을 자유롭게 한다", "각 지교회의 대표로 조직된 연합회가 있다", "산하 교회에 명령하지 않는다", "예식과 도리 해석을 각 교회가 자유롭게 하지 못한다."], "answer": 4, "explanation": "정치 총론 ® 장로회 정치 원리"}, {"id": "헌법-0046", "subject": "헌법", "section": "정치", "qnum": 46, "stem": "장로회 정치 원리에 의하면 세속국가에 대한 교회의 태도는 어떠해야 하는가?", "choices": ["교회법의 정당한 절차와 관계없이 세상 법에 고소, 고발하는 것도 괜찮다.", "교회와 국가는 완전히 분리되어 있으므로 어떤 형태로도 영향을 주고받을 수 없다.", "교회는 신앙공동체로서 일정한 세력을 구축하고, 이를 통해 국가를 적절히 통제할 수 있어야 한다.", "교회는 오직 국가에 대하여 각 종교의 안전 보장과 동일시함을 바랄 뿐이다.", "교회는 세속국가를 통해서 기독교 교리의 정당성을 보장 받아야 한다."], "answer": 4, "explanation": "2번은 재세례파의 입장이다. 3번은 중세 가톨릭의 입장이다."}, {"id": "헌법-0047", "subject": "헌법", "section": "정치", "qnum": 47, "stem": "권징에 대한 설명으로 옳은 것은?", "choices": ["교회의 권징은 도덕적인 문제를 취급하는 것은 아니다. 교회의 시벌은 때로 국법상의 시벌이 되기도 한다.", "교회의 권징은 오직 신령상의 것이다.", "권징의 효력은 정치의 공정에 있다.", "권징은 시대의 여론을 잘 반영한 것이어야 한다."], "answer": 4, "explanation": "교회의 권징은 인민재판이 아니다. 3번에서 권징은 신령의 것이며, 동시에 도덕적인 것이기도 하다. \"오직\"이라는 말이 없으면 답이 될 수 있지만, \"오직\"이라는 말이 있어서 틀렸다. !. 실전문제 589"}, {"id": "헌법-0048", "subject": "헌법", "section": "정치", "qnum": 48, "stem": "교회의 권징이 권위를 갖기 위해서 요구되는 것이 아닌 것은?", "choices": ["교회의 정치 또는 재판이 공정한 과정과 절차를 밟아야 한다.", "교회법과 국가법을 두루 활용해야 한다.", "교회의 머리이신 구주의 권고와 은총이 있어야 한다.", "모든 사람이 공인하는 것이어야 한다.", "권징은 반드시 벌하는 데 목적이 있는 것이 아니라 회개케 하기 위한 것이다."], "answer": 2, "explanation": null}, {"id": "헌법-0049", "subject": "헌법", "section": "정치", "qnum": 49, "stem": "양심의 자유에 대한 설명으로 옳지 않은 것은?", "choices": ["성경에 반하지 않는 교회의 가르침에 대하여도 양심을 이유로 거절할 수 있다.", "양심의 주재는 오직 하나님뿐이시다.", "종교에 관한 모든 사건에 대하여 각기 양심대로 판단할 수 있다.", "비록 국가의 법률이 강제하는 것이라도 성경에 위반한 명령에 대하여는 거절할 수 있다.", "교회의 과도한 교훈이나 명령에 대하여는 순종하지 않을 수 있다."], "answer": 1, "explanation": "정치 제1장 제1조 참고 — 양심 자유 양심의 주재는 하나님뿐이시라. 그가 양심의 자유를 주사 신앙과 예배에 대하여 성경에 위반되거나 과분 3A)한 교훈과 명령을 받지 않게 하셨나니 그러므로 일반 인류(A)는 종교에 관계되는 모든 사건에 대하 여 속박을 받지 않고, 각기 양심대로 판단할 권리가 있은즉 누구든지 이 권리를 침해(홈)하지 못한다."}, {"id": "헌법-0050", "subject": "헌법", "section": "정치", "qnum": 50, "stem": "종교에 관계되는 모든 사건에 대하여 속박을 받지 않을 권리에 대한 설명으로 옳지 않은 것은?", "choices": ["하나님은 인간에게 양심의 자유를 주셨다.", "치리회라고 할지라도 양심의 자유를 제한할 수 없다.", "모든 양심은 오직 하나님의 말씀에만 구속을 받는다. 타라 이후 인류에게는 양심의 자유가 소멸되었다.", "불신앙을 선택할 신앙의 자유를 말하는 것이 아니다."], "answer": 4, "explanation": "양심의 자유가 신자의 중생한 양심을 가리키는 것은 옳다. 그렇다고 타락한 이후에 모든 인류에게 양심의 자유가 없다는 것은 옳지 않다. 그러나 양심의 자유는 궁극적으로 바른 신앙을 견지할 수 있는 자유를 의미한다. 하나님의 말씀과 뜻에 복종할 양심 의 자유를 의미하는 것이다. 그러므로 불신앙을 선택할 자유는 양심의 자유에 해당하지 않는다."}, {"id": "헌법-0051", "subject": "헌법", "section": "정치", "qnum": 51, "stem": "교회 자유 원리에 대한 설명으로 옳지 않은 것은?", "choices": ["어느 교파, 교회든지 각기 교인의 입회 규칙을 임의로 설정할 수 있다.", "직원의 자격과 교회정치 일체의 조직을 설정할 수 있다.", "어느 개인이든 어느 교회에 등록하면 그 교회의 법규에 따른 치리를 받아야 한다.", "어느 개인이든 양심의 자유가 있으므로 교회의 치리는 권고적일 뿐이다.", "교회는 국가 권력에 의해 그 자유를 제한 당하지 않는다."], "answer": 4, "explanation": "교회의 치리는 결코 권고적인 것만은 아니다. 교회법적 강제력을 갖는다. 물론 국법상의 강제력과는 다르지만, 교회법적 제재는 반드시 뒤따른다. 그것은 교회의 자유에 해당한다."}, {"id": "헌법-0052", "subject": "헌법", "section": "정치", "qnum": 52, "stem": "교회법과 국가법의 관계에 대한 설명으로 옳지 않은 것은? 국가법이 교회법에 우선한다.", "choices": ["교회의 고유한 사항은 사법심사의 대상이 되지 않는다.", "목사의 임직과 사직에 관하여는 교회법에 따른다.", "교회에 관한 사항이더라도 국민의 기본권과의 관계에 법적 충돌이 발생하면 사법심사의 대상이 된다.", "현 사법체계에서 교회는 비법인 사단으로 분류된다."], "answer": 1, "explanation": "교회법과 국가법은 서로 고유한 영역을 갖고 있으며, 교회는 때로 국가법의 영향을 받기도 하지만, 국가법의 간섭을 배제하기도 한다. 이것은 양심과 종교의 자유에 해당하는 것이기 때문이다."}, {"id": "헌법-0053", "subject": "헌법", "section": "정치", "qnum": 53, "stem": "직원의 자격과 선택에 관한 설명으로 옳지 않은 것은?", "choices": ["교회는 직원 선택을 위한 규칙을 제정할 것이다.", "어느 회에서든지 그 직원을 선거하는 권한은 그 회에 있다.", "교회의 직원은 우선 입교인이어야 한다.", "성격과 주의가 다 같이 선한 자라도 진리와 교규(⅜)에 의견이 불합하므로 교회의 도리에 완 전히 신복하지 못하는 자라도 서로 용납하면, 직원이 될 수 있다.", "진리는 그에 합당한 선한 행실로 증거된다는 원리에 따라 교회는 당연히 직원을 선정한다."], "answer": 4, "explanation": "직원은 그 교회의 도리에 완전 신복하는 자이어야 한다. ※ 정치 제1장 제4조, 제5조, 제6조 참조 — 진리와 행위의 관계 진리는 선행의 기초라. 진리가 진리 되는 증거는 사람으로 성결하게 하는 경향((i)에 있으니 주 말씀하 시되 「과실로 그 나무를 안다」 하심과 같으니 진리와 허위(표(%)가 동일(-)하며 사람의 신앙이 어떠하든 지 관계없다 하는 이 말보다 더 패리(출)하고 더 해로운 것은 없다. 신앙과 행위는 연락하고 진리와 본분은 서로 결탁(Ght)되어 나누지 못할 것이니 그렇지 아니하면 진리를 연구하거나 선택할 필요가 없다."}, {"id": "헌법-0054", "subject": "헌법", "section": "정치", "qnum": 54, "stem": "다음 중 치리권에 관한 설명으로 맞지 않는 것은?", "choices": ["교회의 치리권은 실제적으로 말하면 행정권과 재판권이다.", "하나님의 명령대로 준봉전달하는 것뿐이다.", "치리권은 신앙과 행위에 대한 유일한 법칙인 성경에서 기인한다.", "법원이나 사법당국에 의한 판결은 교회 치리권의 확장이다.", "교회의 치리권이라도 양심의 자유를 속박할 규칙을 자의로 제정할 수 없다."], "answer": 4, "explanation": null}, {"id": "헌법-0055", "subject": "헌법", "section": "정치", "qnum": 55, "stem": "당회의 권징 치리는 어디까지 그 효력이 미치는가?", "choices": ["당사자에게만 효력이 미친다.", "지교회만 효력이 미친다.", "소속노회 안에만 효력이 미친다.", "전국 교회에 효력이 미친다.", "대회 안에까지만 효력이 미친다."], "answer": 4, "explanation": "한 지교회의 결정은 전국 교회의 결정이 된다. 따라서 각 치리회의 결정은 전국 교회의 결정이 되는 것이다."}, {"id": "헌법-0056", "subject": "헌법", "section": "정치", "qnum": 56, "stem": "다음 중 장로회 정치 원리가 아닌 것은?", "choices": ["교회 자유", "교회의 직원과 그 책임", "양심 자유", "교회 설립 자유", "진리와 행위와의 관계"], "answer": 4, "explanation": "2019년 기출문제"}, {"id": "헌법-0057", "subject": "헌법", "section": "정치", "qnum": 57, "stem": "다음 중 장로회 정치 원리인 교회의 직원과 그 책임에 관한 설명으로 옳은 것은? 거짓 도리를 신앙하거나 악한 자는 자신의 문제를 스스로 책임져야 한다", "choices": ["거짓 도리를 신앙하거나 악한 자는 자신의 문제를 스스로 책임져야 한다", "교회의 직원을 설치하는 이유는 교회의 조직을 위해서다", "교회의 직원을 설치한 것은 총회의 존속을 위해서다", "교우 중 거짓 도리를 신앙하는 자와 행위가 악한 자가 있으면 교회를 대표한 직원과 치리회가 당연히 책망하거나 출교할 권한을 부여한 것이다"], "answer": 2, "explanation": "2020년 기출문제"}, {"id": "헌법-0058", "subject": "헌법", "section": "정치", "qnum": 58, "stem": "다음 중 치리권에 대한 설명으로 옳지 않은 것은?", "choices": ["당회장에게 있다", "당회에 있다", "노회에 있다", "대회에 있다", "총회에 있다"], "answer": 1, "explanation": "2019년 기출문제"}, {"id": "헌법-0059", "subject": "헌법", "section": "정치", "qnum": 59, "stem": "다음 중 치리권에 대해 맞지 않는 것은?", "choices": ["그리스도의 법에 순종케 함", "불복 불법자 시벌", "국법상 시벌을 과함", "패역자와 회개치 않는 자 출교"], "answer": 3, "explanation": null}, {"id": "헌법-0060", "subject": "헌법", "section": "정치", "qnum": 60, "stem": "다음 중 장로교회의 치리권에 대한 설명으로 옳은 것은?", "choices": ["각 치리회는 상회와 하회 양권의 조화와 협력 가운데서 치리권을 행사한다.", "각 치리회는 고유한 특권이 있으므로 각 치리회가 결정한 대로 시행한다.", "총회의 권한은 하회의 청원과 상관없이 결정대로 시행한다.", "각 치리회 회원은 권한이 동등한 목사와 장로이므로 각 치리회는 서로 간섭하면 안 된다."], "answer": 1, "explanation": "정치 총론 5, 제8장 제7 , 2조"}, {"id": "헌법-0061", "subject": "헌법", "section": "정치", "qnum": 61, "stem": "다음 중 각 치리회의 관할 범위에 대한 설명 중 맞지 않는 것은? 당회의 관할 범위는 한 지교회분이다.", "choices": ["당회의 관할 범위는 한 지교회분이다.", "노회의 관할 범위는 총회가 획정한 노회지역이다.", "노회는 대등한 다른 노회라도 문제가 있으면 관할할 수 있다.", "종회의 관할 범위는 전국 지역의 소속교회 및 치리회이다."], "answer": 3, "explanation": "정치 총론 5. 정치 제9장 제5조, 제10장 제6조, 제12장 제4.5조 참고"}, {"id": "헌법-0062", "subject": "헌법", "section": "정치", "qnum": 62, "stem": "다음 중 치리권에 관한 설명으로 옳지 않은 것은? 교회의 치리권은 실제적으로 말하면 행정권과 재판권이다", "choices": ["교회의 치리권은 실제적으로 말하면 행정권과 재판권이다", "어느 교파의 치리회든지 회원의 양심을 속박할 규칙을 자의로 제정할 권리가 없다", "치리권은 신앙과 행위에 대한 유일한 법칙인 성경에서 기인한다", "교회의 치리권 행사에 대하여 사법적 판단이 있으면, 사법적 결정을 따라야 한다."], "answer": 4, "explanation": "2020년 기출문제 수정"}, {"id": "헌법-0063", "subject": "헌법", "section": "정치", "qnum": 63, "stem": "다음 중 장로회 정치 원리인 양심의 자유에 대한 설명으로 맞지 않는 것은? 양심의 주재는 하나님뿐이시며 그가 양심의 자유를 주셨다.", "choices": ["양심의 주재는 하나님뿐이시며 그가 양심의 자유를 주셨다.", "신앙과 예배에 대하여 성경에 위반되거나 과분한 교훈과 명령은 받지 않는다.", "성경의 교훈이라도 내 양심에 허락되지 않으면 순복할 필요가 없다.", "하나님 외에는 어느 누구도 개인의 양심을 속박하거나 강제로 억압할 수 없다"], "answer": 3, "explanation": "정치 제1장 제1조 참고 — 양심 자유 양심의 주재는 하나님뿐이시라. 그가 양심의 자유를 주사 신앙과 예배에 대하여 성경에 위반되거나 과분 3A)한 교훈과 명령을 받지 않게 하셨나니 그러므로 일반 인류(A)는 종교에 관계되는 모든 사건에 대하 여 속박을 받지 않고, 각기 양심대로 판단할 권리가 있은즉 누구든지 이 권리를 침해(홈)하지 못한다."}, {"id": "헌법-0064", "subject": "헌법", "section": "정치", "qnum": 64, "stem": "다음 중 장로회 정치 원리인 양심의 자유에 대한 구체적인 설명으로 맞지 않는 것은?", "choices": ["장로회정치가 개교회와 가 치리회를 다스리는 법규를 제정하는 것은 양심의 자유를 억압하는 것이 아니다.", "어떠한 경우라도 내 양심에 허락되지 않으면 하지 않는 것이 양심의 자유이다", "어느 교회나 교단의 예배의식이나 규범을 이행하지 않고 자기 양심에 따라 신앙생활 한다고 고 집하는 것은 신앙양심의 자유가 아니다.", "헌법이 말하는 양심의 자유는 중생한 신자의 성경적 양심을 가리킨다."], "answer": 2, "explanation": "정치 제1장 제1조 — 양심 자유 양심의 주재는 하나님뿐이시라. 그가 양심의 자유를 주사 신앙과 예배에 대하여 성경에 위반되거나 과분 3A)한 교훈과 명령을 받지 않게 하셨나니 그러므로 일반 인류(A)는 종교에 관계되는 모든 사건에 대하 여 속박을 받지 않고, 각기 양심대로 판단할 권리가 있은즉 누구든지 이 권리를 침해(홈)하지 못한다."}, {"id": "헌법-0065", "subject": "헌법", "section": "정치", "qnum": 65, "stem": "다음 중 장로회 정치원리인 양심자유에 대한 설명으로 틀린 것은?", "choices": ["양심의 자유란 자기 양심에 따라 행동하는 자유를 말한다.", "하나님만이 양심의 주재가 되신다.", "성경의 교훈이라도 내 양심이 허락하지 않으면 순복할 필요가 없다.", "헌법이 말하는 양심자유는 중생된 신자의 중생된 양심을 가리킨다."], "answer": 3, "explanation": "정치 제1장 제1조 — 양심 자유 양심의 주재는 하나님뿐이시라. 그가 양심의 자유를 주사 신앙과 예배에 대하여 성경에 위반되거나 과분 3A)한 교훈과 명령을 받지 않게 하셨나니 그러므로 일반 인류(A)는 종교에 관계되는 모든 사건에 대하 여 속박을 받지 않고, 각기 양심대로 판단할 권리가 있은즉 누구든지 이 권리를 침해(홈)하지 못한다."}, {"id": "헌법-0066", "subject": "헌법", "section": "정치", "qnum": 66, "stem": "다음 장로회정치 원리 중 교회자유원리에 대한 설명으로 맞지 않는 것은?", "choices": ["어느 교파, 교회든지 각기 교인의 입회규칙을 설정할 자유권이 있다.", "어느 교파, 교회든지 입교인 및 직원의 자격과 교회정치 일체의 조직을 설정할 자유권이 있다.", "어느 개인이든 어느 교회에 등록하면 그 교회의 법규에 따른 치리를 받아야 한다.", "어느 개인이든 양심의 자유가 있으므로 치리 받을 필요가 없다."], "answer": 4, "explanation": "정치 제1장 제2조 참고 — 교회 자유 1. 전조(#T()에 설명한 바 개인 자유의 일례(-Bl)로 어느 교파 어느 교회든지 각기 교인의 입회 규칙과 입교인 및 직원의 자격과 교회정치의 일체(-5) 조직을 예수 그리스도의 정하신 대로 설정)할 자유 권이 있다. 2. 교회는 국가의 세력을 의지하지 아니하고 오직 국가에서 각 종교의 종교적 기관을 안전 보장하며 동일시 7-해)함을 바라는 것뿐이다."}, {"id": "헌법-0067", "subject": "헌법", "section": "정치", "qnum": 67, "stem": "다음 중 장로회 정치원리인 교회의 직원과 그 책임에 관한 설명으로 맞지 않는 것은?", "choices": ["복음을 전파하기 위하여", "성례를 시행하게 하기 위하여", "성도로 하여금 진리와 본분을 준수하도록 관리하도록 하기 위하여", "거짓 도리를 신앙하거나 악한 자가 있을 때 권면하기 위하여"], "answer": 4, "explanation": "정치 제1장 제3조 참고 — 교회의 직원과 그 책임 교회의 머리 되신 주 예수 그리스도께서 그 지체 된 교회에 덕을 세우기 위하여 직원을 설치(4)하사 다만 복음을 전파하며 성례를 시행하게 하실 뿐 아니라, 신도로 진리와 본분을 준수하도록 관리(팥)하게 하신 것이라. 이러므로 교우 중에 거짓 도리를 신앙하는 자와 행위가 악한 자가 있으면 교회를 대표한 직원 과 치리회가 당연히 책망하거나 출교할 것이라. 그러나 항상 성경에 교훈한 법례(1,8)대로 행한다."}, {"id": "헌법-0069", "subject": "헌법", "section": "정치", "qnum": 69, "stem": "다음 중 장로회 정치원리인 진리와 행위의 관계에 대한 설명으로 맞지 않는 것은? n 진리는 선행의 기초이다.", "choices": ["n 진리는 선행의 기초이다.", "진리가 진리 되는 증거는 사람으로 성결하게 하는 경향이 있다.", "사람의 신앙이 어떠하든지 관계없다 하는 말보다 더 패리하고 더 해로운 것은 없다.", "신앙과 행위는 별개이므로 나누어서 생각해야 한다."], "answer": 4, "explanation": "정치 제1장 제4조 참고 — 진리와 행위의 관계 진리는 선행의 기초라. 진리가 진리 되는 증거는 사람으로 성결하게 하는 경향((i)에 있으니 주 말씀하 시되 「과실로 그 나무를 안다」 하심과 같으니 진리와 허위(표(%)가 동일(-)하며 사람의 신앙이 어떠하든 지 관계없다 하는 이 말보다 더 패리(출)하고 더 해로운 것은 없다. 신앙과 행위는 연락하고 진리와 본분은 서로 결탁(Ght)되어 나누지 못할 것이니 그렇지 아니하면 진리를 연구하거나 선택할 필요가 없다."}, {"id": "헌법-0070", "subject": "헌법", "section": "정치", "qnum": 70, "stem": "예수교장로회 정치의 일정한 원리 8개조가 있는데 이것을 이해하여야 교회의 성질을 알 것이다. 8개조 원리에 맞지 않는 것은?", "choices": ["교회의 직원과 그 책임, 교회 자유", "진리와 행위의 관계, 양심 자유", "권징, 치리권, 임원 선거권, 직원의 직무", "교회의 권징은 교회 영광과 복을 증진한다."], "answer": 3, "explanation": "2018년 기출문제"}, {"id": "헌법-0071", "subject": "헌법", "section": "정치", "qnum": 71, "stem": "정치 제8장 교회 정치와 치리회 제1조에 의하면 교회를 치리함에는 명백한 정치와 조직이 있어야 한다. 다음 치리회에 대한 설명 중 잘못된 답을 고르시오 © 교회의 치리권은 개인에게 있지 않고 당회, 노회, 총회에 있다.", "choices": ["교회의 치리권은 개인에게 있지 않고 당회, 노회, 총회에 있다.", "각 치리회는 각립한 개체가 아니요, 서로 연합한 것이어서 어떤 일을 처결하든지 법대로 대표된 치리회에서 결정한다.", "치리회의 회집은 노회와 당회는 매년 2회 이상, 대회와 총회는 매년 1회 회집한다.", "교회의 각 치리회는 국법상 시벌을 과하는 권한은 없다."], "answer": 3, "explanation": "2018년 기출문제"}, {"id": "헌법-0072", "subject": "헌법", "section": "정치", "qnum": 72, "stem": "다음 중 교회 직원의 자격에 관한 설명으로 옳은 것은?", "choices": ["교회의 직원은 그 교회 출석한 지 1년 이상 되면 누구나 자격이 있다.", "교회의 도리와 헌법을 완전히 신복하는 자를 직원으로 선택하도록 규칙을 제정해야 한다.", "어느 회에서든지 그 직원을 선거하는 권한은 그 회에 있다.", "장로의 자격은 반드시 집사라야 한다."], "answer": 2, "explanation": "정치 제1장 제5조"}, {"id": "헌법-0073", "subject": "헌법", "section": "정치", "qnum": 73, "stem": "다음 중 직원선거권에 관한 설명으로 맞지 않는 것은?", "choices": ["어느 회에서든지 그 직원을 선거하는 권한은 그 회에 있다.", "직원의 선거는 교회의 회원이 투표로 한다.", "교회 안에 투표하여 선거하는 직임은 목사, 장로, 집사, 권사이다.", "교회의 직원은 어떤 직원을 선거하든지 상회의 허락을 받아야 한다."], "answer": 4, "explanation": "정치 제1장 제6조 참고 — 직원 선거권 교회 직원의 성격과 자격과 권한과 선거와 위임하는 규례는 성경에 기록되었으니 어느 회에서든지 그 직원을 선정하는 권한은 그 회에 있다."}, {"id": "헌법-0074", "subject": "헌법", "section": "정치", "qnum": 74, "stem": "다음 중 치리권에 관한 설명으로 맞지 않는 것은?", "choices": ["교회의 치리권은 실제적으로 말하면 행정권과 재판권이다.", "어느 교파의 치리회든지 회원의 양심을 속박할 규칙을 자의로 제정할 권리가 없다.", "치리권은 신앙과 행위에 대한 유일한 법칙인 성경에서 기인한다.", "교회의 치리권자들의 약점 때문에 국가의 법원이나 사법당국의 결정이 있으면 그에 따라야 한다."], "answer": 4, "explanation": "정치 제1장 제7조 참고 — 치리권 치리권은 치리회로나 그 택해 세운 대표자로 행사함을 묻지 않고 하나님의 명령대로 준봉 전달(19초19분) 하는 것뿐이다. 대개 성경은 신앙과 행위에 대한 유일한 법칙인즉, 어느 교파의 치리회든지 회원의 양심을 속박할 규칙을 자의(티)로 제정할 권리가 없고 오직 하나님의 계시하신 뜻에 기인(보조)한다."}, {"id": "헌법-0075", "subject": "헌법", "section": "정치", "qnum": 75, "stem": "다음 중 교회의 치리권 행사에 대한 설명 중에서 틀린 것은?", "choices": ["치리권 행사자는 오직 주의 뜻을 받드는 종으로 그 뜻을 선언하는 것뿐이다.", "교회의 부패와 이단을 방지하고 신성유지를 위해서는 재판을 통한 징계를 통해서 치리권을 행 사할 수 있다.", "성도를 재판함에 있어 정확무오한 법칙은 오직 성경뿐이다.", "모든 치리회는 헌법에 대한 고유한 해석권을 가지므로 법에 대하여 형편대로 판단하면 된다."], "answer": 4, "explanation": "정치 제1장 제7조 ※ 헌법에 대한 판단은 오직 총회에만 있으므로 각 치리회가 임의로 판단할 수 없다. — 치리권 치리권은 치리회로나 그 택해 세운 대표자로 행사함을 묻지 않고 하나님의 명령대로 준봉 전달(19초19분) 하는 것뿐이다. 대개 성경은 신앙과 행위에 대한 유일한 법칙인즉, 어느 교파의 치리회든지 회원의 양심을 속박할 규칙을 자의(티)로 제정할 권리가 없고 오직 하나님의 계시하신 뜻에 기인(보조)한다."}, {"id": "헌법-0076", "subject": "헌법", "section": "정치", "qnum": 76, "stem": "다음 중 장로교 정치원리 가운데 권징에 대한 설명으로 맞지 않는 것은?", "choices": ["교회의 권징은 도덕상과 신령상의 것이다.", "교회의 시벌은 국법상의 시벌과 같은 효력이 있다.", "권징의 효력은 정치의 공정과 모든 사람이 공인할 수 있어야 한다.", "권징의 효력은 만국교회의 머리이신 구주의 권고와 은총에 있다."], "answer": 2, "explanation": "정치 제1장 제8조 참고 — 권장 교회가 이상(AL) 각 조의 원리를 힘써 지키면 교회의 영광과 복을 증진(1원)할 것이니 교회의 권징은 도덕상과 신령상의 것이요, 국법상의 시벌(6)이 아닌즉, 그 효력(*))은 정치의 공정(소표)과 모든 사람 의 공인(소)과 만국 교회의 머리 되신 구주의 권고와 은총에 있다."}, {"id": "헌법-0077", "subject": "헌법", "section": "정치", "qnum": 77, "stem": "다음 중 장로회 정치원리가 아닌 것은?", "choices": ["양심자유", "교회직원과 그 책임", "치리권", "사도 계승권 원리"], "answer": 4, "explanation": "정치 제1장 제1,3,7조 참고"}, {"id": "헌법-0078", "subject": "헌법", "section": "정치", "qnum": 78, "stem": "다음 중 장로회 정치 7원리인 치리권에 대한 설명으로 틀린 것은?", "choices": ["교회의 행정권", "재판권", "직원선거권", "교회의 신성유지권"], "answer": 3, "explanation": "정치 제1장 제6,7조 참고"}, {"id": "헌법-0080", "subject": "헌법", "section": "정치", "qnum": 80, "stem": "다음 중 교회의 치리권을 개인이 아니라 당회, 노회, 대회, 총회 등 치리회에 있게 한 이유에 대 한 설명으로 맞지 않는 것은?", "choices": ["유능한 사람이라도 유한한 인간이므로 치리권 행사에 오류를 범할 수 있기 때문.", "여러 회원들의 중지에 따라 치리권을 행사하는 것이 개인이 치리하는 것보다 오류를 범할 확률 이 적기 때문에", "성경이 치리권을 치리회에 있게 하셨다.", "개인이 치리권을 행사하면 치리권자의 영향력에 따라 소신껏, 신속하게 너무 빨리 처리해버리기 때문이다."], "answer": 4, "explanation": "정치 제8장 제1,2조 참고"}, {"id": "헌법-0081", "subject": "헌법", "section": "정치", "qnum": 81, "stem": "다음 중 장로교회 정치 원리 중 교회 자유에서 교회가 국가에 바라는 것은 무엇인가? 국가가 교회를 통치하는 것 ② 국가가 교회에 종속되는 것", "choices": ["국가가 교회를 통치하는 것", "국가가 교회에 종속되는 것", "국가가 교회를 후원하는 것", "국가가 교회의 안전을 보장하는 것"], "answer": 4, "explanation": "정치 제1장 제2조 1항 — 교회 자유 1. 전조(#T()에 설명한 바 개인 자유의 일례(-Bl)로 어느 교파 어느 교회든지 각기 교인의 입회 규칙과 입교인 및 직원의 자격과 교회정치의 일체(-5) 조직을 예수 그리스도의 정하신 대로 설정)할 자유 권이 있다. 2. 교회는 국가의 세력을 의지하지 아니하고 오직 국가에서 각 종교의 종교적 기관을 안전 보장하며 동일시 7-해)함을 바라는 것뿐이다."}, {"id": "헌법-0082", "subject": "헌법", "section": "정치", "qnum": 82, "stem": "다음 중 교회 자유 원리에 해당되지 않는 것을 고르시오. \" 양심자유는 개인을 전제로 한 원리요. 교회 자유는 단체를 전제로 한 것이 다르다.", "choices": ["양심자유는 개인을 전제로 한 원리요. 교회 자유는 단체를 전제로 한 것이 다르다.", "양심 자유 원리와 교회 자유 원리는 본질적으로 동일하다.", "양심 자유 원리에 따라 용인할 수 있는 일도, 교회 공동생활로 인한 제약이 불가피하다.", "혼자 예배드리는 것은 양심의 자유이기 때문에 교회가 강요할 수 없다."], "answer": 4, "explanation": "정치 제1장 제1, 2조 • 교회"}, {"id": "헌법-0084", "subject": "헌법", "section": "정치", "qnum": 84, "stem": "헌법이 규정한 교회의 칭호로서 적합하지 않은 것은?", "choices": ["하나님의 교회", "예수의 몸", "성령의 전", "사도들의 공회", "전과 지금과 이후의 만국의 성도"], "answer": 4, "explanation": "2020년도 강도사고시 예상문제집의 문제다. 좋은 문제는 아니다. 교회는 성결해야 하기 때문에 순수한 공회라는 말도 맞는 말 이다. 다만 헌법에서 명시한 것이 아니기 때문에 그것이 답이라고 하겠다."}, {"id": "헌법-0085", "subject": "헌법", "section": "정치", "qnum": 85, "stem": "무형교회에 대한 설명으로 맞지 않는 것은? \"성부, 성자, 성령 삼위일체 되신 하나님을 공경하노라\"고 신앙고백하는 자라면 무형교회의 교 인이 된다.", "choices": ["\"성부, 성자, 성령 삼위일체 되신 하나님을 공경하노라\"고 신앙고백하는 자라면 무형교회의 교 인이 된다.", "하나님의 의중에만 있는 불가견적 교회이다.", "교회의 머리이신 그리스도 아래 택함 받은 자 전체이다.", "하나님의 선택을 받은 하나님의 자녀들만의 영적 회집이다.", "무형교회의 교인은 반드시 유형교회 안에 있다."], "answer": 1, "explanation": "이 문제는 2020년 강도사고시 예제에 포함된 문제이나 좋은 문제는 아니다. 1번은 유형교회 교인에 대한 설명이다. 무형교회는 하나님만이 아시는 선택함을 받은 하나님의 백성이지만 유형교회는 형식적으로라도 신앙을 고백하는 사람들의 무리를 가리킨다. 또한 이렇게 형성된 유형교회는 각각의 조직과 질서를 갖고 다양한 교파로 나뉘어 있다. (정치 2장 2조)"}, {"id": "헌법-0086", "subject": "헌법", "section": "정치", "qnum": 86, "stem": "지교회 설립의 근거에 해당하는 설명으로 옳지 않은 것은?", "choices": ["지교회의 설치는 교회의 통일성과 모순되지 않는다.", "지교회의 설치는 대중이 한곳에 회집할 수 없기 때문이다.", "지교회의 설치는 하나님의 명령이며, 사리에 합당함을 근거로 하지 않는다.", "지교회는 독립성을 갖지만 동시에 연합성을 갖는다.", "지교회가 회집하는 것은 성경의 기록한 모범에 그릇됨이 없다."], "answer": 3, "explanation": "지교회 설치는 \"사리에 합당하다\" 하기 때문이다. (정치 제2장 3조)"}, {"id": "헌법-0087", "subject": "헌법", "section": "정치", "qnum": 87, "stem": "미조직교회 임시 당회장의 권징권 행사에 대한 설명으로 옳은 것은? 미조직교회 임시 당회장은 권징권 행사는 할 수 없고 노회에 보고하여 처리한다.", "choices": ["당회가 없으므로 미조직교회 임시 당회장은 행정 처리권이 원칙이나 부득이한 경우는 권징전도 처리하고 노회에 보고하여 허락을 받아야 한다.", "미조직교회 임시 당회장은 당회권을 가지고 권징도 할 수 있다.", "미조직교회 임시 당회장은 이웃 교회 당회원을 청하여 권장할 수 있다.", "미조직교회의 임시 당회장은 이웃 교회의 장로를 청하여 당회를 구성하고 권징을 행사할 수 있다."], "answer": 1, "explanation": "미조직교회의 임시 당회장은 행정처리권은 갖지만 권장권은 갖지 못한다. 그 경우 권징은 노회에 위탁하여 처리하여야 한다. 1I. 실전문제 597"}, {"id": "헌법-0088", "subject": "헌법", "section": "정치", "qnum": 88, "stem": "교회 신설에 관한 설명으로 옳지 않은 것은?", "choices": ["장년 신자가 15명 이상이어야 한다.", "예배 처소가 준비되고 교회유지 방침이 서야 한다.", "당회와 공동의회의 결의로 노회의 허락을 받아야 한다.", "인근 교회와의 거리나 주변 가구 수까지 살펴서 노회가 설립을 인허한다.", "교회의 신설은 개인으로 할 수 있는 것이 아니다."], "answer": 3, "explanation": null}, {"id": "헌법-0089", "subject": "헌법", "section": "정치", "qnum": 89, "stem": "정치 제2장 교회에서 제1조 교회 설립의 내용에 맞지 않는 것은? 생존하신 하나님의 교회", "choices": ["생존하신 하나님의 교회", "오직 과거와 현재에 속한 만국의 성도", "하나님이 만국 중에서 대중을 택하심", "예수의 몸, 성령의 전, 거룩한 공회"], "answer": 2, "explanation": "2018년 기출문제 수정 ※ 기출문제에서 2번의 보기는 \"전과 후와 이후에 만국의 성도\"이었으나 수정했다."}, {"id": "헌법-0091", "subject": "헌법", "section": "정치", "qnum": 91, "stem": "다음 중 교회설립에 관한 설명으로 맞지 않는 것은?", "choices": ["하나님이 만국 중에서 대중을 택하사 저희로 영원토록 무한하신 은혜와 지혜를 나타내게 하셨다.", "두세 사람만 모여 예배드려도 가능하나 헌법적 규칙 제1조에 의한다.", "교회의 설립자는 하나님의 독생자 예수 그리스도이시다.", "교회설립은 뜻이 있는 교인들이 모이면 할 수 있다."], "answer": 4, "explanation": "정치 제2장 제2조 참고 — 교회의 구별(ER) 헌 교회에 두 가지 구별이 있으니 유형(Fe)한 교회와 무형(#Ee)한 교회라. 무형한 교회의 교인은 하나님만 아시고 유형한 교회는 온 세계에 흩어져 있는 교회니 그 교인은 그리스도인이라 칭하고 성부 성자 성령 삼위일체 되신 하나님을 공경하는 자이다."}, {"id": "헌법-0092", "subject": "헌법", "section": "정치", "qnum": 92, "stem": "다음 중 헌법이 규정한 교회의 칭호로서 적합하지 않은 것은?", "choices": ["생존하시는 하나님의 교회", "예수의 몸", "성령의 전", "민주적인 공회"], "answer": 4, "explanation": "정치 제2장 제2조 — 교회의 구별(ER) 헌 교회에 두 가지 구별이 있으니 유형(Fe)한 교회와 무형(#Ee)한 교회라. 무형한 교회의 교인은 하나님만 아시고 유형한 교회는 온 세계에 흩어져 있는 교회니 그 교인은 그리스도인이라 칭하고 성부 성자 성령 삼위일체 되신 하나님을 공경하는 자이다."}, {"id": "헌법-0093", "subject": "헌법", "section": "정치", "qnum": 93, "stem": "다음 중 '교회의 구별'에 대한 설명으로 맞지 않는 것은? 교회에 두 가지 구별이 있으니 유형교회와 무형교회이다.", "choices": ["교회에 두 가지 구별이 있으니 유형교회와 무형교회이다.", "유형교회는 온 세계에 흩어져 있는 교회로 그 교인은 그리스도인이라 칭한다.", "유형교회는 성부, 성자, 성령 삼위일체 되신 하나님을 공경하노라고 신앙을 고백하는 자라면 하 나님께 선택된 것으로 보고 유형교인이 되게 한다.", "교회는 무형교회나 유형교회가 따로 없다."], "answer": 4, "explanation": "정치 제2장 제2조 참고 — 교회의 구별(ER) 헌 교회에 두 가지 구별이 있으니 유형(Fe)한 교회와 무형(#Ee)한 교회라. 무형한 교회의 교인은 하나님만 아시고 유형한 교회는 온 세계에 흩어져 있는 교회니 그 교인은 그리스도인이라 칭하고 성부 성자 성령 삼위일체 되신 하나님을 공경하는 자이다."}, {"id": "헌법-0094", "subject": "헌법", "section": "정치", "qnum": 94, "stem": "다음 중 '교회의 구별'에 대한 설명 중 틀린 것은?", "choices": ["유형한 교회와 무형한 교회로 나눌 수 있다.", "무형한 교회의 교인은 탁월함이 있어 누구나 다 알아볼 수 있다.", "유형한 교회의 교인을 그리스도인이라 부른다.", "유형한 교회의 교인은 삼위일체 하나님을 공경하는 사람이다."], "answer": 2, "explanation": "2017년 기출문제"}, {"id": "헌법-0095", "subject": "헌법", "section": "정치", "qnum": 95, "stem": "다음 중 교회 정치에서 교회를 구별한 것으로 옳은 것은?", "choices": ["유형교회와 무형교회로 구별한다.", "신교와 구교로 구별한다", "유대교와 기독교로 구별한다.", "참 교회와 거짓 교회로 구별한다."], "answer": 1, "explanation": "정치 제2장 제1조 — 교회 설립(#효) 하나님이 만국 중에서 대중(**)을 택하사 저희로 영원토록 무한하신 은혜와 지혜를 나타내게 하시나니 제 저희는 생존(4)하신 하나님의 교회요, 예수의 몸이요, 성령의 전(%)이라. 전과 지금과 이후에 만국의 성도니 그 명칭은 거룩한 공회라 한다."}, {"id": "헌법-0097", "subject": "헌법", "section": "정치", "qnum": 97, "stem": "다음 중 유형교회에 대한 설명으로 틀린 것은?", "choices": ["유형교회에는 하나님의 선택과 무관한 자들도 섞여 있다.", "모든 세대에 세계 모든 처소에서 바른 신앙을 고백하는 자들과 자녀들로 구성된 교회를 말한다.", "유형교회는 여러 가지 교파로 나뉘어 있고 각자가 다른 헌법을 가지고 있다.", "유형교회에는 거짓으로 신앙을 고백하는 자들은 들어올 수 없다."], "answer": 4, "explanation": "정치 제2장 제3조 참고 — 교회 집회(#5월) 대중이 한 곳에만 회집하여 교제하며 하나님을 경배할 수 없으니 각처에 지교회를 설립하고 회집하는 것이 사리(류)에 합당하고 성경에 기록한 모범에도 그릇됨이 없다(갈 1:22, 계 1:4, 20)"}, {"id": "헌법-0099", "subject": "헌법", "section": "정치", "qnum": 99, "stem": "다음 중 교회집회에 관한 설명으로 바르게 설명한 것이 아닌 것은?", "choices": ["대중이 한곳에만 모여 교제하며 하나님을 경배할 수는 없다.", "시간과 공간의 제한을 받는 유형교회에서 동시에 한곳에서만 모여야 한다는 것이 성경의 교훈 도 아니다.", "각처에 지교회를 설립하는 것이 성경에 기록한 모범에도 그릇됨이 없다.", "원래 교회는 한 anation": "정치 제2장 제4조 — 각 지교회(*#을) 예수를 믿는다고 공언(소)하는 자들과 그 자녀들이 일정한 장소에서 그 원대로 합심하여 하나님을 경배 하며 성결하게 생활하고, 예수의 나라를 확장하기 위하여 성경에 교훈한 모범대로 연합하여 교회 헌법 에 복종하며, 시간을 정하여 공동 예배로 회집하면 이를 지교회라 한다(행 2:47). 1. 헌법(정치) 전문 541 총회 강도사고시 문제집"}, {"id": "헌법-0105", "subject": "헌법", "section": "정치", "qnum": 105, "stem": "다음 중 교회 신설에 관한 설명으로 틀린 것은?", "choices": ["장년 신자가 15명 이상이어야 한다.", "예배 처소가 준비되고 교회유지 방침이 서야 한다.", "당회와 공동의회의 결의로 노회의 허락을 받아야 한다.", "인근 교회와의 거리나 주변 가구 수까지 살펴서 노회가 설립을 인허한다."], "answer": 3, "explanation": "정치 제2장 제4조 — 각 지교회(*#을) 예수를 믿는다고 공언(소)하는 자들과 그 자녀들이 일정한 장소에서 그 원대로 합심하여 하나님을 경배 하며 성결하게 생활하고, 예수의 나라를 확장하기 위하여 성경에 교훈한 모범대로 연합하여 교회 헌법 에 복종하며, 시간을 정하여 공동 예배로 회집하면 이를 지교회라 한다(행 2:47). 1. 헌법(정치) 전문 541 총회 강도사고시 문제집"}, {"id": "헌법-0106", "subject": "헌법", "section": "정치", "qnum": 106, "stem": "다음 중 교회 설립에 관한 설명으로 맞지 않는 것은? 하나님이 만국 중에서 대중을 택하사 저희로 영원토록 무한하신 은혜와 지혜를 나타내게 하셨다.", "choices": ["하나님이 만국 중에서 대중을 택하사 저희로 영원토록 무한하신 은혜와 지혜를 나타내게 하셨다.", "두세 사람만 모여 예배드려도 가능하나 헌법적 규칙 제1조에 의한다.", "교회의 머리는 하나님의 독생자 예수 그리스도이시다.", "교회 설립은 뜻이 있는 교인들이 모이면 할 수 있다."], "answer": 4, "explanation": "2020년 기출문제 수정"}, {"id": "헌법-0107", "subject": "헌법", "section": "정치", "qnum": 107, "stem": "다음 중 교회 신설에 관한 설명으로 옳은 것은?", "choices": ["장년 신자 10명 이상이 되어야 한다.", "예배 처소가 준비되어 있지 않아도 된다.", "인근 교회와의 거리나 주변 가호 수까지 살펴서 노회가 설립을 허락한다.", "신자만 있으면 교회 설립 허락을 받을 필요가 없다."], "answer": 3, "explanation": "2020년 기출문제"}, {"id": "헌법-0108", "subject": "헌법", "section": "정치", "qnum": 108, "stem": "지교회 설립의 5대 요건이 아닌 것은?", "choices": ["예수를 믿는다고 공언하는 교인들 25인 이상이 모여야 한다.", "일정한 장소가 있어야 한다.", "하나님을 경배하고 성결하게 생활을 하여야 한다.", "하나님의 나라 확장을 위해서 힘써야 한다.", "성경에 교훈한 대로 교회 시간을 정하여 공동예배로 회집하여야 한다."], "answer": 1, "explanation": "2019년 기출문제"}, {"id": "헌법-0109", "subject": "헌법", "section": "정치", "qnum": 109, "stem": "다음 중 조직교회에 대해서 바르게 말한 것은? @ 제직회가 조직된 교회 @ 당회가 세워진 교회", "choices": ["제직회가 조직된 교회", "당회가 세워진 교회", "남녀전도회가 조직된 교회", "선교사를 파송한 교회"], "answer": 2, "explanation": null}, {"id": "헌법-0110", "subject": "헌법", "section": "정치", "qnum": 110, "stem": "다음 중 허위교회는 어떤 교회인가? 담임목사가 없는 교회 ② 시무장로가 없는 교회", "choices": ["담임목사가 없는 교회", "시무장로가 없는 교회", "목사와 시무장로가 없는 교회", "노회에 가입되지 않은 교회"], "answer": 1, "explanation": "정치 제17장 1조 참고"}, {"id": "헌법-0111", "subject": "헌법", "section": "정치", "qnum": 111, "stem": "다음 중 어떤 교회가 허위 교회인가?", "choices": ["미조직교회", "시무장로가 없는 교회", "담임목사가 없는 교회", "노회에 가입되지 않은 교회"], "answer": 3, "explanation": "2020년 기출문제"}, {"id": "헌법-0113", "subject": "헌법", "section": "정치", "qnum": 113, "stem": "다음 교인에 대한 설명 중 옳은 것은? 예수를 믿는다고 공언하는 모든 자들은 교인이다.", "choices": ["교인에는 원입교인, 학습교인, 유아세례교인, 세례교인(입교인)이 있다.", "일정한 장소에서 합심하여 공동으로 예배하는 자들이다.", "교인의 자녀는 교인이다.", "본 교회의 무흠 입교인은 제직회의 회원이 된다."], "answer": 1, "explanation": "헌법 정치 2장 4조에서 예수 믿는다고 공언하는 자와 그 자녀를 교인으로 보았다. 무흠 입교인은 공동의회의 회원이 된다."}, {"id": "헌법-0114", "subject": "헌법", "section": "정치", "qnum": 114, "stem": "교인의 의무는 무엇인가?", "choices": ["교인은 교회의 정규 예배에는 꼭 참석해야 하지만, 기도회와 기타 다른 집회에는 꼭 참석해야 하는 것은 아니다.", "교인은 교회의 발전을 위해서 진력하며 사랑과 선행으로 하나님을 섬겨야 한다.", "교인은 교회의 경비와 사업비에 대하여 성심 협조하되, 어떤 일에든지 금전을 아껴야 한다.", "교인이 고의로 교회의 의무금을 드리지 않으면 그 직임까지 면할 수는 없다.", "교인은 교회헌법에 의한 치리라도 국법과 일치하지 않음을 이유로 이를 거절할 수 있다."], "answer": 2, "explanation": "3번은 모든 선한 일에 금전을 아끼지 않아야 한다고 해야 한다."}, {"id": "헌법-0115", "subject": "헌법", "section": "정치", "qnum": 115, "stem": "교인의 권리에 대한 설명으로 옳은 것은?", "choices": ["무고히 6개월 이상 본 교회 예배회에 계속 출석하지 않으면 교인의 모든 권리가 중지된다.", "교인은 임의로 청원, 소원, 상소할 권리가 있다.", "교인은 지교회에서 법규대로 선거 및 피선거권이 있다.", "무흠 입교인은 세례에 참여할 권한이 있다.", "교인은 교회를 위해 분량대로 일하지 않을 특권이 있다."], "answer": 3, "explanation": "1번은 모든 권리가 중지되는 것이 아니라, 사법권, 선거, 피선거권이 중지된다는 것임. 2번은 임의로 청원할 수 있는 것이 아니 라 법규대로 청원해야 함. 4번은 무흠 입교인은 성찬에 참여할 권한이 있는 것이지, 세례에 참여할 권한이 있는 것은 아님. 5번 은 분량대로 일할 특권이 있는 것이지, 일하지 않을 특권이 있는 것은 아님. 그것은 특권이 아님. (헌법적 규칙 제3조 참조)"}, {"id": "헌법-0116", "subject": "헌법", "section": "정치", "qnum": 116, "stem": "교인의 지위를 상실하는 것에 대한 설명으로 맞지 않는 것을 모두 고르시오. 6개월 본 교회의 예배회에 성실히 참석하지 않은 경우에는 성찬에 참여할 수 없다.", "choices": ["다른 교파에 가입한 경우에는 교인의 지위를 상실한다.", "권징에 따라 벌을 받게 되면 교인은 자격을 상실할 수 있다.", "실종교인에 대하여 당회는 제명을 의결할 수 있다.", "공동의회는 결의를 통해서 교인의 신분을 제한할 수 없다."], "answer": 1, "explanation": "헌법적 규칙은 선거권, 피선거권에 관해서만 언급하고 있을 뿐, 이 경우, 무흠 입교인이 아니라고 할 수 있으므로 성찬참여권은 없지만, 성찬참여가 즉시 중지된다고 하기도 어렵다. 2번은 권징조례 53조에 있는 내용이다."}, {"id": "헌법-0117", "subject": "헌법", "section": "정치", "qnum": 117, "stem": "교인의 신급의 종류로 잘못된 것은?", "choices": ["원입교인", "e 학습교인", "유아세례교인", "세례교인", "이명교인"], "answer": 5, "explanation": "2019년 기출문제"}, {"id": "헌법-0118", "subject": "헌법", "section": "정치", "qnum": 118, "stem": "다음 교인의 종류 중 정회원은?", "choices": ["원입교인", "학습교인", "유아세례교인", "입교인(세례교인)", "어린이세례 받은 교인"], "answer": 4, "explanation": "2019년 기출문제 ® 교회의 직원"}, {"id": "헌법-0119", "subject": "헌법", "section": "정치", "qnum": 119, "stem": "교회의 창설직원에 대한 설명으로 옳은 것은?", "choices": ["교회의 창설직원은 현대교회에서 선교사 또는 전도목사 제도로 정착되어 있다.", "교회를 새로 개척하여 세우는 직원이 교회의 창설직원이다.", "창설직원은 주님의 임명으로 최초로 이적 행할 권능을 받은 직원이다.", "교회의 창설직원은 사도와 선지자들을 일컫는다.", "창설직원은 초대교회에서 교회 개척자들을 일컫는 말이다."], "answer": 3, "explanation": "정치 제3장 제1조 참고 ※ 1번에서 창설직원은 오늘날 존재하지 않는다. 2번에서 교회를 개척한다고 창설직원이 되는 것은 아니다. 4번에서 선지자는 비상 직원이다. 5번에서 초대교회의 모든 교회개척자들이 다 창설직원은 아니다. 오직 사도들뿐이다. — 교회 창설(R) 직원 우리 주 예수께서 최초에 이적을 행할 권능이 있는 자로(마 10:8) 자기의 교회를 각 나라 중에서 선발(1 #)하사(시 2:8, 계 7:9) 한 몸(고전10:17)이 되게 하셨다."}, {"id": "헌법-0120", "subject": "헌법", "section": "정치", "qnum": 120, "stem": "교회의 직원이 그 직임을 면하게 되는 경우가 아닌 것은?", "choices": ["교인의 명예를 훼손했을 때", "아무런 이유 없이 주일예배에 빠졌을 때", "승진을 위해 부적을 갖고 다닐 때", "흡연을 했을 때", "음주운전을 했을 때"], "answer": 1, "explanation": "헌법적 규칙 제2조 참조"}, {"id": "헌법-0121", "subject": "헌법", "section": "정치", "qnum": 121, "stem": "교회의 직원과 그 책임에 대한 설명으로 옳지 않은 것은?", "choices": ["복음을 전파하기 위해 직원을 둔다.", "성례를 시행하기 위해서 직원을 둔다.", "교회의 덕을 세우도록 직원을 둔다.", "교회 조직을 통해 대사회적 대응을 위해서 직원을 둔다.", "진리와 본분을 준수하도록 관리(쌀)하기 위하여 직원을 둔다."], "answer": 4, "explanation": "교회의 직원은 교회의 질서와 덕을 세우기 위해서 존재한다. 때로는 대사회적 활동, 반기독교적 활동에 대응하는 측면도 있지만, 궁극적으로 그것을 위해서 존재하는 것은 아니다."}, {"id": "헌법-0123", "subject": "헌법", "section": "정치", "qnum": 123, "stem": "개혁신학자들이 주장하는 직분론에 대한 설명으로 옳은 것은?", "choices": ["2직분론은 교회의 직분을 목사와 장로로 구분한다.", "본 교단의 정치는 2직분론을 따르고 있다. ® 3직분론은 교회의 직분을 목사와 장로, 권사로 구분한다.", "칼빈은 3직분론을 주장했다.", "4직분론은 목사와 장로, 집사, 권사로 구분한다."], "answer": 2, "explanation": "본 교단은 장로(목사와 장로), 집사로 구분한다. 직분론을 구분함에 가장 중요한 것은 성경에 나오는 감독과 장로를 같은 것으로 보느냐 아니냐에 달려 있다. 2직분론은 같은 것으로 이해하는 것이고, 다르게 보는 것은 3직분론이다. 칼빈은 이를 기초로 직분 을 4분하여 목사, 교사, 정로, 집사로 구분했다."}, {"id": "헌법-0124", "subject": "헌법", "section": "정치", "qnum": 124, "stem": "교회 직원의 종류에 관한 설명으로 옳은 것은?", "choices": ["창설직원은 사도와 선지자를 지칭한다.", "현대교회의 목사직은 사도직의 계승이다.", "비상직원은 사도 시대 이후에 등장한 속사도와 교부를 가리킨다.", "항존직원은 교회 안에 계속 존재하는 통상적인 직원을 가리킨다.", "준직원은 목사후보생, 강도사, 선교사 및 그 후보생을 가리킨다."], "answer": 4, "explanation": null}, {"id": "헌법-0125", "subject": "헌법", "section": "정치", "qnum": 125, "stem": "항존직에 대한 설명으로 옳은 것은?", "choices": ["항존직은 교회에서 항상 존귀히 여김을 받는 직분이다. 목사와 장로는 항존직이다.", "집사는 항존직이 아니다.", "칼빈은 교사를 목사를 보좌하는 임시직으로 이해했다.", "권사는 여성이 얻을 수 있는 유일한 항존직이다."], "answer": 2, "explanation": null}, {"id": "헌법-0126", "subject": "헌법", "section": "정치", "qnum": 126, "stem": "교회의 항존직원에 대한 설명으로 옳지 않은 것은?", "choices": ["교회에 항존할 직원은 장로(감독)와 집사이다.", "장로는 두 반이 있으니 목사와 장로이다.", "강도를 겸한 장로는 목사라고 일컫는다.", "장로는 치리만 하는 자로 교인의 대표이다.", "항존직원의 시무연한은 만 70세가 되는 생일 전날까지이다."], "answer": 5, "explanation": "만 70세가 끝나고, 만 7세가 시작하기 하루 전날까지이다."}, {"id": "헌법-0127", "subject": "헌법", "section": "정치", "qnum": 127, "stem": "항존직원으로 짝지어진 것이 아닌 것은?", "choices": ["목사, 장로", "목사, 집사", "목사, 장로, 집사", "목사, 장로, 권사", "장로, 집사"], "answer": 4, "explanation": "이 문제는 함정이 있다. 1.2.3,5번은 모두 항존직이다. 그러나 4번에는 항존직이 아닌 권사가 있다. 정치 제3장 제2조 참고 — 교회의 항존직(1/+배) 교회에 항존(7)할 직원은 다음과 같으니 장로(감독) (행 20:17, 28, 딤전 3:7)와 집사요, 장로는 두 반이 있으니 1. 강도(치)와 치리를 겸한 자를 목사라 일컫고 2. 치리만 하는 자를 장로라 일컫나니 이는 교인의 대표자이다. 3. 항존직의 시무 연한은 만 70세로 한다."}, {"id": "헌법-0128", "subject": "헌법", "section": "정치", "qnum": 128, "stem": "교회는 안수 없이 임시로 직원을 설치할 수 있는데, 그와 관련된 설명으로 옳지 않은 것은?", "choices": ["교회의 모든 임시직의 설치 연한은 만 71세 생일 전날까지로 한다.", "모든 임시직의 임기는 1년이다. 해마다 당회에서 다시 임명 받아야 한다.", "전도사는 당회 회원은 되지 못하나 제직회 임시회장이 될 수 있다.", "1929년 제18회 총회는 여전도사에게 당회의 지도를 받아 강도(설교)할 수 있게 했다.", "미조직교회라도 임시직원을 설치할 수 있다."], "a 사하는 자", "장로 - 그리스도의 집을 근실히 치리하는 자", "사도 - 거룩한 뜻을 전하며 하나님과 화목케 하라 권하는 자", "교사 - 권면하며, 책망하여 각성케 하는 자"], "answer": 4, "explanation": "교회헌법은 목사에 대한 성경적 설명을 하면서 \"사도직\"과 연결시키지는 않았다. 이는 사도적 계승이 직분으로 계승되었다는 오 해를 불식시키기 위해서이다."}, {"id": "헌법-0155", "subject": "헌법", "section": "정치", "qnum": 156, "stem": "목사의 자격에 대한 설명으로 옳지 않은 것은 무엇인가? 총신대학교 신학대학원을 졸업하고 학식이 풍부해야 한다. 행실이 선량하고 신앙이 진실하며 교수에 능해야 한다.", "choices": ["총신대학교 신학대학원을 졸업하고 학식이 풍부해야 한다.", "행실이 선량하고 신앙이 진실하며 교수에 능해야 한다.", "모든 행위가 복음에 적합하여 범사에 존절함과 성결함을 나타내야 한다.", "자기 가정을 잘 다스리며 외인에게서도 칭찬을 받는 자라야 한다.", "목사의 연령은 만 30세 이상이며 군목과 선교사는 만 27세 이상이어야 한다."], "answer": 5, "explanation": "목사의 연령은 만 29세 이상이다."}, {"id": "헌법-0156", "subject": "헌법", "section": "정치", "qnum": 157, "stem": "목사로 안수 받기 위한 일반적 요건에 해당하지 않는 것은 무엇인가? 총신대학교 신학대학원을 졸업해야 한다.", "choices": ["총회에서 실시하는 강도사 고시에 합격해야 한다.", "강도사 인허 후, 1년 이상 교역에 종사해야 한다.", "총회에서 시행하는 목사 고시에 합격해야 한다.", "목사로 청빙을 받아야 한다."], "answer": 4, "explanation": "목사고시는 노회에서 시행한다."}, {"id": "헌법-0158", "subject": "헌법", "section": "정치", "qnum": 159, "stem": "다음 중 목사의 의의에 대하여 맞지 않는 것은?", "choices": ["목사는 노회의 안수로 임직을 받는다.", "목사는 그리스도의 복음을 전파하고 성례를 거행한다. 현", "목사는 교회를 치리하는 자로 교회의 가장 중요하고 유익한 직분이다.", "목사는 교인의 대표로 교회를 다스리며 치리한다."], "answer": 4, "explanation": "정치 제4장 제1조 참고 — 목사의 의의료종) 목사는 노회의 안수로 임직(4)함을 받아 그리스도의 복음을 전파하고 성례를 거행하며 교회를 치리하 는 자니 교회의 가장 중요하고 유익한 직분이다(롬 11:13). 성경에 이 직분 맡은 자에 대한 칭호가 많아 그 칭호로 모든 책임을 나타낸다. 1. 양의 무리를 감시하는 자이므로 목자라 하며(렘 3:15, 벧전 5:2~4, 딤전 3:1), 2. 교회 안에서 그리스도를 봉사하는 자이므로 그리스도의 종이라, 그리스도의 사역자라 하며 또 신약의 집사라 하며(빌 1:1, 고전 4:1, 고후 3:0), 3. 엄숙하고 지혜롭게 하여 모든 사람의 모범이 되고, 그리스도의 집과 그 나라를 근실히 치리하는 자이므로 장로라 하며(벧전 5:1 3), 4. 하나님의 보내신 사자이므로 교회의 사자라 하며(계 2:1), 5. 하나님의 거룩한 뜻을 죄인에게 전파하며 그리스도로 말미암아 하나님과 화목하라 권하는 자이므로 그리 스도의 사신이라 혹은 복음의 사신이라 하며(고후 5:20, 엡 6:20), 6. 정직한 교훈으로 권면하며 거역하는 자를 책망하여 각성(화제)하게 하는 자이므로 교사라 하며(딜 1:9 딤전 2:7, 딤후 1:11), 7. 죄로 침륜할 자에게 구원의 복된 소식을 전하는 자이므로 전도인이라 하며(딤후 4:5) 8. 하나님의 광대하신 은혜와 그리스도의 설립하신 율례(#5)를 시행하는 자이므로 하나님의 오묘한 도를 맡은 청지기라 한다( …"}, {"id": "헌법-0159", "subject": "헌법", "section": "  "헌법-0183", "subject": "헌법", "section": "정치", "qnum": 184, "stem": "다음 중 목사의 칭호에 대한 설명으로 맞는 것은?", "choices": ["목사가 그 담임한 시무와 형편으로 인하여 칭호가 달라진다.", "위임목사가 본 교회를 떠나 1년 이상 결근하게 되는 경우에도 특별한 사정이 있어 노회가 허락 하면 그 위임이 해제되지 않는다.", "위임목사로 청빙받으면 위임식과 상관없이 위임목사이다.", "조직교회에서는 시무목사를 청할 수 없다."], "answer": 1, "explanation": "정치 제4장 제4조 참고 — 목사의 칭호 목사가 그 담임한 시무와 형편으로 인하여 다음과 같은 칭호가 있다. 1. 위임 목사 한 지교회나 1구역(4지교회까지 좋으나 그 중 조직된 교회가 하나 이상됨을 요함)의 청빙으로 노회의 위임을 받은 목사니 특별한 이유가 없으면 그 담임한 교회를 만 70세까지 시무한다. 위임 목사가 본 교회를 떠나 1년 이상 결근하게 되면 자동적으로 그 위임이 해제된다. 2. 시무 목사 조직교회 시무 목사는 공동의회에서 출석 교인 3분의 2 이상의 가결로 청빙을 받으나 그 시무 기간은 1년간이요, 조직교회에서는 위임 목사를 청함이 원칙이나 부득이한 형편이면 다시 공동의회 에서 3분의 2의 가결로 계속 시무를 청원하면 1년간 더 허락할 수 있다. 단, 미조직교회에서 시무 목사 시무 기간은 3년이요, 연기를 청원할 때에는 당회장이 노회에 더 청원할 수 있다. 3. 부목사 부목사는 위임 목사를 보좌하는 임시 목사니 당회의 결의로 청빙하되 계속 시무하게 하려면 매년 당회장이 노회에 청원하여 승낙을 받는다. 544 제3부 헌법(정치) 4. 원로 목사 동일(a-)한 교회에서 20년 이상 시무한 목사가 연로(4)하여 노회에 시무 사면을 제출하려 할 때에 본 교회에서 명예적 관계를 보존하고자 하면 공동의회를 소집하고 생활비를 작정하여 원로 목사 로 투표하여 과반수로 결정한 후 노회에 청원하면 노회의 결정으로 원로 목사의 명예직을 준다. 단, 정년이 지나면 …"}, {"id": "헌법-0185", "subject": "헌법", "section": "정치", "qnum": 186, "stem": "교회 헌법에 나타난 목사의 칭호에 해당하지 않는 것은?", "choices": ["시무목사", "동사목사", "군종목사", "선교사", "기관목사"], "answer": 2, "explanation": "동사목사는 과거 헌법에 존재했고, 정치문답조례에서는 언급되고 있지만, 현행 헌법에서는 삭제되었다. 최근 총회결의에 의해 \"후임목사 또는 동사목사\"에 대한 허락이 있었으나, 그것은 총회결의상의 허용일 뿐, 헌법상의 칭호는 아니다. 그 밖에도 음악목 사, 행정목사 등은 목사의 칭호에 해당하지 않는다."}, {"id": "헌법-0186", "subject": "헌법", "section": "정치", "qnum": 187, "stem": "다음 중 목사의 칭호에 대한 설명으로 옳지 않은 것은?", "choices": ["무임목사 - 아무런 시무가 없는 목사이며, 노회의 결의권이 없다.", "기관목사 - 노회의 허락을 받아 총회나 노회 및 교회 관계 기관에서 행정과 신문과 서적 및 복 음사역에 종사하는 목사이다.", "전도목사 - 교회 없는 지방에 가서 교회를 설립하는 목사이며, 노회의 언권은 있으나 결의권은 없다.", "교육목사 - 지교회 담임목사를 보좌하여 교회의 교육부서를 책임지는 부목사이다.", "군종목사와 군선교사는 군인교회를 섬기는 목사들인데, 목사 자신의 신분이 군인이냐 아니냐로 구분된다."], "answer": 4, "explanation": "교육목사는 교육기관에서 성경과 기독교 교리를 교수하는 목사이다. 지교회의 부목사를 일컫는 말은 아니다."}, {"id": "헌법-0187", "subject": "헌법", "section": "정치", "qnum": 188, "stem": "헌법에 명시된 목사의 칭호 중 맞지 않는 것은?", "choices": ["위임목사", "? 시무목사", "부목사", "임시목사"], "answer": 4, "explanation": "4장 4조 ※ 2016년 기출문제"}, {"id": "헌법-0188", "subject": "헌법", "section": "정치", "qnum": 189, "stem": "다음 중 옳은 것을 골라라.", "choices": ["군종목사는 임관 이전이라도 예배 시에 축도할 수 있다.", "결혼하지 않은 자는 목사로 안수 받을 수 없다. 볕", "총신대학교 신학대학원을 졸업한 후, 타 교단에서 목사 안수를 받은 자는 예외적으로 강도사 고 시 없이 본 교단의 목사가 될 수 있다.", "본 교단으로 이적해 온 목사는 아무 조건 없이 노회의 회원권을 갖는다.", "선교사로 파송 받은 자는 만 27세 이상이면 목사로 안수 받을 수 있다."], "answer": 5, "explanation": null}, {"id": "헌법-0189", "subject": "헌법", "section": "정치", "qnum": 190, "stem": "다음 중에 지교회를 관리하는 목사가 아닌 자는?", "choices": ["위임목사", "시무목사", "부목사", "전도목사"], "answer": 4, "explanation": "정치 제4조 1,2,3항"}, {"id": "헌법-0190", "subject": "헌법", "section": "정치", "qnum": 191, "stem": "위임목사에 대한 설명으로 옳지 않은 것은 무엇인가?", "choices": ["특별한 사유가 있으면 본 회를 떠나 1년 이상 결근할 수 있다.", "한 교회나 1구역의 청빙을 받은 자이어야 한다.", "반드시 위임식을 거행해야 한다.", "위임목사는 그 교회의 공동의회장이 된다.", "노회의 위임을 받은 목사이다."], "answer": 1, "explanation": "4번의 경우에는 당회장이 된다고 하면 틀린 것으로 볼 수 있으나 위임목사는 자동적으로 당회장, 제직회장, 공동의회장이 된다. 그것은 고유의 권한이다."}, {"id": "헌법-0191", "subject": "헌법", "section": "정치", "qnum": 192, "stem": "목사의 위임 해제에 관한 설명으로 옳은 것은 무엇인가?", "choices": ["폐 당회 후 2년 내에 당회를 복구하지 않으면 위임이 해제된다.", "교회는 공동의회를 통해서 목사의 위임을 해제할 수 있다.", "목사의 위임이 해제되면, 그 교회는 허위교회가 되며, 당회의 직무는 정지된다.", "장로가 없는 교회라도 위임목사를 청빙하여 장로를 세워 당회를 조직할 수 있다.", "위임목사만이 노회의 정회원이 되며, 총대권이 있다."], "answer": 1, "explanation": "교회가 허위교회가 되더라도 당회의 직무는 정지되지 않는다. 장로 없는 교회는 위임목사를 청빙할 수 없다. 위임목사 외에도 노회 정회원은 있다."}, {"id": "헌법-0192", "subject": "헌법", "section": "정치", "qnum": 193, "stem": "다음 중 위임목사의 필수조건에 대한 설명으로 맞지 않는 것은? 반드시 시무장로가 있는 조직교회여야 한다.", "choices": ["반드시 시무장로가 있는 조직교회여야 한다.", "교회의 청빙과 노회의 허락을 받아야 한다.", "노회에는 위임국, 지교회에는 청빙위원회가 조직되어야 한다.", "위임식 순서 중에 위임국장의 공포와 동시에 당연직 당회장권이 수임된다."], "answer": 3, "explanation": "정치 제4장 제4조 1,2, 제9장 제1조, 제15장 제11조 참고 ® 시무목사 — 목사의 칭호 목사가 그 담임한 시무와 형편으로 인하여 다음과 같은 칭호가 있다. 1. 위임 목사 한 지교회나 1구역(4지교회까지 좋으나 그 중 조직된 교회가 하나 이상됨을 요함)의 청빙으로 노회의 위임을 받은 목사니 특별한 이유가 없으면 그 담임한 교회를 만 70세까지 시무한다. 위임 목사가 본 교회를 떠나 1년 이상 결근하게 되면 자동적으로 그 위임이 목사를 청함이 원칙이나 부득이한 형편이면 다시 공동의회 에서 3분의 2의 가결로 계속 시무를 청원하면 1년간 더 허락할 수 있다. 단, 미조직교회에서 시무 목사 시무 기간은 3년이요, 연기를 청원할 때에는 당회장이 노회에 더 청원할 수 있다. 3. 부목사 부목사는 위임 목사를 보좌하는 임시 목사니 당회의 결의로 청빙하되 계속 시무하게 하려면 매년 당회장이 노회에 청원하여 승낙을 받는다. 544 제3부 헌법(정치) 4. 원로 목사 동일(a-)한 교회에서 20년 이상 시무한 목사가 연로(4)하여 노회에 시무 사면을 제출하려 할 때에 본 교회에서 명예적 관계를 보존하고자 하면 공동의회를 소집하고 생활비를 작정하여 원로 목사 로 투표하여 과반수로 결정한 후 노회에 청원하면 노회의 결정으로 원로 목사의 명예직을 준다. 단, 정년이 지나면 …"}, {"id": "헌법-0237", "subject": "헌법", "section": "정치", "qnum": 238, "stem": "다음 교단 기관목사의 규정에 관한 설명으로 옳은 것은?", "choices": ["노회의 허락으로 총회나 노회 및 교회 관계 기관에서 행정과 신문과 서적 및 복음사역에 종사 하는 목사이다.", "노회의 허락으로 기독교학교, 신학교에서 성경과 기독교교리를 가르치는 목사이다.", "출판사에서 서적을 만드는 일에 종사하는 목사이다.", "신문사에서 신문을 만드는 일에 종사하는 목사이다."], "answer": 1, "explanation": "정치 제4장 제4조 7항, ® 목사청빙 — 목사의 칭호 목사가 그 담임한 시무와 형편으로 인하여 다음과 같은 칭호가 있다. 1. 위임 목사 한 지교회나 1구역(4지교회까지 좋으나 그 중 조직된 교회가 하나 이상됨을 요함)의 청빙으로 노회의 위임을 받은 목사니 특별한 이유가 없으면 그 담임한 교회를 만 70세까지 시무한다. 위임 목사가 본 교회를 떠나 1년 이상 결근하게 되면 자동적으로 그 위임이 해제된다. 2. 시무 목사 조직교회 시무 목사는 공동의회에서 출석 교인 3분의 2 이상의 가결로 청빙을 받으나 그 시무 기간은 1년간이요, 조직교회에서는 위임 목사를 청함이 원칙이나 부득이한 형편이면 다시 공동의회 에서 3분의 2의 가결로 계속 시무를 청원하면 1년간 더 허락할 수 있다. 단, 미조직교회에서 시무 목사 시무 기간은 3년이요, 연기를 청원할 때에는 당회장이 노회에 더 청원할 수 있다. 3. 부목사 부목사는 위임 목사를 보좌하는 임시 목사니 당회의 결의로 청빙하되 계속 시무하게 하려면 매년 당회장이 노회에 청원하여 승낙을 받는다. 544 제3부 헌법(정치) 4. 원로 목사 동일(a-)한 교회에서 20년 이상 시무한 목사가 연로(4)하여 노회에 시무 사면을 제출하려 할 때에 본 교회에서 명예적 관계를 보존하고자 하면 공동의회를 소집하고 생활비를 작정하여 원로 목사 로 투표하여 과반수로 결정한 후 노회에 청원하면 노회의 결정으로 원로 목사의 명예직을 준다. 단, 정년이 지나면 …"}, {"id": "헌법-0238", "subject": "헌법", "section": "정치", "qnum": 239, "stem": "지교회 담임목사의 청빙을 위한 선거에 관한 설명으로 옳지 않은 것은?", "choices": ["당회의 결의로 공동의회를 시행해야 한다.", "대리 당회장이 강도 후에 선거해야 한다.", "청빙하는 일에 투표할 것이라고 교인들에게 물어야 한다.", "투표할 것에 대하여 공동의회 출석교인 과반수가 찬성해야 한다. ® 공동의회 3분의 2 이상의 찬성이 있어야 한다."], "answer": 2, "explanation": "헌법 정치 제15장 2조는 당회의 결의로 공동의회를 개최하게 하였고, 임시당회장이 강도한 후에 선거하게 했다. 대리당회장과 임시당회장에는 엄연한 구분이 있다. 이는 절차상 담임목사의 부재 상태, 혹은 기존의 담임목사가 시무사면서를 제출한 상태이 어야 함을 의미한다."}, {"id": "헌법-0239", "subject": "헌법", "section": "정치", "qnum": 240, "stem": "다음은 담임목사(위임, 시무)의 청빙과 관련한 설명이다. 옳지 않은 것은?", "choices": ["소수의 반대가 심각하더라도 3분의 2 이상의 찬성이 있으면 즉시 청빙서를 작성하여 노회에 드려야 한다.", "목사의 청빙은 반드시 공동의회에서 투표하여야 하며, 출석회원 3분의 2 이상이 찬성해야 한다.", "청빙서에는 투표자뿐만 아니라 무흠 입교인 과반수의 날인이 있어야 한다.", "청빙서에는 목사의 시무기간 중에 주 안에서 순복하고, 주택과 매월 생활비를 드릴 것을 서약해야 한다.", "강도사가 청빙서를 받아 목사로 임직하게 될 경우, 노회는 구애되는 것이 없으면 동시에 위임식 까지 행한다."], "answer": 1, "explanation": "소수의 반대가 심하면 회장은 교우에게 연기를 권고하는 것이 가하다. (헌법 정치 제15장 3조 참조)"}, {"id": "헌법-0240", "subject": "헌법", "section": "정치", "qnum": 241, "stem": "목사의 청빙에 관한 설명으로 옳지 못한 것은?", "choices": ["부목사의 청빙은 당회의 결의로 당회장이 한다.", "목사의 청빙에는 본 교회 교인들이 모든 일에 편의를 제공함과 더불어 주 안에서 순복하겠다는 복종의 서약을 포함한다.", "부목사는 담임목사의 사임과 함께 해당 교회의 담임목사로 청빙될 수 없다.", "지교회가 목사를 청빙할 경우, 그 청빙서를 해당 목사에게 직접 전한다.", "담임목사(위임, 시무)가 은퇴를 앞두고, 후임자를 세워 동역하고자 할 때 그 동역 기간은 3년을 초과할 수 없다."], "answer": 4, "explanation": "청빙서의 제출은 지교회가 직접 하지 못하고, 반드시 노회가 제정한다. (정치 제15장 6조 참조)"}, {"id": "헌법-0241", "subject": "헌법", "section": "정치", "qnum": 242, "stem": "청빙할 때 약속한 목사의 사례비를 변경하고자 할 때에는 어떻게 하는 것이 옳은가?", "choices": ["교회가 공동의회를 통해 결정하면 된다. 그 변경 사항을 반드시 노회에 보고해야 한다.", "목사와 노회가 승낙하기만 하면 된다.", "청빙할 때 약속한 목사의 사례비는 변경할 수 없다.", "목사의 승낙이 없으면 당회는 그 사유를 노회에 보고한다."], "answer": 2, "explanation": "청빙할 때 약속한 사례는 반드시 지급되어야 하지만, 사정이 있어 변경하고자 할 때에는 반드시 목사와 교회의 승낙이 있어야 하고, 그 사정을 노회에 보고해야 한다. 또한 목사 또는 교회의 승낙이 없는 경우에는 그 사유를 정식으로 공개한 공동의회를 경유하여 노회에 보고해야 한다. (정치 제15장 7조)"}, {"id": "헌법-0242", "subject": "헌법", "section": "정치", "qnum": 243, "stem": "지교회가 목사를 청빙하고자 할 때에 대한 설명으로 옳지 않은 것은? 지교회는 다른 노회에 속한 목사라도 그 교회의 담임목사로 청빙할 수 있다. 지교회는 청빙서를 노회 서기에게 송달하여야 한다.", "choices": ["지교회는 다른 노회에 속한 목사라도 그 교회의 담임목사로 청빙할 수 있다.", "지교회는 청빙서를 노회 서기에게 송달하여야 한다.", "지교회가 청빙하고자 하는 목사가 다른 노회에 소속되어 있는 경우에는 그 목사가 소속된 노회 에 직접 통보하여야 한다.", "지교회의 목사는 반드시 그 교회가 속한 노회에 소속되어 있어야 한다.", "청빙을 받은 목사는 그 교회가 소속한 노회로 이명하며, 노회의 허락을 받아야 한다."], "answer": 3, "explanation": "노회서기가 즉시 해노회에 통보한다. (정치 제15장 8조 참조)"}, {"id": "헌법-0245", "subject": "헌법", "section": "정치", "qnum": 246, "stem": "목사 선거에 위배되는 것은? N 당회의 결의로 공동의회를 소집한다.", "choices": ["N 당회의 결의로 공동의회를 소집한다.", "임시당회장이 강도한 후 진행한다.", "투표 의견을 물어 과반수가 찬성하면 즉시 투표한다.", "당회가 결의했으니 바로 투표한다."], "answer": 4, "explanation": "15장 목사, 선교사 선거 및 임직 - 2조"}, {"id": "헌법-0246", "subject": "헌법", "section": "정치", "qnum": 247, "stem": "세례교인 500명이 공동의회에 참석하여 담임목사 청빙을 가하게 하려면 가표의 수가 얼마 이상 이 되어야 하는가?", "choices": ["300명", "330명", "333명", "334명"], "answer": 4, "explanation": "15장 - 3조"}, {"id": "헌법-0247", "subject": "헌법", "section": "정치", "qnum": 248, "stem": "다른 노회 사역자를 청빙할 시 틀린 것은?", "choices": ["지교회 당회의 허락으로 바로 청빙한다.", "지교회가 청빙서를 노회 서기에게 제출한다.", "노회 서기는 즉시 해노회에 통보한다.", "노회는 해당 사역자의 이명서를 접수하고 청빙을 허락한다."], "answer": 1, "explanation": "15장 8조"}, {"id": "헌법-0248", "subject": "헌법", "section": "정치", "qnum": 249, "stem": "다음 중 목사 선거에 관한 설명으로 옳지 않은 것은?", "choices": ["지교회가 목사를 청빙하고자 하는 경우에는 당회가 공동의회 소집을 결의해야 한다.", "공동의회의 시일과 장소와 안건을 1주일 전에 교회에 광고하거나 통지해야 한다.", "당회장이 강도한 후에 공포하기를 교회에서 원하면 목사 청빙할 일에 대하여 투표할 것이라고 의견을 물어 과반수가 찬성하면 즉시 투표한다.", "당회장은 강도한 후에 교회에서 원하면 목사 청빙할 일에 대하여 의견을 물어서 투표하면 안 된다."], "answer": 4, "explanation": "정치 제15장 제2조 참고 — 목사 선거 지교회에 목사를 청빙하고자 하는 경우에는 당회의 결의로 공동의회를 소집하고, 임시 당회장이 강도한 후 공포하기를, 교회에서 원하면 목사 청빙할 일에 대하여 투표할 것이라고 그 의견(,)을 물어 과반수가 찬성하면 즉시 투표한다. 1. 헌법(정치) 전문 557 총회 강도사고시 문제집"}, {"id": "헌법-0249", "subject": "헌법", "section": "정치", "qnum": 250, "stem": "다음 중 목사 선거에 관한 설명으로 제일 먼저 해야 할 일은?", "choices": ["규칙대로 청빙서를 작성하여 각 투표자로 서명날인하게 하되 청빙서에는 투표자뿐 아니라 무흠 입교인 과반수의 날인을 요한다.", "공동의회의 시일과 장소와 안건을 1주일 전에 교회에 광고하거나 통지해야 한다.", "당회장이 강도한 후에 공포하기를 교회에서 원하면 목사 청빙할 일에 대하여 투표할 것이라고 의견을 물어 과반수가 찬성하면 즉시 투표한다.", "지교회가 목사를 청빙하고자 하는 경우에는 당회가 공동의회 소집을 결의해야 한다."], "answer": 4, "explanation": "정치 제15장 제2조, ※ 003① 순서로 함 — 목사 선거 지교회에 목사를 청빙하고자 하는 경우에는 당회의 결의로 공동의회를 소집하고, 임시 당회장이 강도한 후 공포하기를, 교회에서 원하면 목사 청빙할 일에 대하여 투표할 것이라고 그 의견(,)을 물어 과반수가 찬성하면 즉시 투표한다. 1. 헌법(정치) 전문 557 총회 강도사고시 문제집"}, {"id": "헌법-0250", "subject": "헌법", "section": "정치", "qnum": 251, "stem": "다음 중 목사 청빙준비에 관한 설명으로 옳지 않은 것은?", "choices": ["투표하여 3분의 2가 \"가\"라 할지라도 \"부\"라 하는 소수가 심히 반대하는 경우에는 회장이 교우 들에게 연기하라고 권고하는 것이 가하다.", "공동의회에서 투표하여 3분의 2 이상이 가표를 받으면 투표자의 과반수만 날인하면 된다.", "규칙대로 청빙서를 작성하여 각 투표자로 서명날인하게 하되 청빙서에는 투표자뿐 아니라 무흠 입교인 과반수의 날인을 요한다.", "투표가 일치하든지 혹 거의 일치하든지 혹 대다수가 양보하지 아니하는 경우에는 회장은 합동 하도록 권면한다."], "answer": 2, "explanation": "정치 제15장 제3조 참고 — 청빙 준비 투표하여 3분의 2가 가(미)라 할지라도 부(점)라 하는 소수가 심히 반대하는 경우에는 회장은 교우에게 연기하라고 권고하는 것이 가하다 투표가 일치하든지 혹 거의 일치하든지 혹 대다수가 양보하지 아니하는 경우에는 회장은 합동하도록 권면한 후 규칙대로 청빙서를 작성(\"rt)하여 각 투표자로 서명 날인하게 하고 회장도 날인하여 공동의회의 경과 정형을 명백히 기록(반대자의 수와 그 사람들의 형편도 자세히 기록한다)하여 청빙서와 함께 노회에 드린다. 단, 청빙서에는 투표자뿐 아니라 무흠 입교인 과반수의 날인을 요한다."}, {"id": "헌법-0251", "subject": "헌법", "section": "정치", "qnum": 252, "stem": "다음 중 헌법이 규정한 목사 청빙서식 규정에 들어 있는 목사 대우 요건이 아닌 것은?", "choices": ["모든 일에 편의 제공", "위로를 도모하며 주 안에서 순복함", "주택과 매 삭 생활비", "원로목사 추대"], "answer": 4, "explanation": "정치 제15장 제4조 참고 — 청빙 서식 00곳 00교회 교인들은 귀하께서 목사의 재덕과 능력을 구비하여 우리 영혼의 신령적 유익을 선히 나누어 주실 줄로 확신하여 귀하를 본교회 담임 목사(혹 시무 목사)로 청빙하오며, 겸하여 귀하께서 담임 시무 기간 중에는 본 교인들이 모든 일에 편의와 위로를 도모하며, 주 안에서 순복하고 주택과 매삭 생활비 00를 드리기로 서약하는 동시에이를 확실히 증명하기 위하여 서명 날인하여 청원하오니 허락하심을 바라 나이다. 년 월 일 각 교인 연서 날인 증인, 공동의회장 서명 날인 귀하"}, {"id": "헌법-0253", "subject": "헌법", "section": "정치", "qnum": 254, "stem": "다음 중 청빙승낙의 규정에 관한 설명으로 옳은 것은?", "choices": ["그 목사나 강도사가 그 청빙서를 접수하면 승낙하는 것으로 인정한다.", "청빙은 노회의 허락이 없어도 목사와 교인들 사이에 합의만 되면 된다.", "강도사의 경우 청빙서를 받아 목사로 임직하게 될 경우는 반드시 동시에 위임식까지 행해야 한다.", "지교회가 청빙하는 것이므로 청빙받을 목사가 청빙하는 교회로부터 직접 청빙서를 받은 후에 노회의 허락을 받으면 된다."], "answer": 1, "explanation": "정치 제15장 제5조 참고 — 청빙 승낙 어느 목사나 강도사에게든지 청빙서를 드리면 그 교회가 원하는 줄로 인정할 것이요 그 목사나 강도사가 그 청빙서를 접수하면 승낙하는 것으로 인정한다. 강도사가 청빙서를 받아 목사로 임직하게 될 경우에는 노회는 구애되는 것이 없으면 동시에 위임식까지 행한다."}, {"id": "헌법-0254", "subject": "헌법", "section": "정치", "qnum": 255, "stem": "다음 중 목사 청빙서 제정에 관한 규정 설명으로 옳지 않은 것은?", "choices": ["청빙서는 청빙 받은 자를 관할하는 노회에 드린다.", "그 노회가 가합한 줄로 인정할 때는 청빙받은 자에게 전함이 옳다.", "목사 혹 강도사가 노회를 경유하지 아니하고 직접 청빙서를 받지 못한다.", "지교회가 청빙하는 것이므로 청빙받을 목사가 청빙하는 교회로부터 직접 청빙서를 받은 후에 노회의 허락을 받으면 된다."], "answer": 4, "explanation": "정치 제15장 제6조 참고 — 청빙서 제정(분모) 청빙서는 청빙 받은 자를 관할하는 노회에 드릴 것이요 그 노회가 가합(미습)한 줄로 인정할 때는 청빙 받은 자에게 전함이 옳으니 목사 혹 강도사가 노회를 경유하지 아니하고 직접 청빙서를 받지 못한다."}, {"id": "헌법-0255", "subject": "헌법", "section": "정치", "qnum": 256, "stem": "다음 중 목사 청빙서 제정에 관한 규정 설명으로 옳은 것은?", "choices": ["청빙서는 청빙 받은 자를 관할하는 노회에 드릴 것이요, 그 노회가 가합한 줄로 인정할 때는 청빙받은 자에게 전함이 옳다.", "목사 혹 강도사가 시찰회를 경유하지 아니하고 직접 청빙서를 받지 못한다.", "지교회가 청빙하는 것이므로 청빙받을 목사가 청빙하는 교회로부터 직접 청빙서를 받은 후에 노회의 허락을 받으면 된다.", "목사나 강도사가 어느 교회에 청빙을 받아 부임할 때는 반드시 청빙서를 가지고 갈 필요는 없다."], "answer": 1, "explanation": "정치 제15장 제6조 참고 — 청빙서 제정(분모) 청빙서는 청빙 받은 자를 관할하는 노회에 드릴 것이요 그 노회가 가합(미습)한 줄로 인정할 때는 청빙 받은 자에게 전함이 옳으니 목사 혹 강도사가 노회를 경유하지 아니하고 직접 청빙서를 받지 못한다."}, {"id": "헌법-0256", "subject": "헌법", "section": "정치", "qnum": 257, "stem": "다음 중 청빙할 때 약속한 목사의 생활비에 대한 서약변경의 규정에 관한 설명으로 옳지 않은 것은? • 목사의 생활비는 교회 간의 계약으로 성립하였으므로 공동의회의 결의와 목사의 허락이 있기 전에는 일방적인 변경이 불가능하다.", "choices": ["목사의 생활비는 교회 간의 계약으로 성립하였으므로 공동의회의 결의와 목사의 허락이 있기 전에는 일방적인 변경이 불가능하다.", "생활비를 감액하는 일은 목사나 교회가 서로 승낙해도 노회가 거부할 수 있다.", "청빙할 때 생활비에 대한 서약을 변경하는 일에 승낙치 아니하는 경우에는 그 사유를 반드시 정식으로 공개한 공동의회를 경유하여 노회에 보고한다.", "목사의 생활비를 증액하는 일은 반드시 노회의 승낙을 받아야 한다."], "answer": 4, "explanation": "정치 제15장 제7조 참고 — 서약 변경 청빙할 때에 약속한 목사의 봉급을 변경하고자 할 때에 목사와 교회가 승낙하면 노회에 보고하고 만일 승낙지 아니하는 경우에는 그 사유를 노회에 보고하되 반드시 정식으로 공개한 공동의회를 경유한다."}, {"id": "헌법-0257", "subject": "헌법", "section": "정치", "qnum": 258, "stem": "다음 중 다른 노회 사역자 청빙에 관한 규정 설명으로 옳지 않은 것은?", "choices": ["지교회가 공동의회를 통해 청빙이 결정되면 청빙서를 노회서기에게 송달한다.", "노회서기는 노회의 허락결의 절차를 생략하고 즉시 해 노회에 통보한다.", "다른 노회 목사 청빙에는 노회가 일체 간섭할 권한이 없다.", "노회는 해당 사역자의 이명서를 접수하고 청빙을 허락한다."], "answer": 3, "explanation": "정치 제15장 제8조 참고 — 다른 노회 사역자 청빙 지교회가 청빙서를 노회 서기에게 송달한다. 노회 서기는 즉시 해노회에 통보하며 노회는 해당 사역자의 이명서를 접수하고 청빙을 허락한다. 558 제3부 헌법(정치)"}, {"id": "헌법-0258", "subject": "헌법", "section": "정치", "qnum": 259, "stem": "다음 중 시무목사는 공동의회 출석교인의 얼마 이상의 가결로 청빙을 받는가?", "choices": ["만장일치", "2분의 1", "3분의 2", "4분의 3"], "answer": 3, "explanation": "정치 제4장 제4조 2항 — 목사의 칭호 목사가 그 담임한 시무와 형편으로 인하여 다음과 같은 칭호가 있다. 1. 위임 목사 한 지교회나 1구역(4지교회까지 좋으나 그 중 조직된 교회가 하나 이상됨을 요함)의 청빙으로 노회의 위임을 받은 목사니 특별한 이유가 없으면 그 담임한 교회를 만 70세까지 시무한다. 위임 목사가 본 교회를 떠나 1년 이상 결근하게 되면 자동적으로 그 위임이 해제된다. 2. 시무 목사 조직교회 시무 목사는 공동의회에서 출석 교인 3분의 2 이상의 가결로 청빙을 받으나 그 시무 기간은 1년간이요, 조직교회에서는 위임 목사를 청함이 원칙이나 부득이한 형편이면 다시 공동의회 에서 3분의 2의 가결로 계속 시무를 청원하면 1년간 더 허락할 수 있다. 단, 미조직교회에서 시무 목사 시무 기간은 3년이요, 연기를 청원할 때에는 당회장이 노회에 더 청원할 수 있다. 3. 부목사 부목사는 위임 목사를 보좌하는 임시 목사니 당회의 결의로 청빙하되 계속 시무하게 하려면 매년 당회장이 노회에 청원하여 승낙을 받는다. 544 제3부 헌법(정치) 4. 원로 목사 동일(a-)한 교회에서 20년 이상 시무한 목사가 연로(4)하여 노회에 시무 사면을 제출하려 할 때에 본 교회에서 명예적 관계를 보존하고자 하면 공동의회를 소집하고 생활비를 작정하여 원로 목사 로 투표하여 과반수로 결정한 후 노회에 청원하면 노회의 결정으로 원로 목사의 명예직을 준다. 단, 정년이 지나면 …"}, {"id": "헌법-0259", "subject": "헌법", "section": "정치", "qnum": 260, "stem": "위임목사와 시무목사의 청빙은 공통적으로 어느 치리회의 허락을 받아야 하는가?", "choices": ["당회", "노회", "대회", "총회"], "answer": 2, "explanation": "정치 제15장 참고"}, {"id": "헌법-0260", "subject": "헌법", "section": "정치", "qnum": 261, "stem": "다음 중 목사 청빙 투표를 진행하는 공동의회의 회장은 누구인가?", "choices": ["당회 서기", "@ 임시당회장", "당회장", "대리 당회장"], "answer": 2, "explanation": "정치 제15장 2조 지교회가 목사를 청빙하고자 하는 경우에는 당회의 결의로 공동의회를 소집하고 임시당회장이 강도한 후 공 포하기를••이라고 한다. 따라서 목사 청빙공동의회는 \"임시당회장이 진행하는 것이 옳다.\""}, {"id": "헌법-0261", "subject": "헌법", "section": "정치", "qnum": 262, "stem": "다음 중 위임목사 청빙절차에 대한 설명으로 맞지 않는 것은?", "choices": ["당회의 결의로 청빙을 위한 공동의회 일시와 장소를 결정한다.", "1주일 전에 공동의회 일시와 장소와 안건을 광고 혹은 통지한다.", "공동의회는 모이는 수대로 개회하여 위임목사 청빙 투표에 대한 의견을 물어 출석회원 수 과반 수가 찬성하면 토의 없이 즉시 투표한다.", "투표결과 3분의 2 이상의 가표를 얻었어도 소수라도 반대자가 심히 반대하면 절대로 청빙할 수 없다."], "answer": 4, "explanation": "정치 제15장 제2~6조 참고"}, {"id": "헌법-0262", "subject": "헌법", "section": "정치", "qnum": 263, "stem": "다음 중 위임목사가 되는 절차에 관한 설명으로 옳지 않은 것은?", "choices": ["위임식 순서 중에 위임국장의 공포와 동시에 당연직 당회장권이 수임된다.", "반드시 시무장로가 있는 조직교회여야 한다.", "청빙위원회가 조직되어야 한다.", "노회 주관으로 위임예식을 거행해야 한다."], "answer": 3, "explanation": "정치 제4장 제4조 1,2항, 제9장 제1조, 제15장 제11조 — 목사의 칭호 목사가 그 담임한 시무와 형편으로 인하여 다음과 같은 칭호가 있다. 1. 위임 목사 한 지교회나 1구역(4지교회까지 좋으나 그 중 조직된 교회가 하나 이상됨을 요함)의 청빙으로 노회의 위임을 받은 목사니 특별한 이유가 없으면 그 담임한 교회를 만 70세까지 시무한다. 위임 목사가 본 교회를 떠나 1년 이상 결근하게 되면 자동적으로 그 위임이 해제된다. 2. 시무 목사 조직교회 시무 목사는 공동의 에서 할 수 있고, 위임식은 시무할 교회에서 한다. 목사임직은 노회 소관이며, 교인들 앞에서 선서해야 할 필요는 없다."}, {"id": "헌법-0265", "subject": "헌법", "section": "정치", "qnum": 266, "stem": "목사의 임직서약과 관련된 설명으로 옳지 못한 것은?", "choices": ["신구약 성경은 하나님의 말씀이요, 신앙과 본분에 대하여 정확무오한 유일의 법칙임을 믿는다.", "본 장로회 신조와 웨스트민스터 신도 게요 및 대소요리 문답은 신구약 성경의 교훈한 도리를 총괄한 것으로 알고 성실한 마음으로 받아 신종한다.", "본 장로회 정치와 권징 조례와 예배 모범을 정당한 것으로 승낙한다.", "목사의 성직을 구한 것이 하나님을 사랑하는 마음과 그 독생자 예수의 복음을 전포(075)하여 하나님의 영광을 나타내고자 하는 본심(TrL)에서 발생한 줄로 자인(E)한다.", "목사는 일반 신자와 구별되었은즉 자기의 본분(A)과 다른 사람에 대한 의무와 직무에 대한 책임을 성실히 실행하여 복음을 영화롭게 하며 하나님께서 그대에게 명하사 관리하게 하신 교 회 앞에 경건한 모본을 세우기로 승낙한다."], "answer": 5, "explanation": "목사는 일반 신자와 다르지 않다. \"신자요 겸하여 목사가 되었다\"고 서약한다."}, {"id": "헌법-0266", "subject": "헌법", "section": "정치", "qnum": 267, "stem": "목사 임직에 있어서 안수에 대한 설명이다. 옳지 않은 것은?", "choices": ["안수식은 서약을 마친 후에 행한다.", "안수를 마친 후 회장은 \"성역에 동사자가 되었음을 치하하노라\"는 말과 함께 목사로 임직하게 되었음을 공포한다.", "노회대표자가 안수와 함께 회장이 기도한다.", "청빙받은 자를 적당한 곳에 꿇어앉게 한다.", "악수례를 통해 축하한다."], "answer": 2, "explanation": null}, {"id": "헌법-0267", "subject": "헌법", "section": "정치", "qnum": 268, "stem": "목사의 위임식에 관한 설명이다. 옳은 것은?", "choices": ["목사의 위임식은 노회가 주관하되, 노회 전체로나 혹은 위원으로 예식을 시행한다.", "위임식에는 목사의 서약과 교인의 서약이 함께 행해진다.", "전임하는 목사의 경우에는 목사 서약을 생략할 수 있다. ® 교인의 서약에는 복종서약과 생활비의 지급에 대한 서약이 포함된다.", "위임목사에 대한 공포는 노회장이 하고, 신임 목사와 교회에 대한 권면과 축도는 다른 목사가 해야 한다."], "answer": 1, "explanation": "공포는 회장이 하고, 권면은 회장이나 다른 목사가 할 수 있다."}, {"id": "헌법-0269", "subject": "헌법", "section": "정치", "qnum": 270, "stem": "다음 중 목사 임직 준비에 관한 설명으로 옳지 않은 것은? 노회는 청빙받은 자가 성직을 받을 만한 자격자인지 확인한다.", "choices": ["노회는 청빙받은 자가 성직을 받을 만한 자격자인지 확인한다.", "장립식이나 위임식은 가급적 모이기에 용이한 주일날로 정해야 한다.", "위임식은 그 시무할 교회에서 거행하되 그 교회 교인들은 이것을 위하여 준비 기도해야 한다.", "임직식은 편의에 따라 교회나 노회당석에서 행한다."], "answer": 2, "explanation": "정치 제15장 제9조, 제84회 총회 결의 참고 — 임직 준비 노회는 청빙 받은 자가 성직(일)을 받을 만한 자격자인 줄 확인하면 편의를 따라 임직식을 교회나 노회 당석에서 행하고 위임식은 그 시무할 교회에서 거행하되 그 교회 교인들은 이것을 위하여 준비 기도를 할 것이다(행 13:2, 3)."}, {"id": "헌법-0270", "subject": "헌법", "section": "정치", "qnum": 271, "stem": "다음 중 목사임직 준비에 관한 설명으로 옳은 oices": ["본 교회의 결의로 청빙서와 청원서를 노회서기에게 송달한다.", "e 청빙받은 목사의 시무 교회와 합의되면 그 교회를 사면케 하고 청빙을 허락한다.", "노회서기는 그 청빙사유를 청빙받은 목사와 해 교회에 즉시 통지한다.", "청빙받은 그 교회 담임을 해제하고 청빙교회는 다시 위임한다."], "answer": 3, "explanation": "정치 제16장 제2조 참고 X 2④ 순서로 — 본 노회 안에 전임 본 교회의 결의로 청빙서와 청원서를 노회 서기에게 송달하고 노회 서기는 그 청빙 사유를 청빙 받은 목사와 해교회에 즉시 통지할 것이요 합의하면 노회는 그 교회를 사면케 하고 청빙을 허락한다."}, {"id": "헌법-0284", "subject": "헌법", "section": "정치", "qnum": 285, "stem": "다음 중 목사의 다른 노회로 전임하는 규정에 대한 설명으로 옳지 않은 것은?", "choices": ["다른 노회 소속 교회의 청빙을 받은 목사는 그 교회와 합의해야 한다.", "e 그 교회와 합의가 되면 본 노회는 그 교회를 사면케 하고 이명서를 본인에게 교부한다.", "노회가 소속목사의 임면권이 있으나 전임을 명령할 권을 포함하지는 않는다.", "목사의 전임은 목사와 청빙하는 교회 간에만 합의하면 된다."], "answer": 4, "explanation": "정치 제16장 제3조 참고 — 다른 노회로 전임 다른 노회 소속 교회의 청빙을 받은 목사가 해교회와 합의되면 본 노회는 그 교회를 사면 하고 이명서를 본인에게 교부한다. 560 제3부 헌법(정치)"}, {"id": "헌법-0285", "subject": "헌법", "section": "정치", "qnum": 286, "stem": "다음 중 다른 노회로 전임하는 규정에 관한 설명으로 옳은 것은? 다른 노회 소속교회의 청빙을 받은 목사가 해교회와 합의되면 본 노회는 그 교회를 사면케 하 고 이명서를 본인에게 교부한다.", "choices": ["다른 노회 소속교회의 청빙을 받은 목사가 해교회와 합의되면 본 노회는 그 교회를 사면케 하 고 이명서를 본인에게 교부한다.", "노회가노회", "다른 목사의 임면권이 교회의 청빙을 있으니 전임을해교회와의 받은 목사는 합의와 상관없이 이명서를 교부해야 한다.", "목사의 전임은 목사와 청빙하는 교회 간에만 합의하면 노회는 이명해 주어야 한다."], "answer": 1, "explanation": "정치 제16장 제3조 — 다른 노회로 전임 다른 노회 소속 교회의 청빙을 받은 목사가 해교회와 합의되면 본 노회는 그 교회를 사면 하고 이명서를 본인에게 교부한다. 560 제3부 헌법(정치)"}, {"id": "헌법-0286", "subject": "헌법", "section": "정치", "qnum": 287, "stem": "다음 중 다른 노회 소속교회로 전임하려 할 때 피빙목사 시무교회가 취할 절차에 대한 설명으로 맞지 않는 것은? © 조회서를 따라 소속노회로 청빙에 대한 입장을 회보한다.", "choices": ["조회서를 따라 소속노회로 청빙에 대한 입장을 회보한다.", "본 교회 내의 의견을 종합하기 위하여 필요하면 공동의회를 열 수도 있다.", "혹시 노회가 회집되면 대표를 소속노회에 파송하여 직접 설명한다.", "목사가 다른 노회에 소속교회의 청빙을 받으면 그 교회는 할 일이 없다."], "answer": 4, "explanation": "정치 제16장 제3조 참고 — 다른 노회로 전임 다른 노회 소속 교회의 청빙을 받은 목사가 해교회와 합의되면 본 노회는 그 교회를 사면 하고 이명서를 본인에게 교부한다. 560 제3부 헌법(정치)"}, {"id": "헌법-0287", "subject": "헌법", "section": "정치", "qnum": 288, "stem": "다음 중 다른 노회 소속교회로 전임하려 할 때 피빙목사 소속노회가 취할 절차에 관한 설명으로 맞지 않는 것은?", "choices": ["피빙목사와 피빙목사 사무 지교회로 청빙사유를 통지하고 피빙목사와 지교회의 입장에 대한 회보를 접수한다.", "피빙목사가 거절하면 그 청빙서를 청빙 노회에 회송하는 것을 종결하고 피빙목사 시무 교회가 거절하면 신중히 협의하여 응낙여부를 노회가 작정한다.", "노회가 회집되면 피빙교회 대표를 소속노회에 파송하여 직접 설명한다.", "전임을 허락하면 그 청빙서를 피빙목사에게 주고 본 노회 직무를 해제한 후 이명증서를 발송한다."], "answer": 3, "explanation": "정치 제16장 제3조 참고 — 다른 노회로 전임 다른 노회 소속 교회의 청빙을 받은 목사가 해교회와 합의되면 본 노회는 그 교회를 사면 하고 이명서를 본인에게 교부한다. 560 제3부 헌법(정치)"}, {"id": "헌법-0288", "subject": "헌법", "section": "정치", "qnum": 289, "stem": "다른 교파의 목사가 본 교단에 속한 노회에 가입하고자 하는 경우에 대한 설명으로 옳지 않은 것은? 총회신학원에서 2년 이상 신학과정을 이수해야 한다.", "choices": ["소정의 신학수업을 마친 후 강도사 고시에 합격하여야 한다.", "본 교단에 속한 노회로 가입하려는 목사는 노회가 허락하였더라도 강도사 고시 합격 이전에는 노회 회원권이 없다.", "해당 목사가 다른 노회로 가고자 할 때, 노회는 이명서를 발급해 줄 수 없다.", "강도사 인허를 받은 후 별도로 안수식을 하지는 않는다."], "answer": 1, "explanation": "\"2년 이상 수업한 후\"는 103회 총회에서 개정되어 삭제되었고, 편목의 경우에는 이명서를 발급해 줄 수가 없다. 왜냐하면 노회 의 회원이 아니기 때문이다. 편복은 목사고시를 필요로 하지 않는다."}, {"id": "헌법-0289", "subject": "헌법", "section": "정치", "qnum": 290, "stem": "목사의 전임에 대한 설명으로 옳은 것은?", "choices": ["목사는 교회의 승낙이 있어야 다른 교회로 전임한다.", "목사는 전임 청빙서를 그 교회로부터 직접 받을 수 있다.", "노회 안에 있는 지교회가 다른 지교회에 시무하는 목사를 청빙하려고 하면 그 교회는 그 청빙 사유를 즉시 청빙받는 목사와 해당교회에게 통지해야 한다.", "노회는 목사의 전임과정에서 청빙받은 목사와 현 시무교회 사이에 적절한 합의가 있는지의 여 부를 살펴야 한다.", "다른 노회 소속 교회의 청빙을 받은 목사에 대하여 노회는 즉시 그 목사로 시무하는 교회를 사 임하게 하고, 이명서를 교부한다."], "answer": 4, "explanation": "목사의 전임은 노회의 승낙이 있어야 한다. 전임청빙서는 직접 받을 수 없다. 노회 안에 속한 목사의 경우에 그 청빙사유를 청 빙하는 교회가 통지하는 것이 아니라, 노회 서기가 통지하는 것이다. 5번에서는 노회는 목사와 시무교회 사이의 합의과정을 살 펴야 하고, 즉시 사임케 할 수는 없다. • 목사의 사면, 사직"}, {"id": "헌법-0290", "subject": "헌법", "section": "정치", "qnum": 291, "stem": "목사의 사면과 사직에 관한 설명으로 옳지 않은 것은? ® 목사가 사면원을 제출하면 노회는 교회의 대표를 청하여 그 이유를 물어야 한다. 노회는 교회의 대표가 목사의 사면에 대하여 이의를 제기하지 않으면 그 사면은 승낙한다.", "choices": ["목사가 사면원을 제출하면 노회는 교회의 대표를 청하여 그 이유를 물어야 한다.", "노회는 교회의 대표가 목사의 사면에 대하여 이의를 제기하지 않으면 그 사면은 승낙한다.", "목사의 사면이 처리되면, 그 교회의 당회는 폐당회가 된다.", "지교회가 목사와 해약하고자 할 때에 목사의 사면을 노회에 요청할 수 있다.", "목사의 권고사면에 대한 청원이 있으면 노회는 목사와 교인대표의 의견을 청취하고 목사의 해 임을 결의할 수 있다."], "answer": 3, "explanation": "목사가 사면하게 되면 그 교회는 허위교회가 되는 것이다. 허위교회는 목사의 자리가 비었다는 뜻이다. 폐당회는 당회원(장로)이 없는 당회가 되었다는 뜻이다. 권고사면은 사면을 권고하는 것이 아니라 노회가 결의를 통해 사직을 명령하는 것을 의미한다. (정치 제17장 1,2조)"}, {"id": "헌법-0291", "subject": "헌법", "section": "정치", "qnum": 292, "stem": "목사가 노회나 교단을 탈퇴한 경우에 대한 설명으로 옳은 것은?", "choices": ["목사는 임의로 시무를 사직하거나 사면할 수 없다.", "목사가 임의로 노회나 교단을 탈퇴하게 되면 노회는 별도로 명부를 작성하여 관리한다.", "교단을 탈퇴한 목사가 재가입하려면 탈퇴한 노회에서만 재가입할 수 있다.", "임의로 탈퇴한 목사의 재가입은 교회질서를 어지럽히는 행위이므로 불가하다.", "교단이나 노회를 임의로 탈퇴하면 노회는 그 목사에 대하여 권징할 수 없다."], "answer": 3, "explanation": null}, {"id": "헌법-0292", "subject": "헌법", "section": "정치", "qnum": 293, "stem": "목사가 사직하는 것과 관련된 설명으로 옳지 않은 것은?", "choices": ["목사가 사직하면 별도의 명부에서 관리하고, 이명서를 주어 지교회로 보낸다.", "노회는 목사가 자유로 올린 사직청원에 대하여는 1년간의 유예기간을 둘 수 있다.", "목사가 국회의원, 관공리, 사회학교에 종사하게 되면 사직케 해야 한다. 목사가 특별한 사유 없이 5년간 무임으로 있으면 노회는 사직을 권고한다.", "사직한 목사가 다시 목사가 되려면 다시 임직해야 한다."], "answer": 1, "explanation": "목사가 사직하면 목사명부에서 삭제하고, 평신도가 된다. 3번은 42회 총회결의"}, {"id": "헌법-0293", "subject": "헌법", "section": "정치", "qnum": 294, "stem": "다음 중 목사의 자유 사면에 관한 규정 설명으로 옳지 않은 것은?", "choices": ["목사가 본 교회에 어려운 사정이 있어 사면원을 제출하면 노회는 교회대표를 청하여 그 목사의 사면 이유를 물어야 한다.", "목사가 사면하려 할 때 사면서를 제출함과 동시에 해임된다.", "목사의 청원과 지교회의 태도가 상반되는 경우이면 노회가 자세히 살펴 그 사면 청원을 기각해야 한다.", "그 교회 대표가 오지 않거나 혹 설명하는 이유가 충분하지 못하면 노회는 사면을 승낙하고 회 록에 자세히 기록하고 그 교회는 허위교회가 된다."], "answer": 2, "explanation": "2020년 기출문제"}, {"id": "헌법-0294", "subject": "헌법", "section": "정치", "qnum": 295, "stem": "다음 중 목사의 권고사직에 관한 규정 설명으로 옳지 않은 것은?", "choices": ["목사가 성직에 상당한 자격과 성적이 없을 때 노회가 사직을 권고하고 결정한다.", "목사가 심신이 건강하고 사역할 곳이 있어도 5년간 무임으로 있을 때 노회는 사직을 권고한다.", "노회가 목사를 권고 사직한 일에 대하여는 소원할 수 없다.", "목사의 권고사직에 대하여 하회 결정 10일 이내에 상회에 소원할 수 있다."], "answer": 3, "explanation": "2020년 기출문제, 권징조례 제9장 제84, 85, 96조 참고"}, {"id": "헌법-0295", "subject": "헌법", "section": "정치", "qnum": 296, "stem": "목사 사면에 대한 설명으로 옳지 않은 것은? • 위임목사도 사면할 수 있다.", "choices": ["목사가 본 교회에 대하여 어려운 사정이 있으면 사면원을 노회에 제출한다.", "노회는 교회대표를 청하여 사면 이유를 묻는다.", "노회는 사면서를 받으면 즉시 처리해야 한다.", "위임목사가 사면하면 그 교회는 허위교회가 된다."], "answer": 4, "explanation": "2019년 기출문제"}, {"id": "헌법-0296", "subject": "헌법", "section": "정치", "qnum": 297, "stem": "목사가 본 교회에 대하여 어려운 사정이 있을 때 사면원을 어디에 제출하여야 하는가?", "choices": ["당회", "총회", "노회", "공동의회"], "answer": 3, "explanation": "2018년 기출문제"}, {"id": "헌법-0297", "subject": "헌법", "section": "정치", "qnum": 298, "stem": "목사의 사면 및 사직의 종류가 아닌 것은?", "choices": ["임의사면", "자유사면", "자유사직", "권고사직", "권고사면"], "answer": 1, "explanation": "2019년 기출문제"}, {"id": "헌법-0298", "subject": "헌법", "section": "정치", "qnum": 299, "stem": "목사의 사면 및 사직에 대한 설명으로 옳지 않은 것은?", "choices": ["사면과 사직은 다르다.", "사면은 맡아보던 사역을 그만두는 것이다.", "사직은 맡은 직무의 직분을 내려놓고 물러나는 것이다.", "사직하면 평신도가 된다.", "사면할 경우는 평신도가 된다."], "answer": 5, "explanation": "2019년 기출문제"}, {"id": "헌법-0299", "subject": "헌법", "section": "정치", "qnum": 300, "stem": "자유사면에 대한 설명 중 옳지 않은 것은? n 자유사면은 권고사면이나 사직이 아니다.", "choices": ["n 자유사면은 권고사면이나 사직이 아니다.", "노회의 권징 없이 지교회의 자의에 의해 사면하는 행위를 말한다.", "위임목사는 교회와 결혼한 것이라 자유로이 사면할 수 없다.", "목사와 교회가 서로 맞지 아니하면 목사가 사면을 청할 수 있다."], "answer": 3, "explanation": "2019년 기출문제 수정"}, {"id": "헌법-0300", "subject": "헌법", "section": "정치", "qnum": 301, "stem": "다음 중 위임목사의 해임 및 자동해제에 관한 설명으로 맞지 않는 것은? 분", "choices": ["자유사면 및 사직과 권고사면 및 사직한 경우", "본 교회를 떠나 1년 이상 결근하게 된 때", "장로나 교인들과 불화한 경우", "재판에 의해 목사가 면직되었을 경우"], "answer": 3, "explanation": "정치 제4장 제4조 1항, 제17장 제1조~제4조, 제17장 제5조, 권징조례 제9장 제100조 참고 — 목사의 칭호 목사가 그 담임한 시무와 형편으로 인하여 다음과 같은 칭호가 있다. 1. 위임 목사 한 지교회나 1구역(4지교회까지 좋으나 그 중 조직된 교회가 하나 이상됨을 요함)의 청빙으로 노회의 위임을 받은 목사니 특별한 이유가 없으면 그 담임한 교회를 만 70세까지 시무한다. 위임 목사가 본 교회를 떠나 1년 이상 결근하게 되면 자동적으로 그 위임이 해제된다. 2. 시무 목사 조직교회 시무 목사는 공동의회에서 출석 교인 3분의 2 이상의 가결로 청빙을 받으나 그 시무 기간은 1년간이요, 조직교회에서는 위임 목사를 청함이 원칙이나 부득이한 형편이면 다시 공동의회 에서 3분의 2의 가결로 계속 시무를 청원하면 1년간 더 허락할 수 있다. 단, 미조직교회에서 시무 목사 시무 기간은 3년이요, 연기를 청원할 때에는 당회장이 노회에 더 청원할 수 있다. 3. 부목사 부목사는 위임 목사를 보좌하는 임시 목사니 당회의 결의로 청빙하되 계속 시무하게 하려면 매년 당회장이 노회에 청원하여 승낙을 받는다. 544 제3부 헌법(정치) 4. 원로 목사 동일(a-)한 교회에서 20년 이상 시무한 목사가 연로(4)하여 노회에 시무 사면을 제출하려 할 때에 본 교회에서 명예적 관계를 보존하고자 하면 공동의회를 소집하고 생활비를 작정하여 원로 목사 로 투표하여 과반수로 결정한 후 노회에 청원하면 노회의 결정으로 원로 목사의 명예직을 준다. 단, 정년이 지나면 …"}, {"id": "헌법-0301", "subject": "헌법", "section": "정치", "qnum": 302, "stem": "다음 중 위임목사의 해임 및 자동해제에 관한 설명으로 옳은 것은?", "choices": ["장로나 교인들과 불화한 경우", "자유사면 및 사직과 권고사면 및 사직한 경우", "본 교회를 떠나 6개월 이상 결근한 때", "본 교회를 떠나 2개월 이상 결근한 때"], "answer": 2, "explanation": "정치 제4장 제4조 1항, 제17장 제1조~제4조, 제17장 제5조 — 목사의 칭호 목사가 그 담임한 시무와 형편으로 인하여 다음과 같은 칭호가 있다. 1. 위임 목사 한 지교회나 1구역(4지교회까지 좋으나 그 중 조직된 교회가 하나 이상됨을 요함)의 청빙으로 노회의 위임을 받은 목사니 특별한 이유가 없으면 그 담임한 교회를 만 70세까지 시무한다. 위임 목사가 본 교회를 떠나 1년 이상 결근하게 되면 자동적으로 그 위임이 해제된다. 2. 시무 목사 조직교회 시무 목사는 공동의회에서 출석 교인 3분의 2 이상의 가결로 청빙을 받으나 그 시무 기간은 1년간이요, 조직교회에서는 위임 목사를 청함이 원칙이나 부득이한 형편이면 다시 공동의회 에서 3분의 2의 가결로 계속 시무를 청원하면 1년간 더 허락할 수 있다. 단, 미조직교회에서 시무 목사 시무 기간은 3년이요, 연기를 청원할 때에는 당회장이 노회에 더 청원할 수 있다. 3. 부목사 부목사는 위임 목사를 보좌하는 임시 목사니 당회의 결의로 청빙하되 계속 시무하게 하려면 매년 당회장이 노회에 청원하여 승낙을 받는다. 544 제3부 헌법(정치) 4. 원로 목사 동일(a-)한 교회에서 20년 이상 시무한 목사가 연로(4)하여 노회에 시무 사면을 제출하려 할 때에 본 교회에서 명예적 관계를 보존하고자 하면 공동의회를 소집하고 생활비를 작정하여 원로 목사 로 투표하여 과반수로 결정한 후 노회에 청원하면 노회의 결정으로 원로 목사의 명예직을 준다. 단, 정년이 지나면 …"}, {"id": "헌법-0302", "subject": "헌법", "section": "정치", "qnum": 303, "stem": "다음 중 목사의 자유사면에 관한 규정 설명으로 옳지 않은 것은? 목사가 본 교회에 어려운 사정이 있어 사면원을 제출하면 노회는 교회대표를 청하여 그 목사의 사면 이유를 물어야 한다.", "choices": ["목사가 본 교회에 어려운 사정이 있어 사면원을 제출하면 노회는 교회대표를 청하여 그 목사의 사면 이유를 물어야 한다.", "그 교회 대표가 오지 않거나 혹 설명하는 이유가 충분하지 못하면 노회는 사면을 승낙하고 회 록에 자세히 기록하고 그 교회는 허위교회가 된다.", "목사의 청원과 지교회의 태도가 상반되는 경우이면 노회가 자세히 살펴 그 사면 청원을 기각해 야 한다.", "목사가 사면하려 할 때 사면서를 제출함과 동시에 해임된다."], "answer": 4, "explanation": "정치 제17장 제1조 참고 — 자유 사면 목사가 본 교회에 대하여 어려운 사정이 있어 사면원을 노회에 제출하면 노회는 교회 대표를 청하여 그 목사의 사면 이유를 물을 것이니 그 교회 대표가 오지 아니 하든지 혹 그 설명하는 이유가 충분하지 못하면 사면을 승낙하고 회록에 자세히 기록할 것이요. 그 교회는 허위 교회가 된다."}, {"id": "헌법-0303", "subject": "헌법", "section": "정치", "qnum": 304, "stem": "다음 중 목사의 권고사면에 관한 규정 설명으로 옳지 않은 것은? 권고사면이란 본인이 청원하는 것이 아니라 지교회가 해약하고자 하는 경우이다.", "choices": ["권고사면이란 본인이 청원하는 것이 아니라 지교회가 해약하고자 하는 경우이다.", "지교회가 목사를 환영하지 아니하여 해약하고자 할 때는 노회가 목사와 교회 대표자의 설명을 들은 후 권고사면 처리한다.", "이때 노회의 결의가 부당하다고 여겨질 때는 하회 결정 후 10일 이내에 상회에 소원할 수 있다.", "목사가 권고사면이 되면 교회를 떠나는 길밖에 다른 방법이 없다."], "answer": 4, "explanation": "정치 제17장 2조 참고, 권징조례 제9장 제84, 85, 96조 참고"}, {"id": "헌법-0304", "subject": "헌법", "section": "정치", "qnum": 305, "stem": "다음 중 지교회가 불화한 일로 말미암아 목사의 해임을 원할 경우 처리할 단계에 대한 설명으로 옳지 않은 것은?", "choices": ["교인들이 은밀히 기도하면서 목사를 돕는 일에 더욱 힘쓴다.", "재정상 어려움을 해결하기 위하여 목사와 협의한다.", "교회의 영적인 괴로움이 비록 목사의 부족이나 직무상 나태, 정신적인 부족, 불성실, 질병 혹은 노쇠해서 온 것이 사실이라 해도 함께 다스리는 자가 된 장로들은 힘써 기도하면서 사실을 목 사에게 알린다.", "어떤 경우에도 목사의 해임은 불가하다."], "answer": 4, "explanation": "정치 제17장 제2조 참고 — 권고 사면 지교회가 목사를 환영하지 아니하여 해약하고자 할 때는 노회가 목사와 교회 대표자의 설명을 들은 후 처리한다."}, {"id": "헌법-0305", "subject": "헌법", "section": "정치", "qnum": 306, "stem": "다음 중 지교회가 불화한 일로 말미암아 목사의 해임을 원할 경우에 목사가 장로의 보고에도 불 구하고 계속 불화하면 당회가 본 노회 소속 인근 목사를 통하여 문의하고 중재하여 화목을 시도 해 볼 것이고, 그 후에는 당회가 목사에게 사면을 권고해 볼 것이나 그래도 사면코자 아니하면 어떻게 할 것인지에 대한 설명으로 옳지 않은 것은? \" 당회의 결의로써 정치 제9장 제5조 8항에 의거하여 노회에 위탁한다.", "choices": ["당회의 결의로써 정치 제9장 제5조 8항에 의거하여 노회에 위탁한다.", "당회나 공동의회가 그 목사의 담임해제 청원서를 노회에 제출한다.", "노회가 당회록을 검사할 때에 그 일을 발각하여 상당하게 처리하도록 할 수 있다.", "당회의 결의로 공동의회를 소집하여 공동의회의 결의로 당회가 해임하면 된다."], "answer": 4, "explanation": "정치 제17장 제2조 — 권고 사면 지교회가 목사를 환영하지 아니하여 해약하고자 할 때는 노회가 목사와 교회 대표자의 설명을 들은 후 처리한다."}, {"id": "헌법-0306", "subject": "헌법", "section": "정치", "qnum": 307, "stem": "정치 제17장의 목사 사면 및 사직에는 4가지가 있다. 그중 아닌 것은?", "choices": ["자유 사면", "권고 사면", "권고 사직", "권고 휴직"], "answer": 4, "explanation": "17장 1조 ※ 2016년 기출문제"}, {"id": "헌법-0307", "subject": "헌법", "section": "정치", "qnum": 308, "stem": "다음 중 목사의 자유사직에 관한 규정 설명으로 옳지 않은 것은?", "choices": ["목사는 항존직원이므로 사직을 해도 목사라고 칭해야 한다.", "무흠한 목사가 노회에 사직을 청원하면 그 목적과 이유를 상세히 알아 결정하되 상당한 방법으 로만 1년간 유예를 지난 다음에 노회관할에 그 목사가 단 마음으로 유익하게 시무하지 못할 줄로 인정하면 사직을 허락한다.", "사직을 허락하면 그 성명을 노회 명부에서 삭제하고 입교인의 이명서를 주어 소원하는 교회로 보낸다.", "목사가 그 시무로 교회에 유익을 주지 못할 줄로 생각되면 사직원을 노회에 제출할 것이요 노 회는 이를 협의 결정한다."], "answer": 1, "explanation": "정치 제17장 제3조 참고 — 자유 사직 목사가 그 시무로 교회에 유익을 주지 못할 줄로 각오할 때는 사직원을 노회에 제출할 것이요 노회는 이를 협의 결정한다."}, {"id": "헌법-0308", "subject": "헌법", "section": "정치", "qnum": 309, "stem": "다음 중 목사의 권고사직에 관한 규정 설명으로 옳지 않은 것은?", "choices": ["목사가 성직에 상당한 자격과 성적이 없을 때 노회가 사직을 권고하고 결정한다.", "목사가 심신이 건강하고 사역할 곳이 있어도 5년간 무임으로 있을 때 노회는 사직을 권고한다.", "목사의 권고사직에 대하여 하회 결정 10일 이내에 상회에 소원할 수 있다.", "노회가 목사를 권고사직한 일에 대하여는 소원할 수 없다."], "answer": 4, "explanation": "정치 제17장 제4조, 권징조례 제9장 84,85조 참고 — 권고 사직 목사가 성직에 상당한 자격과 성적이 없든지 심신(Le)이 건강하고 또 사역할 곳이 있어도 5년간 무임으 로 있으면 노회는 사직을 권고한다."}, {"id": "헌법-0309", "subject": "헌법", "section": "정치", "qnum": 310, "stem": "목사 사면 및 사직에 관한 설명 중 다음은 무엇에 관련된 설명인가? \"지교회가 목사를 환영하지 아니하여 해약하고자 할 때는 노회가 목사와 교회 대표자의 설명을 들은 후 처리한다.\"", "choices": ["자유사면", "권고사면", "자유사직", "권고사직"], "answer": 2, "explanation": "정치 제17장 제2조 참고 — 권고 사면 지교회가 목사를 환영하지 아니하여 해약하고자 할 때는 노회가 목사와 교회 대표자의 설명을 들은 후 처리한다."}, {"id": "헌법-0310", "subject": "헌법", "section": "정치", "qnum": 311, "stem": "다음 중 목사의 사면과 사직에 대한 설명으로 옳은 것은?", "choices": ["자유사면: 목사가 그 시무로 교회에 유익을 주지 못할 줄로 각오할 때는 사직원을 노회에 제출 할 것이요 노회는 이를 협의 결정한다.", "자유사직: 지교회 목사를 환영하지 아니하여 해약하고자 할 때는 노회가 목사와 교회 대표자의 설명을 들은 후 처리한다.", "권고사면: 목사가 본 교회에 대하여 어려운 사정이 있어 사면원을 노회에 제출하면 노회는 교회 대표를 청하여 그 목사의 사면 이유를 물을 것이니 그 교회 대표가 오지 아니하든지 혹 그 설 명하는 이유가 충분하지 못하면 사면을 승낙하고 회록에 자세히 기록할 것이요 그 교회는 허위 교회가 된다.", "권고사직: 목사가 성직에 상당한 자격과 성적이 없든지 심신이 건강하고 또 사역할 곳이 있어도 5년간 무임으로 있으면 노회는 사직을 권고한다."], "answer": 4, "explanation": "정치 제17장 제1,2,3,4조 참고 0 목사의 휴양"}, {"id": "헌법-0311", "subject": "헌법", "section": "정치", "qnum": 312, "stem": "교회를 시무하는 목사가 본 교회를 떠나 있게 되는 사유에 해당하지 않는 것은?", "choices": ["교회를 시무하는 목사는 신체 양을 이유로 교회를 떠나 있을 수 있다.", "시무 중의 목사는 신학 연구를 이유로 교회를 떠나 있을 수 있다.", "시무 중의 목사가 교회를 떠나 있으려면 반드시 해당 당회와 협의하여야 한다. 2개월 이상 흠근하게 될 때에는 공동의회의 허락을 받아야 한다.", "목사의 홈근이 1개년이 경과하면 그 위임은 자동 해제된다."], "answer": 4, "explanation": "2개월 이상 홈근하게 될 때에는 노회의 승낙을 받아야 한다. (정치 제17장 5조)"}, {"id": "헌법-0312", "subject": "헌법", "section": "정치", "qnum": 313, "stem": "시무목사가 신체 양이나 신학 연구나 기타 사정으로 본 교회를 떠나게 되는 경우 1년이 경과 하면 어떻게 되는가?", "choices": ["권고사면", "자유사직", "위임해제", "권고사직"], "answer": 3, "explanation": "2018년 기출문제"}, {"id": "헌법-0314", "subject": "헌법", "section": "정치", "qnum": 315, "stem": "다음 중 목사의 휴양에 대한 규정 설명으로 옳지 않은 것은? • 시무목사가 신체 선양이나 신학연구나 기타 사정으로 휴양할 수 있고 2개월 이내는 당회와 협 의하면 된다. 2개월 이상 1년 이내로 흠근하게 될 때는 노회의 승낙을 받아야 한다.", "choices": ["시무목사가 신체 선양이나 신학연구나 기타 사정으로 휴양할 수 있고 2개월 이내는 당회와 협 의하면 된다.", "2개월 이상 1년 이내로 흠근하게 될 때는 노회의 승낙을 받아야 한다.", "1개년이 경과할 때는 자동적으로 그 교회 위임이 해제된다.", "1개년 이내의 휴양은 노회의 허락이 없어도 당회의 결의로 가능하다."], "answer": 4, "explanation": "정치 제17장 제5조 참고 ® 선교사 — 목사의 휴양 시무 목사가 신체 양(3)이나 신학 연구나 기타 사정으로 본 교회를 떠나게 되는 경우에는 본 당회와 협의하며 2개월 이상 흠근(X1)하게 될 때는 노회의 승낙을 요하고 1개년이 경과할 때는 자동적(EDp)으 로 그 교회 위임이 해제된다."}, {"id": "헌법-0315", "subject": "헌법", "section": "정치", "qnum": 316, "stem": "다음 중 외국 선교사 중에 본국의 무임목사와 같은 대우를 하는 경우가 아닌 것은?", "choices": ["지교회 시무를 위탁하지 않은 경우", "지교회 시무가 허락된 경우", "파견증서만 받은 경우", "노회가 부담케 한 직무가 없는 경우"], "answer": 2, "explanation": "정치 제18장 제2조 1-5항 — 외국 선교사 외국 선교사는 곧 본 총회와 관계있는 선교사를 가리킴이다. 1. 외국 장로파 선교사가 본 총회 관하(쌀 F) 노회 구역 안에서 선교하게 되는 경우에는 그 선교사는 이명 증서를 그 노회에 제출하여 접수한 후에야 그 노회의 회원이 된다. 1. 헌법(정치) 전문 561 총회 강도사고시 문제집 2. 각 노회는 이명 증서를 받은 선교사에 대하여 지교회 일을 맡긴 때에만 그 노회에서 가부 투표권이 있다. 3. 본 노회가 직무를 부담하게 아니한 선교사와 파견 증서만 받은 선교사는 투표권은 없으나 언권이 있고 위원회에서는 투표권도 있고 상회 총대권도 있다. 4. 본 총회 산하 노회에서 파견 증서로 시무하는 선교사는 대한예수교장로회 율례를 준행할 의무가 있으니 만일 도덕상 품행에 관한 범과(3D)나 본 신경 정치 성경에 위반되는 때는 소관 노회가 심사한 후에 언권 회원권을 탈제 33송)한다. 5. 외국 선교사는 본 총회에서 정한 서약서에 서명하여야 한다. 6. 외국 선교사에 대한 서약문 ① 사도신경은 성경 말씀의 진리를 옳게 진술한 것으로 알며 또 그대로 믿느뇨? ② 본 대한예수교장로회의 12신조와 웨스트민스터 신도게요 및 대•소요리 문답을 정당한 것으로 믿느뇨? ③ 귀하는 신학상으로 말하는 신신학 및 고등 비평이나 신정통주의 내지 자유주의 신학을 잘못된 것으로 알며, 역사적 기독교의 전통을 항시 이와 투쟁적인 처지에서 진리를 수호해야 …"}, {"id": "헌법-0316", "subject": "헌법", "section": "정치", "qnum": 317, "stem": "선교사와 관련된 설명으로 옳지 않은 것은? A 선교사는 교회설립을 위하여 다른 민족에게 복음을 전하는 자로 총회가 파송한다.", "choices": ["선교사는 노회에 위탁하여 임직할 수 있다.", "선교사는 자원하는 자라야 파송할 수 있다.", "지교회의 청빙이 있어야 선교사로 파송할 수 있다.", "선교사의 사례비와 비용은 파송하는 치리회가 담당한다. 저"], "answer": 4, "explanation": "헌법조문에 대한 해석에 차이가 있을 수 있으나 문제는 헌법조문(정치 제18장, 1조)의 내용대로이다."}, {"id": "헌법-0317", "subject": "헌법", "section": "정치", "qnum": 318, "stem": "본 교단과 관계있는 외국선교사에 대한 설명으로 옳은 것은?", "choices": ["외국선교사가 노회구역 안에서 선교하는 경우에는 노회가 이명서를 접수하면 그 노회의 정회원 이 된다.", "이명증서를 받은 외국선교사에 대하여 지교회의 일을 맡긴 때에만 가부 투표권이 있다.", "외국선교사에게 범과가 있거나 성경에 위반된 사항이 있으면 소관 노회는 심사 후 사직케 한다.", "외국선교사는 그 소속 교단이 정한 바에 따르며 WCC 및 WCC적 에큐메니칼 운동에 반대해야 하는 것은 아니다.", "교단이 정한 바 음주와 흡연 및 속된 생활을 금하는 것은 양심의 자유에 반하므로 소속치리호 의 지도를 받아 부분적으로 허용된다."], "answer": 2, "explanation": "1번은 노회의 회원이 된다고 했지, 정회원이 된다고 규정되어 있지 않다. 다른 규정과 비교하여 종합하면 노회의 회원이라는 것 이 언권회원이 됨을 의미할 뿐이다. (정치 제18장 1조)"}, {"id": "헌법-0318", "subject": "헌법", "section": "정치", "qnum": 319, "stem": "다음 중 선교사의 자격이 아닌 것은?", "choices": ["총신대학 신학대학원 졸업자", "총회에서 실시한 강도사 고시에 합격한 자", "만 30세 이상인 자", "GMS(총회세계선교회)에서 실시한 선교훈련원을 수료한 자", "장립 받은 목사로서 교단에서 파송 받고, 이방나라에서 복음을 전하는 전도자"], "answer": 3, "explanation": "2019년 기출문제"}, {"id": "헌법-0320", "subject": "헌법", "section": "정치", "qnum": 321, "stem": "다음 중 선교사에 관한 규정 설명으로 옳지 않은 것은?", "choices": ["총회는 교회를 설립하기 위하여 내외지를 물론하고 다른 민족에게 선교사를 파송할 수 있다.", "선교사를 파송하는 일은 노회에 위탁하여 지교회의 청빙이 없는 이라도 선교사로 임직할 수 있다.", "원하지 않는 자를 강권할 수 없고, 자원하는 자를 파송해야 옳고 선교사의 봉급과 기타 비용은 파송하는 치리회가 담당한다.", "선교사는 봉급과 기타비용을 파송하는 치리회가 담당하므로 반드시 청빙하는 교회가 있어야만 선교사로 임직할 수 있다."], "answer": 4, "explanation": "2020년 기출문제 수정"}, {"id": "헌법-0321", "subject": "헌법", "section": "정치", "qnum": 322, "stem": "다음 중 외국 선교사에 대하여 본 총회에서 정한 서약문의 내용이 아닌 것은?", "choices": ["본 대한예수교장로회의 12신조와 웨스트민스터 신도게요 및 대소요리문답을 정당한 것으로 믿느뇨?", "귀하는 본 대한예수교장로회의 헌법에 배치되는 교훈이나 행동을 하지 않기로 서약하느뇨?", "본 장로회 신조와 웨스트민스터 신도게요 및 대소요리문답은 신구약 성경의 교훈한 도리를 총 괄한 것으로 알고 성실한 마음으로 받아 신종하느뇨?", "귀하는 본 총회 산하 노회 및 기관에서 봉직하는 동안 소속치리회에 복종하여 순종하기로 맹세하느뇨?"], "answer": 3, "explanation": "2020년 기출문제"}, {"id": "헌법-0322", "subject": "헌법", "section": "정치", "qnum": 323, "stem": "다음 중 목사로서 선교사의 직무에 관한 설명으로 맞는 것은?", "choices": ["장로와 합력하여 치리권을 행사한다.", "외국에서 선교할 때는 교회를 설립하고 조직할 권한이 있다.", "선교사가 선교지를 떠나 1년 이상 결근하면 자동으로 직무가 해제된다.", "선교사가 연기를 청원할 때에는 당회장이 노회에 더 청원할 수 있다."], "answer": 2, "explanation": "정치 제4장 3조 3항 참고"}, {"id": "헌법-0323", "subject": "헌법", "section": "정치", "qnum": 324, "stem": "다음 중 목사와 장로에 대한 설명 중 바른 것은?", "choices": ["설교만 하는 장로를 목사라 한다.", "장로는 치리와 더불어 설교도 할 수 있다.", "목사에 관한 사건은 노회 직할에 속하고 장로는 당회 직할에 속한다.", "목사와 장로는 모두 노회에 속한다."], "answer": 3, "explanation": "권징조례 제4장 제19조 참고 @ 장로"}, {"id": "헌법-0324", "subject": "헌법", "section": "정치", "qnum": 325, "stem": "장로의 기원에 관한 설명으로 옳지 않은 것은?", "choices": ["율법시대에도 교회를 관리하는 장로가 있었다.", "장로는 교회의 치리를 위해서 교인들이 선출한 교회의 대표이다.", "복음시대에도 목사와 협력하여 교회를 치리하는 장로를 세웠다. ⑨ 모세 시대에 백성의 대표자로 70인 장로를 세웠다.", "교부시대에 목사와 구분하여 장로를 언급했으며, 거의 모든 개혁교회에서 장로는 말씀과 가르치 는 사역은 하지 않는다."], "answer": 2, "explanation": "장로는 교인의 대표이지, 교회의 대표는 아니다. 지교회의 대표는 목사(당회장)이다."}, {"id": "헌법-0326", "subject": "헌법", "section": "정치", "qnum": 327, "stem": "치리 장로에 대한 설명으로 옳은 것은? 치리 장로는 교회에 항상 있어야 하는 직분은 아니다.", "choices": ["치리 장로는 당회에서 선출하며, 반드시 안수를 받아야 한다.", "치리 장로는 목사와 합력하여 지교회를 치리한다.", "치리 장로는 치리만 하는 자로 교회의 대표이다.", "치리 장로는 종신토록 그 신분이 유지되는 종신직이다."], "answer": 3, "explanation": "치리 장로는 만 70세가 되면 시무정년이 되어 치리권을 잃는다. 물론 장로 신분은 종신토록 유지되지만, 치리권이 없다. 따라서 치리 장로의 신분이 종신토록 유지되는 것은 아니다."}, {"id": "헌법-0327", "subject": "헌법", "section": "정치", "qnum": 328, "stem": "장로의 자격요건 및 장로의 권한에 대한 설명으로 옳은 것은?", "choices": ["각 치리회에서 목사의 권한에 복종해야 한다.", "만 35세 이상 된 모든 입교인 중에서 세울 수 있다.", "목사와 함께 강도와 교훈에 전담할 수 있다.", "교회에 등록한 지 5년이 지나면 누구나 장로 될 자격이 있다.", "당회의 회원이 되며, 상급치리회(노회, 총회)에 총대가 될 수 있다."], "answer": 5, "explanation": "1번은 각 치리회에서 목사와 동등하다. 2번은 남자입교인 중에서 세울 수 있다. 3번은 강도와 교훈은 장로의 전무가 아니다. 4 번은 무한 입교인만 장로 될 자격이 있다."}, {"id": "헌법-0328", "subject": "헌법", "section": "정치", "qnum": 329, "stem": "장로의 임기와 직무에 관한 설명으로 옳은 것은? 장로는 교인들 중에서 강도의 결과를 찾아야 하며, 그 임기는 만 70세가 되는 전일까지이다.", "choices": ["장로는 7년에 한 번씩 시무 투표를 해야 하고, 그 표결 수는 공동의회 출석회원 과반수의 찬성 을 필요로 한다.", "장로는 주께 부탁받은 양무리들이 도리 오해나 도덕적 부패에 빠지지 않게 하기 위해서 당회에 보고하지 않고도 개인으로 선히 권면할 수 있다.", "목사와 협동하여 행정과 권징을 관리하며, 장로는 지교회의 신령적 관계만을 총찰한다.", "장로는 병자와 조상자(재료합)를 위로하고 기도하지만, 직접 심방할 권한은 없고, 심방할 자를 목사에게 보고할 뿐이다."], "answer": 3, "explanation": "장로는 당회로나 개인으로 선히 권면할 수 있고, 회개치 않으면 당회에 보고한다. (정치 제5장 4조)"}, {"id": "헌법-0329", "subject": "헌법", "section": "정치", "qnum": 330, "stem": "장로의 종류에 해당하지 않는 것은?", "choices": ["시무장로", "@ 원로장로", "은퇴장로", "명예장로", "협동장로"], "answer": 4, "explanation": "본 교단에서는 명예장로는 허락하지 않고 있다. 항존직으로 명예를 보전하기 위한 것은 원로목사, 원로장로뿐이다. 항존직 자체 를 명예로 허락하는 것은 법이 아니며, 다만 권사는 명예권사가 있다. 이는 항존직이 아니기 때문이다."}, {"id": "헌법-0330", "subject": "헌법", "section": "정치", "qnum": 331, "stem": "원로장로에 대한 설명으로 옳지 않은 것은?", "choices": ["원로장로는 당회의 허락이 있어야 참석할 수 있고, 당회가 요청한 내용에 한해서 발언권이 있다.", "원로장로로 추대되려면 공동의회의 결의가 있어야 한다.", "원로장로가 되려면 동일한 교회에서 20년 이상 장로로 시무하여야 한다.", "원로장로의 추대는 노회의 승낙을 받지 않아도 된다.", "원로장로는 제직회 회원이 아니며 제직회에서 의결권이 없다."], "answer": 1, "explanation": "1번은 원로목사에 해당한 것이며, 원로장로는 당회의 언권회원이다. (90회 총회결의 참조) 원로장로라도 정년 이전에는 제직회 에 발언권이 있고, 정년 이후에는 발언권이 없다. (95회 총회결의)"}, {"id": "헌법-0331", "subject": "헌법", "section": "정치", "qnum": 332, "stem": "무임장로에 대한 설명으로 옳은 것은?", "choices": ["다른 교회에서 시무하던 장로가 이명한 교회에 출석하고 있는 장로이다.", "본 교회에서 장로로 임직하였으나 그 시무를 사임한 장로이다.", "무임장로는 장로의 신분으로 교회에 등록 또는 이명 온 자이므로 당회의 언권회원이 된다.", "무임장로는 제직회의 회원이 될 수 없다.", "무임장로에게 필요하면 성찬을 나누는 일을 맡길 수 있다."], "answer": 1, "explanation": "2번은 휴직장로에 대한 설명이다. 3번은 당회가 협동 로로 허락해야 한다. 무임장로라도 당회가 허락하면 제직회의 회원이 될 수 있다."}, {"id": "헌법-0332", "subject": "헌법", "section": "정치", "qnum": 333, "stem": "다음 중 장로직의 기원에 대한 설명으로 맞는 것은?", "choices": ["율법시대에 교회를 관리하는 장로가 있음과 같이 복음시대에도 목사와 협력하여 교회를 치리하 는 자를 세웠으니 치리장로이다.", "장로직은 신약시대에 갑자기 생긴 직분이다.", "구약시대의 장로직과 오늘날의 장로직은 똑같다.", "치리회 안에서 목사와 장로의 권한은 같지 않다."], "answer": 1, "explanation": "정치 제5장 제1조 참고 — 장로직의 기원 율법 시대에 교회를 관리하는 장로가 있음과 같이 복음 시대에도 목사와 협력하여 교회를 치리하는 자를 세웠으니 곧 치리 장로이다."}, {"id": "헌법-0333", "subject": "헌법", "section": "정치", "qnum": 334, "stem": "다음 중 장로의 권한에 대한 설명으로 맞지 않는 것은? 장로에게 강도와 교훈은 그의 전무 책임이 아니다.", "choices": ["장로에게 강도와 교훈은 그의 전무 책임이 아니다.", "각 치리회에서 목사와 같은 권한으로 각항 사무를 처리한다.", "장로는 지교회에서 공동의회 회장, 당회장, 제직회장, 재판회장이 될 수 없다.", "장로는 언제나 노회나 총회의 사무에 대한 권한이 있다."], "answer": 4, "explanation": "정치 제5장 제2조 참고 — 장로의 권한 강도와 교훈은 그의 전무 책임은 아니나 각 치리회에서는 목사와 같은 권한으로 각 항 사무를 처리한다(딤 전 5:17, 롬 12:78) 헌"}, {"id": "헌법-0334", "subject": "헌법", "section": "정치", "qnum": 335, "stem": "다음 장로의 기원에 대하여 옳지 않은 것은?", "choices": ["모세 시대에도 있었다.", "율법 시대에도 있었다.", "족장 시대에도 있었다.", "복음 시대에도 있었다."], "answer": 3, "explanation": "정치 제5장 제1조 참고 — 장로직의 기원 율법 시대에 교회를 관리하는 장로가 있음과 같이 복음 시대에도 목사와 협력하여 교회를 치리하는 자를 세웠으니 곧 치리 장로이다."}, {"id": "헌법-0335", "subject": "헌법", "section": "정치", "qnum": 336, "stem": "다음 중 장로의 권한에 관한 설명으로 옳은 것은?", "choices": ["강도와 교훈은 그의 전무 책임은 아니나 각 치리회에서는 목사와 같은 권한으로 각항 사무를 처리한다.", "목사가 없는 허위교회에서는 당회장이 될 수 있다.", "장로는 언제나 노회나 총회의 사무에 대한 권한이 있다.", "각 치리회에서 목사와 같이 치리회 회원이나 목사와 장로의 권한은 다르다."], "answer": 1, "explanation": "정치 제5장 제2조, 136번 문제 해설 참고 — 장로의 권한 강도와 교훈은 그의 전무 책임은 아니나 각 치리회에서는 목사와 같은 권한으로 각 항 사무를 처리한다(딤 전 5:17, 롬 12:78) 헌"}, {"id": "헌법-0336", "subject": "헌법", "section": "정치", "qnum": 337, "stem": "다음 중 장로와 전국교회에 관한 설명으로 옳은 것은?", "choices": ["장로는 지교회뿐만 아니라 상회의 총대가 되면 상회원이 되어 전국교회의 신령적 관계를 총찰 한다.", "장로는 지교회의 신령적 관계만 총찰할 수 있다.", "상회의 총대가 안 되어도 노회, 총회와 전국교회의 신령적 관계를 총찰한다.", "장로는 자기 교회가 아니라도 보조당회원으로 총찰할 권한이 있다."], "answer": 1, "explanation": "정치 제5장 제4조 1항 참고 — 장로의 직무 1. 교회의 신령적 관계를 총찰한다. 치리 장로는 교인의 택함을 받고 교인의 대표자로 목사와 협동하여 행정과 권징을 관리하며, 지교회 혹은 전국 교회의 신령적 관계를 총찰한다. 2. 도리 오해(콤(주)나 도덕상 부패를 방지한다. 주께 부탁 받은 양무리가 도리 오해나 도덕상 부패에 이르지 않기 위하여 당회로나 개인으로 선히 권면 하되 회개하지 아니하는 자가 있을 때에는 당회에 보고한다. 1. 헌법(정치) 전문 545 총회 강도사고시 문제집 3. 교우를 심방하되 위로, 교훈, 간호한다. 교우를 심방하되 특별히 병자와 조상자(3토#)를 위로하며 무식한 자와 어린아이들을 가르치며 간호할 것이니 평신도보다 장로는 신분(화)상 의무와 직무(83)상 책임이 더욱 중하다. 4. 교인의 신앙을 살피고 위하여 기도한다. 장로는 교인과 함께 기도하며, 위하여 기도하고 교인 중에 강도의 결과를 찾아본다. 5. 특별히 심방할 자를 목사에게 보고한다. 병환자와 슬픔을 당한 자와 회개하는 자와 특별히 구조 받아야 할 자가 있는 때에는 목사에게 보고한다."}, {"id": "헌법-0337", "subject": "헌법", "section": "정치", "qnum": 338, "stem": "다음 중 장로와 전국교회에 관한 설명으로 옳지 않은 것은? 장로는 지교회뿐만 아니라 상회의 총대가 되면 상회원이 되어 전국교회의 신령적 관계를 총찰 한다.", "choices": ["장로는 지교회뿐만 아니라 상회의 총대가 되면 상회원이 되어 전국교회의 신령적 관계를 총찰 한다.", "상회원이 되지 않고는 자기 노회 다른 교회를 총찰하지 못한다.", "상회원이 되지 않고는 다른 노회나 전국교회를 총찰할 권이 부여되지 않는다.", "장로는 당회 소속이므로 지교회만 총찰할 수 있다."], "answer": 4, "explanation": "정치 제5장 제2조, 제8장 제1조 및 제2조 참고 — 장로의 권한 강도와 교훈은 그의 전무 책임은 아니나 각 치리회에서는 목사와 같은 권한으로 각 항 사무를 처리한다(딤 전 5:17, 롬 12:  지출한다. 집사의 직무는 당회와 별개로 이루어 질 수 없다."}, {"id": "헌법-0392", "subject": "헌법", "section": "정치", "qnum": 393, "stem": "무임집사에 대한 설명으로 옳은 것은?", "choices": ["본 교회에서 집사로 시무하다가 사임하게 된 집사이다.", "만 70세 미만인 경우에는 서리집사의 직을 맡을 수 있다.", "공동의회에서 취임식을 행하고 시무집사가 될 수 있다.", "무임집사는 본 교회에 전임하여 무흠 5년이 지나야 시무집사가 될 수 있다.", "시무집사로 피택되었으나 아직 임직하지 못한 자를 가리킨다."], "answer": 2, "explanation": "1번은 휴직집사에 대한 설명이다. 3번은 공동의회에서 취임식을 하지는 않는다. 4번은 만 2년이 경과하면 된다. 5번은 피택자 이지. 무임집사가 아니다. 무임집사는 타 교회에서 이명을 와서 아직 취임하지 못한 집사이다."}, {"id": "헌법-0393", "subject": "헌법", "section": "정치", "qnum": 394, "stem": "교회 역사 집사제도를 교회 생활의 필수적인 구성요소로 그 자리를 회복시킨 사람은?", "choices": ["츠빙글리", "후스", "루터", "칼빈", "멜란히톤"], "answer": 4, "explanation": "칼빈만이 집사의 직분이 필수적임을 강조했다. (Abraham Kuyper, 『칼빈주의 강연, 85. 참조)"}, {"id": "헌법-0394", "subject": "헌법", "section": "정치", "qnum": 395, "stem": "집사의 선거와 관련된 설명으로 옳지 않은 것은?", "choices": ["집사는 공동의회에서 선출한다.", "집사로 선출된 자는 본인의 승낙과 상관없이 공동의회의 의결을 존중하여 순종해야 한다.", "집사는 노회가 임직하는 것이 아니고, 당회가 임직한다.", "집사의 경우에는 노회에서 고시하지 않는다.", "무임집사가 시무집사로 취임하게 될 경우, 장로회정치와 권징조례와 예배모범을 정당한 것으로 승낙한다는 서약은 이전에 했기 때문에 다시 해야 하는 것은 아니다."], "answer": 2, "explanation": "집사로 선출된 자는 본인의 승낙이 있어야 당회가 임직한다. 정치 제13장 제2조 참고 — 임직 승낙 치리 장로 혹은 집사를 선거하여 노회가 고시 승인하고(집사는 제외한다) 선거된 본인도 승낙한 후에 당회가 임직한다."}, {"id": "헌법-0395", "subject": "헌법", "section": "정치", "qnum": 396, "stem": "다음 중 집사의 칭호 가운데 틀린 것은?", "choices": ["시무집사", "@ 휴직집사", "명예집사", "은퇴집사"], "answer": 3, "explanation": "정치 제6장 제4조 참고 W. 실전문제 661 — 집사의 칭호 1. 시무 집사 : 본 교회에서 임직 혹은 취임 받아 시무하고 있는 집사 546 제3부 헌법(정치) 2. 휴직 집사 : 본 교회에서 집사로 시무하다가 휴직 중에 있거나 혹은 사임된 자 3. 은퇴 집사 : 연하여 은퇴한 집사 4. 무임 집사 : 타 교회에서 이명 와서 아직 취임을 받지 못한 집사이니, 만 70세 미만인 자는 서리 집사직을 맡을 수 있고, 본 교회에 전입하여 만 2년이 경과하고, 공동의회에서 집사로 피선되면 취임식만 행하고 안수 없이 시무 집사가 된다."}, {"id": "헌법-0396", "subject": "헌법", "section": "정치", "qnum": 397, "stem": "다음 중 집사의 임직에 관한 설명으로 맞지 않는 것은?", "choices": ["당회의 결의로 공동의회 일시와 장소를 1주일 전에 광고한다.", "공동의회에서 투표수 3분의 2 이상의 가표를 받아야 한다.", "반드시 서리집사 중에서 선출하여야 한다.", "당회고시에 합격하면 당회가 임직한다."], "answer": 3, "explanation": "정치 제13장 제1,2.3조, 제9장 제5조 4항, 제21 제1조 5항 참고"}, {"id": "헌법-0397", "subject": "헌법", "section": "정치", "qnum": 398, "stem": "다음 중 집사직에 대한 설명으로 맞지 않는 것은?", "choices": ["집사직은 목사와 장로와 구별되는 직분이니 무흠한 남교인이라야 한다.", "그 지교회 교인들의 택함을 받아야 한다.", "집사는 치리권은 없으나 당회에 참석하여 언권을 행사할 수 있다.", "정치 제6장에서 규정한 집사는 임시직인 서리집사와 다르다."], "answer": 3, "explanation": "정치 제6장 제1조, 정치 제3장 제2조, 제3조 4항 참고 — 집사직(배) 집사직은 목사와 장로직과 구별되는 직분이니 무흠한 남교인으로 그 지교회 교인들의 택함을 받고 목사에 게 안수(#‡) 임직을 받는 교회 항존(1)직이다."}, {"id": "헌법-0398", "subject": "헌법", "section": "정치", "qnum": 399, "stem": "다음 집사직에 대하여 \"교인의 택함을 받고 임직 받아야 한다\"는 설명으로 옳지 않은 것은? 교회를 대표하여 구제하며 봉사하는 직무를 전담하는 중직이라서 택함을 받아야 한다.", "choices": ["교회를 대표하여 구제하며 봉사하는 직무를 전담하는 중직이라서 택함을 받아야 한다.", "교인의 택함이란 공동의회에서 투표수 과반 이상의 찬성을 얻어야 함을 말한다.", "안수 위임은 당회의 교양과 고시에 합격한 자를 당회가 날짜를 정하고 안수 기도하며 집사 직 무를 위임하는 임직식을 거행하는 일을 말한다.", "집사는 교회 부흥에 큰 영향을 끼치는 중직이니 교인의 투표와 안수임직을 받음이 더욱 마땅하다."], "answer": 2, "explanation": "정치 제6장 제1조 — 집사직(배) 집사직은 목사와 장로직과 구별되는 직분이니 무흠한 남교인으로 그 지교회 교인들의 택함을 받고 목사에 게 안수(#‡) 임직을 받는 교회 항존(1)직이다."}, {"id": "헌법-0399", "subject": "헌법", "section": "정치", "qnum": 400, "stem": "다음 중 집사가 항존직이어야 할 이유에 대한 설명으로 옳지 않은 것은? @ 구제를 받아야 할 만한 대상자는 항상 있기 때문에 항존 직원이 되는 일이 마땅하다.", "choices": ["구제를 받아야 할 만한 대상자는 항상 있기 때문에 항존 직원이 되는 일이 마땅하다.", "집사 자격을 말해 주는 성경(행 6:3, 딤전 38~13, 빌 1:1, 롬 12:7)이 그 사실을 뒷받침한다.", "구제와 섬김은 교회의 본질적인 사명 중 하나이며, 집사를 세우는 권한은 지교회에 있다.", "집사는 교회재정으로 구제하는 일을 하므로 믿을 만한 사람을 당회가 임명하는 것이다."], "answer": 4, "explanation": "정치 제6장 제1조 — 집사직(배) 집사직은 목사와 장로직과 구별되는 직분이니 무흠한 남교인으로 그 지교회 교인들의 택함을 받고 목사에 게 안수(#‡) 임직을 받는 교회 항존(1)직이다."}, {"id": "헌법-0401", "subject": "헌법", "section": "정치", "qnum": 402, "stem": "다음 집사직의 칭호에 대한 설명 중 틀린 것은? n 시무집사: 본 교회에서 임직 혹은 취임 받아 시무하고 있는 집사", "choices": ["시무집사: 본 교회에서 임직 혹은 취임 받아 시무하고 있는 집사", "휴직집사: 본 교회에서 집사로 시무하다가 휴직 중에 있는 자", "은퇴집사: 연로하여 은퇴집사", "무임집사: 무임집사는 만 70세 미만인 자는 본 교회 전입하여 공동의회에서 과반수 투표로 피 선되면 취임식만 행하고 안수 없이 시무집사가 된다."], "answer": 4, "explanation": "정치 제6장 제4조 4항 참고 — 집사의 칭호 1. 시무 집사 : 본 교회에서 임직 혹은 취임 받아 시무하고 있는 집사 546 제3부 헌법(정치) 2. 휴직 집사 : 본 교회에
