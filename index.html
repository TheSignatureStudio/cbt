 함락되었다."], "answer": 3, "explanation": "1439년 동서방 교회의 합동을 축하하는 예배가 피렌체에서 거행되었으나 동방교회가 반대하여 실패로 돌아갔다. 이 일로 인해 예루살렘, 안디옥, 콘스탄티노플의 대주교들은 합동에 찬성했다는 이유로 주교직에서 물러남."}, {"id": "교회사-0303", "subject": "교회사", "section": "중세교회사", "qnum": 114, "stem": "문예부흥이 교회와 종교개혁에 끼친 영향이 아닌 것은?", "choices": ["성경과 교부들의 저작에 대한 연구 및 출판이 활발해짐", "문예부흥이 인문주의적 성향을 띠면서 종교개혁과 반대로 발전", "고전어 연구로 인하여 성경주해의 역사적 •문학적 연구방법이 일어남", "교황제도와 교회의 제도에 반항적인 경향으로 개인주의가 일어남"], "answer": 2, "explanation": "문예부흥이 미친 영향은 종교개혁의 환경이나 정신적인 분위기를 조성했다."}, {"id": "교회사-0304", "subject": "교회사", "section": "중세교회사", "qnum": 115, "stem": "종교개혁 이전의 개혁자가 아닌 사람은?", "choices": ["위클리프", "얀 후스", "제롬", "그레고리"], "answer": 4, "explanation": null}, {"id": "교회사-0305", "subject": "교회사", "section": "중세교회사", "qnum": 116, "stem": "개혁 전 개혁자들을 약술한 것이다. 그 연결이 바르지 않은 것은?", "choices": ["교리적 개혁자- 위클리프, 후스", "실제적 개혁자 - 기롤라모 사바나롤라, 왈도", "신비적 개혁자 - 에크하르트, 토마스 아 켐피스, 타울러", "정치적 개혁자 - 위셀, 도미니크"], "answer": 4, "explanation": "위셀은 신비적 개혁자이다."}, {"id": "교회사-0306", "subject": "교회사", "section": "중세교회사", "qnum": 117, "stem": "문예부흥기의 인물과 그들의 작품이 바르게 연결되어 있지 않은 것은? 단테 - 신곡 ② 페트라르카 - 라틴 문학과 키케로 문학연구", "choices": ["단테 - 신곡", "페트라르카 - 라틴 문학과 키케로 문학연구", "토마스 아 켐피스 - 그리스도를 본받아", "보카치오 - 데카메론"], "answer": 3, "explanation": "토마스 아 켐피스는 문예부흥기 인물이 아니다."}, {"id": "교회사-0307", "subject": "교회사", "section": "중세교회사", "qnum": 118, "stem": "존 위클리프의 사상이 아닌 것은? 성경만이 신앙의 유일한 기준", "choices": ["성경만이 신앙의 유일한 기준", "성직자의 독신주의 비판", "화체설을 부인함", "속죄권은 인정함"], "answer": 4, "explanation": "교황정치의 불필요성과 성상숭배와 면죄부판매, 죽은 자를 위한 미사 등에 반대하였으나 고해성사, 연옥설, 7성례는 인정했다."}, {"id": "교회사-0308", "subject": "교회사", "section": "중세교회사", "qnum": 119, "stem": "다음의 연결이 바르지 않은 것은? 왈도 - 성경만이 신앙의 표준임을 주장, 인노켄티우스 3세의 박해를 받음 위클리프 - 화체설을 받아들이고 속죄권은 부인함", "choices": ["왈도 - 성경만이 신앙의 표준임을 주장, 인노켄티우스 3세의 박해를 받음", "위클리프 - 화체설을 받아들이고 속죄권은 부인함", "후스 - 위클리프의 영향을 받음, 속죄권을 반대함", "사바나롤라 - 플로렌스에서 개혁운동을 함, 타락한 교회 비판"], "answer": 2, "explanation": "위클리프는 로마 카톨락교회의 속죄권, 화체설을 인정하지 않았다."}, {"id": "교회사-0309", "subject": "교회사", "section": "종교개혁사", "qnum": 1, "stem": "다음 중 16세기 종교개혁 발생에 직접적 영향을 준 사상과 가장 거리가 먼 것은?", "choices": ["인문주의", "계몽주의", "신비주의", "스콜라주의"], "answer": 2, "explanation": "인문주의와 스콜라주의는 내용과 방법론에 있어 종교개혁 신학이 전개되는 데 큰 영향을 주었다. 신비주의는 지배적 영향은 아 니었지만 루터의 신학에 일정 정도 영향을 주었다. 계몽주의는 18세기 이후 등장한 서구의 근대사상이다."}, {"id": "교회사-0310", "subject": "교회사", "section": "종교개혁사", "qnum": 2, "stem": "르네상스 인문주의의 표어로서 \"근원으로 돌아가기\"를 의미하는 용어는?", "choices": ["via media", "ad fontes", "sursum corda", "sola fide"], "answer": 2, "explanation": "르네상스 인문주의를 대표하는 라틴어 구호 'ad fontes'는 번역하면 \"근원들로\"라는 뜻이다."}, {"id": "교회사-0311", "subject": "교회사", "section": "종교개혁사", "qnum": 3, "stem": "다음 중 16세기 종교개혁이 발생하게 된 중세 말 로마 가톨릭의 문제로 보기 가장 어려운 것은?", "choices": ["공의회주의에 의한 교황권의 약화", "유럽 각 지역의 세속 정부와 교황청의 갈등", "고위성직자들의 도덕적 부패", "대학에서의 신학 교육의 약화"], "answer": 4, "explanation": "종교개혁이 일어나게 된 원인은 당시 로마 가톨릭의 문제는 제도적, 신학적, 도덕적 문제에 이르기까지 총체적이었다. 대학을 중 심으로 전개된 인문주의의 새로운 학문적 접근은 신학적 지평과 관점을 풍부하게 해 주었다."}, {"id": "교회사-0312", "subject": "교회사", "section": "종교개혁사", "qnum": 4, "stem": "다음 중 16세기 종교개혁 발달에 영향을 준 사회 문화적 요인으로 보기 가장 어려운 것은?", "choices": ["고전 문헌 자료들의 재발견", "인쇄술의 발달", "새로운 경제 구조의 확장", "종교적 문제에 대한 무관심"], "answer": 4, "explanation": "인쇄술의 발달과 고전 문헌의 재발견 및 편집, 그리고 새로운 경제 구조의 확장을 통한 식자층의 확대는 종교개혁 전개에 긍정 적으로 기여했다. 16세기는 종교에 대한 무관심이 확대된 시대가 아니라 여러 가지 사회적 상황 속에서 신앙적 기대와 종교적 관심이 고조된 시기였다. 문제는 로마 가톨릭의 종교체계와 교황청의 정책이 이와 같은 기대와 관심을 충족시킬 수 없었다는 데 있었다."}, {"id": "교회사-0313", "subject": "교회사", "section": "종교개혁사", "qnum": 5, "stem": "다음 중 종교개혁에 영향을 준 인문주의자에 속하지 않는 사상가는?", "choices": ["에라스무스", "르페브르 데타블", "알베르투스 마그누스", "요한 로이힐린"], "answer": 3, "explanation": "알베르투스 마그누스는 13세기 스콜라신학을 대표하는 신학자이다."}, {"id": "교회사-0314", "subject": "교회사", "section": "종교개혁사", "qnum": 6, "stem": "다음 중 종교개혁과 관련한 에라스무스의 업적이라고 볼 수 없는 것은?", "choices": ["벌게이트 성경의 문제점 지적", "헬라어 성경 편집 및 발간", "교부 저작들의 재편집", "히브리어 문법책 출간"], "answer": 4, "explanation": "에라스무스의 인문주의자적 작업들은 종교개혁자들에게 매우 유익한 자료와 식견을 제공해 주었다. 특히 그의 성경 원어 연구 및 편집이 종교개혁에 크게 기여했는데, 다만 에라스무스의 연구는 헬라어에 국한되었다."}, {"id": "교회사-0315", "subject": "교회사", "section": "종교개혁사", "qnum": 7, "stem": "다음 중 에라스무스의 저작이 아닌 것은?", "choices": ["엔키리디온", "유토피아", "광우예찬", "의지의 자유에 대하여"], "answer": 2, "explanation": "유토피아는 잉글랜드의 인문주의자 토마스 모어의 작품이다."}, {"id": "교회사-0316", "subject": "교회사", "section": "종교개혁사", "qnum": 8, "stem": "다음 중 의지의 자유와 관련한 에라스무스의 주장이라고 볼 수 없는 것은? 인간의 본성은 타락으로 인해 심각하게 약화되었다.", "choices": ["인간의 의지는 필연이 아닌 스스로의 동의로 죄를 범한다.", "2", "중립적이며 절대적 의미의 인간 의지는 존재하지 않는다.", "하나님의 은총에 우리의 노력이 결합되어 완전에 이를 수 있다"], "answer": 3, "explanation": "에라스무스는 인문주의자로서 인간의 가능성과 선한 삶의 공로에 대해 긍정적인 의견을 가지고 있었다. 중립적이며 절대적인 인 간 의지를 부인한 것은 에라스무스와 논쟁을 벌였던 루터의 입장이었다. 호"}, {"id": "교회사-0317", "subject": "교회사", "section": "종교개혁사", "qnum": 9, "stem": "프랑스의 인문주의자로서 파리 대학 학생들과 성경공부 모임을 인도했으며 이후 칼빈에게까지 영 향을 준 인물은?", "choices": ["르페브르 데타블", "존 콜렛", "피코 미란돌라", "토마스 모어"], "answer": 1, "explanation": "칼빈과 그의 동료들에게 직접 영향을 준 프랑스의 인문주의자는 르페브르 데타블(1455-1536)이다. 그는 소르본느 대학 신학자들 로부터 이단이라는 판단을 받았으나 제자들과 함께 성경 번역 작업을 계속하는 등 종교개혁 신학이 배태되는 데 크게 기여했다."}, {"id": "교회사-0318", "subject": "교회사", "section": "종교개혁사", "qnum": 10, "stem": "루터의 생애에 대한 설명으로 적절하지 않은 것은? 1483년 독일 아이스레벤에서 출생했다.", "choices": ["1483년 독일 아이스레벤에서 출생했다.", "어거스틴 수도원에 가입했다.", "수도사 생활을 하던 중 스타우피츠를 만나 도움을 받았다.", "에어푸르트 대학에서 신학을 전공했다."], "answer": 4, "explanation": "루터는 에어푸르트 대학에서 법학을 연구하던 중 법학 공부를 포기하고 어거스틴 수도원에 가입했다. 그의 신학 연구는 비텐베 르크 대학에서 이루어졌다."}, {"id": "교회사-0319", "subject": "교회사", "section": "종교개혁사", "qnum": 11, "stem": "다음 중 1520년 발표된 루터의 이른바 종교개혁 3대 저술의 제목이 아닌 것은?", "choices": ["의지의 속박에 관하여", "그리스도인의 자유", "독일 귀족들에게 고함", "교회의 바벨론 포로"], "answer": 1, "explanation": "루터는 1520년 한 해 세 편의 논문을 발표하여 자신이 주장하는 종교개혁의 구원론과 예배 갱신, 그리고 제도적 대안을 제시했 다. 의지의 속박에 대하여\" 혹은 \"노예의지론\"은 에라스무스와의 인간론 논쟁 과정에서 1525년 발표한 저술이다."}, {"id": "교회사-0320", "subject": "교회사", "section": "종교개혁사", "qnum": 12, "stem": "다음 중 루터의 주장과 가장 거리가 먼 것은?", "choices": ["그리스도의 의는 내재적 의로서 실제로 의롭게 한다.", "그리스도인은 의인이면서 동시에 죄인이다.", "율법에는 시민적 기능과 영적 기능이 있다.", "믿음은 사랑의 행위가 없이도 신자를 의롭게 한다."], "answer": 1, "explanation": "루터는 사랑의 행위를 강조했지만 이 행위가 우리를 의롭게 하는 공로가 될 수 없으며 다만 믿음으로 말미암는 칭의의 당연한 귀결로서 성도들에게 새롭게 주어지는 의무라고 주장했다. 그리스도의 의는 내재적 의가 아니라 우리의 것으로 여겨진 전가된 의라고 주장했다. 이 주장은 곧 이 의가 우리가 성취해 내는 것이 아니라 항상 우리 바깥에서 주어지는 외래적인 의임을 의미한다."}, {"id": "교회사-0321", "subject": "교회사", "section": "종교개혁사", "qnum": 13, "stem": "칭의론에서 죄인을 의롭게 하는 그리스도의 의가 우리에게 값없이 주어짐을 설명하기 위해 루터 가 사용한 의의 개념에 해당하는 용어는?", "choices": ["행위의 의", "전가된 의", "점진적 의", "협력적 의"], "answer": 2, "explanation": "루터는 \"이신칭의\" 교리를 통해 오직 믿음만으로 우리에게 주어지는 의는 그리스도께서 성취하신 외래적인 의이며 그리스도의 의는 어떤 가능성으로 주입되는 것이 아니라 하나님께서 우리의 의로 간주해 주시는 전가된 의라고 주장했다."}, {"id": "교회사-0322", "subject": "교회사", "section": "종교개혁사", "qnum": 14, "stem": "중세 후기의 스콜라신학을 \"영광의 신학\"이라고 비판하면서 루터가 강조한 신학적 방향성을 대표 하는 명칭은?", "choices": ["그리스도 신학", "십자가 신학", "겸손의 신학", "소망의 신학"], "answer": 2, "explanation": "루터는 초월적이며 피상적인 사변을 전개하는 스콜라신학을 \"영광의 신학' (Theologia Gloriae)이라고 비판하면서 바른 신학은 그리스도의 구속의 은혜를 증거하는 \"십자가 신학' (Theologia Crucie)이어야 한다고 주장했다."}, {"id": "교회사-0323", "subject": "교회사", "section": "종교개혁사", "qnum": 15, "stem": "1520년 \"주여 일어나소서\"(Exsurge Dei)라는 교령으로 루터를 파문하려 했던 교황은?", "choices": ["바울 3세", "e 레오 10세", "아드리안 6세", "율리우스 2세"], "answer": 2, "explanation": "교황 레오 10세는 교령을 발표하여 루터의 이단성을 지적하고 파문을 위협했다. 루터는 교황청이 자신에게 보낸 교령을 비텐베 르크에서 학생들이 보는 앞에서 불태워버린 것으로 알려져 있다."}, {"id": "교회사-0324", "subject": "교회사", "section": "종교개혁사", "qnum": 16, "stem": "루터가 1521년 참석해 황제 앞에서 자신의 주장과 저술들을 철회하지 않을 것이라고 담대하게 선언했던 제국 회의는?", "choices": ["보름스 회의", "@ 하이델베르크 회의", "라이프치히 회의", "레겐스부르크 회의"], "answer": 1, "explanation": "루터는 황제에게 소환된 1521년 보름스 제국회의에서 자신의 주장을 철회하라는 위협에 굴하지 않고 하나님의 도움을 구하는 담대한 자세를 보여주었다."}, {"id": "교회사-0325", "subject": "교회사", "section": "종교개혁사", "qnum": 17, "stem": "1525년 루터와 에라스무스 사이에서 벌어진 신학적 논쟁은 이 두 사람뿐 아니라 인문주의와 종 교개혁이 각각 추구하던 개혁의 방향이 어떻게 다른지를 명확히 드러냈다. 이 두 사람이 벌인 논 쟁은 무엇에 대한 것이었는가?", "choices": ["삼위일체 하나님의 속성", "새로운 교회 제도의 형식", "성찬에 있어 그리스도의 임재 방식", "인간 의지의 자유 여부"], "answer": 4, "explanation": "1524년 에라스무스가 발표한 의지의 자유에 대하여\"에 대해 루터는 \"의지의 속박에 대하여'를 저술했다. 저술들의 제목이 보 여주듯이 이 두 사람의 논쟁은 인간 의지의 자유에 대한 것이었다."}, {"id": "교회사-0326", "subject": "교회사", "section": "종교개혁사", "qnum": 18, "stem": "다음 중 루터가 종교개혁을 추진하는 동안 직접 상대해야 했던 논쟁의 대상이 아닌 것은?", "choices": ["에라스무스의 자유의지 옹호론", "소키누스의 반삼위일체론", "츠빙글리의 성찬 기념설", "뮌처와 농민전쟁 세력"], "answer": 2, "explanation": "1546년 사망한 루터는 16세기 후반에서야 모습을 드러낸 소시누스의 반삼위일체론을 직접 상대하여 논쟁하지는 않았다."}, {"id": "교회사-0327", "subject": "교회사", "section": "종교개혁사", "qnum": 19, "stem": "스위스의 종교개혁자 츠빙글리의 생애에 대한 설명으로 합당한 것은?", "choices": ["1484년 스위스 빌트하우스에서 루터보다 먼저 출생했다.", "1516년 베른에서 에라스무스를 만나 지도를 받았다.", "1515년 글라루스 지역의 일반 사병으로 전쟁에 참전했다.", "1519년 취리히 대성당에서 강해설교를 시작하여 종교개혁에 본격적으로 착수했다."], "answer": 4, "explanation": "츠빙글리는 1484년 루터보다 2개월 가까이 늦게 출생했으며 바젤에서 에라스무스를 만났다. 그는 1515년 글라루스의 군종사제 로 전쟁에 참여했다."}, {"id": "교회사-0328", "subject": "교회사", "section": "종교개혁사", "qnum": 20, "stem": "다음 중 츠빙글리의 저작이 아닌 것은? 하나님의 말씀의 명료성과 확실성 ② 신앙의 주해", "choices": ["하나님의 말씀의 명료성과 확실성", "신앙의 주해", "청소년 교육", "신학총론"], "answer": 4, "explanation": "츠빙글리는 취리히 종교개혁의 확립을 위해 성경 교육과 관련한 여러 저술들을 남겼다. \"신학총론'은 종교개혁 신학의 주제들을 체계적으로 설명하기 위해 1521년 멜란히톤이 저술한 대표적인 작품이다."}, {"id": "교회사-0329", "subject": "교회사", "section": "종교개혁사", "qnum": 21, "stem": "다음 중 츠빙글리가 자신의 종교개혁 운동 과정에서 치열한 논쟁을 벌인 상대라고 볼 수 없는 인 물은?", "choices": ["마틴 루터", "요한 외콜람파디우스", "콘라드 그레벨", "펠릭스 만츠"], "answer": 2, "explanation": "츠빙글리는 종교개혁 과정에서 여러 대상들과 신학적 논쟁을 벌였다. 루터와는 성찬론을 놓고 논쟁했으며 재세례파인 그레벨과 만츠 등과도 치열한 논쟁을 벌였다. 외콜람파디우스는 바젤의 종교개혁자로서 츠빙글리와 의견 차이는 있었지만 치열한 논쟁을 벌였다고 말하기는 어렵다."}, {"id": "교회사-0330", "subject": "교회사", "section": "종교개혁사", "qnum": 22, "stem": "다음 중 츠빙글리의 신학적 강조점으로 보기 가장 어려운 주장은?", "choices": ["그리스도 중심의 신학", "교회와 국가의 엄격한 분리", "거짓 종교와 비교되는 참된 종교의 중요성", "하나님의 섭리 강조"], "answer": 2, "explanation": "츠빙글리는 종교개혁적 견지에서 그리스도의 의와 십자가의 은혜를 강조했다. 더불어 하나님의 섭리를 강조하여 취리히 시 전체 를 신앙 공동체로 삼아 개혁하려 했다. 교회와 국가의 분리는 취리히 종교개혁에 있어서 상당히 낯선 생각이다."}, {"id": "교회사-0331", "subject": "교회사", "section": "종교개혁사", "qnum": 23, "stem": "1529년 헤센의 제후 필립의 주선으로 루터와 츠빙글리가 모여 대화를 나누었으나 성찬 이해의 차이로 인해 결렬하고 말았던 회의는?", "choices": ["레겐스부르크 회의", "트렌트 회의", "마르부르크 회의", "보름스 회의"], "answer": 3, "explanation": "루터와 츠빙글리는 거의 대부분의 신학적 주제들에 있어서 같은 의견을 가졌다. 성례에 있어서도 로마 가톨릭의 7성례를 부인 하고 세례와 성찬만을 인정했으며 성찬이론에 있어서도 화체설을 강하게 비판했다. 그러나 성찬에서 그리스도의 몸이 어떻게 주 어지는가의 문제에 대해서는 다른 의견을 가지고 서로를 비난했다. 헤센의 필립이 정치적 목적으로 주선해 성사된 1529년 마르 부르크 회담에서 마침내 대면한 두 사람은 끝내 이 문제로 인해 서로를 비판하며 결별하고 말았다."}, {"id": "교회사-0332", "subject": "교회사", "section": "종교개혁사", "qnum": 24, "stem": "다음 중 성찬 이론에 있어 루터와 츠빙글리의 차이를 잘못 연결한 것은?", "choices": ["루터는 인성과 신성의 속성교류를 폭넓게 적용해 그리스도의 몸의 편재성을 인정했다.", "츠빙글리는 \"이것은 나의 몸이다\"라는 말씀을 떡의 실제적 변화로 이해했다.", "루터는 떡 위와 아래와 옆과 함께 그리스도의 몸이 실제로 임한다고 주장했다.", "츠빙글리는 성찬을 통한 공동체적 헌신과 결단을 강조했다."], "answer": 2, "explanation": "츠빙글리는 루터와 달리 \"이것은 나의 몸이다\"라는 마태복음 26:26을 떡의 실제적 변화라고 해석해서는 안 되며 상징적으로 해 석해야 한다고 주징했다."}, {"id": "교회사-0333", "subject": "교회사", "section": "종교개혁사", "qnum": 25, "stem": "루터와 츠빙글리가 함께 공통적으로 거절했던 로마 가톨릭의 잘못된 성찬 이론에 속하지 않는 것은?", "choices": ["화체설", "@ 일종성찬", "7성례", "실재적 임재"], "answer": 4, "explanation": "루터와 츠빙글리는 로마 가톨릭의 화체설과 일종성찬, 그리고 7성례를 함께 비판하고 거절했다. 그러나 성찬에서 그리스도의 몸 이 실재로 임재하는가 여부에 있어서는 상반된 입장을 가졌다. 루터는 실재적 임재를 인정한 반면 츠빙글리는 이를 우상숭배의 잔재라고 강하게 비판했다."}, {"id": "교회사-0334", "subject": "교회사", "section": "종교개혁사", "qnum": 26, "stem": "종교개혁 시대 루터파와 개혁파 진영이 화합하지 못했던 치열한 논쟁점과 가장 거리가 먼 주제는 다음 중 무엇인가?", "choices": ["성찬의 참된 의미", "교황의 수위권", "칭의와 성화의 관계", "율법과 복음의 연속성"], "answer": 2, "explanation": "루터파 진영과 개혁파 진영은 루터와 츠빙글리가 세상을 떠난 이후에도 서로 다른 의견들로 인해 화합을 이루지 못했다. 성찬론 의 차이뿐 아니라 구약 율법에 대한 이해의 차이와 칭의 이후 성화의 신학적 의미에 대한 이해의 차이도 발생했다. 교황 수위권 에 대해서는 두 진영 함께 강하게 반대했다."}, {"id": "교회사-0335", "subject": "교회사", "section": "종교개혁사", "qnum": 27, "stem": "다음 중 스위스의 종교개혁자 하인리히 불링거에 대한 설명으로 바르지 않은 것은? ® 취리히에서 츠빙글리의 후계자로 활동했다.", "choices": ["취리히에서 츠빙글리의 후계자로 활동했다.", "1504년 스위스 아르가우에서 출생했다.", "성찬론의 합의를 위해 루터파와 긴밀하게 협력했다.", "제2스위스 신앙고백 작성을 주도했다."], "answer": 3, "explanation": "하인리히 불링거는 츠빙글리가 카펠 전투에서 전사한 후 그의 후계자로 취리히 교회와 독일어권 스위스 종교개혁의 지도자로 활 동했다. 그는 츠빙글리보다는 유연한 입장을 취했지만 성찬론에 있어서는 루터파와 차별되는 츠빙글리의 입장을 고수하려 했다. 스위스 개혁파 진영에서 16세기 중반 이후 루터파와 개혁파의 상반된 성찬론의 화합을 위해 노력한 것은 불링거라기보다는 제 네바의 칼빈이라고 할 수 있다."}, {"id": "교회사-0336", "subject": "교회사", "section": "종교개혁사", "qnum": 28, "stem": "취리히의 개혁자 불링거와 제네바의 개혁자 칼빈이 성찬 이론에서 합의를 이루어 1549년 발표한 문서는?", "choices": ["취리히 합의문", "로잔 합의문", "제네바 합의문", "베른 합의문", "거의 합의를 통해 나타난 것이 1529년 취리히 합의서이다."], "answer": 1, "explanation": null}, {"id": "교회사-0337", "subject": "교회사", "section": "종교개혁사", "qnum": 29, "stem": "다음 중 종교개혁자 마틴 부씨가 참여하여 로마 가톨릭 진영과 신학적 논의를 벌인 회의가 아닌 것은?", "choices": ["아우크스부르크 회의", "레겐스부르크 회의", "보름스 회의", "하게나우 회의"], "answer": 1, "explanation": "스트라스부르크의 종교개혁자 마틴 부써는 루터파와 츠빙글리파 사이의 대화를 위해 노력했을 뿐 아니라 1540년대에는 종교개 혁 진영과 로마 가톨릭 진영 사이의 대화를 위해서도 노력했다. 그 결과 보름스와 하게나우, 그리고 레겐스부르크에서 신학적 대화가 개최되었지만 실제적인 화합과 같은 성과를 거두지는 못했다."}, {"id": "교회사-0338", "subject": "교회사", "section": "종교개혁사", "qnum": 30, "stem": "스위스의 개혁파와 독일의 루터파 사이의 성찬 이론으로 인한 갈등을 극복하기 위해 마틴 부써가 주도하여 1530년 작성한 신앙고백서는?", "choices": ["테트라폴리탄 신앙고백", "아우크스부르크 신앙고백", "토르가우 신앙고백", "하이델베르크 신앙고백"], "answer": 1, "explanation": "1529년 마르부르크 회담이 결렬된 이후에도 부써는 루터파와 츠빙글리파 사이에서 성찬론의 일치를 위해 노력했다. 그러나 성 찬론 논쟁을 해결하기 위해 부와 그의 동역자 카피토가 1534년 작성해 황제 칼 5세에게 제출한 새로운 신앙고백서는 스트라 스부르크 신앙고백 혹은 슈바벤 신앙고백이라고 불리며, 부써의 노력에도 불구하고 스트라스부르크와 콘스탄츠, 메밍엔, 린다우 네 개 도시에서만 채택되어 \"네 도시 신앙고백'(Tetrapolitan Confession)으로 불린다."}, {"id": "교회사-0339", "subject": "교회사", "section": "종교개혁사", "qnum": 31, "stem": "1549년 잉글랜드로 망명한 부써가 국가 차원의 종교개혁을 위해 1550년 에드워드 6세에게 헌정 한 책의 제목은?", "choices": ["그리스도의 왕국에 관하여", "참된 목회에 관하여", "신학총론", "거룩한 보편적 교회"], "answer": 1, "explanation": "슈말칼트 전쟁에서 루터파가 패배한 후 스트라스부르크의 종교개혁도 중단되고 마틴 부써 역시 추방당했다. 잉글랜드의 크랜머 는 부써를 초대해 캠브리지 대학의 흠정 교수직을 마련해 주었고 부써는 그의 말년을 잉글랜드 종교개혁을 위해 헌신했다. 특히 부써는 1550년 \"그리스도의 왕국에 대하여'를 저술해 에드워드 6세에게 헌정했다. 부써는 이 책에서 국가 차원에서의 종교개혁 의 원리와 구체적 실현 방안을 제안했다."}, {"id": "교회사-0340", "subject": "교회사", "section": "종교개혁사", "qnum": 32, "stem": "16세기 종교개혁 시대 당시 종교를 비판하고 성경적인 교회를 회복하는 과정에서 성경 이외 일체 의 권위를 부정하고 세속 권세와의 극단적 분리를 주장했던 급진세력이 등장했다. 다음 중 이와 같은 의미에서의 급진개혁자라고 보기 어려운 인물은?", "choices": ["토마스 뮌처", "미카엘 자틀러", "카스파르 슈펭크펠트", "멜키오르 호프만"], "answer": 3, "explanation": "16세기 종교개혁 상황에서 신학과 신앙생활, 그리고 대사회적 대처에 관련해 과격한 입장을 주장한 급진세력이 나타났다. 한때 루터와 동역했던 토마스 뮌처는 당시의 군주들에 맞서 농민반란을 이끌었으며, 자틀러와 호프만은 신앙의 영역과 세속의 영역의 분리를 주장한 재세례파였다. 슈펭크펠트는 신학적으로는 급진적인 주장을 펼쳤지만 신앙과 세속의 삶을 분리해야 한다고 주장 하지는 않았다."}, {"id": "교회사-0341", "subject": "교회사", "section": "종교개혁사", "qnum": 33, "stem": "16세기 종교개혁 시대 삼위일체 교리 역시 잘못된 로마 가톨릭 종교의 산물이라고 비판했던 반삼 위일체론자들이 등장했다. 다음 중 반삼위일체론자에 속하는 인물은?", "choices": ["세르베투스", "페에르 카롤리", "메노 시몬스", "기욤 파렐"], "answer": 1, "explanation": "스페인 출신 의사였던 세르베투스(1509-1553)는 3세기 기독교 공인을 타락의 기원으로 생각했고 이때 확립된 삼위일체론도 거 부했던 대표적인 반삼위일체론자였다."}, {"id": "교회사-0342", "subject": "교회사", "section": "종교개혁사", "qnum": 34, "stem": "다음 중 재세례파의 주장과 가장 거리가 먼 것은? 구약의 할례는 복음으로 인해 완전히 폐지되었다. 엄격한 권징을 시행하여 교회의 순수성을 확보할 수 있다.", "choices": ["구약의 할례는 복음으로 인해 완전히 폐지되었다.", "엄격한 권징을 시행하여 교회의 순수성을 확보할 수 있다.", "세속의 검과 영적인 검은 절대로 함께 할 수 없다.", "성경은 체계를 갖춘 신학적 관점에서 해석되어야 한다."], "answer": 4, "explanation": "재세례파는 철저한 권징의 실행을 통한 공동체의 영적 수준 유지를 추구했으며 이와 더불어 성속의 엄격한 분리를 주장했다. 이 들은 로마 가톨릭이 조장해 놓은 각종 외형적 제도와 더불어 기독교 신학의 체계도 비판했기 때문에 체계적이고 일관된 성경해 석을 제시하지는 않았다."}, {"id": "교회사-0343", "subject": "교회사", "section": "종교개혁사", "qnum": 35, "stem": "1527년 스위스의 재세례파 운동 중 작성된 문서로서 이들의 신앙적 입장과 공동체적 삶의 규율 을 명시한 문서는 무엇인가?", "choices": ["로잔 신조", "람베스 신조", "슐라이트하임 신조", "하게나우 신조"], "answer": 3, "explanation": "재세례파들은 체계적인 신학적 저술이나 신앙고백서를 만들지 않았다. 그러나 1527년 스위스의 도시 슐라이트하임에서 마이클 자틀러가 주도해 작성한 신조와 생활 규율은 이들의 사상과 신앙생활 방식을 잘 보여준다."}, {"id": "교회사-0344", "subject": "교회사", "section": "종교개혁사", "qnum": 36, "stem": "16세기 종교개혁 시대에 삼위일체론과 그리스도의 신성을 부정하고 윤리적 신앙을 주장했던 이탈 리아 출신 사상가들의 주장으로부터 시작하여 이후 폴란드를 중심으로 확산된 분파는?", "choices": ["알미니우스파", "소시누스파", "재세례파", "왈도파"], "answer": 2, "explanation": "소시누스파는 이탈리아 출신의 기독교 사상가 파우스토 소치니의 영향을 받아 16세기와 17세기 폴란드 형제단들이 발전시킨 기 독교 분파이다. 이들은 삼위일체론을 거절했으며 그리스도의 신성을 부인했다."}, {"id": "교회사-0345", "subject": "교회사", "section": "종교개혁사", "qnum": 37, "stem": "재세례파의 영향을 받은 레이든의 존이 주도한 종말론적 운동을 통해 도시 전체가 새예루살렘이 되었음을 선포하고 반사회적이며 폭력적 정치 운동을 전개했으나 1535년 진압된 곳은?", "choices": ["엠든", "뮌스터", "마스트리히트", "투르네"], "answer": 2, "explanation": "1530년대 뮌스터에서 벌어져 1535년 무력으로 진압된 천년왕국 건설의 과격한 시도는 이후 재세례파가 세속 정부의 박해를 받게 된 중요한 역사적 원인이 되었다."}, {"id": "교회사-0346", "subject": "교회사", "section": "종교개혁사", "qnum": 38, "stem": "다음 중 재세례파로 볼 수 없는 인물은?", "choices": ["발타자르 후브마이어", "자콥 후터", "울리히 폰 후텐", "한스 템크"], "answer": 3, "explanation": "울리히 폰 후텐은 1488년 태어난 독일의 학자로서 16세기 초 로마 가톨릭과 루터파 진영 사이에 대화를 추구하다가 결국 루터 를 지지하고 종교개혁에 참여한 인물이다. 그는 종교개혁을 위한 무력 사용을 주장했고 기사들의 반란을 옹호했다."}, {"id": "교회사-0347", "subject": "교회사", "section": "종교개혁사", "qnum": 39, "stem": "칼빈이 직접 만나 교제했던 개혁자가 아닌 인물은?", "choices": ["루터", "부써", "멜란히톤", "파렐"], "answer": 1, "explanation": "칼빈은 루터를 직접 만난 적이 없었다."}, {"id": "교회사-0348", "subject": "교회사", "section": "종교개혁사", "qnum": 40, "stem": "다음 중 칼빈이 종교개혁을 위한 활동 중 방문했던 곳이 아닌 도시는? ( 제네바 ② 스트라스부르크 ③ 바젤 ④ 비텐베르크", "choices": ["제네바", "스트라스부르크", "바젤", "비텐베르크"], "answer": 4, "explanation": "칼빈은 종교개혁 활동으로 인해 프랑스에서 추방된 이후 여러 도시들을 거치며 도피생활을 했으며 스트라스부르크 체류 중에는 독일 여러 도시들을 방문해 종교회의에 참석하기도 했다. 그러나 비텐베르크를 방문한 적은 없었다."}, {"id": "교회사-0349", "subject": "교회사", "section": "종교개혁사", "qnum": 41, "stem": "다음 중 칼빈의 주요 저작인 \"기독교강요\"에 대한 바른 설명만을 묶은 것은? 가. 1536년 바젤에서 처음 출판되었다. 나. 라틴어로 먼저 출판된 후 불어로 번역 출판되었다. 다. 종교개혁 시대 나타난 최초의 조직신학적 저술이다. 라. 프랑스 국왕에게 헌정되었다. 마. 1559년 라틴어 최종판은 전체 3권으로 구성되었다.", "choices": ["가, 다, 마", "@ 가, 나, 라", "나, 다, 라", "나, 라, 마"], "answer": 2, "explanation": "칼빈의 \"기독교강요\"는 그가 제네바에 정착하기 전 1536년 바젤에서 처음 라틴어로 출판되었으며 이후 여러 차례 증보되었고 1539년 라틴어 증보판은 1541년 불어로 번역되어 출판되었다. 칼빈은 \"기독교강요\" 초판을 프랑스 왕 프랑수아 1세에게 헌정했다."}, {"id": "교회사-0350", "subject": "교회사", "section": "종교개혁사", "qnum": 42, "stem": "다음 중 제네바에서 칼빈과 동역했던 개혁자가 아닌 인물은?", "choices": ["피에르 비레", "기욤 파렐", "테오도르 베자", "볼프강 카피토"], "answer": 4, "explanation": "제네바의 종교개혁은 칼빈 혼자만의 업적이 아니었다. 그를 처음 초청한 파렐과 동역자 비레와 후계자 베자가 칼빈과 함께 동역 했다. 카피토는 스트라스부르크에서 부써와 함께 칼빈을 지도했던 종교개혁자였다."}, {"id": "교회사-0351", "subject": "교회사", "section": "종교개혁사", "qnum": 43, "stem": "다음 중 제네바의 종교개혁을 위해 칼빈과 그의 동료 개혁자들이 시의회에 제출했던 문서에 해당 하지 않는 것은?", "choices": ["기독교강요", "교회법령", "신앙교육서", "신앙고백서"], "answer": 1, "explanation": "칼빈은 1536년 제네바에 정착한 후 개혁의 확립을 위해 동료들과 함께 신앙고백서와 신앙교육서를 작성해 이 문서들을 시의회 에 제출했다. 1541년 스트라스부르크에서 돌아왔을 때에도 교회법령을 제출하여 개혁의 실천을 도모했다. \"기독교강요\"는 가장 처음 프랑스 왕 프랑수아 1세에게 헌정되었으며 이후에도 제네바 시의회에 제출한 문서는 아니었다."}, {"id": "교회사-0352", "subject": "교회사", "section": "종교개혁사", "qnum": 44, "stem": "1537년 칼빈이 제네바에서 추방된 기간에 제네바 시민들에게 서신을 보내 종교개혁을 중단하고 로마 가톨릭으로 돌아올 것을 촉구했던 로마 가톨릭 추기경은?", "choices": ["콘타리니", "사돌레토", "테첼", "에크"], "answer": 2, "explanation": "1538년 부활절 직후 칼빈과 파렐이 제네바에서 추방된 이후 이탈리아 출신의 추기경 자콥 사돌레토(1477-1547)는 1539년 제 네바 시민들에게 서신을 보내 종교개혁을 중단하고 로마 가톨릭으로 돌아올 것을 회유했다."}, {"id": "교회사-0353", "subject": "교회사", "section": "종교개혁사", "qnum": 45, "stem": "다음 중 칼빈이 제네바에서 사역하는 동안 그가 겪었던 난관에 속하지 않는 것은?", "choices": ["시의회 지도자들과의 정치적 갈등", "반삼위일체주의자들과의 신학적 논쟁", "성찬문제로 인한 루터파와의 논쟁", "교황제도 폐지를 둘러싼 개혁파 진영 내의 논쟁"], "answer": 4, "explanation": "1541년 제네바 시민들의 요청으로 복귀한 칼빈은 이후에도 수많은 난관들과 도전에 직면해야 했다. 특히 그를 복귀시킨 제네바 시의회와의 갈등이 심했다. 신학적 입장 차이로 인한 루터파와의 갈등과 급진세력과의 갈등도 심각했다. 교황제 폐지에 대해 서는 대부분의 종교개혁자들이 동의하고 있었기 때문에 이 문제와 관련한 개혁파 진영 내에 큰 논쟁은 없었다."}, {"id": "교회사-0354", "subject": "교회사", "section": "종교개혁사", "qnum": 46, "stem": "다음 중 성찬이론에 있어 칼빈의 신학적 입장이라고 볼 수 있는 주장은? 그리스도의 몸은 떡 위에, 아래, 옆에, 함께 임한다.", "choices": ["그리스도의 몸은 떡 위에, 아래, 옆에, 함께 임한다.", "성찬은 다만 그리스도의 죽음을 기념하고 헌신을 결단하기 위한 성례이다.", "그리스도의 모든 몸을 먹을 필요가 없으므로 포도주는 나누어 주지 않을 수 있다.", "성령께서 신자들의 마음을 들어 올려 그리스도의 몸을 참으로 누리게 하신다."], "answer": 4, "explanation": "칼빈은 그의 성찬론에서 루터와 츠빙글리를 뛰어넘는 성경에 충실하며 신학적으로 정교한 이론을 제시했다. 그는 떡과 포도주에 그리스도의 몸을 임재시키려 한 루터의 성찬론과 참여하는 신자들의 기억 속에만 임재시키려 한 츠빙글리의 기념설의 한계를 모 두 지적하고 성령의 역사에 의해 신자들이 그리스도를 참으로 향유한다는 이론을 제시했다."}, {"id": "교회사-0355", "subject": "교회사", "section": "종교개혁사", "qnum": 47, "stem": "다음 중 칭의론에 있어 칼빈의 신학적 입장으로 보기 어려운 주장은?", "choices": ["인간의 선행의 공로는 칭의된 이후 신자의 구원을 위한 추가적 의를 더한다.", "칭의는 오직 그리스도의 공로의 전가만으로 가능하다.", "칭의에 있어 믿음은 하나님께서 주시는 선물이다.", "성령께서 신자와 그리스도를 연합시키심으로 그리스도의 의가 전가된다."], "answer": 1, "explanation": "칼빈은 루터와 동일하게 이신칭의 교리를 주장했다. 따라서 신자의 선행이 구원을 위한 추가적 의가 된다는 생각을 완강히 반대 했다. 칼빈의 주장에 따르면 신자의 행위는 그 자체로는 공로가 없지만 하나님께서 의롭고 선하게 여겨주심으로 인해 인정을 받 을 수 있으며 하나님께 쓰임을 받는다. 즉 신자의 신분과 같이 신자의 선한 행위 역시 오직 하나님의 의롭게 여겨주시는 칭의의 은혜로만 선하다는 평가를 받을 수 있다."}, {"id": "교회사-0356", "subject": "교회사", "section": "종교개혁사", "qnum": 48, "stem": "삼위일체 교리를 부인하고 그리스도의 신성을 인정하지 않았던 인물로서 1553년 제네바로 들어 왔다가 발각되어 체포된 후 화형 당한 스페인 출신의 급진적 사상가는?", "choices": ["카스텔리오", "세르베투스", "카롤리", "블라드라타"], "answer": 2, "explanation": "스페인 출신의 의사이며 종교 사상가인 세르베투스는 그의 반삼위일체적 사상으로 인해 로마 가톨릭에 체포되어 이단 혐의로 사 형선고를 받은 후 제네바로 도주했다. 그러나 제네바에서 체포되어 자신의 입장을 굽히지 않다가 결국 화형을 당했다."}, {"id": "교회사-0357", "subject": "교회사", "section": "종교개혁사", "qnum": 49, "stem": "칼빈이 1536년 출간한 \"기독교강요\" 초판을 헌정했던 인물은?", "choices": ["에드워드 6세", "칼 5세", "프랑수아 1세", "헨리 8세"], "answer": 2, "explanation": "1536년 바젤에서 출판된 칼빈의 '기독교강요\" 초판은 프랑스 왕 프랑수아 1세에게 헌정되었다. 칼빈은 프랑수아가 1547년 사 망한 이후 발표한 \"기독교강요* 증보판에서도 이 헌정사를 바꾸지 않았다."}, {"id": "교회사-0358", "subject": "교회사", "section": "종교개혁사", "qnum": 50, "stem": "다음 중 \"기독교강요\"의 성격과 가장 부합하지 않는 것은?", "choices": ["바른 경건을 위한 지침을 담았다.", "구원을 위해 필수적으로 알아야 할 내용을 설명하려 했다.", "성경을 가장 중요한 설명과 증명의 근거로 삼았다.", "종교개혁 신학의 모든 이론적 주제들을 총망라하려 했다."], "answer": 4, "explanation": "\"기독교강요\"는 경건을 위한 지침서이며 구원을 위한 중요 내용을 설명한 해설서이고, 성경을 가장 중요한 근거로 삼았다. 그러 나 종교개혁 신학의 모든 내용을 체계적으로 총망라한 \"대전'(Gumma)은 아니었다."}, {"id": "교회사-0359", "subject": "교회사", "section": "종교개혁사", "qnum": 51, "stem": "다음 중 \"기독교강요\"에서 독립된 장에서 논의한 주제에 해당하지 않는 것은?", "choices": ["하나님을 아는 지식의 필요성", "교회와 국가의 바람직한 관계", "로마 가톨릭의 성례 비판", "교회의 선교적 책임과 수행 방법"], "answer": 4, "explanation": "\"기독교강요\"는 개혁 신학의 중요한 요점들에 집중한다. \"기독교강요에 교회의 선교적 책임에 대한 언급은 나타나지만 이 주제 가 당시 종교개혁에 있어 뚜렷이 부각된 논쟁적 주제는 아니었기 때문에 독립적인 논의로 다루어지지는 않았다."}, {"id": "교회사-0360", "subject": "교회사", "section": "종교개혁사", "qnum": 52, "stem": "칼빈이 제네바에서 시도했던 교회 설립 방안 가운데 제시한 교회의 네 가지 통상적 직분에 포함 되지 않는 것은?", "choices": ["사도", "목사", "장로", "교사"], "answer": 1, "explanation": "칼빈은 스트라스부르크 체류 기간 교회 직분에 대한 이해를 발전시켜 1541년 제네바로 복귀한 후 \"교회법령\"에서 교회의 통상 적 직분으로서 목사, 교사(신학교수), 장로, 집사 이상 네 직분을 명시했다. 그는 사도 직분을 초대교회에 특별히 설립되어 종료 된 특별한 임시직분이라고 생각했다."}, {"id": "교회사-0361", "subject": "교회사", "section": "종교개혁사", "qnum": 53, "stem": "칼빈이 제네바에서 시도했던 교회 개혁의 과제에 해당하지 않는 것은? 성경적 교회 제도의 확립 ② 스위스 전국에 걸친 총회 수립", "choices": ["성경적 교회 제도의 확립", "스위스 전국에 걸친 총회 수립", "빈번한 성찬의 시행", "빈민 구제 기관 설립"], "answer": 2, "explanation": "칼빈은 제네바에서 성경의 진리에 따른 구체적인 개혁을 시도했다. 이는 교회 제도 개혁에만 국한되지 않고 다양한 사회적 개혁 도 포함했다. 그러나 스위스 전국에 걸친 총회의 수립은 시도되지 않았다. 무엇보다 스위스는 다양한 언어와 역사와 문화를 가 진 여러 도시들의 연방 국가였기 때문에 전국적 총회 구성에는 어려움이 컸다."}, {"id": "교회사-0362", "subject": "교회사", "section": "종교개혁사", "qnum": 54, "stem": "칼빈이 \"기독교강요\"에서 바람직한 정치 체제로 추천했던 제도는?", "choices": ["절대왕정제도", "민주적 귀족제도", "대중 민주제도", "국가사회제도"], "answer": 2, "explanation": "본래 법학자였던 칼빈은 \"기독교강요 (1559) 4권 20장에서 여러 정치제도를 언급하면서 \"민주적인 귀족제도\"를 추천한다. 그러 나 그에게 가장 중요한 것은 그리스도의 왕권을 교회뿐 아니라 사회에서도 구현하는 신앙적 과제였다."}, {"id": "교회사-0363", "subject": "교회사", "section": "종교개혁사", "qnum": 55, "stem": "다음 중 칼빈이 말한 \"교회 권징\"의 목적에 해당하는 것만을 묶은 것은? 가. 범죄한 사람에게 회개를 촉구함 나. 교회 안에서 그리스도의 영예를 보존함 다. 기독교 사회의 평화와 안정을 도모함 라. 전도와 교회의 성장의 장애를 예방함 마. 교인들 사이에 범죄의 재발을 방지함", "choices": ["나, 다, 라", "가, 나, 마", "나, 라, 마", "@ 가, 나, 라"], "answer": 3, "explanation": "칼빈은 \"기독교강요 (1559) 4권 12장에서 권징의 세 가지 목적을 제시했다. 칼빈은 권징을 교회의 영적인 권세에 속한다고 보 았기 때문에 그 목적으로 사회적 안정 등을 말하지는 않았다. 또 교회를 위한 권징의 유익을 말하면서도 그 가운데 전도와 교회 의 성장을 위한 권징의 효과를 언급하지는 않았다."}, {"id": "교회사-0364", "subject": "교회사", "section": "종교개혁사", "qnum": 56, "stem": "다음 중 \"기독교강요\"(1559) 제3권에서 칼빈이 그리스도인의 중생한 삶의 방식으로서 제시하지 않은 것은 무엇인가?", "choices": ["자기 부인", "내면적 영성 계발", "십자가를 지는 삶", "내세에 대한 묵상"], "answer": 2, "explanation": "칼빈은 \"기독교강요 (1559) 제3권 6장부터 10장에서 그리스도인들의 중생한 삶에 대해 설명했다. 그는 여기에서 \"자기부인'과 \"십자가를 지는 삶 , 내세에 대한 묵상'을 가장 중요한 그리스도인의 삶의 원리로 제시했다."}, {"id": "교회사-0365", "subject": "교회사", "section": "종교개혁사", "qnum": 57, "stem": "다음 중 1550년대 성찬 이론의 차이로 인해 칼빈과 치열한 논쟁을 벌인 루터파 신학자는 누구인 가?", "choices": ["오시안더", "칼슈타트", "베스트팔", "켐니츠"], "answer": 3, "explanation": "1550년대 루터파 신학자 요아킴 베스트팔은 칼빈과 성찬론을 둘러싼 치열한 논쟁을 벌였다. 멜란히톤은 루터의 후계자였음에도 불구하고 성찬 등의 신학적 주제에서 칼빈의 입장을 지지했기 때문에 루터파 내에서 배척을 당했다."}, {"id": "교회사-0366", "subject": "교회사", "section": "종교개혁사", "qnum": 58, "stem": "다음 중 칼빈의 뒤를 이어 제네바 목사회를 대표했던 베자에 대한 설명으로 합당하지 않은 것은?", "choices": ["프랑스의 귀족 가문 출신이었다.", "칼빈의 뒤를 이어 두 번째로 제네바 아카데미의 학장이 되었다.", "프랑스의 개신교도인 위그노들에게 큰 영향을 주었다.", "철학적 논증 방법을 활용해 예정론을 논증했다."], "answer": 2, "explanation": "테오도르 베자(1519-1605)는 칼빈의 뒤를 이어 제네바 목사회를 이끌었던 개혁자로서 1559년 제네바 아카데미의 초대 학장으 로 취임했다. 그는 이후 이 아카데미를 중심으로 발전한 개혁파 정통주의의 초석을 놓은 가장 중요한 신학자였으며 프랑스의 개 신교인인 위그노를 이끌었던 지도자였기도 하다."}, {"id": "교회사-0367", "subject": "교회사", "section": "종교개혁사", "qnum": 59, "stem": "1534년 국왕이 그 국가의 교회의 수장임을 주장한 \"수장령\"을 발표해 잉글랜드의 종교개혁을 일 으킨 인물은 누구인가?", "choices": ["헨리 8세", "찰스 2세", "제임스 1세", "윌리엄 3세"], "answer": 1, "explanation": "1509년 즉위한 헨리 8세는 처음에는 로마 가톨릭 신앙을 지지했으나 자신의 결혼무효 소송으로 인해 교황청과 결별한 후 1534 년 \"수장령'을 발표해 잉글랜드 교회의 독립을 선언했다."}, {"id": "교회사-0368", "subject": "교회사", "section": "종교개혁사", "qnum": 60, "stem": "다음 중 잉글랜드의 종교개혁을 위해 활동하다가 화형당한 인물이 아닌 사람은?", "choices": ["토마스 크랜머", "? 존 피셔", "니콜라스 리들리", "휴 라티머"], "answer": 2, "explanation": "잉글랜드 종교개혁 과정에서 로마 가톨릭을 복구한 메리 여왕 통치기에 많은 개혁자들이 화형을 당했다. 존 피셔는 로마 가톨릭 신앙을 지지하고 헨리 8세의 결혼 무효 주장을 반대한 추기경으로서 1535년 반역죄로 처형당했다."}, {"id": "교회사-0369", "subject": "교회사", "section": "종교개혁사", "qnum": 61, "stem": "다음 중 잉글랜드 최초의 개신교 캔터베리 대주교인 크랜머가 잉글랜드의 종교개혁을 추진하던 시기에 대륙에서 잉글랜드에 들어와 활동했던 개혁자가 아닌 사람은?", "choices": ["마틴 부써", "피터 마터 버미글리", "요한 아 라스코", "필립 멜란히톤"], "answer": 4, "explanation": "개신교인으로서 1533년 최초로 캔터베리 대주교에 취임한 토마스 크랜머는 에드워드 6세 치하에서 유능한 대륙의 개혁자들을 영입하여 잉글랜드의 종교개혁을 정착시키고자 했다. 그러나 멜란히톤은 끝내 영입하지 못했다."}, {"id": "교회사-0370", "subject": "교회사", "section": "종교개혁사", "qnum": 62, "stem": "에드워드 6세 재위 시기 잉글랜드의 실질적인 종교개혁을 위해 크랜머가 부써를 비롯한 개혁자들 의 도움을 받아 1552년 개정해 전국에 보급했던 문서는?", "choices": ["39개조", "공동기도서", "교회법령", "신앙교육서"], "answer": 2, "explanation": "크랜머는 에드워드 6세 치하인 1552년 부써 등 대륙의 종교개혁자들의 조언을 받아 좀 더 종교개혁적 기준에 따른 새로운 예 배의 형식과 설교 내용을 담아 \"공동기도서\"를 개정해 전국 교회에 보급했다."}, {"id": "교회사-0371", "subject": "교회사", "section": "종교개혁사", "qnum": 63, "stem": "1494년 잉글랜드 글루스터에서 태어난 인물로서 신구약 성경을 영어로 번역했으며 1536년 이단 혐의로 체포되어 화형 당했으나 이후 여러 영어번역 성경과 잉글랜드 종교개혁에 큰 영향을 끼친 개혁자는?", "choices": ["존 브래드포드", "e 매튜 파커", "윌리엄 틴데일", "토마스 카트라이트"], "answer": 3, "explanation": "글루스터 출신의 학자 윌리엄 데일은 잉글랜드 종교개혁의 초석을 놓은 인물로서 특히 영어 성경번역에 크게 기여했다."}, {"id": "교회사-0372", "subject": "교회사", "section": "종교개혁사", "qnum": 64, "stem": "다음 중 독일과 스위스를 중심으로 유럽 대륙에서 발생한 종교개혁과 비교할 때 잉글랜드 종교개 혁이 보여주는 특징으로 보기 어려운 것은? 세속 집권자가 종교개혁 정책을 주도했다.", "choices": ["세속 집권자가 종교개혁 정책을 주도했다.", "제도적 변화보다 신학적 근본 확립에 초점을 맞추었다.", "특정 도시나 지역에 국한되지 않고 전국에 걸쳐 시행되었다.", "왕권의 강화를 위한 정치적 목적에 큰 영향을 받았다."], "answer": 2, "explanation": "잉글랜드의 종교개혁은 무엇보다 국왕이 정치적 목적에 따라 착수한 국가주도형 개혁이라는 점이 특징적이다. 개혁은 전국적으 로 진행되었으며 정치적 상황에 큰 영향을 받았다. 따라서 신학적 기초보다는 외형적 변화가 먼저 중시된 특징을 보여주었다."}, {"id": "교회사-0373", "subject": "교회사", "section": "종교개혁사", "qnum": 65, "stem": "다음 중 엘리자베스 여왕이 즉위한 이후 군주가 교회를 관리 감독하려는 정책에 맞서 교회의 독 립성을 주장하는 청교도들 사이에 발생한 대표적인 논쟁은 무엇인가?", "choices": ["이신칭의 논쟁", "성복 논쟁", "성찬 논쟁", "예정론 논쟁"], "answer": 2, "explanation": "엘리자베스는 왕권 강화를 위해 종교 정책을 결정했고 그에 따라 일관된 예배 형식의 확립과 목사 임명권의 확보를 원했다. 이 에 반발한 청교도들은 여왕이 요구한 성직자 복장을 거부했다. 여왕은 성직복을 입지 않을 경우 면직하겠다고 위협했다. 이 논 쟁을 \"성복 논쟁\"(vestments controversy)이라고 부른다."}, {"id": "교회사-0374", "subject": "교회사", "section": "종교개혁사", "qnum": 66, "stem": "다음 중 스코틀랜드 종교개혁 초기에 개혁을 위한 운동을 시도한 인물이 아닌 사람은?", "choices": ["존 녹스", "패트리 해밀턴", "커트버스 턴스톨", "조지 위샤트"], "answer": 3, "explanation": "스코틀랜드 종교개혁은 패트릭 해밀턴(1504-1528)과 조지 위샤트(1513-1546)의 순교로부터 비롯되었다. 녹스는 스승 위샤트 의 설교에 감화를 받고 고국의 종교개혁을 위해 헌신했다. 턴스톰은 잉글랜드 더럼의 주교로서 녹스가 뉴캐슬에서 사역할 때 그 의 사역을 방해했던 친로마 가톨릭적 인물이다."}, {"id": "교회사-0375", "subject": "교회사", "section": "종교개혁사", "qnum": 67, "stem": "다음은 스코틀랜드 신앙고백의 일부분이다. 빈칸에 들어갈 용어가 알맞게 짝지어진 것은? 우리는 하나님께서 ( ) 이후 그리스도 예수께서 육으로 오실 때까지 모든 시대에 걸쳐, 그의 ( )을(롤) 보존하시며, 가르치시며, 성장케 하시며, 명예롭게 하시며, 영광스럽게 하시고 죽음으로부터 생명으로 불러내셨 음을 확실히 믿는다.", "choices": ["아담 - 백성", "아담 - 교회", "아브라함 - 자녀", "아브라함 - 나라"], "answer": 2, "explanation": "스코틀랜드 신앙고백은 5장에서 교회가 아담으로부터 시작되었다고 말하고 교회의 역사를 재림 때까지의 구원역사 가운데서 설 명하려 했다."}, {"id": "교회사-0376", "subject": "교회사", "section": "종교개혁사", "qnum": 68, "stem": "녹스는 잉글랜드 교회가 1552년 공동기도서를 개정할 때 우상숭배적인 요소를 강하게 비판함으 로써 출판 직후 성찬 시행과 관련한 주석을 첨부하게 했다. 녹스가 잉글랜드에서 사역하던 시기 전후 튜더 왕실의 군주를 즉위 순서대로 바르게 연결한 것은? 헨리 8세 - 에드워드 6세 - 메리 여왕 - 엘리자베스 1세", "choices": ["헨리 8세 - 에드워드 6세 - 메리 여왕 - 엘리자베스 1세", "헨리 8세 - 메리 여왕 - 에드워드 6세 - 엘리자베스 1세", "헨리 8세 - 메리 여왕 - 엘리자베스 1세 - 에드워드 6세", "헨리 8세 - 에드워드 6세 - 엘리자베스 1세 - 메리 여왕"], "answer": 1, "explanation": "녹스가 사역할 당시 잉글랜드는 튜더 왕실이 통치하고 있었다. 헨리 8세는 5번 이혼하고 6번 결혼했는데 복잡한 가정생활 속에 서 세 명의 자녀를 두었다. 막내인 에드워드 6세가 가장 먼저 10살의 나이로 1547년 즉위했고 이어서 첫째 딸 메리가 1553 년 즉위하여 1558년까지 통치했다. 이어서 둘째 딸 엘리자베스가 1558년 즉위하여 1603년까지 통치했다."}, {"id": "교회사-0377", "subject": "교회사", "section": "종교개혁사", "qnum": 69, "stem": "스코틀랜드의 종교개혁을 위해 개혁자들이 작성한 제1치리서에 포함된 내용이 아닌 것은?", "choices": ["각 교구의 목사 청빙 절차", "철저한 권징의 시행", "전국적인 학교의 설립", "교회 재정에 대한 국가의 관여 금지"], "answer": 4, "explanation": "스코틀랜드의 종교개혁을 확립하기 위해 개혁자들이 작성해 의회에 제출한 \"제1치리서\"에는 교회의 개혁방안뿐 아니라 사회적 개혁안도 포함되어 있었다. 이 가운데에는 기존 로마 가톨릭이 소유했던 재정을 국가가 환수하여 새롭게 배분하는 제안도 포함 되어 있었다."}, {"id": "교회사-0378", "subject": "교회사", "section": "종교개혁사", "qnum": 70, "stem": "존 녹스가 종교개혁 과정에서 직접 맞서야 했던 로마 가톨릭 통치자가 아닌 인물은? @ 메리 스튜어트 ② 메리 기즈", "choices": ["메리 스튜어트", "메리 기즈", "메리 튜더", "프랑수아 1세"], "answer": 4, "explanation": "녹스는 피난 중 여러 국가를 거치면서 그곳의 로마 가톨릭 군주들에 대한 비판적 글을 남겼다. 프랑스의 국왕 프랑수아 1세는 1547년 세상을 떠났기 때문에 녹스가 직접 상대하거나 비판하지는 않았다. 녹스는 프랑수아 1세의 아들 앙리와 그의 왕비 캐 더린 메디치를 비판했다."}, {"id": "교회사-0379", "subject": "교회사", "section": "종교개혁사", "qnum": 71, "stem": "다음 중 존 녹스가 목회자로서 사역했던 도시가 아닌 곳은?", "choices": ["잉글랜드 뉴캐슬", "독일 프랑크푸르트", "스위스 제네바", "스코틀랜드 아버딘"], "answer": 4, "explanation": "녹스는 긴 피난 기간 동안 잉글랜드와 프랑스, 스위스, 독일 등 여러 국가의 여러 도시에서 사역했다. 스코틀랜드에서는 에딘버 러와 세인트앤드루스에서 사역했다. 아버딘은 잠시 방문한 적은 있었을 수 있지만 공식적으로 교회를 맡아 사역하지는 않았다."}, {"id": "교회사-0380", "subject": "교회사", "section": "종교개혁사", "qnum": 72, "stem": "1545년 스코틀랜드 몬트로스 출신의 개혁자로서 제2치리서를 통해 스코틀랜드의 종교개혁이 확 립되는 데 크게 기여한 인물은? • 사무엘 러더포드 앤드류 멜빌", "choices": ["사무엘 러더포드", "앤드류 멜빌", "존 윈람", "리처드 반나타인"], "answer": 2, "explanation": "앤드류 멜빌(1545-1622)은 존 녹스의 뒤를 이어 활동했다. 그는 특히 제2치리서를 제정하여 장로교제도에 입각한 스코틀랜드 의 종교개혁 확립에 중요한 역할을 담당했다."}, {"id": "교회사-0381", "subject": "교회사", "section": "종교개혁사", "qnum": 73, "stem": "다음 중 종교개혁에 맞서 로마 가톨릭의 신학적 입장을 분명히 확립하고 행정적 개선을 이루기 위해 1545년 처음으로 소집된 회의는? J 라테란 회의 ② 트렌트 회의 ③ 피사 회의 ④ 볼로냐 회의", "choices": ["라테란 회의", "트렌트 회의", "피사 회의", "볼로냐 회의"], "answer": 2, "explanation": "교황은 정치적 상황을 엿보다가 1545년 이탈리아 북부 알프스 근처의 작은 도시 트렌트에서 공의회를 개최했다. 이 회의는 정 치적 상황에 따라 정회와 속회를 반복하면서 1563년까지 계속되었다."}, {"id": "교회사-0382", "subject": "교회사", "section": "종교개혁사", "qnum": 74, "stem": "다음 중 트렌트 회의에서 결정된 교령의 내용이라고 보기 어려운 주장은?", "choices": ["라틴어 번역 성경인 벌게이트가 교회의 가르침과 경건을 위한 표준판이다.", "성경과 교회의 전통이 신앙과 신학에 있어 동등한 권위를 갖는다.", "외경 역시 성령으로 영감된 하나님의 계시이다.", "오직 교회만 성경의 참된 의미를 해석할 수 있는 권위를 갖는다. 교회 전통이 가장 권위 있는 기준으로 인정되었으며 성경에 대한 사적 해석이 금지되고 라틴어 벌게이트 성경의 권위가 승인되 었다. 외경 역시 참고할 수 있는 권위 있는 기준으로 인정되었으나 외경을 계시된 정경으로 인정하지는 않았다."], "answer": 3, "explanation": null}, {"id": "교회사-0383", "subject": "교회사", "section": "종교개혁사", "qnum": 75, "stem": "다음 중 트렌트 회의에서 확정된 로마 가톨릭의 구원 교리에 해당하는 주장은?", "choices": ["오직 그리스도의 의의 전가나 죄의 사항만으로 죄인이 의롭게 된다.", "중생하고 칭의된 사람은 자신이 예정된 사람들 가운데 포함되었음을 확신할 수 있다.", "세례와 성찬만이 그리스도께서 친히 제정하신 합법적인 성례이다.", "그리스도의 의는 하나님의 심판대 앞에 설 때까지 계속 주입되어 내재된 의를 돕는다."], "answer": 4, "explanation": "로마 가톨릭의 트렌트 회의는 종교개혁 신학을 전면 거부하고 기존의 로마 가톨릭 신앙을 확인하고 보존했다. 이신칭의 교리와 관련해서는 이신징의 교리가 가르친 예수 그리스도의 의의 전가를 부인하고 그리스도의 의의 주입을 통한 내재된 의의 성장을 주장했다."}, {"id": "교회사-0384", "subject": "교회사", "section": "종교개혁사", "qnum": 76, "stem": "15세기 활동했던 스페인의 추기경으로서 이사벨라 여왕을 도와 로마 가톨릭의 개선을 주도하고 원어 성경을 편찬하기까지 했던 인물은?", "choices": ["세르반테스", "로욜라", "히메네즈", "페트라르카"], "answer": 3, "explanation": "스페인이 16세기 종교개혁의 영향을 받지 않은 가장 큰 이유 중 하나는 강력한 통치자였던 이사벨라 여왕을 도와 스페인의 로마 가톨릭을 개선한 추기경 프란시스코 히메네즈 데 시스네로스(재위 1495-1517)가 일정 정도 개선의 성공을 거두었기 때문이다."}, {"id": "교회사-0385", "subject": "교회사", "section": "종교개혁사", "qnum": 77, "stem": "다음 중 로욜라가 창시한 예수회의 가르침과 가장 거리가 먼 주장은?", "choices": ["모든 개인적 판단을 내려놓고 우리의 어머니인 교회의 위계질서에 즉각 복종해야 한다.", "교회의 모든 가르침을 기리고 그 교훈들에 절대 복종해야 한다.", "잘못된 성인 숭배와 성물 숭배를 성경을 통해 분별하여 참된 예배를 드려야 한다.", "사제에게 드리는 고해성사와 자주 드리는 미사를 칭송해야 한다."], "answer": 3, "explanation": "이그나티우스 로욜라가 창시한 예수회는 군사적 체계를 따라 상급자에 대한 철저한 순종을 규율로 삼았고 그 최종 대상은 로마 교황이었다. 로욜라가 쓴 \"영성훈련\"은 훈련의 규칙 가운데 이 점을 명시했다. 성인 숭배와 성물 숭배는 교황의 명령에 의해 가 능하다고 보았다."}, {"id": "교회사-0386", "subject": "교회사", "section": "종교개혁사", "qnum": 78, "stem": "슈말칼트 전쟁에서 승리한 황제 칼 5세가 1548년 5월 루터파 진영에게 로마 가톨릭 신앙으로의 복귀를 요구하기 위해 명령한 방안은?", "choices": ["아우크스부르크 잠정안", "라이프치히 잠정안", "베스트팔렌 조약", "보름스 협정"], "answer": 1, "explanation": "황제 칼 5세는 종교개혁을 지지하던 제후들을 무력으로 제압한 후 교황청의 최종 결정이 있을 때까지 예배 의식과 주교 제도의 회복을 요구하기 위해 개신교 제후들에게 아우크스부르크 잠정안을 명령했다."}, {"id": "교회사-0387", "subject": "교회사", "section": "종교개혁사", "qnum": 79, "stem": "슈말칼트 전쟁에서 패배한 후 로마 가톨릭으로의 복귀를 요구한 황제의 요구에 맞서는 과정에서 루터파 내의 엄격주의자들과 온건주의자들에게서 발생한 논쟁을 부르는 명칭은?", "choices": ["아디아포라 논쟁", "성복 논쟁", "필리오케 논쟁", "흑주 논쟁"], "answer": 1, "explanation": "1547년 슈말칼트 전쟁에서 승리한 이후 황제 칼 5세가 요구한 로마 가톨릭으로의 복귀 명령에 의해 루터파 진영 내에서 분열 이 발생했다. 엄격한 루터파 지도자들은 세세한 사안까지 개혁의 대의를 지켜야 한다고 주장한 반면 온건한 입장을 가진 이들은 본질이 아닌 주변적인 문제, 즉 아디아포라 건에 있어서는 타협이 가능하다고 주장했다. 이 두 진영 사이의 논쟁은 후대에 \"아 디아포라 논쟁이라고 불린다."}, {"id": "교회사-0388", "subject": "교회사", "section": "종교개혁사", "qnum": 80, "stem": "다음 중 멜란히톤에 대한 설명으로 바르지 않은 것은? 1521년 \"신학총론\"을 발표하여 종교개혁 신학을 체계적으로 정리해 제시했다.", "choices": ["1521년 \"신학총론\"을 발표하여 종교개혁 신학을 체계적으로 정리해 제시했다.", "비텐베르크에서 헬라어 교수로 사역했다.", "칼빈을 비롯한 스위스 개혁파 신학자들과 치열하게 신학적으로 대립했다.", "마틴 부써와 함께 마르부르크 회의에 참여했다."], "answer": 3, "explanation": "비텐베르크 대학에서 루터와 동역했으며 루터 사망 이후 루터파의 지도자가 된 필립 멜란히톤(1497-1560)은 1521년 \"신학총 론\"을 저술하여 종교개혁 신학을 체계적으로 설명했을 뿐 아니라 마틴 부써나 칼빈과 함께 종교개혁 진영의 화합을 위해서 노력 했다. 칼빈과 모든 주제에서 의견이 같은 것은 아니었지만 두 사람은 루터와 츠빙글리의 경우와 같이 서로를 비난하면서 치열한 신학적 논쟁을 전개하지는 않았다."}, {"id": "교회사-0389", "subject": "교회사", "section": "종교개혁사", "qnum": 81, "stem": "복음과 율법의 구별을 너무 강하게 주장하다가 모든 율법이 완전히 폐기되었다는 율법폐기론을 주장함으로써 루터파 내에서 멜란히톤 등과 논쟁을 일으킨 인물은?", "choices": ["요한 아그리콜라", "안드레아스 칼슈타트", "카스파르 메간더", "안드레아스 오시안더"], "answer": 1, "explanation": "루터파 종교개혁 초기 아그리콜라는 이신칭의 교리를 과격하게 적용하여 믿음으로 칭의된 이후 모든 율법이 폐기되었고 더 이상 선행은 필요가 없다는 주장을 펼침으로써 그리스도인의 선한 삶을 강조하려 했던 멜란히톤과 신학적 논쟁을 벌였다."}, {"id": "교회사-0390", "subject": "교회사", "section": "종교개혁사", "qnum": 82, "stem": "다음은 1530년 제국회의에 제출된 루터파의 아우크스부르크 신앙고백의 일부분이다. 빈칸에 들어 갈 말은? 주의 성찬을 행할 때, 즉 떡과 포도주를 나눌 때, 우리는 떡과 포도주의 형태 아래 그리스도의 실제의 몸과 피가 ( ) 임재한다고 우리는 가르친다. 따라서 우리는 이에 반대되는 교리를 배격한다.", "choices": ["영적으로", "육화되어", "실제로", "유비적으로"], "answer": 3, "explanation": "1530년 황제에게 제출하기 위해 멜란히톤이 주도하여 작성한 아우크스부르크 신앙고백은 이후 루터파의 표준적 신앙고백으로 활용되었다. 이 고백은 성찬론에 있어서 그리스도의 몸이 성찬에 실제로 임재(real presence)한다고 고백했다."}, {"id": "교회사-0391", "subject": "교회사", "section": "종교개혁사", "qnum": 83, "stem": "16세기 후반 독일의 루터파 내에서 발생한 신학적 논쟁과 종교개혁의 방향에 대한 입장 차이를 종결하기 위해 1577년 제정된 문서는?", "choices": ["일치 신조", "슈말칼트 신조", "램버스 신조", "슐라이트하임 신조"], "answer": 1, "explanation": "16세기 후반 루터 사망 이후 루터파 내의 엄수파와 온건파 사이에서 발생한 신학적 논쟁을 해결하기 위해 루터교회의 지도자들 이 회합하여 1577년 일치신조(Formula of Concord)를 작성했다. 이 신조는 대부분 엄수파의 입장을 반영했다."}, {"id": "교회사-0392", "subject": "교회사", "section": "종교개혁사", "qnum": 84, "stem": "1572년 8월 앙리 부르봉의 결혼식에 참석하기 위해 파리에 집결한 프랑스 위그노 대표자들이 많 이 학살을 당함으로써 위그노들의 정치적 영향력이 크게 약화되었던 사건은?", "choices": ["바시 학살사건", "성 바돌로뮤 축일 학살사건", "성 패트리 축일 학살사건", "앙부아즈 학살 사건"], "answer": 2, "explanation": "1572년 8월 23일 밤 성 바돌로뮤 축일 앙리 부르봉과 발루아 왕실의 공주 마가렛의 정략 결혼을 축하하기 위해 집결한 위그 노 지도자들은 로마 가톨릭 기즈 가문의 주도하에 집단 학살을 당했다. 이후 위그노의 세력은 크게 약화되었고 개혁파 종교개혁 의 흐름도 많이 변경될 수밖에 없었다."}, {"id": "교회사-0393", "subject": "교회사", "section": "종교개혁사", "qnum": 85, "stem": "앙리 2세의 왕비로서 남편의 급작스러운 죽음 이후 왕이 된 어린 아들 대신 설정을 하면서 프랑 스의 종교개혁을 억압했던 인물은?", "choices": ["캐더린 드 메디치", "메리 기즈", "쟌 달브레", "루이 드 로레인"], "answer": 1, "explanation": "캐더린 메디치는 앙리 2세의 왕비로서 남편의 갑작스러운 죽음 이후 어린 아들들의 배후에서 섭정하며 개신교 진영을 억압했다."}, {"id": "교회사-0394", "subject": "교회사", "section": "종교개혁사", "qnum": 86, "stem": "프랑스의 개신교도인 위그노들의 예배의 자유를 허락하기 위해 앙리 4세가 1598년 발표한 칙령 은?", "choices": ["샤토브리앙 칙령", "생 제르맹 칙령", "낭트 칙령", "퐁텐블로 칙령"], "answer": 3, "explanation": "부르봉 왕실에 속한 앙리 4세는 여러 차례 개종과 번복을 반복했지만 프랑스 왕으로 즉위한 후 1598년에 낭트 칙령을 발표하 여 파리를 제외한 전국에 위그노들이 드리는 예배의 자유를 허용했다."}, {"id": "교회사-0395", "subject": "교회사", "section": "종교개혁사", "qnum": 87, "stem": "다음 중 개혁파 진영에서 발표한 신앙고백이 아닌 것은?", "choices": ["제2 바젤 신앙고백", "벨기에 신앙고백", "스코틀랜드 신앙고백", "슈말칼트 신앙고백"], "answer": 4, "explanation": "16세기 종교개혁 시대 개혁파 진영에서는 여러 국가의 상황에 맞추어 다양한 신앙고백서들이 나타났다. 슈말칼트 신앙고백은 루 터파에서 발표된 문서이다."}, {"id": "교회사-0396", "subject": "교회사", "section": "종교개혁사", "qnum": 88, "stem": "1561년 벨기에 신앙고백을 작성했으며 1561년 체포되어 이단 혐의로 처형당한 개혁자는?", "choices": ["기 드 브레", "잔 달브레", "아드리안 드 사라비아", "레오 유트"], "answer": 1, "explanation": "1561년 작성된 벨기에 신앙고백은 프랑스어를 사용하는 왈룬 지방 출신 기 드 브레에 의해 불어와 라틴어로 작성되었다. 그러 나 이후 벨기에 신앙고백은 별도의 표준문서를 작성하지 않았던 네덜란드 개혁교회가 17세기에 자신들의 표준문서로 채택했다"}, {"id": "교회사-0397", "subject": "교회사", "section": "종교개혁사", "qnum": 89, "stem": "다음은 벨기에 신앙고백의 일부이다. 빈칸에 공통적으로 들어갈 알맞은 말은 무엇인가? 2 )은(는) 모든 공로를 가지신 예수 그리스도를 받아들여 소유하며 그분 밖에는 아무것도 구하지 않는다. 왜냐하면 우리의 구원을 위하여 필요한 모든 것이 예수 그리스도 안에 있는지 혹은 없든지 간에 ( 통하여 예수 그리스도를 소유한 사람은 그분 안에서 완전한 구원을 당연히 얻을 수 있기 때문이다. )을(를) 호", "choices": ["선행", "신앙", "칭의", "성화"], "answer": 2, "explanation": "벨기에 신앙고백은 다른 종교개혁 시대 발표된 문서들과 마찬가지로 이신칭의를 강조한다. 그러나 이신칭의의 강조점은 신앙 자체가 아니라 신앙이 붙잡는 유일한 대상이며 내용인 예수 그리스도이다."}, {"id": "교회사-0398", "subject": "교회사", "section": "종교개혁사", "qnum": 90, "stem": "다음 중 16세기 후반 자신이 활동하던 독어권 지역의 종교개혁 신학을 명확히 설명하기 위해 불 링거가 주도하여 1566년 작성한 문서는?", "choices": ["제1바젤 신앙고백서", "제2스위스 신앙고백서", "하이델베르크 요리문답서", "슐라이트하임 신조"], "answer": 2, "explanation": "취리히의 개혁자 하인리히 불링거는 1566년 제2스위스 신앙고백서를 작성하여 독일어권 스위스 개혁파 교회의 신학적 입장을"}, {"id": "교회사-0399", "subject": "교회사", "section": "종교개혁사", "qnum": 91, "stem": "다음 중 하이델베르크 요리문답 작성에 참여한 인물로 볼 수 없는 사람은?", "choices": ["자카리아스 우르시누스", "선제후 프리드리히 3세", "카스파르 올레비아누스", "틸레만 헤수시우스"], "answer": 4, "explanation": "팔츠의 제후 프리드리히 3세는 성찬론을 중심으로 발생한 신학적 논쟁과 관련해 개혁파 신학자들을 시켜 새로운 교리교육서를 문답서 형식으로 작성해 채택했다. 이 하이델베르크 요리문답 작성에는 우르시누스와 올레비아누스를 비롯해 선제후 프리드리히 도 참여했다. 헤수시우스는 이들과 달리 루터파의 입장에서 성찬론을 강하게 주했던 신학자이다."}, {"id": "교회사-0400", "subject": "교회사", "section": "종교개혁사", "qnum": 92, "stem": "다음 중 하이델베르크 요리문답에 대한 설명으로 올바른 것만을 묶은 것은? 가. 독일 헤센 지역에서 작성되었다. 나. 1563년 하이델베르크에서 벌어진 성찬 논쟁이 계기가 되었다. 다. 전체 129개의 문답으로 이루어졌다. 라. 성찬 교리에 있어서는 루터파의 입장을 충실히 따랐다.", "choices": ["가, 나", "가, 다", "나, 다", "나, 라"], "answer": 3, "explanation": "하이델베르크 요리문답은 1563년에 팔츠의 수도였던 하이델베르크에서 개혁파의 신학적 입장을 확립하고 가르치기 위한 목적으 로 작성되었으며 총 129의 문답으로 구성되어 있다. 성찬 이론은 칼빈의 입장을 따랐다."}, {"id": "교회사-0401", "subject": "교회사", "section": "종교개혁사", "qnum": 93, "stem": "다음 중 1559년 사상 최초로 전국 차원에서 열린 개혁교회의 총회에서 공식적으로 채택된 신앙 고백은 무엇인가?", "choices": ["벨기에 신앙고백", "프랑스 신앙고백", "스코틀랜드 신앙고백", "웨스트민스터 신앙고백"], "answer": 1, "explanation": "역사상 최초로 전국적 차원의 개혁교회 총회는 1559년 5월 파리에서 개최되었다. 프랑스의 개혁교회 대표들은 이 총회에서 프 랑스 신앙고백을 표준 신앙고백으로 채택했다."}, {"id": "교회사-0402", "subject": "교회사", "section": "종교개혁사", "qnum": 94, "stem": "다음 중 종교개혁을 억압했던 16세기 유럽의 군주들과 그들이 통치했던 국가를 바르게 연결한 것 은?", "choices": ["앙리 2세 - 스페인", "메리 튜더 - 네덜란드", "칼 5세 - 잉글랜드", "메리 스튜어트 - 스코틀랜드"], "answer": 4, "explanation": "16세기 종교개혁 시대 각국의 군주들이 종교개혁자들을 억압했다. 앙리 2세는 프랑스의 군주였으며 메리 튜더는 잉글랜드의 군 주였다. 칼 5세는 스페인의 왕이었으며 독일의 황제였다. 메리 스튜어트는 스코틀랜드의 통치자였다."}, {"id": "교회사-0403", "subject": "교회사", "section": "종교개혁사", "qnum": 95, "stem": "다음 중 종교개혁자들과 그들이 작성한 대표적인 문서를 잘못 연결한 것은?", "choices": ["루터 - 하이델베르크 논제", "츠빙글리 - 67개조", "칼빈 - 제네바 요리문답", "녹스 - 국민언약"], "answer": 4, "explanation": "국민언약은 1581년 존 크레그에 의해 작성되었으며 1638년 알렉산더 핸더슨 등 국교회 정책에 맞섰던 스코틀랜드의 언약도들 에 의해서 최종 확정되었다."}, {"id": "교회사-0404", "subject": "교회사", "section": "종교개혁사", "qnum": 96, "stem": "16세기 종교개혁에서 나타난 여러 전통들과 그 개혁자들을 바르게 연결한 것은?", "choices": ["루터파 - 피에르 비레", "재세례파 - 토마스 크랜머", "개혁파 - 오스왈드 미코니우스", "국교회파 - 마티아스 플라키우스"], "answer": 3, "explanation": "피에르 비레는 칼빈과 동역했던 스위스 개혁파의 개혁자이다. 토마스 크랜머는 튜더 왕조 통치기 잉글랜드 국교회파의 개혁자이 다. 미코니우스는 칼빈과 동시대 외콜람파디우스를 뒤이어 바젤에서 활동했던 개혁파 신학자이다. 플라키우스는 루터 엄수파를 대표하는 신학자이다."}, {"id": "교회사-0405", "subject": "교회사", "section": "종교개혁사", "qnum": 97, "stem": "다음 중 종교개혁 시대 개혁파 진영에서 출현한 신앙고백서와 교리교육서를 작성 순서대로 바르 게 연결한 것은?", "choices": ["프랑스 신앙고백 벨기에 신앙고백- 스코틀랜드 신앙고백 - 하이델베르크 요리문답", "스코틀랜드 신앙고백 - 프랑스 신앙고백 - 하이델베르크 요리문답 - 벨기에 신앙고백", "프랑스 신앙고백- 스코틀랜드 신앙고백 - 벨기에 신앙고백 - 하이델베르크 요리문답", "④스코틀랜드 신앙고백- 하이델베르크 요리문답 프랑스 신앙고백 - 벨기에 신앙고백"], "answer": 3, "explanation": "각 문서의 작성 연도는 다음과 같다. 프랑스 신앙고백(1559), 스코틀랜드 신앙고백(1560), 벨기에 신앙고백(1561), 하이델베르 크 요리문답(1563)."}, {"id": "교회사-0406", "subject": "교회사", "section": "근현대교회사", "qnum": 1, "stem": "종교개혁의 과정에서 독일 각 지역 영주의 결정에 따라 로마 가톨릭과 루터파 사이에서 주민들의 종교를 결정하기로 한 1555년의 평화 조약은?", "choices": ["아우크스부르크 조약", "보름스 조약", "베스트팔렌 조약", "베르사이유 조약"], "answer": 1, "explanation": "1555년 독일의 제후들은 그동안의 군사적 충돌을 종식시키기 위해 각 지역별로 영주가 취한 신앙에 따라 그 지역 주민들의 신 앙이 확정되도록 하는 협약을 체결했다. 선택은 로마 가톨릭과 루터교 둘 중에서만 가능했으며 주민들이 영주의 신앙에 동의하 지 않는 경우 모든 재산과 권한을 포기하고 이주해야 했다."}, {"id": "교회사-0407", "subject": "교회사", "section": "근현대교회사", "qnum": 2, "stem": "1648년 로마 가톨릭 진영과 루터파 진영 사이에 체결되어 30년 전쟁을 종결한 조약은?", "choices": ["보름스 조약", "아우크스부르크 조약", "뤼벡 조약", "베스트팔렌 조약"], "answer": 4, "explanation": "30년 전쟁을 종식시키기 위해 베스트팔렌 지역의 뮌스터에서 화해 조약이 체결되었다."}, {"id": "교회사-0408", "subject": "교회사", "section": "근현대교회사", "qnum": 3, "stem": "다음 중 30년 전쟁의 결과로 보기 가장 어려운 것은?", "choices": ["교회에 대한 세속권세의 지배력 강화", "종교적 대의에 대한 대중들의 무관심 증가", "사회 경제 구조 변화의 가속화", "황제의 권력 강화"], "answer": 4, "explanation": "30년 동안 독일 지역에서 벌어진 종교전쟁의 결과 교황의 권한은 크게 약화되었으며 대중들은 교회가 내세우는 신앙적 대의에 대한 회의감을 품게 되었다. 사회 경제의 구조도 크게 변화되었으며 독일 각 지역의 영주들의 권한이 강화되면서 황제의 지배력 은 약화되었다."}, {"id": "교회사-0409", "subject": "교회사", "section": "근현대교회사", "qnum": 4, "stem": "30년 전쟁은 당시 서유럽의 여러 국가들이 참전한 국제전의 양상을 띠었다. 다음 중 군대를 파병 하여 30년 전쟁에 직접 참전하지 않은 국가는?", "choices": ["스웨덴", "잉글랜드", "덴마크", "보헤미아"], "answer": 2, "explanation": "30년 전쟁은 프라하에서 일어난 폭동으로부터 시작되었으나 덴마크와 스웨덴을 포함하여 여러 주변 국가들이 참전하여 점차 국 제전의 양상으로 확대되었다. 독일 내 개신교 진영은 잉글랜드의 참전을 기대했으나 잉글랜드는 참전하지 않았다."}, {"id": "교회사-0410", "subject": "교회사", "section": "근현대교회사", "qnum": 5, "stem": "다음 중 16세기 종교개혁 시대와 그 이후 17세기 발생한 종교 전쟁과 그 전쟁이 발생한 국가를 바르게 연결한 것은?", "choices": ["독일 - 고이센 전쟁", "잉글랜드 - 30년 전쟁", "프랑스 - 위그노 전쟁", "네덜란드 - 청교도 전쟁"], "answer": 3, "explanation": "독일에서 벌어진 30년 전쟁 이외에도 17세기 초반에는 개신교 진영과 로마 가톨릭 진영의 종교 전쟁이 벌어졌다. 프랑스에서는 개신교인들을 부르는 명칭인 위그노를 상대로 로마 가톨릭 진영이 전쟁을 벌였다."}, {"id": "교회사-0411", "subject": "교회사", "section": "근현대교회사", "qnum": 6, "stem": "1559년 엘리자베스 1세가 잉글랜드의 종교정책의 일관성을 회복하기 위해 메리 여왕이 폐지한 공 동기도서의 재사용을 명령한 칙령은 무엇인가?", "choices": ["수장령", "통일령", "5마일령", "회복령"], "answer": 2, "explanation": "엘리자베스 1세는 왕권의 강화를 위해 교회의 문제를 국가가 관리하는 국교회 정책을 실시했다. 특히 1559년 공동기도서의 사 용을 강제하는 통일령을 발표하여 예배를 통제하려 함으로써 청교도들의 반발을 샀다."}, {"id": "교회사-0412", "subject": "교회사", "section": "근현대교회사", "qnum": 7, "stem": "다음 중 청교도들과 지속적인 갈등을 일으켰던 잉글랜드의 군주가 아닌 인물은?", "choices": ["제임스 1세", "찰스 1세", "에드워드 6세", "엘리자베스 1세"], "answer": 3, "explanation": "엘리자베스 1세와 이후 스튜어트 왕실의 군주들은 국교회 정책을 강력하게 추진함으로써 말씀을 중심으로 삼은 예배의 자유를 원했던 청교도들과 충돌했다. 에드워드 6세는 엘리자베스 1세의 남동생이지만 그 이전인 1547년부터 1553년까지 통치했었고 당시에는 로마 가톨릭을 억압하고 종교개혁을 확립하려는 정책을 시행했지만 청교도들은 아직 형성되지 않았었다."}, {"id": "교회사-0413", "subject": "교회사", "section": "근현대교회사", "qnum": 8, "stem": "다음 중 제임스 1세가 즉위하던 당시 청교도들이 국왕과 관련하여 발생한 종교적 사건에 속하는 것은?", "choices": ["천인의 청원", "웨스트민스터 회의", "장기의회", "엄숙동맹과 계약"], "answer": 1, "explanation": "1603년 엘리자베스 1세에 이어 잉글랜드 국왕으로 즉위한 제임스 1세는 본래 스코틀랜드 스튜어트 왕실의 제임스 6세였다. 그 가 부임하자 잉글랜드의 청교도들은 800여 명의 서명을 받아 청원서를 제출하여 스코틀랜드의 장로교회와 같은 교회의 독립적 운영과 예배의 자유를 요구했다. 그러나 제임스 1세는 \"천인의 청원'이라고 부르는 이 요구 사항을 대부분 거부했다."}, {"id": "교회사-0414", "subject": "교회사", "section": "근현대교회사", "qnum": 9, "stem": "엘리자베스 통치 기간 잉글랜드 국교회파의 신앙적 입장을 대표했던 신조는 무엇인가?", "choices": ["39개 신조", "퍼스 5개조", "67개조", "람베스 신조"], "answer": 1, "explanation": "에드워드 6세 통치기간에 제정된 42개 신조가 메리 여왕의 사망 이후 매튜 파커 주교가 소집한 회의에서 정리되어 39개 신조 (Thirty-Nine Articles)로 정리되었다. 39개조는 공동기도서와 더불어 엘리자베스 1세 통치기간 국교회의 강화를 위해 국교회의 신학적 기준을 제시하는 표준문서로 사용되었다."}, {"id": "교회사-0415", "subject": "교회사", "section": "근현대교회사", "qnum": 10, "stem": "잉글랜드 국교회의 공동기도서 사용 강요에 맞서 스코틀랜드의 장로교인들과 잉글랜드의 의회 사 이에서 1643년 체결된 동맹은?", "choices": ["국민계약", "엄숙동맹과 계약", "에딘버러 계약", "퍼스 계약"], "answer": 2, "explanation": "찰스 1세의 국교회 정책 및 왕권강화 정책에 맞서 잉글랜드 의회 지도자들과 스코틀랜드의 장로교 지도자들은 1643년 엄숙동 맹과 계약(Solern League and Covenant)을 체결하여 국왕에 맞섰다."}, {"id": "교회사-0416", "subject": "교회사", "section": "근현대교회사", "qnum": 11, "stem": "찰스 1세 치하에서 잉글랜드의 국교회 정책을 책임졌던 캔터베리 대주교로 청교도들을 철저하게 박해했으나 의회에서 유죄판결을 받고 1645년 처형된 인물은?", "choices": ["레지널드 폴", "매튜 파커", "리처드 밴크로프트", "윌리엄 로드"], "answer": 4, "explanation": "윌리엄 로드(iliam Laud, 1573-1645)는 찰스 1세 치하의 캔터베리 대주교로서 강력한 국교회 정책을 펼쳤고, 이를 거부하 는 청교도 목회자들을 면직하고 투옥하는 등 박해했다."}, {"id": "교회사-0417", "subject": "교회사", "section": "근현대교회사", "qnum": 12, "stem": "다음 중 잉글랜드에서 벌어진 청교도 전쟁에 대한 설명으로 바르지 못한 것은?", "choices": ["친로마 가톨릭 진영과 친개신교 진영 사이에 발생한 전쟁이다.", "왕당파는 왕권신수설을 주장하면서 의회파를 탄압했다.", "찰스 1세 통치 기간 중 발발했다.", "의회파는 대부분 청교도들로 구성되었다."], "answer": 1, "explanation": "청교도 전쟁은 1640년대 찰스 1세 통치기간 잉글랜드에서 발생한 종교전쟁으로, 국왕을 지지했던 세력은 표면적으로는 친로마 가톨릭은 아니었다. 찰스 1세의 왕비가 프랑스 공주로서 개인적인 미사를 드리고 있었지만 국왕파가 39개조를 통해 표방했던 국교회는 로마 가톨릭과 구별되는 개신교 신앙이었다."}, {"id": "교회사-0418", "subject": "교회사", "section": "근현대교회사", "qnum": 13, "stem": "청교도 전쟁에서 의회파가 승리하자 강경한 입장을 고수해 찰스 1세를 처형하고 의회의 권력을 장악한 후 스스로를 \"호국경\"이라 칭하며 강력한 종교적 독재를 시행했던 인물은?", "choices": ["존 휘트기프트", "존핌", "제임스 샤프", "올리버 크롬웰"], "answer": 4, "explanation": "잉글랜드 청교도 전쟁의 결과 강경파가 득세하여 찰스 1세를 반역죄로 처형하고 공화제를 시행했다. 의회 내 강경파를 이끌었던 올리버 크롬웰은 의회를 해산하고 스스로를 \"호국경\"(Lord Protecton)이라 칭하며 강력한 종교적 독재를 시행했다."}, {"id": "교회사-0419", "subject": "교회사", "section": "근현대교회사", "qnum": 14, "stem": "다음 중 잉글랜드 장로교주의를 창시한 청교도는?", "choices": ["토마스 카트라이트", "존 오웬", "토마스 굿윈", "리차스 백스터"], "answer": 1, "explanation": "토마스 카트라이트(Thomas Cartwright, 1535-1603)는 캠브리지 대학의 신학자로서 엘리자베스 1세 통치 기간에 잉글랜드 장로교주의를 창시하였다. 그는 엘리자베스의 국교회 정책을 반대하여 감독제도의 폐지와 국가에 의한 목사 임명을 반대했다. 오웬과 굿원과 백스터는 카트라이트보다 후대에 활동한 청교도들이다."}, {"id": "교회사-0420", "subject": "교회사", "section": "근현대교회사", "qnum": 15, "stem": "존 번연이 1678년 발표한 작품으로서 크리스천이라는 등장인물이 천국에 이르는 과정을 통해 청 교도들의 신앙의 삶의 여정을 묘사한 소설은?", "choices": ["천로역정", "유토피아", "실낙원", "완덕의 길"], "answer": 1, "explanation": "침례교도였던 존 번연은 불법 설교 및 예배 인도 혐의로 베드포드 감옥에 투옥되었다. 그는 복역 기간 중 \"천로역정\"(Pigrim Progress)을 작성하였으며, 감옥에 면회하였던 존 오웬에게 넘겨주어 오웬이 이 책을 번연의 이름으로 1678년에 출간하였다."}, {"id": "교회사-0421", "subject": "교회사", "section": "근현대교회사", "qnum": 16, "stem": "다음 중 청교도들과 그들이 저술한 작품을 바르게 연결하지 않은 것은?", "choices": ["존 번연 - 천로역정", "존 오웬 - 죄 죽임", "토마스 모어 - 유토피아", "존 밀턴 - 복락원"], "answer": 3, "explanation": "\"유토피아\"를 저술한 토마스 모어는 16세기 활동한 잉글랜드의 정치가로서 헨리 8세의 수장령을 반대하다가 처형당한 로마 가 톨릭 지지자였다. 그는 후에 로마 가톨릭에서 성자로 추대되었다."}, {"id": "교회사-0422", "subject": "교회사", "section": "근현대교회사", "qnum": 17, "stem": "1660년 잉글랜드의 공화정을 끝내고 왕정이 복구되었을 때 잉글랜드와 스코틀랜드 전체에 걸쳐 공동기도서 사용과 감독제도의 복원을 시도하여 청교도들과 스코틀랜드 장로교도들에게 큰 반발 을 일으킨 국왕은?", "choices": ["제임스 1세", "제임스 2세", "찰스 2세", "윌리엄 3세"], "answer": 3, "explanation": "올리버 크롬웰이 실시한 청교도적 독재제도는 결국 의회 지도자들뿐 아니라 국민들의 반발을 샀다. 스코틀랜드의 왕당파뿐 아니 라 장로교인들도 크롬웰의 정책을 반대했다. 그 결과 잉글랜드의 공화정은 실패로 끝났고 처형당한 찰스 1세의 아들 찰스 2서 가 프랑스에서 돌아와 왕정이 복구되었다. 그는 아버지의 정책을 이어받아 국교회 정책을 재개했기 때문에 청교도들의 큰 반발 을 샀다."}, {"id": "교회사-0423", "subject": "교회사", "section": "근현대교회사", "qnum": 18, "stem": "제임스 2세의 강력한 국교회 정책과 왕권의 강화 정책에 맞서 의회파가 반발하여 국왕을 폐위시 키고 입헌군주제를 시작한 1688년 발생한 혁명은?", "choices": ["청교도 혁명", "5월 혁명", "명예 혁명", "7월 혁명"], "answer": 3, "explanation": "1685년 왕위에 오른 제임스 2세는 아버지 찰스 1세와 형 찰스 2세와 같이 강력한 국교회 정책을 실시했으며 로마 가톨릭으 복구를 시도했다. 이에 국왕의 정책을 반대했던 개신교도 중심의 의회의 귀족들은 정치적 수완을 발휘해 1688년 제임스 2세의 딸 메리와 사위 윌리엄을 왕으로 추대하고 제임스 2세를 폐위시켰다. 이 정변은 무력이 동원하지 않은 의회의 혁명이었기 때문 에 명예 혁명(Glorious Revolution)이라고 불린다."}, {"id": "교회사-0424", "subject": "교회사", "section": "근현대교회사", "qnum": 19, "stem": "다음 중 웨스트민스터 회의에 대한 설명으로 부적합한 것은?", "choices": ["영국 내전 기간 동안 의회의 요청으로 소집되었다.", "스코틀랜드 장로교회의 대표자들도 참석했다.", "주로 국교회파와 장로교파 사이의 논쟁이 치열하게 벌어졌다.", "신앙고백서와 대소요리문답 등이 제정되었다."], "answer": 3, "explanation": "웨스트민스터 회의는 의회의 요청에 따라 1643년 영국 내전 상황에서 잉글랜드의 교회 지도자들이 소집했다. 잉글랜드와 스코 틀랜드의 동맹 이후 스코틀랜드 장로교회 지도자들도 이 회의에 참여했고 함께 신앙고백서와 요리문답 등 표준문서들을 제정했 다. 웨스트민스터 회의는 기본적으로 국교회에 대해서 반대했다. 따라서 회의에서 벌어진 교회제도 관련 논쟁은 주로 국교회주 의에 대한 대안으로서 장로교회 제도와 회중교회 제도 중 무엇을 선택할 것인가의 문제를 놓고 벌어졌다."}, {"id": "교회사-0425", "subject": "교회사", "section": "근현대교회사", "qnum": 20, "stem": "다음 중 웨스트민스터 회의에서 잉글랜드의 \"웨스트민스터 표준문서\"를 작성한 인물이 아닌 사람은?", "choices": ["윌리암 퍼킨스", "사무엘 러더포드", "조지 길레스피", "알렉산더 핸더슨"], "answer": 1, "explanation": "윌리암 퍼킨스는 초기 청교도로서 이 시기에 해당되지 않는다. 러더포드, 길레스피, 핸더슨은 스코틀랜드 장로교회를 대표하여 웨스트민스터에 파견된 인물들이었다."}, {"id": "교회사-0426", "subject": "교회사", "section": "근현대교회사", "qnum": 21, "stem": "웨스트민스터 회의가 신앙고백과 대소요리문답을 작성하는 과정에서 신학적 위험으로 간주해 대 처했던 사상과 가장 거리가 먼 것은?", "choices": ["알미니우스주의", "보편적 가설주의", "율법폐기론", "계몽주의"], "answer": 4, "explanation": "웨스트민스터 회의는 당시 잉글랜드를 위협했던 여러 잘못된 사상들을 경계했고 그 경계의 내용을 신앙고백서에 담았다. 계몽주 의는 17세기 잉글랜드에서 그 모습을 드러내지 않았으며 18세기에 들어서서 형성되어 전개된 근대 사상이다."}, {"id": "교회사-0427", "subject": "교회사", "section": "근현대교회사", "qnum": 22, "stem": "웨스트민스터 신앙고백은 구체적인 신학적 진술과 더불어 신학적 체계를 논리적으로 잘 반영한 완성도 높은 구조를 보여준 수준 높은 문서였다. 다음 중 이 신앙고백의 주요 주제들의 목차로 바른 것은? 하나님과 삼위일체- 창조 - 성경 - 하나님의 영원한 작정", "choices": ["하나님과 삼위일체- 창조 - 성경 - 하나님의 영원한 작정", "성경 - 하나님과 삼위일체- 하나님의 영원한 작정 - 창조", "성경- 창조 - 하나님과 삼위일체 - 하나님의 영원한 작정", "하나님과 삼위일체- 하나님의 영원한 작정- 성경- 창조"], "answer": 2, "explanation": "웨스트민스터 신앙고백의 체계와 진술은 신학적 논리 체계를 따라 구성되었으며 신학적으로도 높은 완성도를 보여준다. 웨스트 민스터 신앙고백은 가장 먼저 성경에 대해 다루고 이어서 삼위일체 교리, 하나님의 작정, 창조를 각 장에서 순서대로 다룬다."}, {"id": "교회사-0428", "subject": "교회사", "section": "근현대교회사", "qnum": 23, "stem": "다음은 웨스트민스터 신앙고백의 일부분이다. 빈칸에 들어갈 말이 바르게 짝지어진 것은? 마땅히 믿고 순종해야 할 성경의 권위는 어느 사람이나 ( )의 증거에 의거하지 아니하고 오직 진리 자체이시 며, 저자()이신 하나님에게 전적으로 의거한다. 따라서 성경은 ( )이므로 수납되어야 한다 교회 - 하나님의 말씀", "choices": ["교회 - 하나님의 말씀", "교부들 - 하나님의 말씀", "신학자 - 계시의 고백", "교황 - 계시의 고백"], "answer": 1, "explanation": "웨스트민스터 신앙고백 1장 4항은 성경의 권위에 대해 말하면서 성경은 하나님의 말씀이므로 교회의 증거에 의존하지 않는다고 진술한다."}, {"id": "교회사-0429", "subject": "교회사", "section": "근현대교회사", "qnum": 24, "stem": "다음은 웨스트민스터 신앙고백의 일부분이다. 빈칸에 들어갈 말이 바르게 짝지어진 것은? 인류의 나머지는 하나님이 그것에 의하여 긍휼을 베푸시든지, 않으시든지, 그가 기뻐하시는 대로 하시는 그 자신의 뜻의 헤아릴 수 없는 ( )에 따라 그의 피조물들 위에 가지시는 그의 주권적 권세의 ( 위하여 간과(폴)하시고, 그들을 그들의 죄 때문에 수욕과 진노를 당하게 정명(분)하시어, 그의 영광스러운 )를 찬송케 하시기를 기뻐하셨다.", "choices": ["섭리 - 예정 - 은혜", "도모- 영광 - 공의", "섭리 - 영광 - 은혜", "도모- 예정 - 공의"], "answer": 2, "explanation": "웨스트민스터 신앙고백 3장 7항은 하나님의 영원한 작정에 대해 진술한다. 하나님께서는 헤아릴 수 없는 섭리에 따라 그의 주 권적 영광을 위하여 택자들을 구원하시기로 예정하셔서 그의 영광스러운 공의를 찬송하게 하신다."}, {"id": "교회사-0430", "subject": "교회사", "section": "근현대교회사", "qnum": 3, "stem": "그들은 온 인류의 시조(3)이었으므로, 그들로부터 보통 생육법(소;)으로 출생(H)하는 그들의 모든 후손들에게 이 죄의 죄책이 ( )되었고, 또 동일한 죄에서의 죽음과 부패한 성질이 전하여졌다. ①원의- 전적으로 - 전가", "choices": ["원의- 전적으로 - 전가", "자유- 심각하게 - 유전", "원의 - 심각하게 - 전가", "자유 - 전적으로 - 유전"], "answer": 4, "explanation": "웨스트민스터 신앙고백 6장 2항과 3항은 원죄의 결과에 대해 진술한다. 원죄는 인간들의 원의를 상실하게 했으며 영혼뿐 아니 라 신체의 많은 부분을 전적으로 오염시켰다. 이 죄의 책임은 모든 후손에게 전가된다."}, {"id": "교회사-0431", "subject": "교회사", "section": "근현대교회사", "qnum": 26, "stem": "다음은 웨스트민스터 신앙고백이 말하는 하나님께서 사람과 맺으신 언약에 대한 설명으로 부적합 한 것은?", "choices": ["은혜언약은 성경에서 자주 유언이라는 이름으로 발표된다.", "최초의 언약은 인간의 순종을 조건으로 생명을 약속하신 행위언약이다.", "은혜언약은 율법시대와 복음시대에 동일하게 집행되었다.", "언약의 방법은 하나님께서 기뻐하신 자기 낮추심의 표현이었다."], "answer": 3, "explanation": "웨스트민스터 신앙고백은 전체적으로 개혁신학의 언약신학을 따른다. 특히 7장은 하나님의 언약에 대해 진술하는데 여기서 말하 는 언약은 크게 행위언약과 은혜언약으로 대별된다. 은혜언약은 전적으로 하나님께서 성취하시는 은혜의 약속이다. 그러나 신앙 고백은 5항에서 구약 율법시대와 신약 복음시대에 서로 다른 방식으로 집행되었다고 진술한다."}, {"id": "교회사-0432", "subject": "교회사", "section": "근현대교회사", "qnum": 27, "stem": "다음 중 웨스트민스터 신앙고백이 말하는 중보자 그리스도에 대한 설명으로 부적합한 것은? 주 예수는 그의 완전한 순종과 영원하신 영을 통하여 단번에 드리신 자기 제사에 의하여 그의 아버지의 공의를 충분히 만족시키셨다.", "choices": ["주 예수는 그의 완전한 순종과 영원하신 영을 통하여 단번에 드리신 자기 제사에 의하여 그의 아버지의 공의를 충분히 만족시키셨다.", "구속의 사역(15(0)은 그리스도께서 성육신하시기까지는 그에 의해 실제적으로 수행되지 않았다.", "그리스도는 중보의 사역에 있어서 오직 그의 인성에 따라서 행동하신다.", "그리스도께서는 구속을 매수하여 주신 모든 자들에게 확실하고 유효적으로 동일한 구속을 적용 하시며 전달하여 주신다."], "answer": 3, "explanation": "웨스트민스터 신앙고백은 중보자 그리스도께서 아버지의 공의를 충분히 만족시키셨으며 성육신하신 이후 실제적으로 수행되었고, 그의 구속은 구원받는 모든 사람들에게 확실하고 유효하게 동일한 구속을 적용한다고 고백한다. 그리고 8장 6항에서 그리스도는 그의 중보 사역에 있어 자신의 양성에 의해서 행동하신다고 진술한다."}, {"id": "교회사-0433", "subject": "교회사", "section": "근현대교회사", "qnum": 28, "stem": "다음은 웨스트민스터 신앙고백의 일부분이다. 빈칸에 들어갈 말이 바르게 짝지어진 것은? 이 유효 소명은 오직 하나님의 값 없으며 특별한 ( )에서 나오는 것이요. 결코 사람 안에 선견(#토)된 어떤 것에서 나오는 것이 아니다. 사람은 성령에 의해 살아나고 새로워져서 이 소명에 응답하며 또 이것에서 제공되고 전달된 은혜를 받아들이기 가능하게 되기까지는 이것에서 전적으로 ( >이다.", "choices": ["섭리 - 언약적", "은혜 - 수동적", "섭리 - 잠정적", "은혜 - 협력적"], "answer": 2, "explanation": "웨스트민스터 신앙고백 제10장은 유효 소명에 대해 진술한다. 구원하시기로 예정된 사람들을 부르시는 이 소명은 전적으로 하나 님의 은혜이다. 따라서 사람들은 이 소명을 수용함에 있어서 전적으로 수동적이다."}, {"id": " 했고 대규모의 조직신학 저술들도 나타났다. 그러나 신학적 내용에 있어서는 16세기 발표된 개신교 신 앙고백들의 주요 내용들을 고수했다."}, {"id": "교회사-0443", "subject": "교회사", "section": "근현대교회사", "qnum": 38, "stem": "도르트 신조의 배경이 된 네덜란드 개혁교회 내의 예정론 논쟁 가운데 다음 인물 중 다른 이들과 다른 입장을 취한 사람은?", "choices": ["알미니우스", "고마루스", "에피스코피우스", "코른헤르트"], "answer": 2, "explanation": "코른헤르트와 알미니우스와 에피스코피우스는 모두 벨기에 신앙고백이 진술하는 예정론에 문제를 제기했던 인물들이다. 고마루스 는 알미니우스에 맞서 칼빈주의적 예정론을 변호했던 레이든 대학의 신학자이다."}, {"id": "교회사-0444", "subject": "교회사", "section": "근현대교회사", "qnum": 39, "stem": "1618년 도르트레히트에서 모인 회의에 대한 설명으로 올바른 것은? T,U,Ll,P로 표현되는 다섯 장으로 이루어진 표준 신조를 채택했다.", "choices": ["T,U,Ll,P로 표현되는 다섯 장으로 이루어진 표준 신조를 채택했다.", "알미니우스의 주장을 수용한 항론파들의 참석을 불허했다.", "영국, 스위스, 프랑스의 개혁교회에서 파견된 대표자들도 참석했다.", "독립 전쟁 중이던 네덜란드 의회가 소집했다."], "answer": 4, "explanation": "도르트 신조는 4장으로 구성되어 있다. 도르트 회의 초기에는 알미니우스주의를 주장한 항론파들도 참석했다. 다른 국가 개혁교 회의 대표자들도 초대되었는데 프랑스 대표들은 국왕의 처벌 위협 때문에 끝내 참석하지 못했다. 이 회의는 당시 독립전쟁 중 휴전 기간에 네덜란드 의회가 소집했다."}, {"id": "교회사-0445", "subject": "교회사", "section": "근현대교회사", "qnum": 40, "stem": "다음 중 예정론과 관련한 도르트 회의의 결정과 가장 거리가 먼 주장은?", "choices": ["예수님께서는 전체 인류를 위하여 돌아가셨으므로 그 효력은 모든 사람에게 해당한다.", "인간은 죄로 인해 전적으로 타락하여 스스로의 힘으로 은혜를 깨달을 수 없다.", "하나님께서 택한 자들에게 주시는 구원의 은혜는 인간이 거절할 수 없다.", "택자들을 향한 하나님의 예정은 하나님의 미리 아심에 의해 조건지어지지 않는다."], "answer": 1, "explanation": "도르트 회의가 결정한 신조는 예수 그리스도의 대속적 죽음의 효력은 오직 선택된 사람들에게만 해당된다고 주장한다."}, {"id": "교회사-0446", "subject": "교회사", "section": "근현대교회사", "qnum": 41, "stem": "다음은 성도의 견인에 대한 도르트 신조의 한 부분이다. 빈칸에 들어갈 알맞은 말이 바르게 짝지 어진 것은? 따라서 성도들이 믿음과 은혜에서 완전히 떨어져 나가지 않고 행여 실족하더라도 보존이 되며 완전히 잃어버림이 되지 않는 것은 그들 자신의 공로나 힘 때문이 아니라 자격이 없는 자에게 베푸시는 하나님의 ) 때문이다. 신자들 자신만을 놓고 보면 믿음과 은혜에서 완전히 떠나는 일은 쉽게 일어날 뿐 아니라 반드시 일어날 것이다. 그러나 하나님을 생각하면 그러한 일은 절대 일어날 수 없다. 왜냐하면 그분의 )이(가) 변경될 수 없고 그분의 약속은 파기될 수 없으며 그분이 목적하시고 부르신 것은 취소될 수 없기 때문이다.", "choices": ["자비 - 섭리", "예지 - 작정", "자비 - 작정", "예지 - 섭리"], "answer": 3, "explanation": "도르트 신조는 성도의 견인에 대해 진술하면서 성도의 구원을 끝까지 지켜주시는 견인의 은혜는 신자의 어떤 자격조격이나 노력 때문이 아니라 전적으로 하나님의 자비 때문이며, 하나님의 작정이 변하지 않기 때문임을 주장한다."}, {"id": "교회사-0447", "subject": "교회사", "section": "근현대교회사", "qnum": 42, "stem": "도르트 신조의 다음 구절은 개혁신학의 어떤 주제를 강조하며 주장하기 위한 것인가? 성경은 우리를 택하신 영원하고 감당할 수 없는 은혜를 우리에게 알려주는데 특히 모든 사람이 선택된 것이 아니라 어떤 사람은 선택되지 않았음을 증거할 때 그렇다. 하나님께서는 그분의 영원한 선택 가운데서 어떤 사람은 간과하신다. 하나님께서는 자신의 심히 자유롭고 공의롭고 흠 없고 변함없는 선하신 기쁨 속에서 자신들 의 죄로 인해 떨어져 버린 그들의 공통된 비참 가운데 그들을 그냥 버려두시고 구원의 믿음과 회심의 은혜를 베풀지 않기로 작정하셨다. 전적인 타락 ② 무조건적 선택", "choices": ["전적인 타락", "무조건적 선택", "성도의 견인", "불가항력적 은혜"], "answer": 2, "explanation": "도르트 신조는 알미니우스주의자들의 예지예정론에 맞서 하나님의 선택에 있어 어떤 조건도 거부하는 무조건적 선택을 주장했다."}, {"id": "교회사-0448", "subject": "교회사", "section": "근현대교회사", "qnum": 43, "stem": "프랑스의 국왕 루이 13세 통치 기간 섭정을 담당했던 추기경으로서 종교적 신념보다는 정치적 이 해관계에 따라 국정을 운영함으로써 왕권을 강화하는 데 기여했으나 국내에서는 개신교도들을 박 해했던 인물은?", "choices": ["콜리니", "리슐리외", "마자렝", "콩데"], "answer": 2, "explanation": "루이 13세 통치 초기 섭정했던 추기경 리슐리외는 외교 정책에서 있어서는 교황청에 대해 프랑스의 이익을 추구했지만 국내적 으로는 위그노들을 크게 박해했다."}, {"id": "교회사-0449", "subject": "교회사", "section": "근현대교회사", "qnum": 44, "stem": "절대왕권을 주장한 루이 14세가 개신교도들에게 허락된 예배의 자유를 폐지한 1685년의 칙령은?", "choices": ["낭트 칙령", "퐁텐블로 칙령", "베르사이유 칙령", "보름스 칙령"], "answer": 2, "explanation": "스스로를 태양왕이라고 칭하며 절대왕정을 이루어낸 루이 14세는 1685년 퐁텐블로 칙령을 통해 1598년 공포된 낭트 칙령을 폐지하고 위그노들의 예배를 금지했다."}, {"id": "교회사-0450", "subject": "교회사", "section": "근현대교회사", "qnum": 45, "stem": "다음 중 프랑스의 왕 루이 14세의 종교정책과 그 결과로 볼 수 없는 것은?", "choices": ["교황에 맞서 프랑스 교회의 자유와 독자적 운영을 주장했다.", "개신교도들의 개종을 유도하기 위해 회유와 박해를 동시에 사용했다.", "위그노들을 탄압함으로써 프랑스의 국가 경제를 발전시켰다.", "국왕의 권력을 강화하여 절대왕정을 수립했다."], "answer": 3, "explanation": "위그노들을 박해했던 루이 14세의 종교정책은 왕권 강화를 목적으로 삼았다. 그러나 박해를 피해 상업과 수공업에 많이 종사하 던 위그노들이 국외로 탈출함으로써 국가 경제에 큰 손실이 발생했다."}, {"id": "교회사-0451", "subject": "교회사", "section": "근현대교회사", "qnum": 46, "stem": "다음 중 데카르트의 사상과 가장 거리가 먼 것은?", "choices": ["공리적 진리를 찾기 위해 방법론적 회의를 전개했다.", "생각하는 나의 존재에 대한 명증한 기초로부터 신존재를 증명했다.", "이분법적 인간론을 거부하고 유물론적 사고를 제시했다.", "선한 신을 증명함으로써 자연과학적 탐구의 가능성을 확보했다."], "answer": 3, "explanation": "데카르트는 방법론적 회의를 동원하여 지식의 기초에 대한 기성 권위를 반성하고 비판 불가능한 지식의 기초로서 Cogito ergo sum, 즉 생각하는 나의 존재의 확실성을 주장했다. 그리고 이 기초로부터 신의 존재와 신의 선함에 기초한 경험 지식 가능성을 논증했다. 따라서 데카르트의 방법론적 회의론은 회의주의나 유물론으로 귀결되지는 않는다."}, {"id": "교회사-0452", "subject": "교회사", "section": "근현대교회사", "qnum": 47, "stem": "다음 중 유럽의 근대 사상가와 그들의 대표적인 사상을 바르게 연결한 것은? \" 스피노자 - 육체와 영혼은 하나의 실체가 갖고 있는 속성이다.", "choices": ["스피노자 - 육체와 영혼은 하나의 실체가 갖고 있는 속성이다.", "로크 - 모든 지식은 인간에게 생득적으로 내재된 지식으로부터 말미암는다.", "라이프니츠 - 종교는 역사적 계시에 의존하지 않는 보편적 인간본성에 따라야 한다.", "데카르트 - 독립된 실체인 단자들이 신적 질서에 따라 상호의존적으로 운동한다."], "answer": 1, "explanation": "스피노자는 육체와 영혼은 하나의 실체가 갖고 있는 속성이라고 주장했다. 로크는 모든 지식은 경험에서 나온다고 주장했다. 보 편적 인간본성에 따른 종교만을 주장한 것은 라이프니츠가 아니라 볼테르와 같은 계몽주의자들과 로크를 비롯한 영국의 이신론 자들이다. 라이프니츠(Gottfried Wilhelm Leibniz, 1646-1716)는 독립된 실체적 단자들의 조화를 주장했다."}, {"id": "교회사-0453", "subject": "교회사", "section": "근현대교회사", "qnum": 48, "stem": "다음 중 17세기 이후 영국에서 확산된 이신론자들의 주장에 가장 어울리지 않는 말은?", "choices": ["보편종교는 역사적 계시에 의존하지 않고 보편적 인간본성에 의지해야 한다.", "기독교의 중심 내용은 결국 자연 종교의 내용과 일치할 수 없다.", "신앙고백을 강조하는 전통적 신앙은 편협한 교리주의에 불과하다.", "예수 그리스도의 신성은 이성적으로 증명될 수 없다."], "answer": 2, "explanation": "17세기 이후 영국에서 확산한 이신론(Deism)은 이성의 가능성 내에서만 하나님의 존재와 활동을 인정하려 했다. 이들은 신앙고 백 중심의 기독교를 편협한 것으로 보고 비판했으며 정통 삼위일체교리나 기독론을 이성적 증명이 불가능하다고 비판했다. 그들 은 기독교의 중심 내용을 자연 종교의 내용과 일치시키려 했다."}, {"id": "교회사-0454", "subject": "교회사", "section": "근현대교회사", "qnum": 49, "stem": "근대 유럽 계몽주의자들이 가졌던 기독교 이해에 대한 설명으로 적합하지 않은 것은? 특별한 교파나 경전의 하나님이 아닌 보편적인 신에 대한 신앙을 추구해야 한다.", "choices": ["특별한 교파나 경전의 하나님이 아닌 보편적인 신에 대한 신앙을 추구해야 한다.", "이성의 올바른 사용을 통해 바람직한 인간상을 구현해야 한다.", "바른 종교는 도그마와 교회의 역사적 전통으로 검증된 신앙을 회복하는 것이다.", "로마 가톨릭에 의한 개신교도들에 대한 박해를 중단하고 종교적 관용을 회복해야 한다."], "answer": 3, "explanation": "18세기 유럽의 계몽주의자들은 대부분 도그마와 역사적 전통에 따른 기독교 신앙을 비판하고 이성의 올바른 사용에 따른 보편 적 신앙을 추구했으며 절대왕정을 향해서는 종교적 관용을 촉구했다."}, {"id": "교회사-0455", "subject": "교회사", "section": "근현대교회사", "qnum": 50, "stem": "1624년 영국에서 직공의 아들로 출생했으며 모든 교회 제도와 체계에 반대하고 내면적 빛에 의 해 하나님을 신앙해야 한다고 주장하여 퀘이커 교도들에게 큰 영향을 준 인물은?", "choices": ["야콥 뵈메", "조지 폭스", "임마누엘 스웨덴보리", "윌리엄 펜"], "answer": 2, "explanation": "조지 폭스(George Fox, 1624-1691)는 기존 예배 형식이나 교회 제도를 부인하고 내면적 빛을 강조했던 퀘이커 교도들에게 큰 영향을 준 인물이다."}, {"id": "교회사-0456", "subject": "교회사", "section": "근현대교회사", "qnum": 51, "stem": "다음 중 근대 유럽에서 활동한 종교사상가 스웨덴보리에 대한 설명으로 옳지 않은 것은? 1688년 스웨덴에서 출생했다. 근대의 과학적 탐구와 기독교 신앙을 연결하려 했다.", "choices": ["1688년 스웨덴에서 출생했다.", "근대의 과학적 탐구와 기독교 신앙을 연결하려 했다.", "범신론적 세계관을 주장했다.", "니케아 신조의 전통을 고수했다."], "answer": 4, "explanation": "스웨덴보리는 범신론적 이해에 따른 기독교의 재편을 주장했으며 따라서 정통 삼위일체 교리를 받아들이지 않았다."}, {"id": "교회사-0457", "subject": "교회사", "section": "근현대교회사", "qnum": 52, "stem": "18세기 독일에서 전개된 경건주의 운동과 가장 거리가 먼 인물은?", "choices": ["필립 야콥 슈페너", "요한 아른트", "아우구스트 헤르만 프랑케", "요한 게르하르트"], "answer": 4, "explanation": "18세기 독일에서는 형식화된 신앙을 반성하면서 경건주의 운동이 전개되었다. 슈페너, 아른트, 프랑게 등이 경건주의 운동의 중 요한 인물들이다. 한편 요한 게르하르트는 17세기 루터교 정통주의 신학자이다."}, {"id": "교회사-0458", "subject": "교회사", "section": "근현대교회사", "qnum": 53, "stem": "다음 중 슈페너가 저술한 \"경건한 열망\"(Pia Desidera)에 대한 설명으로 적합하지 않은 것은?", "choices": ["일반 신자들의 경건을 증진시키기 위한 목적으로 저술되었다.", "신학교 운영과 신학생 교육에 대한 내용을 담고 있다.", "새로운 형식과 내용의 설교가 이루어져야 할 필요성을 주장했다.", "사적인 모임보다는 목회자가 중심이 되는 공적 성경연구를 강조했다."], "answer": 4, "explanation": "슈페너는 1680년 \"경건한 열망'을 발표하여 경건주의 운동의 가장 기본적인 지침을 제시했다. 이 책은 개인의 성경공부뿐 아니 라 신학교육의 갱신까지 다룬다. 슈페너는 공식적 성경공부 모임을 보충하는 사적 모임의 도입을 추천했다."}, {"id": "교회사-0459", "subject": "교회사", "section": "근현대교회사", "qnum": 54, "stem": "18세기 독일에서 전개된 경건주의 운동과 가장 무관한 것은?", "choices": ["기존의 루터파 교회로부터 독립해 독자적으로 교회를 조직했다.", "\"만인사제사상\"에 근거해 평신도와 목회자의 동등함을 강조했다.", "공동체적인 실천과 헌신을 위해 빈민구제와 고아원 운영을 시행했다.", "개신교회의 선교 운동에 자극을 주었다."], "answer": 1, "explanation": "18세기 독일에서 전개된 경건주의 운동은 신비주의와는 달리 성경연구에 기초한 공동체적 경건을 추구했으며 실제적인 봉사와 선교를 통한 경건의 실천을 추진했다. 그리고 기존 루터교의 교리를 부인하거나 루터교의 권위와 충돌하지 않으려 했다."}, {"id": "교회사-0460", "subject": "교회사", "section": "근현대교회사", "qnum": 55, "stem": "1700년 드레스덴에서 태어나 슈페너의 영향을 받아 경건주의 운동에 헌신했으며 모라비아 공동 체를 후원하여 헤른후트 공통체를 창설했던 인물은?", "choices": ["니콜라스 진젠도르프", "바돌로메우스 지겐발크", "고트프리트 아놀트", "크리스찬 토마시우스"], "answer": 1, "explanation": "1700년 드레스덴에서 출생한 진전도르프는 경건주의자로서 모라비아 공동체를 후원했으며 헤른후트 공동체를 창설하고 이를 중 심으로 신대륙 선교에 헌신했다."}, {"id": "교회사-0461", "subject": "교회사", "section": "근현대교회사", "qnum": 56, "stem": "다음 중 존 웨슬리의 생애에 대한 설명으로 정확하지 않은 것은? o 1703년 영국 중부 웨스에서 국교회 사제의 아들로 출생했다.", "choices": ["1703년 영국 중부 웨스에서 국교회 사제의 아들로 출생했다.", "옥스퍼드 대학 재학 시절 홀리클럽을 조직해 경건 운동을 시작했다.", "신대륙 조지아주 사바나에서 선교활동을 하던 중 진정한 회심을 경험했다.", "모라비안 공동체의 영향을 받았으나 그들과 신학적 교류를 계속하지는 않았다."], "answer": 3, "explanation": "1703년 영국 국교회 목사의 아들로 태어난 존 웨슬리는 옥스퍼드 대학 재학 시절부터 홀리클럽을 창설하고 동료 학생들과 경건 운동에 힘썼다. 졸업 후 신대륙 조지아 선교에 헌신했으나 실패를 경험한 후 런던으로 돌아와 머무는 동안 1738년 5월 24일 올더스게이트에서 모라비아 공동체 모임에 참석하여 진정한 회심을 경험했다."}, {"id": "교회사-0462", "subject": "교회사", "section": "근현대교회사", "qnum": 57, "stem": "웨슬리와 휘필드에 의해서 시작된 감리교 운동에 대한 설명으로 바르지 않은 것은? 감리교 운동은 모두 예정론에 있어서 칼빈의 입장을 따르지 않았다.", "choices": ["감리교 운동은 모두 예정론에 있어서 칼빈의 입장을 따르지 않았다.", "적극적인 복음 전도를 위해 옥외 설교 방식을 사용했다.", "초기에는 영국 국교회로부터의 분리를 추진하지 않았다.", "조직을 확장해 가는 과정에서 평신도와 여성들의 설교권을 일부 인정했다."], "answer": 1, "explanation": "웨슬리와 휘필드를 중심으로 영국에서 시작된 감리교 운동은 적극적인 복음 전도를 위해 옥외 설교를 시행했다. 효과적인 설교 사역을 위해 평신도와 여성들의 설교도 일부 인정하는 등 기성 교회와는 차별되는 방식을 허용했으나 영국 국교회로부터 분리하 려 하지 않았다. 그리고 감리교 운동을 전개했던 모든 사람들이 칼빈주의적 예정론을 거절한 것은 아니다. 웨슬리와 달리 휘필 드는 칼빈의 예정론을 충실하게 주장했고 이는 감리교 운동 안에서 신학적 갈등을 불러일으켰다."}, {"id": "교회사-0463", "subject": "교회사", "section": "근현대교회사", "qnum": 58, "stem": "1745년 영국 햄스테드 브리지에서 태어난 인물로서 1771년 존 웨슬리의 설교에 감명을 받아 신 대륙으로 이주하여 감리고 운동을 전개했으며 미국에 감리 감독교회가 설립되는 데 지대한 영향 을 준 인물은?", "choices": ["로저 윌리엄스", "프란치스코 애즈버리", "조셉 필모어", "프란치스코 매케미"], "answer": 2, "explanation": "프란치스코 애즈버리(Francis Asbury. 1745-1816)는 미국에서 감리교 운동이 감독제도를 통해 조직되어 독자적으로 발전하는 데 크게 공헌했다."}, {"id": "교회사-0464", "subject": "교회사", "section": "근현대교회사", "qnum": 59, "stem": "다음 중 조지 휫필드에 대한 설명으로 올바른 것은? O 1714년 스코틀랜드에서 출생했다.", "choices": ["1714년 스코틀랜드에서 출생했다.", "옥스퍼드 크라이스트 처치 대학 재학 중 웨슬리와 홀리클럽에 동참했다.", "여러 차례 미국을 방문하여 제2차 대각성운동에 큰 영향을 주었다.", "성도의 삶의 변화를 강조하면서도 칼빈주의적인 예정론을 취했다."], "answer": 4, "explanation": "1714년 잉글랜드 글루스터에서 출생한 조지 휫필드는 옥스퍼드의 펨브로크 대학 재학 중 웨슬리와 함께 홀리클럽 멤버로 활동 했다. 휘필드는 신대륙을 방문해 1740년대 전개된 제1차 대각성운동에 크게 영향을 끼쳤다. 그는 신자의 진정한 회심과 삶의 헌신을 강조했지만 웨슬리와 달리 칼빈주의적 예정론을 고수했다."}, {"id": "교회사-0465", "subject": "교회사", "section": "근현대교회사", "qnum": 60, "stem": "다음 중 존 웨슬리가 전개한 감리교 운동의 영향을 받아 노예제도 폐지 운동을 추진했던 영국의 정치가는 누구인가?", "choices": ["존 뉴턴", "아이작 와츠", "윌리엄 윌버포스", "윌리엄 로"], "answer": 3, "explanation": "영국의 정치가 윌리엄 윌버포스(Wiliam Wlbertorce, 1759-1833)는 1784년 하원의원이 된 이후부터 노예제도 폐지를 위해 헌신했다. 그의 헌신의 결과 그가 죽기 3일 전인 1833년 7월 26일 노예제도 폐지법안이 의회를 통과했다. 그는 웨슬리나 존 뉴튼(John Newton) 목사와 대화하면서 신앙적 차원에서 노예제도 폐지를 주장했던 복음주의 정치가로 평가받고 있다."}, {"id": "교회사-0466", "subject": "교회사", "section": "근현대교회사", "qnum": 61, "stem": "1585년 잉글랜드 캠브리지에서 출생했으며 1611년 영국의 최초 식민지인 버지니아의 제임스 강 가에서 목회했으며 원주민을 선교해 포카혼타스 등에게 세례를 주었던 목회자는?", "choices": ["알렉산더 휘태커", "로버트 헌트", "존 스미스", "존 화이트"], "answer": 1, "explanation": "알렉산더 휘태커는 영국에서 교회 지도자로서 중요한 역할을 담당했으며 1611년 신대륙의 첫 식민지 버지니아로 이주한 이후에 도 교회를 설립하여 장로교적으로 운영했으며, 더 나아가 현지 주민들을 선교하는 일에도 헌신했다."}, {"id": "교회사-0467", "subject": "교회사", "section": "근현대교회사", "qnum": 62, "stem": "다음은 1620년 작성된 메이플라워 협약의 일부분이다. 이 문서와 관련한 설명으로 타당한 것은? 우리는 하나님의 영광과 기독교 신앙의 진흥 및 국왕과 국가의 명예를 위해 버지니아 북부에 최초의 식민지를 건설하기 위해 항해를 계획했고, 개척지에서 질서와 유지, 위의 목적의 촉진을 위해서 하나님과 서로의 앞에 엄숙하게 계약을 체결하며, 우리 스스로 민간 정치체제를 결성할 것을 결정했다. 이것을 제정하여 우리 식민지 의 총체적인 이익을 위해 식민지의 사정에 가장 잘 적합하다고 생각되는 정당하고 평등한 법률, 조례, 법 헌법이나 직책을 만들어, 우리 모두 당연히 복종과 순종할 것을 약속한다. 메이플라워호 출항 전 잉글랜드에서 청교도들에 의해 결의되었다.", "choices": ["메이플라워호 출항 전 잉글랜드에서 청교도들에 의해 결의되었다.", "새로운 식민지에서 철저하게 본국 국왕의 지배를 받을 것을 서약했다.", "정치적 조직의 정당성을 구성원들의 합의와 계약에 두었다.", "참정권의 기준을 바른 신앙보다는 출신 배경에 두었다."], "answer": 3, "explanation": "1620년 메이플라워호를 타고 메사추세츠 플리머스에 도착한 청교도들은 협약을 발표하여 자신들의 신앙적 취지를 밝혔다. 이 협약은 국왕과 국가의 명예를 언급하지만 실제로는 그리스도에 의한 통치와 그리스도의 영예를 위한 사회 건설을 가장 중요한 목적으로 삼았다. 이들은 정치적 조직의 정당성을 구성원들의 합의와 계약에 둠으로써 민주적 사회 운영을 추구했으며 참정권의 기준은 출신 배경이나 계층적 특권에 두지 않고 바른 신앙의 고백 위에 두었다."}, {"id": "교회사-0468", "subject": "교회사", "section": "근현대교회사", "qnum": 63, "stem": "청교도 목사였던 로저 윌리엄스가 정교분리와 모든 신앙의 자유를 주장하면서 1636년 프로비던 스를 중심으로 개척한 신대륙의 식민지는?", "choices": ["메사추세츠", "로드 아일랜드", "코네티컷", "메릴랜드"], "answer": 2, "explanation": "로저 윌리엄스는 1636년 프로비던스를 중심으로 로드 아일랜드를 개척했고 정교의 분리와 모든 신앙의 자유를 보장하려 했다."}, {"id": "교회사-0469", "subject": "교회사", "section": "근현대교회사", "qnum": 64, "stem": "1630년대 신대륙으로 이주한 존 윈스롭 등의 청교도 지도자들이 세상의 모든 나라가 우러러볼 수 있고 복음을 널리 증거할 수 있는 바람직한 사회와 국가 건설을 소망하면서 주장한 구호는?", "choices": ["소금과 빛", "언덕 위의 도시", "하나님의 도성", "운명의 길"], "answer": 2, "explanation": "신대륙으로 이주한 청교도들은 마태복음 5장 14절을 인용해 새로운 땅에서 \"언덕 위의 도시\"를 건설해 바람직한 기독교 사회를 세우려는 이상을 품었다."}, {"id": "교회사-0470", "subject": "교회사", "section": "근현대교회사", "qnum": 65, "stem": "18세기 신대륙에서 발생한 대각성운동에 대한 설명 중 올바른 것만을 묶은 것은? 가. 조나단 에드워즈의 사역이 중요한 계기가 되었다. 나. 영국에서 방문한 조지 휫필드의 순회 설교가 영향을 주었다. 다. \"부흥을 추구하는 북아메리카 기독교의 특징이 형성되었다. 라. 신비주의적 성격으로 인해 칼빈주의적 예정론이 약화되었다. 마. 부흥운동의 결과로 몰몬교와 안식교와 같은 신흥 기독교도 등장했다.", "choices": ["가, 나", "가, 나, 다", "가, 나, 다, 라", "가, 나, 다, 라, 마"], "answer": 2, "explanation": "대각성운동 혹은 대부흥운동은 영국의 식민지배를 받던 신대륙과 미국 기독교의 중요한 특징이었다. 1740년대 전후 독립 이전 신대륙에서 벌어진 제1차 대각성운동은 조나단 에드워즈를 비롯한 설교자들의 사역을 통해 본격화되었으며 조지 필드의 순회 설교 역시 큰 영향을 주었다. 그러나 신비주의적 성향으로 인해 칼빈주의적 신학이 약화되지는 않았다. 몰몬교와 안식교 등 신 흥종교들은 미국이 독립한 이후 19세기에 출현했다."}, {"id": "교회사-0471", "subject": "교회사", "section": "근현대교회사", "qnum": 66, "stem": "신대륙에서 발생한 여러 차례의 대각성운동과 그 중요한 지도자들이 바르게 연결된 것은?", "choices": ["1차 대각성운동 - 티모시 드와이트", "2차 대각성운동 - 찰스 피니", "3차 대각성운동 - 조나단 에드워즈", "4차 대각성운동 - 드와이트 무디"], "answer": 2, "explanation": "19세기 초 전개된 제2차 대각성운동 시기 찰스 피니는 가장 중요한 부흥운동의 지도자였다. 그는 \"종교부흥 강의\"(1835)를 저 술했고 부흥은 기적이 아니라 적절한 방법을 사용하여 얻어낼 수 있는 노력의 결과라고 주장했다."}, {"id": "교회사-0473", "subject": "교회사", "section": "근현대교회사", "qnum": 68, "stem": "다음 중 1776년 독립을 선언한 미국의 기독교 발전의 특징으로 보기 어려운 것은?", "choices": ["미국 성공회와 감리교를 비롯한 여러 교파들이 독자적으로 발전했다.", "진취적이고 자유로운 인간이해에 기초한 기독교 교파들이 나타났다.", "유럽에서의 이민의 증가로 로마 가톨릭과 루터파 교회의 수도 증가했다.", "대각성운동의 열정이 약화되고 합리주의적 이신론이 주류 기독교 신앙으로 자리잡았다."], "answer": 4, "explanation": "1776년 독립한 미국은 정교분리와 종교의 자유를 헌법 1조에 명시했다. 이후 미국에서는 각 교파들이 독자적인 전도와 선교를 통해 발전했으며 이민자들의 유입에 따라 로마 가톨릭도 성장했다. 미국 기독교는 자유로운 인간이해에 기초한 진취적 성격을 뚜렷이 보여주지만 대각성운동의 열정이 약화되지는 않았고, 이신론이 지배적인 신학으로 자리 잡은 것도 아니다."}, {"id": "교회사-0474", "subject": "교회사", "section": "근현대교회사", "qnum": 69, "stem": "다음 중 미국 남북전쟁 시기 미국 교회에서 나타난 현상에 대한 가장 적절한 설명은?", "choices": ["미국 교회는 모두 노예제도를 반대했다.", "전쟁이 발발하자 장로교를 비롯한 여러 교단들이 분열했다.", "흑인들을 중심으로 설립된 교회들은 점차 백인 교회에 흡수되었다.", "남북전쟁 이후 신앙적 회의가 팽배하여 교회가 급속히 쇠퇴했다."], "answer": 2, "explanation": "1861년부터 1865년까지 벌어진 미국의 내전인 남북전쟁은 미국의 교회들을 교파를 망라하여 분열시켰다. 미국의 각 교회들은 신학적 입장이나 교파의 신앙고백보다는 남부와 북부의 정치 경제적 입장에 따라 노예제도를 적극 반대하거나 소극적으로 지지 하는 입장을 취했다. 북부의 승리로 인해 노예제도가 폐지되었음에도 불구하고 흑인들에 대한 차별이 계속되었으며 이후 흑인들 을 중심으로 한 교파들은 독자적으로 성장해 나갔다. 전쟁의 참혹한 결과는 미국인들에게 신앙적 열정과 영적 각성을 새롭게 일 으켰다."}, {"id": "교회사-0475", "subject": "교회사", "section": "근현대교회사", "qnum": 70, "stem": "다음 중 19세기에 미국에서 처음으로 출현한 기독교와 관련한 신흥종교나 이단에 속하지 않는 것은? • 몰몬교 ② 여호와의 증인 ③ 크리스천 사이언스 ④ 유니테리언", "choices": ["몰몬교", "여호와의 증인", "크리스천 사이언스", "유니테리언"], "answer": 4, "explanation": "정교분리를 헌법에 명시한 19세기 미국에서는 다양한 기독교 분파 및 이단들이 등장해 세력을 확장했다. 유니테리언들은 예수 그리스도의 완전한 신성을 인정하지 않고 삼위일체 교리를 부인하는 자들로서 16세기 등장한 소시누스주의로부터 영향을 받았 으며 18세기 이신론자들을 통해 이미 신대륙에서 시작되었다."}, {"id": "교회사-0476", "subject": "교회사", "section": "근현대교회사", "qnum": 71, "stem": "다음은 근대주의에 맞서기 위해 로마 교황 피우스 9세가 1869년 소집한 제1차 바티칸 공의회에 서 결정된 교황에 대한 교리의 일부분이다. 보기 중 빈칸에 가장 합당한 용어는 무엇인가? 로마 교황이 모든 신자들의 목자이자 교사로서 자신의 직분에 의거하여 전체 교회가 지켜야 할 신앙과 생활에 관련 교리를 정하여 말하는 것은 지존한 사도들의 권위와 복된 베드로에게 약속하신 하나님의 거룩한 도움으로 인해 )을 지닌다.", "choices": ["신적 무오류성", "도덕적 우월성", "법적 구속력", "보편적 규범성"], "answer": 1, "explanation": "제1차 바티칸 공의회는 근대 합리주의의 도전에 대항하기 위해 교황의 신적 무오류성을 주장하고 이를 바탕으로 유럽의 근대국 가들이 시행하는 여러 정책들을 정죄했다."}, {"id": "교회사-0477", "subject": "교회사", "section": "근현대교회사", "qnum": 72, "stem": "다음 중 19세기 독일에서 발표된 자유주의 신학을 담은 저술이 아닌 것은?", "choices": ["불트만의 \"공관복음 전승사\"", "하르낙의 \"교리사\"", "포이에르바하의 \"기독교의 본질\"", "리츨의 \"칭의와 화해에 대한 기독교 교리\""], "answer": 1, "explanation": "루돌프 불트만의 \"공관복음 전승사\"는 1921년 발표되었다."}, {"id": "교회사-0478", "subject": "교회사", "section": "근현대교회사", "qnum": 73, "stem": "1768년 실레지아에서 개혁파 목사의 아들로 태어났으며 1799년 \"종교론\"을 발표해 큰 영향을 끼 쳤고, 전통적 기독교를 근대적 안목으로 재해석하여 기독교 신앙의 기초를 정통 교리나 신앙고백 이 아니라 인간적 종교 체험과 감정이라고 이해했던 사상가는?", "choices": ["요한 고틀리프 피히테", "쇠렌 키에르케고르", "프리드리히 슐라이어마허", "프리드리히 니체"], "answer": 3, "explanation": "프리드리히 슐라이어마허는 \"종교론'(1799)에서 인간의 보편적 종교 체험과 공통의 감정에 기초한 기독교 신학을 주장했다."}, {"id": "교회사-0479", "subject": "교회사", "section": "근현대교회사", "qnum": 74, "stem": "다음 중 네덜란드의 신학자이며 정치가인 카이퍼에 대한 설명으로 적합하지 않은 것은?", "choices": ["1880년 암스테르담 자유대학을 설립했다.", "반혁명당을 이끌고 네덜란드의 수상이 되었다.", "그가 주장한 영역주권 사상은 이후 개혁신학에 큰 영향을 주었다.", "1886년 국가교회에 맞서 \"분리\"(Afscheiding) 운동을 전개했다."], "answer": 4, "explanation": "아브라함 카이퍼는 국가의 교회통제 정책을 반대하고 1880년 암스테르담에 자유대학을 설립했으며 \"애통\"(Doleantie) 운동을 통해 국가교회로부터 분리했다. 신학적으로는 칼빈의 신학을 사회, 문화, 정치 영역에까지 영역주권 사상을 통해 광범위하게 확 대해 적용하려 했다. 그는 더 나아가 목사직과 교수직을 내려놓고 직접 정치에 뛰어들어 기독교 정신에 입각한 반혁명당을 이끌 었고 1901년 수상에 취임해 1905년까지 수상직을 수행했다."}, {"id": "교회사-0480", "subject": "교회사", "section": "근현대교회사", "qnum": 75, "stem": "다음 중 20세기 두 차례 세계대전 이후 기독교의 특징으로 볼 수 없는 것은?", "choices": ["로마 가톨릭은 제2차 바티칸 공의회를 소집해 보수적 입장을 강화했다.", "개신교회는 전 세계적인 선교를 적극 추진했다.", "실존주의 신학, 해방신학, 토착화 신학 등 다양한 신학적 추구로 전개되었다.", "흑인과 여성, 노동자와 같은 교회 내의 다양한 목소리가 커졌다."], "answer": 1, "explanation": "두 차례의 세계대전 이후 로마 가톨릭은 1962년부터 1965년까지 제2차 바티칸 공의회를 개최하여 대사회적 입장이나 타종교 에 대한 입장에서 기존의 수구적 입장보다는 유연한 신학적 입장을 표명했다. 그러나 교황수위권을 비롯한 가장 중요한 신학적, 교회적 입장을 변경한 것은 아니다. 개신교는 다양한 구성원들의 목소리를 반영한 신학이 전개되었으며 세계 선교를 적극 추진 하기 시작했다."}, {"id": "교회사-0481", "subject": "교회사", "section": "근현대교회사", "qnum": 76, "stem": "바르트와 불트만, 본회퍼 등 독일의 기독교 지도자들이 히틀러의 나치 독재와 폭압에 맞서 1934 년 기독교 신앙의 바른 태도에 대해 천명한 선언은?", "choices": ["베를린 선언", "포츠담 선언", "바르멘 선언", "뮌헨 선언"], "answer": 3, "explanation": "독일의 나치 정권의 독재적이며 폭압적인 정책에 맞서 독일 고백교회의 양심적인 인사들은 1934년 바르멘에 모여 기독교 신앙 의 바른 태도에 대해 천명하는 \"바르멘 선언\"을 발표했다. 이 선언은 바르트의 신학적 입장을 따라 하나님의 말씀인 예수 그리 스도만이 복종의 대상이요. 하나님의 계시라고 말함으로써 히틀러의 종교정책에 대한 반대를 분명히 했다."}, {"id": "교회사-0482", "subject": "교회사", "section": "근현대교회사", "qnum": 77, "stem": "다음 중 20세기 독일의 기독교 신학자 본회퍼가 쓴 저술이 아닌 것은?", "choices": ["신도의 공동생활", "옥중서신", "교회교의학", "나를 따르라"], "answer": 3, "explanation": "교회교의학'은 칼 바르트의 대표작이다."}, {"id": "교회사-0483", "subject": "교회사", "section": "근현대교회사", "qnum": 78, "stem": "다음 중 20세기 미국에서 활동한 대표적인 신학자와 그의 작품을 바르게 연결한 것은?", "choices": ["라인홀트 니버- 그리스도와 문화", "그레샴 메이첸- 기독교와 자유주의", "리차드 니버 - 도덕적 인간과 부도덕한 사회", "폴 틸리히 - 세속도시"], "answer": 2, "explanation": "\"그리스도와 문화'는 리차드 니버의 작품이며, \"도덕적 인간과 부도덕한 사회'는 그의 형인 라인홀트 니버의 대표적 작품이다. \"세속도시'는 하버드 대학의 교수 하비 콕스의 작품이다. 그레샴 메이첸은 1923년 현대주의의 신학적 도전을 비판하는 \"기독교 와 자유주의'를 발표했다."}, {"id": "교회사-0484", "subject": "교회사", "section": "근현대교회사", "qnum": 79, "stem": "다음 중 1948년 세계교회협의회(WCC)의 첫 총회가 열린 도시는? ^ 에든버러 ② 암스테르담", "choices": ["에든버러", "암스테르담", "에반스톤", "하라레"], "answer": 2, "explanation": "세계교회협의회는 1948년 네덜란드 암스테르담에서 첫 총회를 개최했다."}, {"id": "교회사-0485", "subject": "교회사", "section": "근현대교회사", "qnum": 80, "stem": "다음 중 칼 바르트에 대한 설명으로 바르지 않은 것은?", "choices": ["1886년 스위스 바젤에서 출생한 개혁교회 목사이다.", "1922년 발표한 로마서 주석 2판은 당시 자유주의 신학을 대표하는 작품이다.", "1934년 히틀러의 나치 정책에 반대하는 바르멘 선언을 주도했다", "하나님의 말씀으로서의 예수 그리스도를 강조하는 신학을 전개했다."], "answer": 2, "explanation": "칼 바르트가 1922년 발표한 로마서 주석\" 2판은 당시의 자유주의 신학을 비판하고 하나님의 말씀의 신학을 주장했다."}, {"id": "교회사-0486", "subject": "교회사", "section": "근현대교회사", "qnum": 81, "stem": "1974년 스위스의 로잔에서 열린 제1차 세계복음화국제대회(The First International Congress on World Evangelization)에 대한 설명으로 바르지 않은 것은?", "choices": ["개신교의 보수적이며 복음주의적인 성향을 대표한 회의였다.", "비서구 기독교 대표자들을 포함해 150개국에서 2,700명의 대표자들이 참석했다.", "영국의 대표적 복음주의자인 존 스토트가 의장을 맡았다.", "복음전도와 더불어 교회의 사회적 책임에 대해서도 적극적인 입장을 표명했다."], "answer": 3, "explanation": "존 스토트는 로잔 언약 작성위원회의 위원장으로서 언약의 주요 내용들을 초안했다. 그러나 1974년 로잔 대회의 의장은 미국으 부흥운동가 빌리 그래함이 맡았다."}, {"id": "교회사-0487", "subject": "교회사", "section": "근현대교회사", "qnum": 82, "stem": "다음 중 미국의 흑인인권운동가 마틴 루터 킹에 대한 설명으로 바르지 않은 것은? 호", "choices": ["1929년 미국 조지아주 애틀란타에서 침례교 목사의 아들로 태어났다.", "1955년 프린스턴 신학교에서 박사학위를 받았다.", "1964년 비폭력 저항운동의 공로를 인정받아 노벨 평화상을 수상했다.", "1968년 테네시주 멤피스에서 백인 우월주의자에게 암살당했다."], "answer": 2, "explanation": "마틴 루터 킹은 1955년 보스턴대학에서 조직신학으로 박사학위를 취득했다."}, {"id": "교회사-0488", "subject": "교회사", "section": "근현대교회사", "qnum": 83, "stem": "다음 중 20세기 미국에서 활동한 개혁신학자가 아닌 인물은? ^ 알렉산더 핫지 ② 루이스 벌코프 ③
